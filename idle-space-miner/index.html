        function drawCrosshair() {
            const size = 10;
            const gap = 4;

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            // horizontal left
            ctx.beginPath();
            ctx.moveTo(mouseScreenX - size, mouseScreenY);
            ctx.lineTo(mouseScreenX - gap, mouseScreenY);
            ctx.stroke();

            // horizontal right
            ctx.beginPath();
            ctx.moveTo(mouseScreenX + gap, mouseScreenY);
            ctx.lineTo(mouseScreenX + size, mouseScreenY);
            ctx.stroke();

            // vertical top
            ctx.beginPath();
            ctx.moveTo(mouseScreenX, mouseScreenY - size);
            ctx.lineTo(mouseScreenX, mouseScreenY - gap);
            ctx.stroke();

            // vertical bottom
            ctx.beginPath();
            ctx.moveTo(mouseScreenX, mouseScreenY + gap);
            ctx.lineTo(mouseScreenX, mouseScreenY + size);
            ctx.stroke();

            // center dot
            ctx.beginPath();
            ctx.arc(mouseScreenX, mouseScreenY, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = GREEN;
            ctx.fill();

            ctx.restore();
        }

        function drawLaserBeams() {
            for (const beam of laserBeams) {
                const alpha = beam.life / 12;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 14;

                ctx.beginPath();
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(beam.x2, beam.y2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawHyperlaneGate(x, y, angle, label) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            const pulse = 0.78 + Math.sin(frameCount * 0.08) * 0.12;

            // Gate is drawn top-down, aligned with the lane:
            // lane direction = +X / -X
            // gate width = across the lane (Y axis)

            // --- soft glow ---
            ctx.fillStyle = `rgba(80,255,130,${0.08 * pulse})`;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 16;
            ctx.beginPath();
            ctx.roundRect(-16, -24, 32, 48, 8);
            ctx.fill();

            // --- left pylon ---
            ctx.fillStyle = "rgba(0,255,90,0.12)";
            ctx.strokeStyle = "rgba(120,255,170,0.7)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(-12, -24, 8, 48, 4);
            ctx.fill();
            ctx.stroke();

            // --- right pylon ---
            ctx.beginPath();
            ctx.roundRect(4, -24, 8, 48, 4);
            ctx.fill();
            ctx.stroke();

            // --- top connector ---
            ctx.strokeStyle = `rgba(180,255,210,${0.55 * pulse})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-4, -18);
            ctx.lineTo(4, -18);
            ctx.stroke();

            // --- bottom connector ---
            ctx.beginPath();
            ctx.moveTo(-4, 18);
            ctx.lineTo(4, 18);
            ctx.stroke();

            // --- central gate core / aperture ---
            ctx.strokeStyle = `rgba(180,255,210,${0.75 * pulse})`;
            ctx.fillStyle = `rgba(120,255,170,${0.12 * pulse})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(-5, -10, 10, 20, 4);
            ctx.fill();
            ctx.stroke();

            // --- animated inner energy line ---
            ctx.strokeStyle = `rgba(120,255,170,${0.55 * pulse})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(0, 8);
            ctx.stroke();

            // --- small indicator lights ---
            ctx.fillStyle = GREEN;
            ctx.globalAlpha = 0.75 + Math.sin(frameCount * 0.12) * 0.08;
            ctx.fillRect(-10, -16, 2, 2);
            ctx.fillRect(8, -16, 2, 2);
            ctx.fillRect(-10, 14, 2, 2);
            ctx.fillRect(8, 14, 2, 2);

            ctx.restore();

            if (label) {
                drawText(label, x + 14, y - 18, 0.55);
            }
        }

        function drawHyperlanes() {
            if (hyperlanes.length <= 0) return;

            ctx.save();
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            for (const lane of hyperlanes) {
                const { from, to } = getHyperlaneEndpoints(lane);

                const dx = to.x - from.x;
                const dy = to.y - from.y;
                const len = Math.hypot(dx, dy) || 1;

                const nx = -dy / len;
                const ny = dx / len;

                const angle = Math.atan2(dy, dx);
                const pulse = 0.22 + Math.sin(frameCount * 0.05) * 0.06;

                // --- Outer corridor haze ---
                ctx.strokeStyle = `rgba(80,255,130,${pulse})`;
                ctx.lineWidth = 16;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 22;
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();

                // --- Main lane body ---
                ctx.strokeStyle = "rgba(100,255,150,0.22)";
                ctx.lineWidth = 9;
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();

                // --- Bright inner core ---
                ctx.strokeStyle = "rgba(180,255,210,0.32)";
                ctx.lineWidth = 3;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();

                // --- Animated energy flow strands ---
                ctx.strokeStyle = "rgba(120,255,170,0.32)";
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 6;

                for (let s = -1; s <= 1; s++) {
                    const offset = s * 4;

                    ctx.setLineDash([14, 10]);
                    ctx.lineDashOffset = -(frameCount * 1.2 + s * 9);

                    ctx.beginPath();
                    ctx.moveTo(from.x + nx * offset, from.y + ny * offset);
                    ctx.lineTo(to.x + nx * offset, to.y + ny * offset);
                    ctx.stroke();
                }

                ctx.setLineDash([]);

                // --- Structural ribs across the corridor ---
                ctx.strokeStyle = "rgba(80,255,130,0.22)";
                ctx.lineWidth = 1;
                ctx.shadowBlur = 0;

                const ribSpacing = 70;
                const ribHalfWidth = 10;

                for (let d = 40; d < len - 40; d += ribSpacing) {
                    const px = from.x + dx / len * d;
                    const py = from.y + dy / len * d;

                    ctx.beginPath();
                    ctx.moveTo(px - nx * ribHalfWidth, py - ny * ribHalfWidth);
                    ctx.lineTo(px + nx * ribHalfWidth, py + ny * ribHalfWidth);
                    ctx.stroke();
                }

                // --- Small moving plasma packets ---
                for (let i = 0; i < 5; i++) {
                    const p = ((frameCount * 0.01) + i / 5) % 1;
                    const px = from.x + dx * p;
                    const py = from.y + dy * p;

                    ctx.fillStyle = "rgba(180,255,210,0.55)";
                    ctx.shadowColor = GREEN;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // --- Draw start and end gates ---
                drawHyperlaneGate(from.x, from.y, angle, `${lane.codename}-A`);
                drawHyperlaneGate(to.x, to.y, angle + Math.PI, `${lane.codename}-B`);

                // --- Mid-lane codename ---
                drawText(
                    lane.codename,
                    (from.x + to.x) * 0.5 + nx * 14,
                    (from.y + to.y) * 0.5 + ny * 14,
                    0.65
                );
            }

            ctx.restore();
        }

        function drawFloatingOre() {
            if (floatingOre.length <= 0) return;

            // Only draw particles visible in the current camera view.
            const pad = 40 / camera.zoom;
            const left = camera.x - W / 2 / camera.zoom - pad;
            const right = camera.x + W / 2 / camera.zoom + pad;
            const top = camera.y - H / 2 / camera.zoom - pad;
            const bottom = camera.y + H / 2 / camera.zoom + pad;

            const renderedChunks = [];
            const bucketCounts = new Map();

            for (const ore of floatingOre) {
                if (
                    ore.x < left || ore.x > right ||
                    ore.y < top || ore.y > bottom
                ) {
                    continue;
                }

                const bx = Math.floor(ore.x / CHUNK_RENDER_BUCKET_SIZE);
                const by = Math.floor(ore.y / CHUNK_RENDER_BUCKET_SIZE);
                const key = `${bx},${by}`;

                const count = bucketCounts.get(key) || 0;

                if (count >= MAX_RENDERED_CHUNKS_PER_BUCKET) {
                    continue;
                }

                bucketCounts.set(key, count + 1);
                renderedChunks.push(ore);
            }

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(80,255,130,0.25)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            // ---- ORE / RICH ORE CIRCLES ----
            ctx.beginPath();

            for (const ore of renderedChunks) {
                if (ore.resourceType === "metal") continue;

                ctx.moveTo(ore.x + 3, ore.y);
                ctx.arc(ore.x, ore.y, 3, 0, Math.PI * 2);
            }

            ctx.fill();
            ctx.stroke();

            // ---- METAL SQUARES ----
            ctx.beginPath();

            const size = 6;
            const half = size / 2;

            for (const ore of renderedChunks) {
                if (ore.resourceType !== "metal") continue;

                ctx.rect(ore.x - half, ore.y - half, size, size);
            }

            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawGravityPulses() {
            for (const p of gravityPulses) {
                const alpha = p.life / 28;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawText(text, x, y, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = GREEN;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 6;
            ctx.font = "12px monospace";
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function drawGrid() {
            ctx.strokeStyle = FAINT;
            ctx.lineWidth = 1;

            for (let x = 0; x < WORLD_W; x += 32) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, WORLD_H);
                ctx.stroke();
            }

            for (let y = 0; y < WORLD_H; y += 32) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WORLD_W, y);
                ctx.stroke();
            }
        }

        function isNebulaVisible(nebula) {
            const visualRadius = nebula.radius * Math.max(nebula.scaleX, nebula.scaleY);
            const halfW = W / 2 / camera.zoom;
            const halfH = H / 2 / camera.zoom;

            return (
                nebula.x + visualRadius >= camera.x - halfW &&
                nebula.x - visualRadius <= camera.x + halfW &&
                nebula.y + visualRadius >= camera.y - halfH &&
                nebula.y - visualRadius <= camera.y + halfH
            );
        }

        function drawNebula(nebula) {
            if (!isNebulaVisible(nebula)) return;

            const pulse = 0.84 + Math.sin(frameCount * nebula.pulseSpeed + nebula.phase) * 0.16;

            ctx.save();
            ctx.translate(nebula.x, nebula.y);
            ctx.rotate(nebula.rotation);

            // --- very soft base haze ---
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            ctx.scale(nebula.scaleX, nebula.scaleY);

            const hull = ctx.createRadialGradient(0, 0, 0, 0, 0, nebula.radius);
            hull.addColorStop(0.00, `rgba(${nebula.color.core},${0.10 * nebula.alpha * pulse})`);
            hull.addColorStop(0.32, `rgba(${nebula.color.mid},${0.08 * nebula.alpha * pulse})`);
            hull.addColorStop(0.72, `rgba(${nebula.color.outer},${0.045 * nebula.alpha * pulse})`);
            hull.addColorStop(1.00, "rgba(0,0,0,0)");

            ctx.fillStyle = hull;
            ctx.beginPath();
            ctx.arc(0, 0, nebula.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // --- elongated fog filaments ---
            ctx.globalCompositeOperation = "screen";

            for (const filament of nebula.filaments) {
                const a =
                    filament.angle +
                    Math.sin(frameCount * 0.0012 * filament.drift + nebula.phase) * 0.16;

                const fx = Math.cos(a) * filament.dist * nebula.scaleX;
                const fy = Math.sin(a) * filament.dist * nebula.scaleY;

                ctx.save();
                ctx.translate(fx, fy);
                ctx.rotate(filament.rotation + Math.sin(frameCount * 0.001 * filament.drift) * 0.35);
                ctx.scale(filament.scaleX, filament.scaleY);

                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, filament.radius);
                grad.addColorStop(0.00, `rgba(${nebula.color.core},${0.14 * nebula.alpha * filament.alpha * pulse})`);
                grad.addColorStop(0.45, `rgba(${nebula.color.mid},${0.085 * nebula.alpha * filament.alpha * pulse})`);
                grad.addColorStop(1.00, "rgba(0,0,0,0)");

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, filament.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // --- irregular cloud puffs ---
            for (const puff of nebula.puffs) {
                const a =
                    puff.angle +
                    Math.sin(frameCount * 0.0015 * puff.drift + nebula.phase) * 0.12;

                const px = Math.cos(a) * puff.dist * nebula.scaleX;
                const py = Math.sin(a) * puff.dist * nebula.scaleY;

                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(puff.rotation + Math.sin(frameCount * 0.0011 * puff.drift) * 0.18);
                ctx.scale(puff.scaleX, puff.scaleY);

                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, puff.radius);
                grad.addColorStop(0.00, `rgba(${nebula.color.core},${0.18 * nebula.alpha * puff.alpha * pulse})`);
                grad.addColorStop(0.35, `rgba(${nebula.color.mid},${0.12 * nebula.alpha * puff.alpha * pulse})`);
                grad.addColorStop(0.72, `rgba(${nebula.color.outer},${0.06 * nebula.alpha * puff.alpha * pulse})`);
                grad.addColorStop(1.00, "rgba(0,0,0,0)");

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, puff.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // --- fine mist / particulate detail ---
            for (const dust of nebula.dust) {
                const a =
                    dust.angle +
                    Math.sin(frameCount * 0.002 * dust.drift + nebula.phase) * 0.08;

                const dx = Math.cos(a) * dust.dist * nebula.scaleX;
                const dy = Math.sin(a) * dust.dist * nebula.scaleY;

                ctx.fillStyle = `rgba(${nebula.color.core},${dust.alpha * nebula.alpha * pulse})`;
                ctx.beginPath();
                ctx.arc(dx, dy, dust.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // --- darker pockets to break up the "ellipse stack" look ---
            ctx.globalCompositeOperation = "source-over";

            for (const gap of nebula.gaps) {
                const a =
                    gap.angle +
                    Math.sin(frameCount * 0.001 * gap.drift + nebula.phase) * 0.10;

                const gx = Math.cos(a) * gap.dist * nebula.scaleX;
                const gy = Math.sin(a) * gap.dist * nebula.scaleY;

                ctx.save();
                ctx.translate(gx, gy);
                ctx.rotate(gap.rotation);
                ctx.scale(gap.scaleX, gap.scaleY);

                const gapGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, gap.radius);
                gapGrad.addColorStop(0.00, `rgba(0,18,0,${gap.alpha})`);
                gapGrad.addColorStop(0.65, `rgba(0,18,0,${gap.alpha * 0.45})`);
                gapGrad.addColorStop(1.00, "rgba(0,0,0,0)");

                ctx.fillStyle = gapGrad;
                ctx.beginPath();
                ctx.arc(0, 0, gap.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // --- undiscovered points of interest ---
            if (nebula.pois?.length) {
                ctx.save();
                ctx.setLineDash([8, 6]);
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = `rgba(190,255,210,0.95)`;
                ctx.fillStyle = `rgba(220,255,230,0.95)`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                for (const poi of nebula.pois) {
                    const a =
                        poi.angle +
                        Math.sin(frameCount * 0.0012 + poi.phase) * 0.05;

                    const px = Math.cos(a) * poi.dist * nebula.scaleX;
                    const py = Math.sin(a) * poi.dist * nebula.scaleY;
                    const r = poi.radius;

                    ctx.globalAlpha = 0.82 + Math.sin(frameCount * 0.03 + poi.phase) * 0.12;

                    ctx.beginPath();
                    ctx.arc(px, py, r, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.save();
                    ctx.translate(px, py + 1);
                    ctx.rotate(-nebula.rotation);
                    ctx.font = `${Math.floor(r * 1.2)}px monospace`;
                    ctx.fillText("?", 0, 0);
                    ctx.restore();
                }

                ctx.restore();
            }

            ctx.restore();
        }

        function drawStation() {
            drawStationConnections();

            for (const module of stationModules) {
                drawStationModule(module);
            }
        }

        function drawStationConnections() {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            for (const module of stationModules) {
                if (module.id === "stationCore") continue;

                ctx.beginPath();
                ctx.moveTo(station.x, station.y);
                ctx.lineTo(module.x, module.y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawStationModule(module) {
            const hovered = getHoveredTarget()?.object === module;

            ctx.save();
            ctx.translate(module.x, module.y);

            ctx.strokeStyle = hovered ? "rgba(120,255,160,0.95)" : GREEN;
            ctx.fillStyle = hovered
                ? "rgba(0,255,90,0.16)"
                : "rgba(0,255,90,0.06)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 22 : 12;

            if (module.id === "stationCore") {
                drawCoreShape(module);
            } else if (module.id === "gravityPulse") {
                drawGravityModuleShape(module);
            } else if (module.id === "smallShipyard") {
                drawShipyardShape(module);
            } else if (module.id === "largeShipyard") {
                drawLargeShipyardShape(module);
            } else if (module.id === "stationMiningLaser") {
                drawMiningLaserShape(module);
            } else if (module.id === "observatory") {
                drawObservatoryShape(module);
            }

            ctx.restore();

            if (hovered && module.range) {
                drawModuleRange(module);
            }

            drawText(module.codename, module.x - 42, module.y - module.radius - 14, hovered ? 1 : 0.75);
        }

        function drawModuleRange(module) {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.28)";
            ctx.lineWidth = 2;
            ctx.setLineDash([12, 10]);
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            ctx.arc(module.x, module.y, module.range, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();
        }

        function drawObservatoryShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-18, 10);
            ctx.lineTo(0, -20);
            ctx.lineTo(18, 10);
            ctx.closePath();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, -4, 8, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, 30);
            ctx.lineTo(0, 44);
            ctx.moveTo(-14, 44);
            ctx.lineTo(14, 44);
            ctx.stroke();
        }

        function drawMiningLaserShape(module) {
            ctx.save();

            // lean triangle pointing outward (upward relative to module)
            ctx.beginPath();
            ctx.moveTo(0, -20);   // tip
            ctx.lineTo(-10, 10);  // left base
            ctx.lineTo(10, 10);   // right base
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner cross (targeting / focusing element)
            ctx.beginPath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(5, 0);
            ctx.moveTo(0, -5);
            ctx.lineTo(0, 5);
            ctx.stroke();

            ctx.restore();
        }

        function drawCoreShape(module) {
            // outer hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 58;
                const y = Math.sin(a) * 58;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 30;
                const y = Math.sin(a) * 30;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.stroke();

            // central command node
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.stroke();

            // small hardpoint lines
            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;

                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 34, Math.sin(a) * 34);
                ctx.lineTo(Math.cos(a) * 52, Math.sin(a) * 52);
                ctx.stroke();
            }
        }

        function drawGravityModuleShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-34, 0);
            ctx.lineTo(-18, 0);
            ctx.moveTo(18, 0);
            ctx.lineTo(34, 0);
            ctx.moveTo(0, -34);
            ctx.lineTo(0, -18);
            ctx.moveTo(0, 18);
            ctx.lineTo(0, 34);
            ctx.stroke();
        }

        function drawLargeShipyardShape(module) {
            // Main heavy dock body
            ctx.beginPath();
            ctx.rect(-36, -24, 72, 48);
            ctx.fill();
            ctx.stroke();

            // Left construction gantry
            ctx.beginPath();
            ctx.moveTo(-48, -34);
            ctx.lineTo(-34, -24);
            ctx.lineTo(-34, 24);
            ctx.lineTo(-48, 34);
            ctx.stroke();

            // Right launch gantry
            ctx.beginPath();
            ctx.moveTo(48, -34);
            ctx.lineTo(34, -24);
            ctx.lineTo(34, 24);
            ctx.lineTo(48, 34);
            ctx.stroke();

            // Central drydock opening
            ctx.beginPath();
            ctx.rect(-18, -12, 36, 24);
            ctx.stroke();

            // Antenna / crane mast
            ctx.beginPath();
            ctx.moveTo(0, -24);
            ctx.lineTo(0, -46);
            ctx.moveTo(-10, -38);
            ctx.lineTo(10, -38);
            ctx.stroke();

            // Small docking lights
            ctx.fillRect(-28, -16, 4, 4);
            ctx.fillRect(24, -16, 4, 4);
            ctx.fillRect(-28, 12, 4, 4);
            ctx.fillRect(24, 12, 4, 4);
        }

        function drawShipyardShape(module) {
            ctx.beginPath();
            ctx.rect(-34, -22, 68, 44);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-24, 22);
            ctx.lineTo(-24, 34);
            ctx.moveTo(0, 22);
            ctx.lineTo(0, 38);
            ctx.moveTo(24, 22);
            ctx.lineTo(24, 34);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-18, -6);
            ctx.lineTo(14, -6);
            ctx.lineTo(24, 0);
            ctx.lineTo(14, 6);
            ctx.lineTo(-18, 6);
            ctx.closePath();
            ctx.stroke();
        }

        function worldToScreen(wx, wy) {
            return {
                x: W / 2 + (wx - camera.x) * camera.zoom,
                y: H / 2 + (wy - camera.y) * camera.zoom
            };
        }

        function getHoveredMenuItem(visibleItems) {
            for (const item of visibleItems) {
                if (!item.bounds) continue;

                const inside =
                    mouseScreenX >= item.bounds.x &&
                    mouseScreenX <= item.bounds.x + item.bounds.w &&
                    mouseScreenY >= item.bounds.y &&
                    mouseScreenY <= item.bounds.y + item.bounds.h;

                if (inside) return item;
            }

            return null;
        }

        function getMenuItemDescription(item) {
            if (!item) return null;

            if (typeof item.description === "function") {
                return item.description();
            }

            return null;
        }

        function drawMenuTooltip(menuX, menuY, menuW, menuH, item, isMenuOnRight) {
            const description = getMenuItemDescription(item);

            if (!description) {
                activeMenu.tooltipBounds = null;
                return;
            }

            const gap = 8;
            const tooltipW = 320;
            const padding = 14;
            const lineHeight = 18;

            ctx.save();
            ctx.font = "13px monospace";

            const lines = wrapTextLines(description, tooltipW - padding * 2);
            const tooltipH = Math.max(
                48,
                padding * 2 + lines.length * lineHeight
            );

            let x = menuX + menuW + gap;

            // Prefer right side, fallback left.
            if (x + tooltipW > W - 12) {
                x = menuX - tooltipW - gap;
            }

            // Align tooltip with hovered row when possible.
            let y = item.bounds
                ? item.bounds.y + item.bounds.h / 2 - tooltipH / 2
                : menuY;

            // Keep onscreen.
            if (y < 12) y = 12;
            if (y + tooltipH > H - 12) y = H - tooltipH - 12;

            activeMenu.tooltipBounds = {
                x,
                y,
                w: tooltipW,
                h: tooltipH
            };

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.90)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.fillRect(x, y, tooltipW, tooltipH);
            ctx.strokeRect(x, y, tooltipW, tooltipH);

            // Inner frame
            ctx.strokeStyle = "rgba(80,255,130,0.28)";
            ctx.strokeRect(
                x + 6,
                y + 6,
                tooltipW - 12,
                tooltipH - 12
            );

            // Connector line from hovered item to tooltip
            if (item.bounds) {
                const itemCenterY = item.bounds.y + item.bounds.h / 2;

                ctx.strokeStyle = "rgba(80,255,130,0.35)";
                ctx.beginPath();

                if (x > menuX) {
                    ctx.moveTo(item.bounds.x + item.bounds.w, itemCenterY);
                    ctx.lineTo(x, itemCenterY);
                } else {
                    ctx.moveTo(item.bounds.x, itemCenterY);
                    ctx.lineTo(x + tooltipW, itemCenterY);
                }

                ctx.stroke();
            }

            // Description only. No header.
            ctx.fillStyle = GREEN;
            ctx.font = "13px monospace";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";

            let lineY = y + padding;

            for (const line of lines) {
                ctx.fillText(line, x + padding, lineY);
                lineY += lineHeight;
            }

            ctx.restore();
        }

        const MENU_OFFSET = 6; // was 18

        function drawActiveMenu() {
            if (!activeMenu) return;

            const rowH = 26;
            const w = 220;
            const visibleItems = activeMenu.items.filter(item =>
                item.isVisible ? item.isVisible() : true
            );

            const h = 60 + visibleItems.length * rowH;

            const anchor = worldToScreen(activeMenu.x, activeMenu.y);
            const radius = activeMenu.radius * camera.zoom;

            let x;
            let y = anchor.y - h / 2;

            // GRAV-PULSE → force left side
            if (activeMenu.menuSide === "left") {
                x = anchor.x - radius - w - MENU_OFFSET;

                // fallback if offscreen
                if (x < 12) {
                    x = anchor.x + radius + MENU_OFFSET;
                }
            } else {
                // default → right side
                x = anchor.x + radius + MENU_OFFSET;

                // fallback if offscreen
                if (x + w > W - 12) {
                    x = anchor.x - radius - w - MENU_OFFSET;
                }
            }

            if (y < 12) y = 12;
            if (y + h > H - 12) y = H - h - 12;

            activeMenu.menuBounds = { x, y, w, h };

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.88)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);

            const menuCenterX = x + w / 2;
            const isMenuOnRight = menuCenterX > anchor.x;

            const fromX = anchor.x;
            const fromY = anchor.y;

            // if menu is on right, connect to its left edge
            // if menu is on left, connect to its right edge
            const toX = isMenuOnRight ? x : x + w;
            const toY = y + h / 2;

            // draw connector
            const midX = (fromX + toX) / 2;

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(midX, fromY);
            ctx.lineTo(midX, toY);
            ctx.lineTo(toX, toY);
            ctx.stroke();

            ctx.fillStyle = GREEN;
            ctx.font = "12px monospace";
            ctx.fillText(activeMenu.menuTitle, x + 12, y + 20);
            ctx.fillText(activeMenu.codename, x + 12, y + 36);

            visibleItems.forEach((item, i) => {
                const bx = x + 12;
                const by = y + 50 + i * rowH;
                const bw = w - 24;
                const bh = 20;

                const cost = item.getCost ? item.getCost() : item.cost;
                const canBuy = item.canBuy ? item.canBuy() : true;
                const affordable = canBuy && canAffordCost(cost);

                ctx.strokeStyle = affordable ? GREEN : "rgba(80,255,130,0.25)";
                ctx.fillStyle = affordable
                    ? "rgba(0,255,90,0.08)"
                    : "rgba(0,255,90,0.03)";

                ctx.fillRect(bx, by, bw, bh);
                ctx.strokeRect(bx, by, bw, bh);

                ctx.fillStyle = affordable ? GREEN : "rgba(80,255,130,0.35)";
                let label = item.label;

                if (item.type === "upgrade") {
                    const nextLevel = item.getLevel() + 1;
                    label = `${item.label} ${nextLevel}`;
                }

                ctx.fillText(`${label} (${formatCost(cost)})`, bx + 8, by + 14);

                if (affordable) {
                    const pulse = Math.floor(frameCount / 12) % 2;
                    const offset = pulse ? 2 : 0;

                    ctx.fillText(">>", bx - 24 - offset, by + 14);
                    ctx.fillText("<<", bx + bw + 8 + offset, by + 14);
                }

                item.bounds = { x: bx, y: by, w: bw, h: bh };
            });

            const hoveredItem = getHoveredMenuItem(visibleItems);

            if (hoveredItem) {
                drawMenuTooltip(x, y, w, h, hoveredItem, isMenuOnRight);
            } else {
                activeMenu.tooltipBounds = null;
            }

            ctx.restore();
        }

        function drawCelestialBody(body) {
            const hovered = getHoveredTarget()?.object === body;
            const observedBy = observatoryArrays.filter(a => a.target === body);

            ctx.save();
            ctx.translate(body.x, body.y);

            if (body.type === "STAR") {
                const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.5;

                ctx.save();

                // --- OUTER GLOW (big soft halo) ---
                ctx.shadowColor = "#00ffaa";
                ctx.shadowBlur = hovered ? 90 : 70;
                ctx.globalAlpha = 0.35 + pulse * 0.25;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius + 30, 0, Math.PI * 2);
                ctx.fillStyle = "#00ff99";
                ctx.fill();

                // --- MID HALO ---
                ctx.globalAlpha = 0.5 + pulse * 0.3;
                ctx.shadowBlur = hovered ? 55 : 40;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius + 14, 0, Math.PI * 2);
                ctx.fill();

                // --- CORE (very bright) ---
                ctx.globalAlpha = 1;
                ctx.shadowBlur = hovered ? 35 : 25;

                ctx.fillStyle = "#66ffcc";
                ctx.strokeStyle = "#aaffdd";
                ctx.lineWidth = hovered ? 3 : 2;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // --- SHARP CROSS FLARE ---
                ctx.shadowBlur = hovered ? 28 : 18;
                ctx.strokeStyle = "#99ffcc";

                ctx.beginPath();
                ctx.moveTo(-body.radius - 28, 0);
                ctx.lineTo(body.radius + 28, 0);
                ctx.moveTo(0, -body.radius - 28);
                ctx.lineTo(0, body.radius + 28);
                ctx.stroke();

                ctx.restore();
            } else if (body.type === "PLANET") {
                // --- PLANET STYLE (solid, subdued) ---
                ctx.strokeStyle = hovered ? "rgba(120,255,160,0.9)" : "rgba(80,255,130,0.45)";
                ctx.fillStyle = hovered ? "rgba(0,255,90,0.14)" : "rgba(0,255,90,0.05)";
                ctx.lineWidth = hovered ? 3 : 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = hovered ? 18 : 6;

                // body
                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // equatorial ring (thin tech-style)
                ctx.beginPath();
                ctx.ellipse(0, 0, body.radius + 10, body.radius * 0.35, 0, 0, Math.PI * 2);
                ctx.stroke();

                // small surface detail lines
                ctx.beginPath();
                ctx.arc(-6, -4, 6, 0, Math.PI * 2);
                ctx.moveTo(8, 4);
                ctx.arc(8, 4, 4, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.restore();

            // labels (same for both)
            drawText(`${body.type}: ${body.codename}`, body.x - 54, body.y - body.radius - 50, 0.9);

            const orbitingProbes = getOrbitingProbeCount(body);
            const effectiveYield = body.sciencePerSecond * (1 + orbitingProbes);

            drawText(`SCI:${effectiveYield}/SEC`, body.x - 42, body.y + body.radius + 50, 0.65);

            // if (orbitingProbes > 0) {
            //     drawText(`PROBES x${orbitingProbes}`, body.x - 42, body.y + body.radius + 100, 0.75);
            // }

            if (observedBy.length > 0) {
                drawText(`OBSERVED`, body.x - 42, body.y + body.radius + 75, 0.85);
            }
        }

        function drawAsteroid(a) {
            const hovered = getHoveredTarget()?.object === a;
            const isRich = isRichOreTarget(a);

            ctx.save();
            ctx.translate(a.x, a.y);

            // Keep regular asteroid appearance exactly as before
            ctx.strokeStyle = hovered
                ? "rgba(120,255,160,0.9)"
                : a.ore > 0
                    ? DIM
                    : "rgba(80,255,130,0.08)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 16 : a.ore > 0 ? 5 : 0;

            // Main asteroid outline
            ctx.beginPath();
            a.verts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.stroke();

            // Extra visuals ONLY for rich ore asteroids
            if (isRich && a.ore > 0) {
                // Rebuild path so we can clip the internal pattern to the asteroid shape
                ctx.beginPath();
                a.verts.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.closePath();

                ctx.save();
                ctx.clip();

                // Lean diagonal stripe pattern
                ctx.strokeStyle = hovered
                    ? "rgba(180,255,210,0.45)"
                    : "rgba(120,255,170,0.28)";
                ctx.lineWidth = 1;
                ctx.shadowBlur = 0;

                const span = a.radius * 2.6;
                const spacing = 8;

                for (let x = -span; x <= span; x += spacing) {
                    ctx.beginPath();
                    ctx.moveTo(x, -span);
                    ctx.lineTo(x + span, span);
                    ctx.stroke();
                }

                ctx.restore();
            }

            ctx.restore();

            drawText(a.codename, a.x - 28, a.y - 60, 0.85);

            if (a.ore != Infinity) {
                if (isRich) {
                    drawText(`RICH ORE:${a.ore}`, a.x - 34, a.y + 60, 0.65);
                } else {
                    drawText(`ORE:${a.ore}`, a.x - 22, a.y + 60, 0.65);
                }
            }
        }

        function drawShip(ship) {
            const kind = ship.kind || "miningFrigate";
            const isDroneCarrier = kind === "droneCarrier";
            const isSalvageShip = kind === "salvageShip";
            const isStarSiphoner = kind === "starSiphoner";
            const isTransport = kind === "transportShip";
            const isLiberationCorvette = kind === "liberationCorvette";

            if (ship.carriedBy) return;

            let angle = 0;

            if (
                (ship.state === "hyperlaneEntry" || ship.state === "hyperlaneTravel") &&
                ship.hyperlane
            ) {
                const headingTarget = ship.state === "hyperlaneEntry"
                    ? ship.hyperlane.from
                    : ship.hyperlane.to;

                angle = Math.atan2(
                    headingTarget.y - ship.y,
                    headingTarget.x - ship.x
                );

            } else if (ship.state === "returning") {
                const returnTarget = ship.kind === "starSiphoner"
                    ? getLargeShipyardDockPoint()
                    : station;

                angle = Math.atan2(
                    returnTarget.y - ship.y,
                    returnTarget.x - ship.x
                );

            } else if (ship.target) {
                angle = Math.atan2(
                    ship.target.y - ship.y,
                    ship.target.x - ship.x
                );

            } else if (ship.targetX !== undefined) {
                angle = Math.atan2(
                    ship.targetY - ship.y,
                    ship.targetX - ship.x
                );
            }

            const hovered = getHoveredTarget()?.object === ship;

            if (isDroneCarrier && (hovered || activeMenu === ship)) {
                ctx.save();
                ctx.strokeStyle = "rgba(80,255,130,0.18)";
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 8]);
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, getEffectiveDroneCarrierRange(ship), 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(angle);

            ctx.strokeStyle = hovered ? "rgba(180,255,210,0.95)" : GREEN;

            ctx.fillStyle = isLiberationCorvette
                            ? "rgba(80,255,130,0.16)"
                            : isTransport
                                ? "rgba(80,255,130,0.16)"
                                : isStarSiphoner
                                    ? "rgba(80,255,130,0.18)"
                                    : isDroneCarrier
                                        ? "rgba(80,255,180,0.14)"
                                        : isSalvageShip
                                            ? "rgba(120,255,190,0.18)"
                                            : "rgba(0,255,90,0.12)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 14 : 8;

            ctx.beginPath();

            if (isLiberationCorvette) {
                drawLiberationCorvetteShape(hovered);
            } else if (isTransport) {
                drawTransportShipShape(hovered);
            } else if (isStarSiphoner) {
                drawStarSiphonerShape(hovered);
            } else if (isDroneCarrier) {
                ctx.rect(-15, -11, 30, 22);
                ctx.moveTo(15, 0);
                ctx.lineTo(25, -8);
                ctx.lineTo(25, 8);
                ctx.closePath();
            } else if (isSalvageShip) {
                drawSalvageShipShape(hovered);
            } else {
                drawMiningFrigateShape();
            }

            ctx.fill();
            ctx.stroke();

            ctx.restore();

            //ship highlight
            /*if (followedShip === ship) {
                ctx.save();

                ctx.strokeStyle = "rgba(180,255,210,0.85)";
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 18;
                ctx.setLineDash([6, 6]);
                ctx.lineDashOffset = -frameCount * 0.8;

                ctx.beginPath();
                ctx.arc(ship.x, ship.y, 34, 0, Math.PI * 2);
                ctx.stroke();

                ctx.setLineDash([]);
                ctx.restore();
            }*/

            if (isTransport && (hovered || ship.state === "deployed")) {
                ctx.save();

                ctx.strokeStyle = "rgba(80,255,130,0.12)";
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, TRANSPORT_DEPLOY_RANGE, 0, Math.PI * 2);
                ctx.stroke();

                ctx.setLineDash([]);
                ctx.restore();
            }

            if (isStarSiphoner) {
                drawHelionSiphonEffect(ship);
            }

            if (isDroneCarrier) {
                for (const drone of ship.drones) {
                    drawCarrierDrone(drone);
                }
            }

            drawText(ship.codename, ship.x + 10, ship.y - 10);

            if (isLiberationCorvette) {
                const stateLabel =
                    ship.state === "toStation"
                        ? "TO STATION"
                        : ship.state === "loading"
                            ? "LOITERING"
                            : "OFF-SECTOR";

                drawText(
                    `${stateLabel} SHELTER:${ship.cargo}/${getEffectiveCargoMax(ship)}`,
                    ship.x + 14,
                    ship.y + 6,
                    0.65
                );
            }

            if (isTransport) {
                const passengers = getTransportPassengers(ship).length;
                const carried = getTransportCarriedPassengers(ship).length;

                const transportStateLabel =
                    ship.state === "hyperlaneEntry"
                        ? "ENTERING LANE"
                        : ship.state === "hyperlaneTravel"
                            ? "HYPERLANE"
                            : ship.state.toUpperCase();

                drawText(
                    `${transportStateLabel} CARGO:${getTransportCargoLabel(ship)}`,
                    ship.x + 18,
                    ship.y + 6,
                    0.65
                );

                drawText(
                    `SLOTS:${carried}/${passengers}/${getEffectiveTransportShipSlots(ship)}`,
                    ship.x + 18,
                    ship.y + 20,
                    0.6
                );
            } else if (isDroneCarrier) {
                const { mining, salvaging } = getDroneCarrierCounts(ship);

            } else if (ship.target && ship.state !== "idle" && ship.state !== "standby") {

        function drawHelionSiphonEffect(ship) {
            if (ship.kind !== "starSiphoner") return;
            if (ship.state !== "siphoning") return;
            if (!ship.target) return;

            const target = ship.target;

            const angle = Math.atan2(target.y - ship.y, target.x - ship.x);

            // Start the effect a bit in front of the tanker,
            // so it feels like it comes from the siphon apparatus.
            const startX = ship.x + Math.cos(angle) * 34;
            const startY = ship.y + Math.sin(angle) * 34;

            // End slightly inside the star edge, not dead center.
            const endX = target.x - Math.cos(angle) * (target.radius * 0.2);
            const endY = target.y - Math.sin(angle) * (target.radius * 0.2);

            const dx = endX - startX;
            const dy = endY - startY;
            const len = Math.hypot(dx, dy) || 1;

            // Perpendicular vector for beam wobble / plasma ribbon effect
            const nx = -dy / len;
            const ny = dx / len;

            const t = frameCount * 0.12;
            const midX = (startX + endX) * 0.5;
            const midY = (startY + endY) * 0.5;

            const wobble = 10 + Math.sin(t * 0.9) * 3;

            ctx.save();
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // --- Outer plasma haze ---
            ctx.strokeStyle = "rgba(80,255,130,0.10)";
            ctx.lineWidth = 20 + Math.sin(t * 1.1) * 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 24;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(
                midX + nx * wobble,
                midY + ny * wobble,
                endX,
                endY
            );
            ctx.stroke();

            // --- Main plasma ribbon ---
            ctx.strokeStyle = "rgba(100,255,150,0.28)";
            ctx.lineWidth = 12;
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(
                midX + nx * wobble * 0.7,
                midY + ny * wobble * 0.7,
                endX,
                endY
            );
            ctx.stroke();

            // --- Bright inner core ---
            ctx.strokeStyle = "rgba(180,255,210,0.72)";
            ctx.lineWidth = 5;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(
                midX + nx * wobble * 0.4,
                midY + ny * wobble * 0.4,
                endX,
                endY
            );
            ctx.stroke();

            // --- Extra plasma strands ---
            for (let i = 0; i < 3; i++) {
                const strandPhase = t + i * 1.8;
                const strandOffset = (i - 1) * 6 + Math.sin(strandPhase) * 3;

                ctx.strokeStyle = `rgba(120,255,170,${0.18 + i * 0.05})`;
                ctx.lineWidth = 2 + i * 0.7;
                ctx.shadowBlur = 8;

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(
                    midX + nx * strandOffset,
                    midY + ny * strandOffset,
                    endX,
                    endY
                );
                ctx.stroke();
            }

            // --- Plasma packets moving along the beam ---
            for (let i = 0; i < 6; i++) {
                const p = (i / 6 + (t * 0.08)) % 1;

                const curveX =
                    (1 - p) * (1 - p) * startX +
                    2 * (1 - p) * p * (midX + nx * wobble * 0.55) +
                    p * p * endX;

                const curveY =
                    (1 - p) * (1 - p) * startY +
                    2 * (1 - p) * p * (midY + ny * wobble * 0.55) +
                    p * p * endY;

                const r = 2.5 + Math.sin(t + i) * 0.8;

                ctx.fillStyle = "rgba(180,255,210,0.75)";
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(curveX, curveY, r, 0, Math.PI * 2);
                ctx.fill();
            }

            // --- Impact flare on the star ---
            const impactPulse = 10 + Math.sin(t * 1.8) * 3;

            ctx.fillStyle = "rgba(120,255,170,0.18)";
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(endX, endY, impactPulse, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(180,255,210,0.65)";
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(endX, endY, 4 + Math.sin(t * 2.2), 0, Math.PI * 2);
            ctx.fill();

            // --- Siphon nozzle glow on the ship ---
            ctx.fillStyle = "rgba(120,255,170,0.28)";
            ctx.shadowBlur = 14;
            ctx.beginPath();
            ctx.arc(startX, startY, 7 + Math.sin(t * 1.4) * 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        const FLEET_HUD_TYPES = [
            { key: "1", kind: "miningFrigate", label: "MINING FRIGATES" },
            { key: "2", kind: "salvageShip", label: "SALVAGING SHIPS" },
            { key: "3", kind: "droneCarrier", label: "DRONE SHIPS" },
            { key: "4", kind: "starSiphoner", label: "HELION SIPHONERS" },
            { key: "5", kind: "transportShip", label: "TRANSPORTS" },
            { key: "6", kind: "liberationCorvette", label: "LIBERATION CORVETTES" }
        ];

        let followedShip = null;
        let lastFleetCycleKind = null;
        let lastFleetCycleIndex = -1;

        function getShipKind(ship) {
            return ship.kind || "miningFrigate";
        }

        function getFleetShipsByKind(kind) {
            return ships.filter(ship => getShipKind(ship) === kind);
        }

        function getSelectableFleetShipsByKind(kind) {
            return ships.filter(ship =>
                getShipKind(ship) === kind &&
                !ship.carriedBy
            );
        }

        function isShipIdleForFleetHud(ship) {
            if (!ship) return false;
            if (ship.carriedBy) return false;

            const kind = getShipKind(ship);

            if (ship.state === "idle" || ship.state === "standby") {
                return true;
            }

            if (kind === "droneCarrier" && ship.drones?.length <= 0) {
                return true;
            }

            if (kind === "transportShip" && ship.state === "seekingSite") {
                return true;
            }

            return false;
        }

        function getFleetTypeStats(kind) {
            const typeShips = getFleetShipsByKind(kind);

            return {
                total: typeShips.length,
                idle: typeShips.filter(isShipIdleForFleetHud).length
            };
        }

        function clearFollowedShip() {
            followedShip = null;
        }

        function followShip(ship) {
            if (!ship || ship.carriedBy) return;

            followedShip = ship;
            camera.x = ship.x;
            camera.y = ship.y;
            clampCamera();
        }

        function cycleFleetShip(kind) {
            const candidates = getSelectableFleetShipsByKind(kind);

            if (candidates.length <= 0) return;

            if (lastFleetCycleKind !== kind) {
                lastFleetCycleKind = kind;
                lastFleetCycleIndex = -1;
            }

            lastFleetCycleIndex = (lastFleetCycleIndex + 1) % candidates.length;

            followShip(candidates[lastFleetCycleIndex]);
        }

        function updateCameraFollow() {
            if (!followedShip) return;

            if (!ships.includes(followedShip) || followedShip.carriedBy) {
                clearFollowedShip();
                return;
            }

            camera.x = followedShip.x;
            camera.y = followedShip.y;
            clampCamera();
        }

        function drawFleetHud(x, y) {
            ctx.save();

            ctx.font = "12px monospace";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.fillStyle = "rgba(80,255,130,0.65)";
            ctx.fillText("FLEET STATUS", x, y);

            let rowY = y + 18;

            for (const type of FLEET_HUD_TYPES) {
                const stats = getFleetTypeStats(type.kind);

                if (stats.total <= 0) {
                    continue;
                }

                const selected =
                    followedShip &&
                    getShipKind(followedShip) === type.kind;

                ctx.fillStyle = selected
                    ? "rgba(80,255,130,0.95)"
                    : GREEN;

                const marker = selected ? ">" : " ";

                ctx.fillText(
                    `${marker}[${type.key}] ${type.label}`,
                    x,
                    rowY
                );

                ctx.fillStyle = selected
                    ? "rgba(80,255,130,0.95)"
                    : "rgba(80,255,130,0.65)";

                ctx.fillText(
                    `TOTAL:${stats.total} IDLE:${stats.idle}`,
                    x + 230,
                    rowY
                );

                rowY += 16;
            }

            if (followedShip) {
                rowY += 4;

                ctx.fillStyle = "rgba(80,255,130,0.95)";
                ctx.fillText(
                    `FOLLOWING: ${followedShip.codename}`,
                    x,
                    rowY
                );

                rowY += 16;
            }

            ctx.restore();

            return rowY + 6;
        }

                }
            }

            if (hovered?.type === "wreck") {

                if (laser && !isInModuleRange(laser, hovered.object)) {
                    drawText("WRECK OUT OF LASER RANGE", 24, 64, 0.8);
                } else {
                    drawText(`SALVAGE LOCK: ${hovered.object.codename} // WRECK: METAL`, 24, 64, 0.8);

                drawText(`MODULE LOCK: ${hovered.object.codename}`, 24, 64, 0.8);

        function drawRunEndedScreen() {
            ctx.save();

            ctx.fillStyle = "rgba(0,0,0,0.86)";
            ctx.fillRect(0, 0, W, H);

            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 18;
            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.94)";

            const boxH = 620;

            const y = H / 2 - boxH / 2;

            ctx.strokeRect(x, y, boxW, boxH);

            ctx.strokeStyle = "rgba(80,255,130,0.28)";
            ctx.strokeRect(x + 14, y + 14, boxW - 28, boxH - 28);

            ctx.textAlign = "center";

        function formatRunTimeFromFrames(frames) {
            const totalSeconds = Math.floor(frames / 60);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            return `${minutes}:${String(seconds).padStart(2, "0")}`;
        }

        function getFleetRunStats() {
            const stats = {};

            for (const ship of ships) {
                const kind = getShipKind ? getShipKind(ship) : (ship.kind || "miningFrigate");
                stats[kind] = (stats[kind] || 0) + 1;
            }

            return stats;
        }

        function endRunWithLiberty() {
            runEndStats = {
                durationFrames: frameCount,
                debtProgress: Math.floor(totalOreAcquired),
                oreStockpile: Math.floor(resources.ore || 0),
                science: Math.floor(resources.science || 0),
                metal: Math.floor(resources.metal || 0),
                helion: Math.floor(resources.helion || 0),
                taxesPaid: Math.floor(totalTaxesPaid),
                shipsBuilt: ships.length,
                fleet: getFleetRunStats(),
                hyperlanesBuilt: hyperlanes?.length || 0,
                salvageRights: salvageSlots?.length || 0,
                taxCyclesSurvived: lastTaxBill ? Math.floor(frameCount / TAX_CYCLE_FRAMES) : 0,
                oreSheltered: Math.floor(totalOreSheltered),
            };

            activeMenu = null;
            activeIncomingMessage = null;

            if (typeof clearFollowedShip === "function") {
                clearFollowedShip();
            }

            gameState = "runEnded";
        }

        function loop() {
            frameCount++;

            if (gameState === "start") {
                updateStartScreenBackground();
                drawStartScreen();
                requestAnimationFrame(loop);
                return;
            }

            if (gameState === "runEnded") {
                drawRunEndedScreen();
                requestAnimationFrame(loop);
                return;
            }

            if (messageInputLock > 0) {
                messageInputLock--;
            }

            updateCameraKeyboard();

            ctx.fillStyle = "rgba(0,12,0,0.35)";
            ctx.fillRect(0, 0, W, H);

            updateCooldowns();
            updateHeldLaserFire();
            updateSoundCombos();
            updateOreGatherSoundQueue();
            updateAutomaticPulse();
            updateActiveMenu();
            updateLaserBeams();
            updateFloatingOre();
            updateGravityPulses();
            updateScienceProduction();
            updateScienceProbes();
            updateSalvage();
            updateTaxSystem();
            updateLucrativeLiberationShip();
            ships.forEach(updateShip);
            updateCameraFollow();

            ctx.save();
            applyCameraTransform();

            drawGrid();

            nebulas.forEach(drawNebula);
            asteroids.forEach(drawAsteroid);
            celestialBodies.forEach(drawCelestialBody);
            scienceProbes.forEach(drawScienceProbe);
            drawSalvage();
            drawTaxCollectors();
            drawLucrativeLiberationShip();

            drawObservationLinks();
            drawLaserBeams();
            drawFloatingOre();
            drawGravityPulses();
            drawHyperlanes();

            ships.forEach(drawShip);

            drawStation();

            ctx.restore();

            drawActiveMenu();
            drawScanlines();
            drawVignette();

            drawHud();
            drawDebtProgressBar();
            drawHyperlaneScreen();
            drawCrosshair();
            drawIncomingMessage();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>

</html>
