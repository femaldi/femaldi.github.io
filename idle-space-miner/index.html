<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Idle Space Miner</title>
    <style>
        body {
            margin: 0;
            background: #020802;
            display: grid;
            place-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }

        canvas {
            width: 1920;
            height: 1080px;
            image-rendering: pixelated;
            background: #001000;
            box-shadow: 0 0 40px #00ff6644;
            cursor: none;
        }
    </style>
</head>

<body>
    <canvas id="game" width="1920" height="1080"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const W = 1920;
        const H = 1080;

        const GREEN = "#66ff99";
        const DIM = "rgba(80,255,130,0.35)";
        const FAINT = "rgba(80,255,130,0.15)";

        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        let heldAsteroidTarget = null;
        let frameCount = 0;
        let menuCloseTimer = 0;
        const MENU_CLOSE_DELAY = 15;

        const station = {
            x: W / 2,
            y: H / 2,
            r: 46,
            codename: "CITADEL-01",
            storedOre: 0
        };

        let activeMenu = null;

        const stationModules = [];

        const MODULE_DEFS = {
            stationCore: {
                id: "stationCore",
                codename: "CITADEL-01",
                type: "menu",
                xOffset: 0,
                yOffset: 0,
                radius: 58,
                menuTitle: "STATION MODULES",
                items: [
                    {
                        label: "Small Shipyard",
                        cost: 10,
                        canBuy: () => !stationModules.some(m => m.id === "smallShipyard"),
                        buy: () => {
                            station.storedOre -= 10;
                            stationModules.push(createModule("smallShipyard"));
                            activeMenu = null;
                        }
                    }
                ]
            },

            stationMiningLaser: {
                id: "stationMiningLaser",
                codename: "LASER-LANCE",
                type: "menu",
                xOffset: 0,
                yOffset: -96,
                radius: 30,
                menuTitle: "MINING LASER CONTROL",
                items: [
                    {
                        label: "Laser Strength",
                        type: "upgrade",
                        getLevel: () => upgrades.laserStrength.level,
                        getCap: () => upgrades.laserStrength.cap,
                        getCost: () => getLaserStrengthCost(),
                        isVisible: () => upgrades.laserStrength.level < upgrades.laserStrength.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.laserStrength;
                            const cost = getLaserStrengthCost();

                            if (upg.level >= upg.cap) return;
                            if (station.storedOre < cost) return;

                            station.storedOre -= cost;
                            upg.level++;
                        }
                    },

                    {
                        label: "Laser Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.laserSpeed.level,
                        getCap: () => upgrades.laserSpeed.cap,
                        getCost: () => getLaserSpeedCost(),
                        isVisible: () =>
                            upgrades.laserStrength.level >= upgrades.laserStrength.cap &&
                            upgrades.laserSpeed.level < upgrades.laserSpeed.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.laserSpeed;
                            const cost = getLaserSpeedCost();

                            if (upg.level >= upg.cap) return;
                            if (station.storedOre < cost) return;

                            station.storedOre -= cost;
                            upg.level++;
                        }
                    }
                ]
            },

            gravityPulse: {
                id: "gravityPulse",
                codename: "GRAV-PULSE",
                type: "menu",
                xOffset: -92,
                yOffset: 0,
                radius: 28,
                menuTitle: "GRAVITY PULSE CONTROL",
                menuSide: "left",
                action: () => {
                    const cd = CLICK_COOLDOWNS.gravity;

                    if (cd.current <= 0) {
                        triggerGravityField();
                        cd.current = cd.max;
                    }
                },
                items: [
                    {
                        label: "Automatic Pulse",
                        type: "upgrade",
                        getLevel: () => upgrades.automaticPulse.level,
                        getCap: () => upgrades.automaticPulse.cap,
                        getCost: () => getAutomaticPulseCost(),
                        isVisible: () => upgrades.automaticPulse.level < upgrades.automaticPulse.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.automaticPulse;
                            const cost = getAutomaticPulseCost();

                            if (upg.level >= upg.cap) return;
                            if (station.storedOre < cost) return;

                            station.storedOre -= cost;
                            upg.level++;
                            automaticPulseTimer = 0;
                        }
                    }
                ]
            },

            smallShipyard: {
                id: "smallShipyard",
                codename: "YARD-ALPHA",
                type: "menu",
                xOffset: 92,
                yOffset: 0,
                radius: 32,
                menuTitle: "SHIPYARD REQUISITIONS",
                items: [
                    {
                        label: "Basic Miner",
                        getCost: () => Math.floor(Math.pow(2, ships.length) * 10),
                        canBuy: () => true,
                        buy: () => {
                            const cost = Math.floor(Math.pow(2, ships.length) * 10);
                            if (station.storedOre < cost) return;

                            station.storedOre -= cost;
                            ships.push(makeShip(ships.length));
                        }
                    }
                ]
            }
        };

        function createModule(id) {
            const def = MODULE_DEFS[id];

            return {
                ...def,
                x: station.x + def.xOffset,
                y: station.y + def.yOffset
            };
        }

        stationModules.push(createModule("stationCore"));
        stationModules.push(createModule("gravityPulse"));
        stationModules.push(createModule("stationMiningLaser"));

        const codenamePrefixes = [
            "IRON", "GHOST", "VULTURE", "SABLE", "ORBIT",
            "HAMMER", "WRAITH", "TITAN", "ECHO", "RAVEN"
        ];

        const shipNames = [
            "MULE-7", "DRILL-12", "ROOK-4", "MANTIS-9",
            "PICKAXE-3", "HOUND-6"
        ];

        function rand(min, max) {
            return min + Math.random() * (max - min);
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getModuleById(id) {
            return stationModules.find(m => m.id === id);
        }

        function getHoveredTarget() {
            const module = getHoveredModule();

            if (module) {
                return { type: "module", object: module };
            }

            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mouseX, mouseY, asteroid)) {
                    return { type: "asteroid", object: asteroid };
                }
            }

            return null;
        }

        function makeAsteroid(i, existingAsteroids) {
            let x, y, radius;
            let attempts = 0;

            do {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(300, 500);

                x = station.x + Math.cos(angle) * dist;
                y = station.y + Math.sin(angle) * dist;
                radius = rand(28, 62);

                attempts++;
            } while (
                attempts < 200 &&
                existingAsteroids.some(a => {
                    const dx = x - a.x;
                    const dy = y - a.y;
                    const minDist = radius + a.radius + 28;
                    return dx * dx + dy * dy < minDist * minDist;
                })
            );

            const verts = [];
            const sides = Math.floor(rand(8, 15));

            for (let a = 0; a < sides; a++) {
                const t = (a / sides) * Math.PI * 2;
                const r = radius * rand(0.65, 1.2);
                verts.push({
                    x: Math.cos(t) * r,
                    y: Math.sin(t) * r
                });
            }

            return {
                x,
                y,
                radius,
                verts,
                ore: Math.floor(rand(1000, 50000)),
                maxOre: 50000,
                codename: `${pick(codenamePrefixes)}-${String(i + 1).padStart(2, "0")}`
            };
        }

        const asteroids = [];

        for (let i = 0; i < 12; i++) {
            asteroids.push(makeAsteroid(i, asteroids));
        }

        function makeShip(i) {
            return {
                x: station.x + rand(-30, 30),
                y: station.y + rand(-30, 30),
                speed: rand(0.8, 1.4),
                cargo: 0,
                cargoMax: Math.floor(rand(15, 28)),
                miningTimer: 0,
                target: null,
                state: "seeking",
                codename: shipNames[i] || `MINER-${i + 1}`
            };
        }

        const upgrades = {
            laserStrength: {
                level: 0,
                cap: 5
            },
            laserSpeed: {
                level: 0,
                cap: 3
            },
            automaticPulse: {
                level: 0,
                cap: 3
            }
        };

        function toRoman(n) {
            const romans = [
                "", "I", "II", "III", "IV", "V",
                "VI", "VII", "VIII", "IX", "X"
            ];

            return romans[n] || String(n);
        }

        let automaticPulseTimer = 0;

        function getAutomaticPulseCost() {
            return Math.floor(Math.pow(2, upgrades.automaticPulse.level) * 50);
        }

        function getAutomaticPulseInterval() {
            const intervals = [
                Infinity, // level 0 = disabled
                600,      // level I   = 10s
                360,      // level II  = 6s
                180       // level III = 3s
            ];

            return intervals[upgrades.automaticPulse.level];
        }

        function updateAutomaticPulse() {
            if (upgrades.automaticPulse.level <= 0) return;
            if (floatingOre.length <= 0) return;

            automaticPulseTimer++;

            const interval = getAutomaticPulseInterval();

            if (automaticPulseTimer >= interval) {
                triggerGravityField();
                automaticPulseTimer = 0;
            }
        }

        function getLaserOreChunks() {
            return Math.pow(2, upgrades.laserStrength.level);
        }

        function getLaserStrengthCost() {
            return Math.floor(Math.pow(2, upgrades.laserStrength.level) * 10);
        }

        function getLaserSpeedCost() {
            return Math.floor(Math.pow(3, upgrades.laserSpeed.level) * 100);
        }

        function getLaserCooldownMax() {
            const baseCooldown = 30; // 0.5s at 60fps

            const cooldownByLevel = [
                30, // no upgrade
                20, // Laser Speed I
                15, // Laser Speed II
                10  // Laser Speed III
            ];

            return cooldownByLevel[upgrades.laserSpeed.level] ?? baseCooldown;
        }

        const ships = []; //Array.from({ length: 6 }, (_, i) => makeShip(i));

        const floatingOre = [];
        const laserBeams = [];
        const gravityPulses = [];

        const ORE_PULL_RADIUS = 1000;

        const CLICK_COOLDOWNS = {
            laser: {
                current: 0,
                getMax: () => getLaserCooldownMax()
            },
            gravity: {
                current: 0,
                max: 30
            }
        };

        function pointInAsteroid(mx, my, asteroid) {
            const dx = mx - asteroid.x;
            const dy = my - asteroid.y;
            return dx * dx + dy * dy <= asteroid.radius * asteroid.radius;
        }

        function pointInModule(mx, my, module) {
            const dx = mx - module.x;
            const dy = my - module.y;
            return dx * dx + dy * dy <= module.radius * module.radius;
        }

        function getHoveredModule() {
            for (let i = stationModules.length - 1; i >= 0; i--) {
                const module = stationModules[i];

                if (pointInModule(mouseX, mouseY, module)) {
                    return module;
                }
            }

            return null;
        }

        function spawnFloatingOre(asteroid) {
            if (asteroid.ore <= 0) return;

            asteroid.ore--;

            floatingOre.push({
                x: asteroid.x + rand(-asteroid.radius * 0.35, asteroid.radius * 0.35),
                y: asteroid.y + rand(-asteroid.radius * 0.35, asteroid.radius * 0.35),
                vx: rand(-0.35, 0.35),
                vy: rand(-0.35, 0.35),
                pull: false,
                codename: `ORE-${Math.floor(rand(100, 999))}`
            });
        }

        function firePulseLaser(asteroid) {
            const laserModule = getModuleById("stationMiningLaser") || station;

            laserBeams.push({
                x1: laserModule.x,
                y1: laserModule.y,
                x2: asteroid.x,
                y2: asteroid.y,
                life: 12,
                asteroid
            });
        }

        function triggerGravityField() {
            const gravModule = getModuleById("gravityPulse") || station;

            gravityPulses.push({
                x: gravModule.x,
                y: gravModule.y,
                r: 20,
                life: 28
            });

            for (const ore of floatingOre) {
                const dx = ore.x - gravModule.x;
                const dy = ore.y - gravModule.y;

                if (dx * dx + dy * dy <= ORE_PULL_RADIUS * ORE_PULL_RADIUS) {
                    ore.pull = true;

                    // optional: store target so it pulls toward module instead of center
                    ore.pullTarget = gravModule;
                }
            }
        }

        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();

            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener("mousedown", e => {
            mouseDown = true;

            const rect = canvas.getBoundingClientRect();

            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            // detect asteroid under cursor at press time
            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mx, my, asteroid)) {
                    heldAsteroidTarget = asteroid;

                    // fire immediately if off cooldown (feels responsive)
                    const cd = CLICK_COOLDOWNS.laser;
                    if (cd.current <= 0) {
                        firePulseLaser(asteroid);
                        cd.current = cd.getMax();
                    }

                    return;
                }
            }

            // no asteroid → clear target
            heldAsteroidTarget = null;
        });

        canvas.addEventListener("mouseup", e => {
            mouseDown = false;
            heldAsteroidTarget = null;
        });

        canvas.addEventListener("mouseleave", e => {
            mouseDown = false;
            heldAsteroidTarget = null;
        });

        canvas.addEventListener("click", e => {
            const rect = canvas.getBoundingClientRect();

            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Menu clicks first
            if (activeMenu) {
                const visibleItems = activeMenu.items.filter(item =>
                    item.isVisible ? item.isVisible() : true
                );

                for (const item of visibleItems) {
                    if (!item.bounds) continue;

                    const inside =
                        mx >= item.bounds.x &&
                        mx <= item.bounds.x + item.bounds.w &&
                        my >= item.bounds.y &&
                        my <= item.bounds.y + item.bounds.h;

                    if (inside) {
                        const cost = item.getCost ? item.getCost() : item.cost;
                        const canBuy = item.canBuy ? item.canBuy() : true;

                        if (canBuy && station.storedOre >= cost) {
                            item.buy();
                        }

                        return;
                    }
                }

                activeMenu = null;
            }

            // Module clicks
            for (let i = stationModules.length - 1; i >= 0; i--) {
                const module = stationModules[i];

                if (pointInModule(mx, my, module)) {
                    if (module.action) {
                        module.action();
                    }

                    return;
                }
            }

            // Asteroid click: pulse laser
            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mx, my, asteroid)) {
                    const cd = CLICK_COOLDOWNS.laser;

                    if (cd.current <= 0) {
                        firePulseLaser(asteroid);
                        cd.current = cd.getMax();
                    }

                    return;
                }
            }
        });

        function updateActiveMenu() {
            const hoveredModule = getHoveredModule();

            // Hovering a module with menu → open + reset timer
            if (hoveredModule && hoveredModule.type === "menu") {
                activeMenu = hoveredModule;
                menuCloseTimer = 0; // 👈 RESET HERE
                return;
            }

            // If menu is open, check if mouse is inside it
            if (activeMenu && activeMenu.menuBounds) {
                const b = activeMenu.menuBounds;

                const inside =
                    mouseX >= b.x &&
                    mouseX <= b.x + b.w &&
                    mouseY >= b.y &&
                    mouseY <= b.y + b.h;

                if (inside) {
                    menuCloseTimer = 0; // 👈 RESET HERE TOO
                    return;
                }
            }

            // Not hovering anything → start closing timer
            if (activeMenu) {
                menuCloseTimer++;

                if (menuCloseTimer > MENU_CLOSE_DELAY) {
                    activeMenu = null;
                    menuCloseTimer = 0; // 👈 CLEAN RESET
                }
            }
        }

        function updateHeldLaserFire() {
            if (!mouseDown || !heldAsteroidTarget) return;

            if (heldAsteroidTarget.ore <= 0) {
                heldAsteroidTarget = null;
                return;
            }

            const stillHovering = pointInAsteroid(mouseX, mouseY, heldAsteroidTarget);

            if (!stillHovering) {
                heldAsteroidTarget = null;
                return;
            }

            const cd = CLICK_COOLDOWNS.laser;

            if (cd.current <= 0) {
                firePulseLaser(heldAsteroidTarget);
                cd.current = cd.getMax();
            }
        }

        function chooseAsteroid() {
            const available = asteroids.filter(a => a.ore > 0);
            if (!available.length) return null;
            return pick(available);
        }

        function moveToward(obj, tx, ty, speed) {
            const dx = tx - obj.x;
            const dy = ty - obj.y;
            const d = Math.hypot(dx, dy);

            if (d < speed) {
                obj.x = tx;
                obj.y = ty;
                return true;
            }

            obj.x += dx / d * speed;
            obj.y += dy / d * speed;
            return false;
        }

        function updateCooldowns() {
            for (const key in CLICK_COOLDOWNS) {
                const cd = CLICK_COOLDOWNS[key];
                if (cd.current > 0) cd.current--;
            }
        }

        function updateLaserBeams() {
            for (let i = laserBeams.length - 1; i >= 0; i--) {
                const beam = laserBeams[i];

                beam.life--;

                if (beam.life === 6) {
                    const chunks = getLaserOreChunks();

                    for (let n = 0; n < chunks; n++) {
                        spawnFloatingOre(beam.asteroid);
                    }
                }

                if (beam.life <= 0) {
                    laserBeams.splice(i, 1);
                }
            }
        }

        function updateFloatingOre() {
            for (let i = floatingOre.length - 1; i >= 0; i--) {
                const ore = floatingOre[i];

                if (ore.pull) {
                    const target = ore.pullTarget || station;
                    const dx = target.x - ore.x;
                    const dy = target.y - ore.y;
                    const d = Math.hypot(dx, dy);

                    if (d < 12) {
                        station.storedOre++;
                        ore.pull = false;
                        ore.pullTarget = null;
                        floatingOre.splice(i, 1);
                        continue;
                    }

                    ore.vx += dx / d * 0.22;
                    ore.vy += dy / d * 0.22;
                }

                ore.vx *= 0.96;
                ore.vy *= 0.96;

                ore.x += ore.vx;
                ore.y += ore.vy;
            }
        }

        function updateGravityPulses() {
            for (let i = gravityPulses.length - 1; i >= 0; i--) {
                const p = gravityPulses[i];

                p.r += 10;
                p.life--;

                if (p.life <= 0) {
                    gravityPulses.splice(i, 1);
                }
            }
        }

        function updateShip(ship) {
            if (ship.state === "seeking") {
                ship.target = chooseAsteroid();
                ship.state = ship.target ? "outbound" : "idle";
            }

            if (ship.state === "outbound") {
                if (!ship.target || ship.target.ore <= 0) {
                    ship.state = "seeking";
                    return;
                }

                if (moveToward(ship, ship.target.x, ship.target.y, ship.speed)) {
                    ship.state = "mining";
                    ship.miningTimer = 0;
                }
            }

            if (ship.state === "mining") {
                ship.miningTimer++;

                if (ship.miningTimer % 14 === 0 && ship.target && ship.target.ore > 0) {
                    ship.target.ore--;
                    ship.cargo++;
                }

                if (!ship.target || ship.target.ore <= 0 || ship.cargo >= ship.cargoMax) {
                    ship.state = "returning";
                }
            }

            if (ship.state === "returning") {
                if (moveToward(ship, station.x, station.y, ship.speed * 1.15)) {
                    station.storedOre += ship.cargo;
                    ship.cargo = 0;
                    ship.state = "seeking";
                }
            }
        }

        function drawCrosshair() {
            const size = 10;
            const gap = 4;

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            // horizontal left
            ctx.beginPath();
            ctx.moveTo(mouseX - size, mouseY);
            ctx.lineTo(mouseX - gap, mouseY);
            ctx.stroke();

            // horizontal right
            ctx.beginPath();
            ctx.moveTo(mouseX + gap, mouseY);
            ctx.lineTo(mouseX + size, mouseY);
            ctx.stroke();

            // vertical top
            ctx.beginPath();
            ctx.moveTo(mouseX, mouseY - size);
            ctx.lineTo(mouseX, mouseY - gap);
            ctx.stroke();

            // vertical bottom
            ctx.beginPath();
            ctx.moveTo(mouseX, mouseY + gap);
            ctx.lineTo(mouseX, mouseY + size);
            ctx.stroke();

            // center dot
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = GREEN;
            ctx.fill();

            ctx.restore();
        }

        function drawLaserBeams() {
            for (const beam of laserBeams) {
                const alpha = beam.life / 12;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 14;

                ctx.beginPath();
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(beam.x2, beam.y2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawFloatingOre() {
            for (const ore of floatingOre) {
                ctx.save();
                ctx.translate(ore.x, ore.y);

                ctx.strokeStyle = GREEN;
                ctx.fillStyle = "rgba(80,255,130,0.25)";
                ctx.lineWidth = 1;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2); // 👈 circle instead of square
                ctx.fill();
                ctx.stroke();

                ctx.restore();

                //drawText(ore.codename, ore.x + 8, ore.y - 6, 0.55);
            }
        }

        function drawGravityPulses() {
            for (const p of gravityPulses) {
                const alpha = p.life / 28;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawText(text, x, y, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = GREEN;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 6;
            ctx.font = "12px monospace";
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function drawGrid() {
            ctx.strokeStyle = FAINT;
            ctx.lineWidth = 1;

            for (let x = 0; x < W; x += 32) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }

            for (let y = 0; y < H; y += 32) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }
        }

        function drawStation() {
            drawStationConnections();

            for (const module of stationModules) {
                drawStationModule(module);
            }
        }

        function drawStationConnections() {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            for (const module of stationModules) {
                if (module.id === "stationCore") continue;

                ctx.beginPath();
                ctx.moveTo(station.x, station.y);
                ctx.lineTo(module.x, module.y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawStationModule(module) {
            const hovered = getHoveredTarget()?.object === module;

            ctx.save();
            ctx.translate(module.x, module.y);

            ctx.strokeStyle = hovered ? "rgba(120,255,160,0.95)" : GREEN;
            ctx.fillStyle = hovered
                ? "rgba(0,255,90,0.16)"
                : "rgba(0,255,90,0.06)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 22 : 12;

            if (module.id === "stationCore") {
                drawCoreShape(module);
            } else if (module.id === "gravityPulse") {
                drawGravityModuleShape(module);
            } else if (module.id === "smallShipyard") {
                drawShipyardShape(module);
            } else if (module.id === "stationMiningLaser") {
                drawMiningLaserShape(module);
            }

            ctx.restore();

            drawText(module.codename, module.x - 42, module.y - module.radius - 14, hovered ? 1 : 0.75);
        }

        function drawMiningLaserShape(module) {
            ctx.save();

            // lean triangle pointing outward (upward relative to module)
            ctx.beginPath();
            ctx.moveTo(0, -20);   // tip
            ctx.lineTo(-10, 10);  // left base
            ctx.lineTo(10, 10);   // right base
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner cross (targeting / focusing element)
            ctx.beginPath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(5, 0);
            ctx.moveTo(0, -5);
            ctx.lineTo(0, 5);
            ctx.stroke();

            ctx.restore();
        }

        function drawCoreShape(module) {
            // outer hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 58;
                const y = Math.sin(a) * 58;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 30;
                const y = Math.sin(a) * 30;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.stroke();

            // central command node
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.stroke();

            // small hardpoint lines
            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;

                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 34, Math.sin(a) * 34);
                ctx.lineTo(Math.cos(a) * 52, Math.sin(a) * 52);
                ctx.stroke();
            }
        }

        function drawGravityModuleShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-34, 0);
            ctx.lineTo(-18, 0);
            ctx.moveTo(18, 0);
            ctx.lineTo(34, 0);
            ctx.moveTo(0, -34);
            ctx.lineTo(0, -18);
            ctx.moveTo(0, 18);
            ctx.lineTo(0, 34);
            ctx.stroke();
        }

        function drawShipyardShape(module) {
            ctx.beginPath();
            ctx.rect(-34, -22, 68, 44);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-24, 22);
            ctx.lineTo(-24, 34);
            ctx.moveTo(0, 22);
            ctx.lineTo(0, 38);
            ctx.moveTo(24, 22);
            ctx.lineTo(24, 34);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-18, -6);
            ctx.lineTo(14, -6);
            ctx.lineTo(24, 0);
            ctx.lineTo(14, 6);
            ctx.lineTo(-18, 6);
            ctx.closePath();
            ctx.stroke();
        }

        function drawActiveMenu() {
            if (!activeMenu) return;

            const rowH = 26;
            const w = 220;
            const visibleItems = activeMenu.items.filter(item =>
                item.isVisible ? item.isVisible() : true
            );

            const h = 44 + visibleItems.length * rowH;

            let x;
            let y = activeMenu.y - h / 2;

            // GRAV-PULSE → force left side
            if (activeMenu.menuSide === "left") {
                x = activeMenu.x - activeMenu.radius - w - 18;

                // fallback if offscreen
                if (x < 12) {
                    x = activeMenu.x + activeMenu.radius + 18;
                }
            } else {
                // default → right side
                x = activeMenu.x + activeMenu.radius + 18;

                // fallback if offscreen
                if (x + w > W - 12) {
                    x = activeMenu.x - activeMenu.radius - w - 18;
                }
            }

            if (y < 12) y = 12;
            if (y + h > H - 12) y = H - h - 12;

            activeMenu.menuBounds = { x, y, w, h };

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.88)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);

            // determine which side the menu is on
            const menuCenterX = x + w / 2;
            const isMenuOnRight = menuCenterX > activeMenu.x;

            // connection points
            const fromX = activeMenu.x;
            const fromY = activeMenu.y;

            const toX = isMenuOnRight ? x : x + w;
            const toY = y + h / 2;

            // draw connector
            const midX = (fromX + toX) / 2;

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(midX, fromY);
            ctx.lineTo(midX, toY);
            ctx.lineTo(toX, toY);
            ctx.stroke();

            ctx.fillStyle = GREEN;
            ctx.font = "12px monospace";
            ctx.fillText(activeMenu.menuTitle, x + 12, y + 20);
            ctx.fillText(activeMenu.codename, x + 12, y + 36);

            visibleItems.forEach((item, i) => {
                const bx = x + 12;
                const by = y + 50 + i * rowH;
                const bw = w - 24;
                const bh = 20;

                const cost = item.getCost ? item.getCost() : item.cost;
                const canBuy = item.canBuy ? item.canBuy() : true;
                const affordable = canBuy && station.storedOre >= cost;

                ctx.strokeStyle = affordable ? GREEN : "rgba(80,255,130,0.25)";
                ctx.fillStyle = affordable
                    ? "rgba(0,255,90,0.08)"
                    : "rgba(0,255,90,0.03)";

                ctx.fillRect(bx, by, bw, bh);
                ctx.strokeRect(bx, by, bw, bh);

                ctx.fillStyle = affordable ? GREEN : "rgba(80,255,130,0.35)";
                let label = item.label;

                if (item.type === "upgrade") {
                    const nextLevel = item.getLevel() + 1;
                    label = `${item.label} ${toRoman(nextLevel)}`;
                }

                ctx.fillText(`${label} (${cost})`, bx + 8, by + 14);

                if (affordable) {
                    const pulse = Math.floor(frameCount / 12) % 2;
                    const offset = pulse ? 2 : 0;

                    ctx.fillText(">>", bx - 24 - offset, by + 14);
                    ctx.fillText("<<", bx + bw + 8 + offset, by + 14);
                }

                item.bounds = { x: bx, y: by, w: bw, h: bh };
            });

            ctx.restore();
        }

        function drawAsteroid(a) {
            const hovered = getHoveredTarget()?.object === a;

            ctx.save();
            ctx.translate(a.x, a.y);

            ctx.strokeStyle = hovered
                ? "rgba(120,255,160,0.9)"
                : a.ore > 0
                    ? DIM
                    : "rgba(80,255,130,0.08)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 16 : a.ore > 0 ? 5 : 0;

            ctx.beginPath();
            a.verts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.stroke();

            ctx.restore();

            drawText(a.codename, a.x - 28, a.y - 60, 0.85);
            drawText(`ORE:${a.ore}`, a.x - 22, a.y + 60, 0.65);
        }

        function drawShip(ship) {
            const angle = ship.state === "returning"
                ? Math.atan2(station.y - ship.y, station.x - ship.x)
                : ship.target
                    ? Math.atan2(ship.target.y - ship.y, ship.target.x - ship.x)
                    : 0;

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(angle);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.12)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(-9, -7);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-9, 7);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();

            drawText(ship.codename, ship.x + 10, ship.y - 10);
            drawText(`${ship.state.toUpperCase()} ${ship.cargo}/${ship.cargoMax}`, ship.x + 10, ship.y + 4, 0.65);

            if (ship.target && ship.state !== "idle") {
                ctx.strokeStyle = "rgba(80,255,130,0.12)";
                ctx.beginPath();
                ctx.moveTo(ship.x, ship.y);
                ctx.lineTo(ship.target.x, ship.target.y);
                ctx.stroke();
            }
        }

        function drawScanlines() {
            ctx.fillStyle = "rgba(0,0,0,0.18)";
            for (let y = 0; y < H; y += 3) {
                ctx.fillRect(0, y, W, 1);
            }
        }

        function drawVignette() {
            const g = ctx.createRadialGradient(W / 2, H / 2, 160, W / 2, H / 2, 620);
            g.addColorStop(0, "rgba(0,0,0,0)");
            g.addColorStop(1, "rgba(0,0,0,0.72)");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
        }

        function drawHud() {
            drawText("DEEP SPACE EXTRACTION COMMAND", 24, 28);
            drawText("SECTOR: KAPPA-9 / STATUS: ACTIVE", 24, 46, 0.75);
            drawText(`FLEET: ${ships.length} MINING UNITS`, 24, 64, 0.75);
            drawText(`ORE: ${station.storedOre}`, 24, 82, 0.75);

            const hovered = getHoveredTarget();

            if (hovered?.type === "asteroid") {
                drawText(`TARGET LOCK: ${hovered.object.codename}`, 24, 112, 0.8);
            }

            if (hovered?.type === "module") {
                drawText(`MODULE LOCK: ${hovered.object.codename}`, 24, 112, 0.8);
            }

        }

        function loop() {
            frameCount++;
            ctx.fillStyle = "rgba(0,12,0,0.35)";
            ctx.fillRect(0, 0, W, H);

            updateCooldowns();
            updateHeldLaserFire();
            updateAutomaticPulse();
            updateActiveMenu();
            updateLaserBeams();
            updateFloatingOre();
            updateGravityPulses();

            drawGrid();

            asteroids.forEach(drawAsteroid);

            drawLaserBeams();
            drawFloatingOre();
            drawGravityPulses();

            ships.forEach(updateShip);
            ships.forEach(drawShip);

            drawStation();

            drawScanlines();
            drawVignette();

            drawHud();
            drawActiveMenu();
            drawCrosshair();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
