        function drawCoreShape(module) {
            // outer hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 58;
                const y = Math.sin(a) * 58;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 30;
                const y = Math.sin(a) * 30;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.stroke();

            // central command node
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.stroke();

            // small hardpoint lines
            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;

                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 34, Math.sin(a) * 34);
                ctx.lineTo(Math.cos(a) * 52, Math.sin(a) * 52);
                ctx.stroke();
            }
        }

        function drawGravityModuleShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-34, 0);
            ctx.lineTo(-18, 0);
            ctx.moveTo(18, 0);
            ctx.lineTo(34, 0);
            ctx.moveTo(0, -34);
            ctx.lineTo(0, -18);
            ctx.moveTo(0, 18);
            ctx.lineTo(0, 34);
            ctx.stroke();
        }

        function drawShipyardShape(module) {
            ctx.beginPath();
            ctx.rect(-34, -22, 68, 44);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-24, 22);
            ctx.lineTo(-24, 34);
            ctx.moveTo(0, 22);
            ctx.lineTo(0, 38);
            ctx.moveTo(24, 22);
            ctx.lineTo(24, 34);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-18, -6);
            ctx.lineTo(14, -6);
            ctx.lineTo(24, 0);
            ctx.lineTo(14, 6);
            ctx.lineTo(-18, 6);
            ctx.closePath();
            ctx.stroke();
        }

        function worldToScreen(wx, wy) {
            return {
                x: W / 2 + (wx - camera.x) * camera.zoom,
                y: H / 2 + (wy - camera.y) * camera.zoom
            };
        }

        const MENU_OFFSET = 6; // was 18

        function drawActiveMenu() {
            if (!activeMenu) return;

            const rowH = 26;
            const w = 220;
            const visibleItems = activeMenu.items.filter(item =>
                item.isVisible ? item.isVisible() : true
            );

            const h = 60 + visibleItems.length * rowH;

            const anchor = worldToScreen(activeMenu.x, activeMenu.y);
            const radius = activeMenu.radius * camera.zoom;

            let x;
            let y = anchor.y - h / 2;

            // GRAV-PULSE → force left side
            if (activeMenu.menuSide === "left") {
                x = anchor.x - radius - w - MENU_OFFSET;

                // fallback if offscreen
                if (x < 12) {
                    x = anchor.x + radius + MENU_OFFSET;
                }
            } else {
                // default → right side
                x = anchor.x + radius + MENU_OFFSET;

                // fallback if offscreen
                if (x + w > W - 12) {
                    x = anchor.x - radius - w - MENU_OFFSET;
                }
            }

            if (y < 12) y = 12;
            if (y + h > H - 12) y = WORLD_H - h - 12;

            activeMenu.menuBounds = { x, y, w, h };

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.88)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);

            const menuCenterX = x + w / 2;
            const isMenuOnRight = menuCenterX > anchor.x;

            const fromX = anchor.x;
            const fromY = anchor.y;

            // if menu is on right, connect to its left edge
            // if menu is on left, connect to its right edge
            const toX = isMenuOnRight ? x : x + w;
            const toY = y + h / 2;

            // draw connector
            const midX = (fromX + toX) / 2;

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(midX, fromY);
            ctx.lineTo(midX, toY);
            ctx.lineTo(toX, toY);
            ctx.stroke();

            ctx.fillStyle = GREEN;
            ctx.font = "12px monospace";
            ctx.fillText(activeMenu.menuTitle, x + 12, y + 20);
            ctx.fillText(activeMenu.codename, x + 12, y + 36);

            visibleItems.forEach((item, i) => {
                const bx = x + 12;
                const by = y + 50 + i * rowH;
                const bw = w - 24;
                const bh = 20;

                const cost = item.getCost ? item.getCost() : item.cost;
                const canBuy = item.canBuy ? item.canBuy() : true;
                const affordable = canBuy && canAffordCost(cost);

                ctx.strokeStyle = affordable ? GREEN : "rgba(80,255,130,0.25)";
                ctx.fillStyle = affordable
                    ? "rgba(0,255,90,0.08)"
                    : "rgba(0,255,90,0.03)";

                ctx.fillRect(bx, by, bw, bh);
                ctx.strokeRect(bx, by, bw, bh);

                ctx.fillStyle = affordable ? GREEN : "rgba(80,255,130,0.35)";
                let label = item.label;

                if (item.type === "upgrade") {
                    const nextLevel = item.getLevel() + 1;
                    label = `${item.label} ${toRoman(nextLevel)}`;
                }

                ctx.fillText(`${label} (${formatCost(cost)})`, bx + 8, by + 14);

                if (affordable) {
                    const pulse = Math.floor(frameCount / 12) % 2;
                    const offset = pulse ? 2 : 0;

                    ctx.fillText(">>", bx - 24 - offset, by + 14);
                    ctx.fillText("<<", bx + bw + 8 + offset, by + 14);
                }

                item.bounds = { x: bx, y: by, w: bw, h: bh };
            });

            ctx.restore();
        }

        function drawObservationLinks() {
            const observatory = getModuleById("observatory");
            if (!observatory) return;

            for (const array of observatoryArrays) {
                if (!array.target) continue;

                ctx.save();
                ctx.strokeStyle = "rgba(80,255,130,0.22)";
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 8]);
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 8;

                ctx.beginPath();
                ctx.moveTo(observatory.x, observatory.y);
                ctx.lineTo(array.target.x, array.target.y);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawCelestialBody(body) {
            const hovered = getHoveredTarget()?.object === body;
            const observedBy = observatoryArrays.filter(a => a.target === body);

            ctx.save();
            ctx.translate(body.x, body.y);

            if (body.type === "STAR") {
                const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.5;

                ctx.save();

                // --- OUTER GLOW (big soft halo) ---
                ctx.shadowColor = "#00ffaa";
                ctx.shadowBlur = hovered ? 90 : 70;
                ctx.globalAlpha = 0.35 + pulse * 0.25;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius + 30, 0, Math.PI * 2);
                ctx.fillStyle = "#00ff99";
                ctx.fill();

                // --- MID HALO ---
                ctx.globalAlpha = 0.5 + pulse * 0.3;
                ctx.shadowBlur = hovered ? 55 : 40;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius + 14, 0, Math.PI * 2);
                ctx.fill();

                // --- CORE (very bright) ---
                ctx.globalAlpha = 1;
                ctx.shadowBlur = hovered ? 35 : 25;

                ctx.fillStyle = "#66ffcc";
                ctx.strokeStyle = "#aaffdd";
                ctx.lineWidth = hovered ? 3 : 2;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // --- SHARP CROSS FLARE ---
                ctx.shadowBlur = hovered ? 28 : 18;
                ctx.strokeStyle = "#99ffcc";

                ctx.beginPath();
                ctx.moveTo(-body.radius - 28, 0);
                ctx.lineTo(body.radius + 28, 0);
                ctx.moveTo(0, -body.radius - 28);
                ctx.lineTo(0, body.radius + 28);
                ctx.stroke();

                ctx.restore();
            } else if (body.type === "PLANET") {
                // --- PLANET STYLE (solid, subdued) ---
                ctx.strokeStyle = hovered ? "rgba(120,255,160,0.9)" : "rgba(80,255,130,0.45)";
                ctx.fillStyle = hovered ? "rgba(0,255,90,0.14)" : "rgba(0,255,90,0.05)";
                ctx.lineWidth = hovered ? 3 : 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = hovered ? 18 : 6;

                // body
                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // equatorial ring (thin tech-style)
                ctx.beginPath();
                ctx.ellipse(0, 0, body.radius + 10, body.radius * 0.35, 0, 0, Math.PI * 2);
                ctx.stroke();

                // small surface detail lines
                ctx.beginPath();
                ctx.arc(-6, -4, 6, 0, Math.PI * 2);
                ctx.moveTo(8, 4);
                ctx.arc(8, 4, 4, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.restore();

            // labels (same for both)
            drawText(`${body.type}: ${body.codename}`, body.x - 54, body.y - body.radius - 50, 0.9);
            
            const orbitingProbes = getOrbitingProbeCount(body);
            const effectiveYield = body.sciencePerSecond * (1 + orbitingProbes);

            drawText(`SCI:${effectiveYield}/SEC`, body.x - 42, body.y + body.radius + 50, 0.65);

            // if (orbitingProbes > 0) {
            //     drawText(`PROBES x${orbitingProbes}`, body.x - 42, body.y + body.radius + 100, 0.75);
            // }

            if (observedBy.length > 0) {
                drawText(`OBSERVED`, body.x - 42, body.y + body.radius + 75, 0.85);
            }
        }

        function drawWreck(wreck) {
            ctx.save();
            ctx.globalAlpha = wreck.fade ?? 1;
            ctx.translate(wreck.x, wreck.y);

            const hovered = getHoveredTarget()?.object === wreck;

            ctx.strokeStyle = hovered ? "rgba(180,255,210,0.95)" : "rgba(120,255,160,0.45)";
            ctx.fillStyle = hovered ? "rgba(0,255,120,0.13)" : "rgba(0,255,90,0.05)";
            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 18 : 6;

            ctx.beginPath();
            wreck.verts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-wreck.radius * 0.8, 0);
            ctx.lineTo(wreck.radius * 0.8, 0);
            ctx.moveTo(0, -wreck.radius * 0.5);
            ctx.lineTo(0, wreck.radius * 0.5);
            ctx.stroke();

            ctx.restore();

            drawText(wreck.codename, wreck.x - 36, wreck.y - wreck.radius - 20, wreck.fade ?? 1);
            drawText(`METAL:${wreck.metal}`, wreck.x - 34, wreck.y + wreck.radius + 18, 0.7 * (wreck.fade ?? 1));
        }

        function drawSalvage() {
            for (const slot of salvageSlots) {
                if (slot.wreck) drawWreck(slot.wreck);
                if (slot.hauler) drawSalvageHauler(slot.hauler);
            }
        }

        function drawSalvageHauler(hauler) {
            ctx.save();
            ctx.translate(hauler.x, hauler.y);
            ctx.rotate(hauler.angle);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.10)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.beginPath();
            ctx.rect(-18, -10, 36, 20);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-26, -14);
            ctx.lineTo(-18, -10);
            ctx.moveTo(-26, 14);
            ctx.lineTo(-18, 10);
            ctx.stroke();

            ctx.restore();

            // keep label unrotated (world-aligned)
            drawText(hauler.codename, hauler.x + 18, hauler.y - 14, 0.7);
        }

        function drawAsteroid(a) {
            const hovered = getHoveredTarget()?.object === a;

            ctx.save();
            ctx.translate(a.x, a.y);

            ctx.strokeStyle = hovered
                ? "rgba(120,255,160,0.9)"
                : a.ore > 0
                    ? DIM
                    : "rgba(80,255,130,0.08)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 16 : a.ore > 0 ? 5 : 0;

            ctx.beginPath();
            a.verts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.stroke();

            ctx.restore();

            drawText(a.codename, a.x - 28, a.y - 60, 0.85);
            drawText(`ORE:${a.ore}`, a.x - 22, a.y + 60, 0.65);
        }

        function drawScienceProbe(probe) {
            ctx.save();
            ctx.translate(probe.x, probe.y);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.12)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(8, 6);
            ctx.lineTo(-8, 6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-14, 0);
            ctx.lineTo(-6, 0);
            ctx.moveTo(6, 0);
            ctx.lineTo(14, 0);
            ctx.stroke();

            ctx.restore();

            drawText(probe.codename, probe.x + 10, probe.y - 10, 0.75);
            drawText(probe.state.toUpperCase(), probe.x + 10, probe.y + 4, 0.55);

            if (probe.target && probe.state === "traveling") {
                ctx.save();
                ctx.strokeStyle = "rgba(80,255,130,0.14)";
                ctx.setLineDash([5, 8]);

                ctx.beginPath();
                ctx.moveTo(probe.x, probe.y);
                ctx.lineTo(probe.target.x, probe.target.y);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawShip(ship) {
            const angle = ship.state === "returning"
                ? Math.atan2(station.y - ship.y, station.x - ship.x)
                : ship.target
                    ? Math.atan2(ship.target.y - ship.y, ship.target.x - ship.x)
                    : 0;

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(angle);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.12)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(-9, -7);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-9, 7);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();

            drawText(ship.codename, ship.x + 10, ship.y - 10);
            drawText(`${ship.state.toUpperCase()} ${ship.cargo}/${ship.cargoMax}`, ship.x + 10, ship.y + 4, 0.65);

            if (ship.target && ship.state !== "idle") {
                ctx.strokeStyle = "rgba(80,255,130,0.12)";
                ctx.beginPath();
                ctx.moveTo(ship.x, ship.y);
                ctx.lineTo(ship.target.x, ship.target.y);
                ctx.stroke();
            }
        }

        function drawScanlines() {
            ctx.fillStyle = "rgba(0,0,0,0.18)";
            for (let y = 0; y < H; y += 3) {
                ctx.fillRect(0, y, W, 1);
            }
        }

        function drawVignette() {
            const g = ctx.createRadialGradient(W / 2, H / 2, 160, W / 2, H / 2, 620);
            g.addColorStop(0, "rgba(0,0,0,0)");
            g.addColorStop(1, "rgba(0,0,0,0.72)");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
        }

        function drawHud() {
            const RESOURCES_OFFSET_Y = 450;

            drawText("DEEP SPACE EXTRACTION COMMAND", 24, 28);
            drawText("SECTOR: KAPPA-9 / STATUS: ACTIVE", 24, 46, 0.75);
            drawText(`FLEET: ${ships.length} MINING UNITS`, 24, 64, 0.75);
            if (resources.ore > 0) drawText(`ORE: ${resources.ore}`, 24, RESOURCES_OFFSET_Y + 82, 1.0);
            if (resources.science > 0) drawText(`SCIENCE: ${resources.science}`, 24, RESOURCES_OFFSET_Y + 100, 1.0);
            if (resources.metal > 0) drawText(`METAL: ${resources.metal}`, 24, RESOURCES_OFFSET_Y + 118, 1.0);

            const hovered = getHoveredTarget();

            if (hovered?.type === "asteroid") {
                const laser = getModuleById("stationMiningLaser");
                
                if (laser && !isInModuleRange(laser, hovered.object)) {
                    drawText("TARGET OUT OF LASER RANGE", 24, 132, 0.8);
                } else {
                    drawText(`TARGET LOCK: ${hovered.object.codename}`, 24, 132, 0.8);
                }
            }

            if (hovered?.type === "wreck") {
                const laser = getModuleById("stationMiningLaser");

                if (laser && !isInModuleRange(laser, hovered.object)) {
                    drawText("WRECK OUT OF LASER RANGE", 24, 132, 0.8);
                } else {
                    drawText(`SALVAGE LOCK: ${hovered.object.codename}`, 24, 132, 0.8);
                }
            }

            if (hovered?.type === "module") {
                drawText(`MODULE LOCK: ${hovered.object.codename}`, 24, 132, 0.8);
            }

        }

        function loop() {
            frameCount++;

            if (gameState === "start") {
                drawStartScreen();
                requestAnimationFrame(loop);
                return;
            }

            if (messageInputLock > 0) {
                messageInputLock--;
            }

            updateCameraKeyboard();

            ctx.fillStyle = "rgba(0,12,0,0.35)";
            ctx.fillRect(0, 0, W, H);

            updateCooldowns();
            updateHeldLaserFire();
            updateSoundCombos();
            updateOreGatherSoundQueue();
            updateAutomaticPulse();
            updateActiveMenu();
            updateLaserBeams();
            updateFloatingOre();
            updateGravityPulses();
            updateScienceProduction();
            updateScienceProbes();
            updateSalvage();
            ships.forEach(updateShip);

            ctx.save();
            applyCameraTransform();

            drawGrid();

            asteroids.forEach(drawAsteroid);
            celestialBodies.forEach(drawCelestialBody);
            scienceProbes.forEach(drawScienceProbe);
            drawSalvage();

            drawObservationLinks();
            drawLaserBeams();
            drawFloatingOre();
            drawGravityPulses();

            ships.forEach(drawShip);

            drawStation();
            
            ctx.restore();
            
            drawActiveMenu();
            drawScanlines();
            drawVignette();

            drawHud();
            drawDebtProgressBar();
            drawCrosshair();
            drawIncomingMessage();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
