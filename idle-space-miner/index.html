            const normalSiphonPoint = chooseSiphonerParkingSpot(ship, star, ship);
            const normalTime = estimateTravelTime(ship, normalSiphonPoint, getEffectiveShipSpeed(ship));

            let bestRoute = null;
            let bestTime = normalTime;

            for (const lane of hyperlanes) {
                const endpoints = getHyperlaneEndpoints(lane);

                const exitPoint = endpoints.to;
                const postLaneSiphonPoint = chooseSiphonerParkingSpot(ship, star, exitPoint);

                const directDistanceToStar = Math.sqrt(distSq(ship, normalSiphonPoint));
                const exitDistanceToStar = Math.sqrt(distSq(exitPoint, postLaneSiphonPoint));

                // The lane must actually place the siphoner closer to the star's siphon point.
                if (exitDistanceToStar >= directDistanceToStar) {
                    continue;
                }

                const timeToEntry = estimateTravelTime(ship, endpoints.from, getEffectiveShipSpeed(ship));
                const laneTime = estimateTravelTime(endpoints.from, endpoints.to, HYPERLANE_TRAVEL_SPEED);
                const timeAfterExit = estimateTravelTime(exitPoint, postLaneSiphonPoint, getEffectiveShipSpeed(ship));

                const totalTime = timeToEntry + laneTime + timeAfterExit;

                // No minimum-save threshold.
                // Any faster route is preferred over conventional travel.
                if (totalTime < bestTime) {
                    bestTime = totalTime;
                    bestRoute = {
                        lane,
                        from: endpoints.from,
                        to: endpoints.to,
                        afterState: "outbound"
                    };
                }
            }

            return bestRoute;
        }

        function estimateSiphonerTravelTimeToStar(ship, star) {
            const normalSiphonPoint = chooseSiphonerParkingSpot(ship, star, ship);
            const normalTime = estimateTravelTime(ship, normalSiphonPoint, getEffectiveShipSpeed(ship));

            const hyperlaneRoute = getBestHyperlaneRouteToStar(ship, star);

            if (!hyperlaneRoute) {
                return normalTime;
            }

            const timeToEntry = estimateTravelTime(ship, hyperlaneRoute.from, getEffectiveShipSpeed(ship));
            const laneTime = estimateTravelTime(
                hyperlaneRoute.from,
                hyperlaneRoute.to,
                HYPERLANE_TRAVEL_SPEED
            );

            const postLaneSiphonPoint = chooseSiphonerParkingSpot(ship, star, hyperlaneRoute.to);
            const timeAfterExit = estimateTravelTime(
                hyperlaneRoute.to,
                postLaneSiphonPoint,
                getEffectiveShipSpeed(ship)
            );

            return timeToEntry + laneTime + timeAfterExit;
        }

        function chooseStarForSiphoner(ship) {
            const stars = celestialBodies
                .filter(isActiveStarTarget);

            if (!stars.length) return null;

            stars.sort((a, b) => {
                const timeA = estimateSiphonerTravelTimeToStar(ship, a);
                const timeB = estimateSiphonerTravelTimeToStar(ship, b);

                if (timeA !== timeB) {
                    return timeA - timeB;
                }

                return distSq(ship, a) - distSq(ship, b);
            });

            return stars[0];
        }

        function isAsteroidClaimedByOtherShip(asteroid, currentShip) {
            return ships.some(other =>
                other !== currentShip &&
                other.target === asteroid &&
                (
                    other.state === "outbound" ||
                    other.state === "mining"
                )
            );
        }

        function isValidShipAsteroidTarget(ship, asteroid) {
            if (!asteroid) return false;
            if (asteroid.ore <= 0) return false;

            const shipyard = getModuleById("smallShipyard");
            if (!shipyard) return false;
            //if (!isInModuleRange(shipyard, asteroid)) return false;

            // If another ship is already traveling to it or mining it,
            // this ship should not use it.
            if (isAsteroidClaimedByOtherShip(asteroid, ship)) return false;

            return true;
        }

        function getTargetResourceType(target) {
            return target?.resourceType === "metal" ? "metal" : "ore";
        }

        function getTargetResourceAmount(target) {
            return getTargetResourceType(target) === "metal" ? target.metal : target.ore;
        }

        function reduceTargetResource(target, amount) {
            if (getTargetResourceType(target) === "metal") {
                target.metal = Math.max(0, target.metal - amount);
            } else {
                target.ore = Math.max(0, target.ore - amount);
            }
        }

        function isShipTargetClaimedByOther(ship, target, kind) {
            return ships.some(other =>
                other !== ship &&
                (other.kind || "miningFrigate") === kind &&
                other.target === target &&
                (other.state === "outbound" || other.state === "mining")
            );
        }

        function isInSmallShipyardFleetRange(target) {
            const shipyard = getModuleById("smallShipyard");
            if (!shipyard) return false;

            return isInModuleRange(shipyard, target);
        }

        function isValidMiningShipTarget(ship, asteroid) {
            if (!asteroid || asteroid.ore <= 0) return false;

            if (ship.assignedTransport) {
                return isTargetUsableByTransport(ship.assignedTransport, asteroid) &&
                    !isShipTargetClaimedByOther(ship, asteroid, "miningFrigate");
            }

            if (!isInSmallShipyardFleetRange(asteroid)) return false;

            return !isShipTargetClaimedByOther(ship, asteroid, "miningFrigate");
        }

        function isValidSalvageShipTarget(ship, wreck) {
            if (!wreck || wreck.fading || wreck.metal <= 0) return false;
            if (!isInSmallShipyardFleetRange(wreck)) return false;

            return !isShipTargetClaimedByOther(ship, wreck, "salvageShip");
        }

        function chooseAsteroid(ship) {
            if (ship.assignedTransport) {
                const transport = ship.assignedTransport;

                const available = asteroids.filter(a =>
                    isTargetUsableByTransport(transport, a) &&
                    !isShipTargetClaimedByOther(ship, a, "miningFrigate")
                );

                if (!available.length) return null;

                available.sort((a, b) => distSq(ship, a) - distSq(ship, b));
                return available[0];
            }

            const available = asteroids.filter(a =>
                isValidMiningShipTarget(ship, a)
            );

            if (!available.length) return null;

            available.sort((a, b) => distSq(ship, a) - distSq(ship, b));
            return available[0];
        }

        function chooseWreck(ship) {
            const available = getActiveWrecks().filter(w =>
                isValidSalvageShipTarget(ship, w)
            );

            if (!available.length) return null;

            available.sort((a, b) => distSq(ship, a) - distSq(ship, b));
            return available[0];
        }

        function getDroneCarrierCounts(carrier) {
            let mining = 0;
            let salvaging = 0;

            for (const drone of carrier.drones) {
                if (drone.droneType === "salvaging") salvaging++;
                else mining++;
            }

            return { mining, salvaging };
        }

        function getDroneCarrierCandidateTargets(carrier) {
            const shipyard = getModuleById("smallShipyard");

            const asteroidTargets = asteroids.filter(a =>
                a.ore > 0
            );

            const wreckTargets = getActiveWrecks().filter(w =>
                w.metal > 0 && !w.fading
            );

            const { mining, salvaging } = getDroneCarrierCounts(carrier);

            return salvaging > mining
                ? [...wreckTargets, ...asteroidTargets]
                : [...asteroidTargets, ...wreckTargets];
        }

        function isTargetInsideCarrierRange(carrier, target) {
            const range = getEffectiveDroneCarrierRange(carrier);
            return distSq(carrier, target) <= range * range;
        }

        function fireDroneLaser(carrier, drone, target) {
            if (!target || getTargetResourceAmount(target) <= 0) return;

            laserBeams.push({
                x1: drone.x,
                y1: drone.y,
                x2: target.x,
                y2: target.y,
                life: 8,
                asteroid: target,
                noSpawn: true
            });

            const chunks = getDroneChunksPerShot();

            for (let i = 0; i < chunks; i++) {
                if (getTargetResourceAmount(target) <= 0) break;
                spawnFloatingChunk(target);
            }
        }

        function moveToward(obj, tx, ty, speed) {
            const dx = tx - obj.x;
            const dy = ty - obj.y;
            const d = Math.hypot(dx, dy);

            if (d < speed) {
                obj.x = tx;
                obj.y = ty;
                return true;
            }

            obj.x += dx / d * speed;
            obj.y += dy / d * speed;
            return false;
        }

        function updateCooldowns() {
            for (const key in CLICK_COOLDOWNS) {
                const cd = CLICK_COOLDOWNS[key];
                if (cd.current > 0) cd.current--;
            }
        }

        function updateLaserBeams() {
            for (let i = laserBeams.length - 1; i >= 0; i--) {
                const beam = laserBeams[i];

                beam.life--;

                if (beam.life === 6 && !beam.noSpawn) {
                    const chunks = getLaserOreChunks();

                    for (let n = 0; n < chunks; n++) {
                        spawnFloatingChunk(beam.asteroid);
                    }
                }

                if (beam.life <= 0) {
                    laserBeams.splice(i, 1);
                }
            }
        }

        function isMineableTargetDepleted(target) {
            if (target.resourceType === "metal") return target.metal <= 0;
            return target.ore <= 0;
        }

        function getMineableTargets() {
            return [
                ...asteroids.filter(a => a.ore > 0),
                ...getActiveWrecks().filter(w => w.metal > 0 && !w.fading)
            ];
        }

        function updateTransportGravPulse(transport) {
            if (transport.state !== "deployed") return;
            if (isTransportCargoFull(transport)) return;

            transport.gravTimer++;

            if (transport.gravTimer < TRANSPORT_GRAV_INTERVAL) return;

            transport.gravTimer = 0;

            gravityPulses.push({
                x: transport.x,
                y: transport.y,
                r: 20,
                life: 28
            });

            for (const chunk of floatingOre) {
                if (TRANSPORT_GRAV_PULLS_ORE_ONLY) {
                    const type = chunk.resourceType || "ore";

                    if (type !== "ore" && type !== "richOre") {
                        continue;
                    }
                }

                const dx = chunk.x - transport.x;
                const dy = chunk.y - transport.y;

                if (dx * dx + dy * dy <= TRANSPORT_DEPLOY_RANGE  * TRANSPORT_DEPLOY_RANGE ) {
                    chunk.pull = true;
                    chunk.pullTarget = transport;
                }
            }
        }

        function updateFloatingOre() {
            for (let i = floatingOre.length - 1; i >= 0; i--) {
                const ore = floatingOre[i];

                if (ore.pull) {
                    const target = ore.pullTarget || station;
                    const dx = target.x - ore.x;
                    const dy = target.y - ore.y;
                    const d = Math.hypot(dx, dy);

                    if (d < 12) {
                        const pullTarget = ore.pullTarget || station;

                        let collected = false;

                        if (isTransportShip(pullTarget)) {
                            collected = addCargoToTransport(
                                pullTarget,
                                ore.resourceType || "ore",
                                1
                            );
                        } else {
                            depositCargoResource(ore.resourceType || "ore", 1);
                            collected = true;
                        }

                        if (!collected) {
                            ore.pull = false;
                            ore.pullTarget = null;
                            continue;
                        }
                        queueOreGatherSound();
                        // playSound("oreGather", {
                        //     volume: 0.22,
                        //     volumeVar: 0.04,
                        //     pitch: 1,
                        //     pitchVar: 0.025
                        // });
                        ore.pull = false;
                        ore.pullTarget = null;
                        floatingOre.splice(i, 1);
                        continue;
                    }

                    ore.vx += dx / d * 0.22;
                    ore.vy += dy / d * 0.22;
                }

                ore.vx *= 0.96;
                ore.vy *= 0.96;

                ore.x += ore.vx;
                ore.y += ore.vy;
            }
        }

        function updateGravityPulses() {
            for (let i = gravityPulses.length - 1; i >= 0; i--) {
                const p = gravityPulses[i];

                p.r += 10;
                p.life--;

                if (p.life <= 0) {
                    gravityPulses.splice(i, 1);
                }
            }
        }

        function updateScienceProbe(probe) {
            if (!probe.target) {
                probe.target = chooseProbeTarget();
                probe.state = probe.target ? "traveling" : "idle";
                return;
            }

            const observedBodies = getObservedBodies();

            if (!observedBodies.includes(probe.target)) {
                probe.target = chooseProbeTarget();
                probe.state = probe.target ? "traveling" : "idle";
                return;
            }

            if (probe.state === "traveling") {
                const arrived = moveToward(probe, probe.target.x, probe.target.y, probe.speed);

                if (arrived) {
                    probe.state = "orbiting";
                    probe.angle = rand(0, Math.PI * 2);
                    probe.orbitRadius = probe.target.radius + rand(55, 85);
                }
            }

            if (probe.state === "orbiting") {
                probe.angle += probe.orbitSpeed;

                probe.x = probe.target.x + Math.cos(probe.angle) * probe.orbitRadius;
                probe.y = probe.target.y + Math.sin(probe.angle) * probe.orbitRadius;
            }
        }

        function updateScienceProbes() {
            for (const probe of scienceProbes) {
                updateScienceProbe(probe);
            }
        }

        function updateCargoMiningShip(ship, chooseTarget, isValidTarget, resourceType) {

            if (ship.state === "idle" || ship.state === "standby") {
                updateShipStandbyPosition(ship);

                if (!shouldStandbyShipRetryWork(ship)) {
                    return;
                }

                ship.state = "seeking";
            }

            if (ship.state === "seeking") {
                ship.target = chooseTarget(ship);

                if (ship.target) {
                    ship.state = "outbound";
                    ship.standbySearchTimer = 0;
                } else {
                    updateShipStandbyPosition(ship);
                    return;
                }
            }

            if (ship.state === "outbound") {
                if (!isValidTarget(ship, ship.target)) {
                    ship.target = null;
                    ship.state = "seeking";
                    return;
                }

                if (moveToward(ship, ship.target.x, ship.target.y, getEffectiveShipSpeed(ship))) {
                    ship.state = "mining";
                    ship.miningTimer = 0;
                }
            }

            if (ship.state === "mining") {
                if (!isValidTarget(ship, ship.target)) {
                    ship.target = null;
                    ship.state = ship.cargo > 0 ? "returning" : "seeking";
                    return;
                }

                ship.miningTimer++;

                if (ship.miningTimer % getMiningInterval() === 0) {
                    const mined = Math.min(
                        getMiningAmountPerTick(),
                        getTargetResourceAmount(ship.target),
                        getEffectiveCargoMax(ship) - ship.cargo
                    );

                    if (ship.cargo <= 0) {
                        ship.cargoResourceType = getCargoResourceTypeFromTarget(ship.target);
                    }

                    reduceTargetResource(ship.target, mined);
                    ship.cargo += mined;
                }

                if (
                    !ship.target ||
                    getTargetResourceAmount(ship.target) <= 0 ||
                    ship.cargo >= getEffectiveCargoMax(ship)
                ) {
                    ship.target = null;
                    ship.state = "returning";
                }
            }

            if (ship.state === "returning") {
                const homeBase = ship.assignedTransport || station;
                const speed = getEffectiveShipSpeed(ship);

                if (moveToward(ship, homeBase.x, homeBase.y, speed * 0.85)) {
                    if (ship.cargo > 0) {
                        if (isTransportShip(homeBase)) {
                            addCargoToTransport(
                                homeBase,
                                ship.cargoResourceType || resourceType,
                                ship.cargo
                            );
                        } else {
                            depositCargoResource(ship.cargoResourceType || resourceType, ship.cargo);
                        }

                        queueOreGatherSound();
                    }

                    ship.cargo = 0;
                    ship.cargoResourceType = resourceType;
                    ship.target = null;
                    ship.state = ship.assignedTransport ? "seeking" : "seeking";
                }
            }
        }

        function isTargetInsideCarrierLogisticsRange(carrier, target) {
            if (carrier.assignedTransport) {
                return isTargetUsableByTransport(carrier.assignedTransport, target);
            }

            return isInSmallShipyardFleetRange(target);
        }

        function isActiveAsteroidTarget(target) {
            return target && target.ore > 0;
        }

        function isActiveWreckTarget(target) {
            return target && target.metal > 0 && !target.fading;
        }

        function isDroneCarrier(ship) {
            return (ship.kind || "miningFrigate") === "droneCarrier";
        }

        function getOtherDroneCarriers(carrier) {
            return ships.filter(other =>
                other !== carrier &&
                isDroneCarrier(other)
            );
        }

        function getDroneCarrierCounts(carrier) {
            let mining = 0;
            let salvaging = 0;

            for (const drone of carrier.drones) {
                if (drone.droneType === "salvaging") salvaging++;
                else mining++;
            }

            return { mining, salvaging };
        }

        function droneCarrierPrefersSalvage(carrier) {
            const mode = getDroneCarrierOperationMode(carrier);

            if (mode === "salvaging") return true;
            if (mode === "mining") return false;

            // Mixed mode: current behavior.
            const { mining, salvaging } = getDroneCarrierCounts(carrier);
            return salvaging > mining;
        }

        function getGravityPulseModule() {
            return getModuleById("gravityPulse");
        }

        function isTargetInsideGravPulseRange(target) {
            const grav = getGravityPulseModule();
            if (!grav || !grav.range) return false;

            return distSq(grav, target) <= grav.range * grav.range;
        }

        function preferGravPulseTargets(targets) {
            const inside = targets.filter(isTargetInsideGravPulseRange);

            // If there are valid targets inside grav range, use only those.
            // Otherwise fall back to all targets so carriers do not become useless.
            return inside.length > 0 ? inside : targets;
        }

        function getPreferredCarrierTargets(carrier) {
            const mode = getDroneCarrierOperationMode(carrier);
            const salvagePriority = droneCarrierPrefersSalvage(carrier);

            let wreckTargets = getActiveWrecks()
                .filter(isActiveWreckTarget)
                .filter(w => isTargetInsideCarrierLogisticsRange(carrier, w));

            let asteroidTargets = asteroids
                .filter(isActiveAsteroidTarget)
                .filter(a => isTargetInsideCarrierLogisticsRange(carrier, a));

            const gravWrecks = carrier.assignedTransport
                ? wreckTargets
                : preferGravPulseTargets(wreckTargets);

            const gravAsteroids = carrier.assignedTransport
                ? asteroidTargets
                : preferGravPulseTargets(asteroidTargets);

            if (mode === "salvaging") {
                return wreckTargets.length > 0 ? gravWrecks : gravAsteroids;
            }

            if (mode === "mining") {
                return asteroidTargets.length > 0 ? gravAsteroids : gravWrecks;
            }

            if (salvagePriority && wreckTargets.length > 0) {
                return gravWrecks;
            }

            if (asteroidTargets.length > 0) {
                return gravAsteroids;
            }

            return gravWrecks;
        }

        function getCarrierCoverageScoreAt(carrier, x, y, salvagePriority) {
            let score = 0;
            const range = getEffectiveDroneCarrierRange(carrier);
            const rangeSq = range * range;

            for (const asteroid of asteroids) {
                if (!isActiveAsteroidTarget(asteroid)) continue;
                if (!isInSmallShipyardFleetRange(asteroid)) continue;

                const dx = asteroid.x - x;
                const dy = asteroid.y - y;

                if (dx * dx + dy * dy <= rangeSq) {
                    const insideGrav = isTargetInsideGravPulseRange(asteroid);

                    score += salvagePriority ? 1 : 5;

                    if (insideGrav) {
                        score += salvagePriority ? 4 : 20;
                    }
                }
            }

            for (const wreck of getActiveWrecks()) {
                if (!isActiveWreckTarget(wreck)) continue;
                if (!isInSmallShipyardFleetRange(wreck)) continue;

                const dx = wreck.x - x;
                const dy = wreck.y - y;

                if (dx * dx + dy * dy <= rangeSq) {
                    const insideGrav = isTargetInsideGravPulseRange(wreck);

                    score += salvagePriority ? 8 : 2;

                    if (insideGrav) {
                        score += salvagePriority ? 32 : 8;
                    }
                }
            }

            return score;
        }

        function wouldCarrierOverlapAt(carrier, x, y) {
            const minDistSq = DRONE_CARRIER_MIN_SEPARATION * DRONE_CARRIER_MIN_SEPARATION;

            return getOtherDroneCarriers(carrier).some(other => {
                const ox = other.targetX ?? other.x;
                const oy = other.targetY ?? other.y;

                const dx = ox - x;
                const dy = oy - y;

                return dx * dx + dy * dy < minDistSq;
            });
        }

        function getParkingCandidatesAroundTarget(carrier, target) {
            const candidates = [];

            const baseAngle = Math.atan2(
                station.y - target.y,
                station.x - target.x
            );

            const carrierRange = getEffectiveDroneCarrierRange(carrier);

            const parkingDist = Math.min(
                carrierRange * 0.72,
                target.radius + 115
            );

            for (let i = 0; i < DRONE_CARRIER_PARKING_SAMPLES; i++) {
                // Start with station-facing side, then rotate around the target.
                const angle = baseAngle + (i / DRONE_CARRIER_PARKING_SAMPLES) * Math.PI * 2;

                const x = Math.max(
                    40,
                    Math.min(WORLD_W - 40, target.x + Math.cos(angle) * parkingDist)
                );

                const y = Math.max(
                    40,
                    Math.min(WORLD_H - 40, target.y + Math.sin(angle) * parkingDist)
                );

                candidates.push({
                    x,
                    y,
                    target
                });
            }

            return candidates;
        }

        function scoreCarrierParkingCandidate(carrier, candidate) {
            const salvagePriority = droneCarrierPrefersSalvage(carrier);

            let score = getCarrierCoverageScoreAt(
                carrier,
                candidate.x,
                candidate.y,
                salvagePriority
            );

            // Prefer not travelling too far if two positions are similar.
            score -= Math.sqrt(distSq(carrier, candidate)) / 1200;

            // Strong penalty for overlapping another carrier.
            // We still allow it as a fallback if every possible space overlaps.
            if (wouldCarrierOverlapAt(carrier, candidate.x, candidate.y)) {
                score -= 10000;
            }

            return score;
        }

        function findDroneCarrierDeployment(carrier) {
            const targets = getPreferredCarrierTargets(carrier);

            if (!targets.length) {
                return {
                    x: station.x,
                    y: station.y,
                    target: null
                };
            }

            const candidates = [];

            for (const target of targets) {
                candidates.push(...getParkingCandidatesAroundTarget(carrier, target));
            }

            candidates.sort((a, b) =>
                scoreCarrierParkingCandidate(carrier, b) -
                scoreCarrierParkingCandidate(carrier, a)
            );

            // First try to find a non-overlapping space.
            const nonOverlapping = candidates.find(c =>
                !wouldCarrierOverlapAt(carrier, c.x, c.y)
            );

            return nonOverlapping || candidates[0];
        }

        function isTargetInsideCarrierRange(carrier, target) {
            if (!carrier || !target) return false;

            const range = getEffectiveDroneCarrierRange(carrier);

            if (!Number.isFinite(range) || range <= 0) return false;

            return distSq(carrier, target) <= range * range;
        }

        function isTargetInsideRangeFromPoint(x, y, target, range) {
            if (!target) return false;

            const dx = target.x - x;
            const dy = target.y - y;

            return dx * dx + dy * dy <= range * range;
        }

        function isTargetInsideCarrierLogisticsRange(carrier, target) {
            // Normal Drone Ships are limited by Small Shipyard fleet range.
            if (!carrier.assignedTransport) {
                return isInSmallShipyardFleetRange(target);
            }

            // Transport-assigned Drone Ships are limited by the Transport Ship instead.
            return isTargetUsableByTransport(carrier.assignedTransport, target);
        }

        function canDroneCarrierUseTargetFromPoint(carrier, x, y, target, droneType) {
            if (!carrier || !target) return false;

            if (droneType === "salvaging") {
                if (!isActiveWreckTarget(target)) return false;
            } else {
                if (!isActiveAsteroidTarget(target)) return false;
            }

            if (!isTargetInsideCarrierLogisticsRange(carrier, target)) return false;

            const range = getEffectiveDroneCarrierRange(carrier);

            if (!Number.isFinite(range) || range <= 0) return false;

            return isTargetInsideRangeFromPoint(x, y, target, range);
        }

        function canDroneCarrierUseTarget(carrier, target, droneType) {
            return canDroneCarrierUseTargetFromPoint(
                carrier,
                carrier.x,
                carrier.y,
                target,
                droneType
            );
        }

        function getDroneTargetsForType(carrier, droneType) {
            let targets;

            if (droneType === "salvaging") {
                targets = getActiveWrecks()
                    .filter(w =>
                        canDroneCarrierUseTarget(carrier, w, "salvaging")
                    );
            } else {
                targets = asteroids
                    .filter(a =>
                        canDroneCarrierUseTarget(carrier, a, "mining")
                    );
            }

            // If this carrier belongs to a Transport Ship, do NOT prioritize station Grav Pulse.
            // The Transport Ship has its own internal Grav Pulse.
            if (carrier.assignedTransport) {
                return targets;
            }

            return preferGravPulseTargets(targets);
        }

        function countCarrierDronesAssignedToTarget(carrier, droneType, target, ignoredDrone = null) {
            let count = 0;

            for (const drone of carrier.drones) {
                if (drone === ignoredDrone) continue;
                if (drone.droneType !== droneType) continue;
                if (drone.target !== target) continue;

                count++;
            }

            return count;
        }

        function getDroneTarget(carrier, drone) {
            const targets = getDroneTargetsForType(carrier, drone.droneType);

            if (!targets.length) return null;

            targets.sort((a, b) => {
                const aInsideGrav = isTargetInsideGravPulseRange(a);
                const bInsideGrav = isTargetInsideGravPulseRange(b);

                if (aInsideGrav !== bInsideGrav) {
                    return aInsideGrav ? -1 : 1;
                }

                const assignedA = countCarrierDronesAssignedToTarget(
                    carrier,
                    drone.droneType,
                    a,
                    drone
                );

                const assignedB = countCarrierDronesAssignedToTarget(
                    carrier,
                    drone.droneType,
                    b,
                    drone
                );

                if (assignedA !== assignedB) {
                    return assignedA - assignedB;
                }

                return distSq(drone, a) - distSq(drone, b);
            });

            return targets[0];
        }

        function updateAssignedShipDocking(ship) {
            const transport = ship.assignedTransport;
            if (!transport) return false;

            if (
                transport.state !== "gatheringShips" &&
                transport.state !== "recallingShips"
            ) {
                return false;
            }

            if (ship.carriedBy === transport) {
                ship.x = transport.x;
                ship.y = transport.y;
                return true;
            }

            ship.target = null;
            ship.targetX = transport.x;
            ship.targetY = transport.y;

            if ((ship.kind || "miningFrigate") === "droneCarrier") {
                ship.forceRedeploy = false;

                for (const drone of ship.drones) {
                    drone.target = null;
                    drone.x = ship.x;
                    drone.y = ship.y;
                }
            }

            if (moveToward(ship, transport.x, transport.y, getEffectiveShipSpeed(ship))) {
                if (ship.cargo > 0) {
                    addCargoToTransport(
                        transport,
                        ship.cargoResourceType || "ore",
                        ship.cargo
                    );

                    ship.cargo = 0;
                    ship.cargoResourceType = "ore";
                }

                ship.carriedBy = transport;
                ship.state = "carried";
                ship.x = transport.x;
                ship.y = transport.y;
            }

            return true;
        }

        function deployTransportPassengers(transport) {
            const passengers = getTransportCarriedPassengers(transport);

            passengers.forEach((ship, i) => {
                const angle = (i / Math.max(1, passengers.length)) * Math.PI * 2;
                const dist = 70;

                ship.carriedBy = null;
                ship.x = transport.x + Math.cos(angle) * dist;
                ship.y = transport.y + Math.sin(angle) * dist;
                ship.target = null;
                ship.targetX = undefined;
                ship.targetY = undefined;

                if ((ship.kind || "miningFrigate") === "droneCarrier") {
                    ship.state = "seeking";
                    ship.forceRedeploy = true;

                    for (const drone of ship.drones) {
                        drone.target = null;
                        drone.x = ship.x;
                        drone.y = ship.y;
                    }
                } else {
                    ship.state = "seeking";
                }
            });
        }

        function recallTransportPassengers(transport) {
            for (const ship of getTransportPassengers(transport)) {
                if (ship.carriedBy === transport) continue;

                ship.target = null;
                ship.targetX = transport.x;
                ship.targetY = transport.y;

                if ((ship.kind || "miningFrigate") === "droneCarrier") {
                    ship.forceRedeploy = false;

                    for (const drone of ship.drones) {
                        drone.target = null;
                    }
                }

                ship.state = "joiningTransport";
            }
        }

        function hasPreferredDroneTargetsInRange(carrier) {
            const salvagePriority = droneCarrierPrefersSalvage(carrier);

            const wrecksInRange = getActiveWrecks().filter(w =>
                isActiveWreckTarget(w) &&
                isTargetInsideCarrierRange(carrier, w)
            );

            const asteroidsInRange = asteroids.filter(a =>
                isActiveAsteroidTarget(a) &&
                isTargetInsideCarrierRange(carrier, a)
            );

            if (salvagePriority) {
                const activeWrecks = getActiveWrecks().filter(isActiveWreckTarget);
                const gravWreckExists = activeWrecks.some(isTargetInsideGravPulseRange);

                if (gravWreckExists) {
                    return wrecksInRange.some(isTargetInsideGravPulseRange);
                }

                if (activeWrecks.length > 0) {
                    return wrecksInRange.length > 0;
                }
            }

            const gravAsteroidExists = asteroids
                .filter(isActiveAsteroidTarget)
                .some(isTargetInsideGravPulseRange);

            if (gravAsteroidExists) {
                return asteroidsInRange.some(isTargetInsideGravPulseRange);
            }

            return asteroidsInRange.length > 0 || wrecksInRange.length > 0;
        }

        function retargetCarrierDrones(carrier) {
            for (const drone of carrier.drones) {
                if (
                    !drone.target ||
                    getTargetResourceAmount(drone.target) <= 0 ||
                    !isTargetInsideCarrierRange(carrier, drone.target)
                ) {
                    drone.target = null;
                }
            }

            for (const drone of carrier.drones) {
                drone.target = getDroneTarget(carrier, drone);
            }
        }

        function hasAnyDroneCarrierWorkAvailable(carrier) {
            const { mining, salvaging } = getDroneCarrierCounts(carrier);

            if (mining > 0 && asteroids.some(isActiveAsteroidTarget)) {
                return true;
            }

            if (salvaging > 0 && getActiveWrecks().some(isActiveWreckTarget)) {
                return true;
            }

            return false;
        }

        function updateCarriedPassengersPosition(transport) {
            for (const ship of getTransportCarriedPassengers(transport)) {
                ship.x = transport.x;
                ship.y = transport.y;
            }
        }

        function updateTransportShip(transport) {
            if (transport.state === "hyperlaneEntry" || transport.state === "hyperlaneTravel") {
                updateShipHyperlaneTravel(transport);
                updateCarriedPassengersPosition(transport);
                return;
            }

            updateCarriedPassengersPosition(transport);

            if (transport.state === "seekingSite") {
                transport.targetSite = chooseTransportMiningSite(transport);

                if (!transport.targetSite) {
                    transport.state = "standby";
                    updateShipStandbyPosition(transport);
                    return;
                }

                transport.state = "gatheringShips";
                return;
            }

            if (transport.state === "standby") {
                updateShipStandbyPosition(transport);

                if (frameCount % 120 === 0) {
                    transport.state = "seekingSite";
                }

                return;
            }

            if (transport.state === "gatheringShips") {
                callShipsToTransport(transport);

                const noMoreCanJoin = transportHasNoMoreJoinableShips(transport);
                const everyoneOnBoard = allTransportPassengersCarried(transport);

                if (noMoreCanJoin && everyoneOnBoard) {
                    if (getTransportPassengers(transport).length <= 0) {
                        transport.state = "standby";
                        return;
                    }

                    assignTransportParkingPoint(transport, transport.targetSite);
                    transport.state = "outbound";
                }

                return;
            }

            if (transport.state === "outbound") {
                const destinationPoint = {
                    x: transport.targetX,
                    y: transport.targetY
                };

                const route = getBestHyperlaneRouteToPoint(
                    transport,
                    destinationPoint,
                    "outbound"
                );

                if (route && startShipHyperlaneTravel(transport, route)) {
                    updateCarriedPassengersPosition(transport);
                    return;
                }

                const arrived = moveToward(
                    transport,
                    transport.targetX,
                    transport.targetY,
                    getEffectiveShipSpeed(transport)
                );

                if (arrived) {
                    transport.state = "deployed";
                    transport.gravTimer = 0;
                    deployTransportPassengers(transport);
                }

                return;
            }

            if (transport.state === "deployed") {
                updateTransportGravPulse(transport);

                if (
                    isTransportCargoFull(transport) ||
                    !isTransportMiningSiteActive(transport.targetSite)
                ) {
                    transport.state = "recallingShips";
                    recallTransportPassengers(transport);
                }

                return;
            }

            if (transport.state === "recallingShips") {
                recallTransportPassengers(transport);

                if (allTransportPassengersCarried(transport)) {
                    const dock = getLargeShipyardDockPoint();
                    transport.targetX = dock.x;
                    transport.targetY = dock.y;
                    transport.state = "returning";
                }

                return;
            }

            if (transport.state === "returning") {
                const dockPoint = {
                    x: transport.targetX,
                    y: transport.targetY
                };

                const route = getBestHyperlaneRouteBackToStation(
                    transport,
                    dockPoint,
                    "returning"
                );

                if (route && startShipHyperlaneTravel(transport, route)) {
                    updateCarriedPassengersPosition(transport);
                    return;
                }

                const arrived = moveToward(
                    transport,
                    transport.targetX,
                    transport.targetY,
                    getEffectiveShipSpeed(transport)
                );

                if (arrived) {
                    depositTransportCargoAtStation(transport);

                    // Re-evaluate every cycle.
                    // A newly built hyperlane may make another belt more attractive.
                    const nextSite = chooseTransportMiningSite(transport);

                    if (nextSite) {
                        transport.targetSite = nextSite;

                        assignTransportParkingPoint(transport, transport.targetSite);
                        transport.state = "outbound";
                    } else {
                        transport.targetSite = null;
                        transport.parkingPoint = null;
                        transport.state = "seekingSite";
                    }
                }

                return;
            }
        }

        function updateDroneCarrierStandby(ship) {
            updateShipStandbyPosition(ship);

            for (const drone of ship.drones) {
                drone.target = null;
                updateCarrierDrone(ship, drone);
            }

            if (shouldStandbyShipRetryWork(ship)) {
                ship.forceRedeploy = true;
                ship.state = "seeking";
            }
        }

        function updateDroneCarrier(ship) {
            if (ship.drones.length <= 0) {
                ship.forceRedeploy = false;
                ship.redeployTimer = 0;
                updateShipStandbyPosition(ship);
                return;
            }

            if (!hasAnyDroneCarrierWorkAvailable(ship)) {
                updateDroneCarrierStandby(ship);
                return;
            }

            if (ship.state === "standby") {
                ship.forceRedeploy = true;
                ship.state = "seeking";
            }

            ship.redeployTimer++;

            const salvagePriority = droneCarrierPrefersSalvage(ship);
            const priorityChanged = ship.lastSalvagePriority !== salvagePriority;
            ship.lastSalvagePriority = salvagePriority;

            const shouldCheckDeployment =
                ship.redeployTimer >= DRONE_CARRIER_REDEPLOY_CHECK_INTERVAL;

            const shouldRedeploy =
                ship.forceRedeploy ||
                priorityChanged ||
                ship.state === "seeking" ||
                (
                    ship.state === "deployed" &&
                    shouldCheckDeployment &&
                    !hasPreferredDroneTargetsInRange(ship)
                );

            if (shouldRedeploy) {
                const deployment = findDroneCarrierDeployment(ship);

                ship.target = deployment.target;
                ship.targetX = deployment.x;
                ship.targetY = deployment.y;
                ship.state = "outbound";
                ship.redeployTimer = 0;
                ship.forceRedeploy = false;

                // Force drones to choose targets again after the carrier moves.
                for (const drone of ship.drones) {
                    drone.target = null;
                }
            }

            if (ship.state === "outbound") {
                const arrived = moveToward(ship, ship.targetX, ship.targetY, getEffectiveShipSpeed(ship));

                if (arrived) {
                    ship.state = "deployed";
                    ship.redeployTimer = 0;
                    retargetCarrierDrones(ship);
                }
            }

            if (
                ship.state === "deployed" &&
                ship.redeployTimer % 60 === 0
            ) {
                retargetCarrierDrones(ship);
            }

            for (const drone of ship.drones) {
                updateCarrierDrone(ship, drone);
            }
        }


        function updateCarrierDrone(carrier, drone) {
            if (
                !drone.target ||
                getTargetResourceAmount(drone.target) <= 0 ||
                !isTargetInsideCarrierRange(carrier, drone.target)
            ) {
                drone.target = getDroneTarget(carrier, drone);
            }

            if (!drone.target) {
                drone.angle += drone.orbitSpeed * 0.65;
                drone.x = carrier.x + Math.cos(drone.angle) * DRONE_IDLE_ORBIT_RADIUS;
                drone.y = carrier.y + Math.sin(drone.angle) * DRONE_IDLE_ORBIT_RADIUS;
                return;
            }

            drone.angle += drone.orbitSpeed;
            drone.orbitRadius = drone.target.radius + 26;

            drone.x = drone.target.x + Math.cos(drone.angle) * drone.orbitRadius;
            drone.y = drone.target.y + Math.sin(drone.angle) * drone.orbitRadius;

            drone.fireTimer--;

            if (drone.fireTimer <= 0) {
                fireDroneLaser(carrier, drone, drone.target);
                drone.fireTimer = DRONE_LASER_INTERVAL;
            }
        }

        function getStarSiphonPointFrom(star, fromPoint) {
            const siphonDistance = star.radius + STAR_SIPHON_STANDOFF;

            const dx = fromPoint.x - star.x;
            const dy = fromPoint.y - star.y;
            const d = Math.hypot(dx, dy) || 1;

            return {
                x: star.x + dx / d * siphonDistance,
                y: star.y + dy / d * siphonDistance
            };
        }

        function getLargeShipyardDockPoint() {
            const largeShipyard = getModuleById("largeShipyard") || station;

            return {
                x: largeShipyard.x,
                y: largeShipyard.y
            };
        }

        function estimateTravelTime(a, b, speed) {
            return Math.sqrt(distSq(a, b)) / speed;
        }

        function getBestHyperlaneRouteToStation(ship) {
            if (!canUseHyperlane()) return null;
            if (hyperlanes.length <= 0) return null;

            const dock = getLargeShipyardDockPoint();
            const normalTime = estimateTravelTime(ship, dock, getEffectiveShipSpeed(ship));

            let bestRoute = null;
            let bestTime = normalTime;

            for (const lane of hyperlanes) {
                const endpoints = getHyperlaneEndpoints(lane);

                const timeToEntry = estimateTravelTime(ship, endpoints.to, getEffectiveShipSpeed(ship));
                const laneTime = estimateTravelTime(endpoints.to, endpoints.from, HYPERLANE_TRAVEL_SPEED);
                const timeAfterExit = estimateTravelTime(endpoints.from, dock, getEffectiveShipSpeed(ship));

                const totalTime = timeToEntry + laneTime + timeAfterExit;

                if (totalTime < bestTime) {
                    bestTime = totalTime;
                    bestRoute = {
                        lane,
                        from: endpoints.to,
                        to: endpoints.from,
                        afterState: "returning"
                    };
                }
            }

            return bestRoute;
        }

        function startSiphonerHyperlaneTravel(ship, route) {
            if (!route) return false;

            if (!spendResource("helion", HYPERLANE_SIPHONER_COST)) {
                return false;
            }

            ship.hyperlane = {
                from: route.from,
                to: route.to,
                afterState: route.afterState,
                lane: route.lane
            };

            ship.state = "hyperlaneEntry";
            return true;
        }

        function updateSiphonerHyperlaneTravel(ship) {
            if (!ship.hyperlane) {
                ship.state = "seeking";
                return;
            }

            if (ship.state === "hyperlaneEntry") {
                const arrived = moveToward(
                    ship,
                    ship.hyperlane.from.x,
                    ship.hyperlane.from.y,
                    getEffectiveShipSpeed(ship)
                );

                if (arrived) {
                    ship.state = "hyperlaneTravel";
                }

                return;
            }

            if (ship.state === "hyperlaneTravel") {
                const arrived = moveToward(
                    ship,
                    ship.hyperlane.to.x,
                    ship.hyperlane.to.y,
                    HYPERLANE_TRAVEL_SPEED
                );

                if (arrived) {
                    const afterState = ship.hyperlane.afterState;
                    const exitPoint = ship.hyperlane.to;

                    if (afterState === "outbound" && ship.target) {
                        assignSiphonerParkingSpot(ship, ship.target, exitPoint);
                    }

                    ship.hyperlane = null;
                    ship.state = afterState;
                }
            }
        }

        function updateStarSiphoner(ship) {
            if (ship.state === "hyperlaneEntry" || ship.state === "hyperlaneTravel") {
                updateSiphonerHyperlaneTravel(ship);
                return;
            }

            if (ship.state === "idle" || ship.state === "standby") {
                ship.state = "seeking";
            }

            if (ship.state === "seeking") {
                ship.target = chooseStarForSiphoner(ship);

                if (ship.target) {
                    assignSiphonerParkingSpot(ship, ship.target, ship);
                    ship.state = "outbound";
                } else {
                    ship.siphonPoint = null;
                    ship.state = "idle";
                    return;
                }
            }

            if (ship.state === "outbound") {
                if (!ship.target || !isActiveStarTarget(ship.target)) {
                    ship.target = null;
                    ship.state = "seeking";
                    return;
                }

                const route = getBestHyperlaneRouteToStar(ship, ship.target);

                if (route && startSiphonerHyperlaneTravel(ship, route)) {
                    return;
                }

                if (!ship.siphonPoint) {
                    assignSiphonerParkingSpot(ship, ship.target, ship);
                }

                if (moveToward(ship, ship.siphonPoint.x, ship.siphonPoint.y, getEffectiveShipSpeed(ship))) {
                    ship.state = "siphoning";
                    ship.siphonTimer = 0;
                }
            }

            if (ship.state === "siphoning") {
                if (!ship.target || !isActiveStarTarget(ship.target)) {
                    ship.target = null;
                    ship.state = ship.cargo > 0 ? "returning" : "seeking";
                    return;
                }

                ship.siphonTimer++;

                if (ship.siphonTimer >= getStarSiphonInterval()) {
                    ship.siphonTimer = 0;

                    const amount = Math.min(
                        getStarSiphonAmount(),
                        getEffectiveCargoMax(ship) - ship.cargo
                    );

                    ship.cargo += amount;
                }

                if (ship.cargo >= getEffectiveCargoMax(ship)) {
                    ship.state = "returning";
                }
            }

            if (ship.state === "returning") {
                const route = getBestHyperlaneRouteToStation(ship);

                if (route && startSiphonerHyperlaneTravel(ship, route)) {
                    return;
                }

                const dock = getLargeShipyardDockPoint();

                if (moveToward(ship, dock.x, dock.y, getEffectiveShipSpeed(ship))) {
                    if (ship.cargo > 0) {
                        addResource("helion", ship.cargo);
                        queueOreGatherSound();
                    }

                    ship.cargo = 0;
                    ship.target = null;
                    ship.siphonPoint = null;
                    ship.state = "seeking";
                }
            }
        }

        function updateShip(ship) {
            const kind = ship.kind || "miningFrigate";

            if (ship.carriedBy) {
                ship.x = ship.carriedBy.x;
                ship.y = ship.carriedBy.y;
                return;
            }

            if (kind !== "transportShip" && ship.assignedTransport) {
                if (updateAssignedShipDocking(ship)) {
                    return;
                }
            }

            if (kind === "liberationCorvette") {
                updateLiberationCorvette(ship);
                return;
            }

            if (kind === "transportShip") {
                updateTransportShip(ship);
                return;
            }

            if (kind === "salvageShip") {
                updateCargoMiningShip(ship, chooseWreck, isValidSalvageShipTarget, "metal");
                return;
            }

            if (kind === "droneCarrier") {
                updateDroneCarrier(ship);
                return;
            }

            if (kind === "starSiphoner") {
                updateStarSiphoner(ship);
                return;
            }

            updateCargoMiningShip(ship, chooseAsteroid, isValidMiningShipTarget, "ore");
        }

        function wrapTextLines(text, maxWidth) {
            const words = text.split(" ");
            const lines = [];
            let line = "";

            for (const word of words) {
                const testLine = line ? `${line} ${word}` : word;

                if (ctx.measureText(testLine).width > maxWidth && line) {
                    lines.push(line);
                    line = word;
                } else {
                    line = testLine;
                }
            }

            if (line) lines.push(line);
            return lines;
        }

        function getHyperlaneMapLayout() {
            const size = 720;
            const x = W / 2 - size / 2;
            const y = H / 2 - size / 2 + 18;

            return {
                x,
                y,
                w: size,
                h: size,
                titleY: y - 48,
                closeX: x + size - 28,
                closeY: y - 28,
                closeR: 15
            };
        }

        function worldToHyperlaneMap(wx, wy, layout) {
            return {
                x: layout.x + (wx / WORLD_W) * layout.w,
                y: layout.y + (wy / WORLD_H) * layout.h
            };
        }

        function drawLiberationCorvetteShape(hovered) {
            // Fast medium courier / blockade-runner profile.
            ctx.beginPath();
            ctx.moveTo(28, 0);
            ctx.lineTo(8, -12);
            ctx.lineTo(-22, -10);
            ctx.lineTo(-12, 0);
            ctx.lineTo(-22, 10);
            ctx.lineTo(8, 12);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Side fins
            ctx.beginPath();
            ctx.moveTo(-6, -10);
            ctx.lineTo(-16, -22);
            ctx.moveTo(-6, 10);
            ctx.lineTo(-16, 22);
            ctx.stroke();

            // Cargo / ledger bay
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.rect(-6, -6, 14, 12);
            ctx.stroke();

            // Engine ticks
            ctx.fillStyle = hovered ? "rgba(180,255,210,0.95)" : GREEN;
            ctx.fillRect(-26, -7, 3, 4);
            ctx.fillRect(-26, 3, 3, 4);
        }

        function drawHyperlaneScreen() {
            if (!activeHyperlaneScreen) return;

            const layout = getHyperlaneMapLayout();
            const targets = getHyperlaneTargets();

            ctx.save();

            // Background veil
            ctx.fillStyle = "rgba(0,0,0,0.72)";
            ctx.fillRect(0, 0, W, H);

            // Title
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 16;
            ctx.fillStyle = GREEN;
            ctx.font = "22px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("HYPERLANE CONSTRUCTION // SECTOR MAP", W / 2, layout.titleY);

            ctx.font = "13px monospace";
            ctx.globalAlpha = 0.72;
            ctx.fillText("SELECT A PLANETARY BELT OR STAR TO ANCHOR A NEW HYPERLANE", W / 2, layout.titleY + 28);
            ctx.globalAlpha = 1;

            // Map panel
            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.94)";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 14;

            ctx.fillRect(layout.x, layout.y, layout.w, layout.h);
            ctx.strokeRect(layout.x, layout.y, layout.w, layout.h);

            // Grid
            ctx.strokeStyle = "rgba(80,255,130,0.10)";
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;

            for (let i = 1; i < 8; i++) {
                const gx = layout.x + layout.w * i / 8;
                const gy = layout.y + layout.h * i / 8;

                ctx.beginPath();
                ctx.moveTo(gx, layout.y);
                ctx.lineTo(gx, layout.y + layout.h);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(layout.x, gy);
                ctx.lineTo(layout.x + layout.w, gy);
                ctx.stroke();
            }

            // Existing hyperlanes
            for (const lane of hyperlanes) {
                const s = worldToHyperlaneMap(station.x, station.y, layout);
                const d = worldToHyperlaneMap(lane.destination.x, lane.destination.y, layout);

                ctx.strokeStyle = "rgba(80,255,130,0.42)";
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 6]);

                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(d.x, d.y);
                ctx.stroke();

                ctx.setLineDash([]);
            }

            // Station marker
            const stationP = worldToHyperlaneMap(station.x, station.y, layout);

            ctx.fillStyle = "rgba(80,255,130,0.28)";
            ctx.strokeStyle = GREEN;
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.beginPath();
            ctx.rect(stationP.x - 8, stationP.y - 8, 16, 16);
            ctx.fill();
            ctx.stroke();

            ctx.font = "11px monospace";
            ctx.textAlign = "left";
            ctx.fillStyle = GREEN;
            ctx.fillText("STATION", stationP.x + 12, stationP.y - 10);

            // Destination markers
            for (const body of targets) {
                const p = worldToHyperlaneMap(body.x, body.y, layout);
                const alreadyBuilt = hasHyperlaneTo(body);
                const hovered = distSq({ x: mouseScreenX, y: mouseScreenY }, p) <= 16 * 16;

                ctx.shadowColor = GREEN;
                ctx.shadowBlur = hovered ? 18 : 8;
                ctx.lineWidth = hovered ? 3 : 2;

                if (alreadyBuilt) {
                    ctx.strokeStyle = "rgba(80,255,130,0.35)";
                    ctx.fillStyle = "rgba(80,255,130,0.08)";
                } else if (body.type === "STAR") {
                    ctx.strokeStyle = hovered ? "rgba(180,255,210,0.95)" : GREEN;
                    ctx.fillStyle = hovered ? "rgba(80,255,130,0.24)" : "rgba(80,255,130,0.14)";
                } else {
                    ctx.strokeStyle = hovered ? "rgba(180,255,210,0.95)" : "rgba(120,255,170,0.85)";
                    ctx.fillStyle = hovered ? "rgba(80,255,130,0.20)" : "rgba(80,255,130,0.10)";
                }

                ctx.beginPath();

                if (body.type === "STAR") {
                    ctx.arc(p.x, p.y, hovered ? 11 : 9, 0, Math.PI * 2);
                } else {
                    ctx.rect(p.x - 8, p.y - 8, 16, 16);
                }

                ctx.fill();
                ctx.stroke();

                ctx.font = "11px monospace";
                ctx.textAlign = "left";
                ctx.fillStyle = alreadyBuilt ? "rgba(80,255,130,0.45)" : GREEN;

                const label = alreadyBuilt
                    ? `${body.codename} // LINKED`
                    : `${body.codename} // ${body.type === "STAR" ? "STAR" : "BELT WORLD"}`;

                ctx.fillText(label, p.x + 14, p.y - 10);
            }

            // Close button
            ctx.shadowBlur = 10;
            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.08)";
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.arc(layout.closeX, layout.closeY, layout.closeR, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = GREEN;
            ctx.font = "15px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("X", layout.closeX, layout.closeY);

            // Footer
            const hyperlaneCost = getHyperlaneBuildCost();
            const canBuildLane = canAffordCost(hyperlaneCost);

            ctx.font = "12px monospace";
            ctx.globalAlpha = 0.72;
            ctx.fillText("ESC OR X TO CLOSE", W / 2, layout.y + layout.h + 32);
            ctx.globalAlpha = 1;

            ctx.font = "13px monospace";
            ctx.textAlign = "center";
            ctx.fillStyle = canBuildLane ? GREEN : "rgba(120,255,160,0.45)";
            ctx.globalAlpha = 0.9;
            ctx.fillText(
                `BUILD COST: ${formatCost(hyperlaneCost)}`,
                W / 2,
                layout.y + layout.h + 14
            );
            ctx.globalAlpha = 0.72;
            ctx.fillText("ESC OR X TO CLOSE", W / 2, layout.y + layout.h + 36);
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        function drawDebtProgressBar() {
            const barW = 620;
            const barH = 22;
            const gap = 8;
            const x = W / 2 - barW / 2;
            const y = 24;

            const debtProgress = Math.min(1, totalOreAcquired / DEBT_TARGET_ORE);

            const nextQuota = oreQuotas.find(q => !q.unlocked);
            const prevQuota = (() => {
                const unlocked = oreQuotas.filter(q => q.unlocked);
                return unlocked.length ? unlocked[unlocked.length - 1].amount : 0;
            })();

            const quotaProgress = nextQuota
                ? Math.min(1, (totalOreAcquired - prevQuota) / (nextQuota.amount - prevQuota))
                : 1;

            ctx.save();

            function drawBar(label, valueText, progress, yPos) {
                ctx.strokeStyle = GREEN;
                ctx.fillStyle = "rgba(0,20,0,0.82)";
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.fillRect(x, yPos, barW, barH);
                ctx.strokeRect(x, yPos, barW, barH);

                ctx.fillStyle = "rgba(80,255,130,0.28)";
                ctx.fillRect(x + 3, yPos + 3, (barW - 6) * progress, barH - 6);

                ctx.fillStyle = GREEN;
                ctx.font = "12px monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                ctx.fillText(`${label}: ${valueText}`, W / 2, yPos + barH / 2);
            }

            drawBar(
                "DEBT REPAYMENT",
                `${Math.floor(totalOreAcquired).toLocaleString("de-DE")} / ${DEBT_TARGET_ORE.toLocaleString("de-DE")} ORE`,
                debtProgress,
                y
            );

            drawBar(
                "NEXT MILESTONE",
                nextQuota
                    ? `${nextQuota.label} ${Math.floor(totalOreAcquired).toLocaleString("de-DE")} / ${nextQuota.amount.toLocaleString("de-DE")} ORE`
                    : "ALL MILESTONES REACHED",
                quotaProgress,
                y + barH + gap
            );

            ctx.restore();
        }

        function drawIncomingMessage() {
            if (!activeIncomingMessage) return;

            const boxW = 760;
            const boxH = 600;
            const x = W / 2 - boxW / 2;
            const y = H / 2 - boxH / 2;

            ctx.save();

            ctx.fillStyle = "rgba(0,0,0,0.62)";
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.94)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 18;

            ctx.fillRect(x, y, boxW, boxH);
            ctx.strokeRect(x, y, boxW, boxH);

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.strokeRect(x + 12, y + 12, boxW - 24, boxH - 24);

            ctx.fillStyle = GREEN;
            ctx.font = "16px monospace";
            ctx.fillText(activeIncomingMessage.title, x + 34, y + 44);

            ctx.globalAlpha = 0.7;
            ctx.font = "12px monospace";
            ctx.fillText(`FROM: ${activeIncomingMessage.from}`, x + 34, y + 70);
            ctx.globalAlpha = 1;

            ctx.beginPath();
            ctx.moveTo(x + 34, y + 92);
            ctx.lineTo(x + boxW - 34, y + 92);
            ctx.stroke();

            ctx.font = "15px monospace";

            let lineY = y + 128;

            const textMaxWidth = boxW - 84;

            for (const paragraph of activeIncomingMessage.body) {
                if (paragraph === "") {
                    lineY += 18;
                    continue;
                }

                const wrappedLines = wrapTextLines(paragraph, textMaxWidth);

                for (const line of wrappedLines) {
                    ctx.fillText(line, x + 42, lineY);
                    lineY += 24;
                }
            }

            const blink = Math.floor(frameCount / 24) % 2 === 0;

            if (blink) {
                ctx.font = "13px monospace";
                ctx.fillText("PRESS SPACE TO CONTINUE", x + boxW / 2 - 100, y + boxH - 34);
            }

            ctx.restore();
        }

        function isInsideStartScreenExclusionZone(x, y, padding = 0) {
            return (
                x >= W / 2 - 520 - padding &&
                x <= W / 2 + 520 + padding &&
                y >= H / 2 - 250 - padding &&
                y <= H / 2 + 230 + padding
            );
        }

        function makeStartScreenAsteroid(i) {
            for (let attempt = 0; attempt < 300; attempt++) {
                const radius = rand(34, 72);
                const x = rand(90, W - 90);
                const y = rand(90, H - 90);

                if (isInsideStartScreenExclusionZone(x, y, radius + 36)) {
                    continue;
                }

                const overlaps = startScreenAsteroids.some(other => {
                    const minDist = radius + other.radius + 80;
                    const dx = x - other.x;
                    const dy = y - other.y;
                    return dx * dx + dy * dy < minDist * minDist;
                });

                if (overlaps) continue;

                const verts = [];
                const sides = Math.floor(rand(8, 12));

                for (let s = 0; s < sides; s++) {
                    const t = (s / sides) * Math.PI * 2;
                    const r = radius * rand(0.72, 1.18);

                    verts.push({
                        x: Math.cos(t) * r,
                        y: Math.sin(t) * r
                    });
                }

                return {
                    x,
                    y,
                    radius,
                    verts,
                    rotation: rand(0, Math.PI * 2),
                    drift: rand(-0.0025, 0.0025),
                    codename: `BG-AST-${String(i + 1).padStart(2, "0")}`
                };
            }

            return {
                x: rand(90, W - 90),
                y: rand(90, H - 90),
                radius: 48,
                verts: [
                    { x: -34, y: -18 },
                    { x: -10, y: -42 },
                    { x: 26, y: -30 },
                    { x: 40, y: -4 },
                    { x: 26, y: 28 },
                    { x: -6, y: 40 },
                    { x: -32, y: 16 }
                ],
                rotation: 0,
                drift: 0,
                codename: `BG-AST-${String(i + 1).padStart(2, "0")}`
            };
        }

        function chooseStartScreenFrigateTarget(ship) {
            const options = startScreenAsteroids.filter(a => a !== ship.lastTarget);
            const targetPool = options.length > 0 ? options : startScreenAsteroids;

            ship.target = pick(targetPool);
            ship.lastTarget = ship.target;

            const angle = rand(0, Math.PI * 2);
            const dist = ship.target.radius + rand(18, 28);

            ship.targetX = ship.target.x + Math.cos(angle) * dist;
            ship.targetY = ship.target.y + Math.sin(angle) * dist;
            ship.state = "toTarget";
        }

        function makeStartScreenFrigate(i) {
            const ship = {
                x: rand(120, W - 120),
                y: rand(120, H - 120),
                speed: rand(0.55, 0.95),
                state: "toTarget",
                target: null,
                targetX: 0,
                targetY: 0,
                angle: rand(0, Math.PI * 2),
                miningTimer: 0,
                beamPhase: rand(0, Math.PI * 2),
                wobblePhase: rand(0, Math.PI * 2),
                lastTarget: null,
                codename: `BG-MINER-${String(i + 1).padStart(2, "0")}`
            };

            chooseStartScreenFrigateTarget(ship);
            return ship;
        }

        function initStartScreenBackground() {
            if (startScreenAsteroids.length > 0 || startScreenFrigates.length > 0) return;

            for (let i = 0; i < START_SCREEN_ASTEROID_COUNT; i++) {
                startScreenAsteroids.push(makeStartScreenAsteroid(i));
            }

            for (let i = 0; i < START_SCREEN_FRIGATE_COUNT; i++) {
                startScreenFrigates.push(makeStartScreenFrigate(i));
            }
        }

        function updateStartScreenBackground() {
            initStartScreenBackground();

            for (const asteroid of startScreenAsteroids) {
                asteroid.rotation += asteroid.drift;
            }

            for (const ship of startScreenFrigates) {
                if (!ship.target) {
                    chooseStartScreenFrigateTarget(ship);
                }

                if (ship.state === "toTarget") {
                    const dx = ship.targetX - ship.x;
                    const dy = ship.targetY - ship.y;

                    ship.angle = Math.atan2(dy, dx);

                    const arrived = moveToward(ship, ship.targetX, ship.targetY, ship.speed);

                    if (arrived) {
                        ship.state = "mining";
                        ship.miningTimer = Math.floor(rand(70, 150));
                    }

                    continue;
                }

                if (ship.state === "mining") {
                    const dx = ship.target.x - ship.x;
                    const dy = ship.target.y - ship.y;
                    ship.angle = Math.atan2(dy, dx);

                    const orbitAngle = ship.angle + Math.PI;
                    ship.x += Math.cos(orbitAngle + Math.sin(frameCount * 0.03 + ship.wobblePhase) * 0.45) * 0.08;
                    ship.y += Math.sin(orbitAngle + Math.sin(frameCount * 0.03 + ship.wobblePhase) * 0.45) * 0.08;

                    ship.miningTimer--;

                    if (ship.miningTimer <= 0) {
                        chooseStartScreenFrigateTarget(ship);
                    }
                }
            }
        }

        function drawStartScreenAsteroid(a) {
            ctx.save();
            ctx.translate(a.x, a.y);
            ctx.rotate(a.rotation);

            ctx.strokeStyle = "rgba(110,255,165,0.55)";
            ctx.fillStyle = "rgba(0,255,90,0.05)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            a.verts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawStartScreenFrigate(ship) {
            if (ship.state === "mining" && ship.target) {
                ctx.save();

                const beamPulse = 0.65 + Math.sin(frameCount * 0.25 + ship.beamPhase) * 0.25;

                ctx.strokeStyle = `rgba(140,255,190,${0.45 + beamPulse * 0.25})`;
                ctx.lineWidth = 1.5 + beamPulse;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 8;
                ctx.setLineDash([7, 5]);

                ctx.beginPath();
                ctx.moveTo(ship.x, ship.y);
                ctx.lineTo(ship.target.x, ship.target.y);
                ctx.stroke();

                ctx.setLineDash([]);

                for (let i = 0; i < 3; i++) {
                    const sparkAngle = frameCount * 0.08 + ship.beamPhase + i * 2.1;
                    const sparkDist = 8 + i * 4;

                    ctx.fillStyle = `rgba(170,255,210,${0.18 + beamPulse * 0.18})`;
                    ctx.beginPath();
                    ctx.arc(
                        ship.target.x + Math.cos(sparkAngle) * sparkDist,
                        ship.target.y + Math.sin(sparkAngle) * sparkDist,
                        1.8 + i * 0.45,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }

                ctx.restore();
            }

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            ctx.strokeStyle = "rgba(170,255,210,0.9)";
            ctx.fillStyle = "rgba(0,255,90,0.14)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.beginPath();
            drawMiningFrigateShape();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawStartScreenBackground() {
            initStartScreenBackground();

            ctx.save();
            ctx.globalAlpha = 0.9;

            for (const asteroid of startScreenAsteroids) {
                drawStartScreenAsteroid(asteroid);
            }

            for (const ship of startScreenFrigates) {
                drawStartScreenFrigate(ship);
            }

            ctx.restore();
        }
