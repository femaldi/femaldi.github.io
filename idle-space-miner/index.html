<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Idle Space Miner</title>
    <style>
        body {
            margin: 0;
            background: #020802;
            display: grid;
            place-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }

        canvas {
            width: 1920;
            height: 1080px;
            image-rendering: pixelated;
            background: #001000;
            box-shadow: 0 0 40px #00ff6644;
            cursor: none;
        }
    </style>
</head>

<body>
    <canvas id="game" width="1920" height="1080"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const W = 1920;
        const H = 1080;
        const WORLD_W = 6000;
        const WORLD_H = 6000;

        const camera = {
            x: WORLD_W / 2,
            y: WORLD_H / 2,
            zoom: 1,
            minZoom: 0.45,
            maxZoom: 2.5
        };

        let mouseScreenX = 0;
        let mouseScreenY = 0;
        let isCameraDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let cameraStartX = 0;
        let cameraStartY = 0;
        let musicAudio = null;

        let oreGatherCombo = 0;
        let oreGatherComboTimer = 0;
        const ORE_GATHER_COMBO_WINDOW = 12; // frames
        let oreGatherChunks = 0;
        const CHUNKS_PER_COMBO = 10;
        const queuedOreGatherSounds = [];
        let oreGatherSoundDelay = 0;
        const ORE_GATHER_SOUND_SPACING = 2; // frames between sounds

        const soundEnabled = true;

        const sounds = {
            laser: new Audio("sounds/laser.wav"),
            oreGather: new Audio("sounds/ore-gather.wav"),
            menu: new Audio("sounds/menu.wav")
        };

        for (const sound of Object.values(sounds)) {
            sound.preload = "auto";
            sound.volume = 0.45;
        }

        function startMusic() {
            if (musicAudio) return; // prevent multiple starts

            musicAudio = new Audio("sounds/music.wav");
            musicAudio.loop = true;
            musicAudio.volume = 0.1;
            musicAudio.play().catch(() => {
                // autoplay might fail, but since this is user-triggered it should work
            });
        }

        function playSound(name, options = {}) {
            if (!soundEnabled) return;

            const base = sounds[name];
            if (!base) return;

            const {
                volume = 0.45,
                volumeVar = 0,
                pitch = 1,
                pitchVar = 0
            } = options;

            const s = base.cloneNode();

            // volume variance
            const finalVolume = volume + (Math.random() * 2 - 1) * volumeVar;
            s.volume = Math.max(0, Math.min(1, finalVolume));

            // pitch variance (playbackRate)
            const finalPitch = pitch + (Math.random() * 2 - 1) * pitchVar;
            s.playbackRate = Math.max(0.5, Math.min(2.0, finalPitch));

            s.play().catch(() => {});
        }

        const keys = {};

        const GREEN = "#66ff99";
        const DIM = "rgba(80,255,130,0.35)";
        const FAINT = "rgba(80,255,130,0.15)";

        const DEBT_TARGET_ORE = 6587651565;

        const incomingMessages = [];
        let activeIncomingMessage = null;
        let messageInputLock = 0;

        let gameState = "start";
        const startButton = {
            x: W / 2 - 110,
            y: H / 2 + 90,
            w: 220,
            h: 54
        };

        function queueIncomingMessage(message) {
            incomingMessages.push(message);

            if (!activeIncomingMessage) {
                showNextIncomingMessage();
            }
        }

        function showNextIncomingMessage() {
            activeIncomingMessage = incomingMessages.shift() || null;
            messageInputLock = 8;
        }

        function advanceIncomingMessage() {
            if (!activeIncomingMessage) return;
            if (messageInputLock > 0) return;

            showNextIncomingMessage();
        }

        function isMessageActive() {
            return !!activeIncomingMessage;
        }

        function queueStartingMessages() {
            queueIncomingMessage({
                title: "INCOMING MESSAGE // ESTATE TRANSFER",
                from: "DEBT-CLAIM AUTHORITY",
                body: [
                    "Administrator, welcome to your inherited command post.",
                    "",
                    "By validated succession protocol, this extraction station, its liabilities, and its outstanding mineral obligations are now yours.",
                    "",
                    `Current inherited debt: ${DEBT_TARGET_ORE.toLocaleString("de-DE")} ORE UNITS.`,
                    "",
                    "Grow the station. Keep the ore flowing. Reach the owed amount, and your contract will be considered fulfilled."
                ]
            });

            queueIncomingMessage({
                title: "INCOMING MESSAGE // FIELD INSTRUCTION",
                from: "STATION OPERATIONS",
                body: [
                    "Initial procedure:",
                    "",
                    "Use the Old War Laser to mine one asteroid.",
                    "Then activate the Grav Pull module to retrieve the released ore chunks.",
                    "Use the Station to requisiton new modules spending the acquired ore.",
                    "",
                    "Laser: click and hold an asteroid within range.",
                    "Grav Pull: click the GRAV-PULSE module.",
                    "",
                    "May the ore flow forevermore."
                ]
            });
        }

        function pointInRect(px, py, r) {
            return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
        }

        function clampCamera() {
            const halfW = W / 2 / camera.zoom;
            const halfH = H / 2 / camera.zoom;

            camera.x = Math.max(halfW, Math.min(WORLD_W - halfW, camera.x));
            camera.y = Math.max(halfH, Math.min(WORLD_H - halfH, camera.y));
        }

        function screenToWorld(sx, sy) {
            return {
                x: camera.x + (sx - W / 2) / camera.zoom,
                y: camera.y + (sy - H / 2) / camera.zoom
            };
        }

        function applyCameraTransform() {
            ctx.translate(W / 2, H / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
        }

        function zoomCamera(delta, sx = mouseScreenX, sy = mouseScreenY) {
            const before = screenToWorld(sx, sy);

            camera.zoom = Math.max(
                camera.minZoom,
                Math.min(camera.maxZoom, camera.zoom * delta)
            );

            const after = screenToWorld(sx, sy);

            camera.x += before.x - after.x;
            camera.y += before.y - after.y;

            clampCamera();
        }

        const scienceProbes = [];

        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        let heldAsteroidTarget = null;
        let frameCount = 0;
        let menuCloseTimer = 0;
        const MENU_CLOSE_DELAY = 15;

        const station = {
            x: WORLD_W / 2,
            y: WORLD_H / 2,
            r: 46,
            codename: "CITADEL-01"
        };

        let activeMenu = null;
        let totalOreAcquired = 0;

        const resources = {
            ore: 0,
            science: 0,
            metal: 0
        };

        let hasDiscoveredScience = false;
        let hasDiscoveredMetal = false;

        const oreQuotas = [
            {
                amount: 1000,
                label: "SALVAGING RIGHTS",
                unlocked: false,
                onUnlock: () => {
                    salvagingLicenseUnlocked = true;
                },
                message: {
                    title: "INCOMING MESSAGE // LICENSE ISSUED",
                    from: "DEBT-CLAIM AUTHORITY",
                    body: [
                        "Quota milestone reached: 1.000 total ore units acquired.",
                        "",
                        "Congratulations, Administrator.",
                        "",
                        "A provisional Salvaging Rights license has been issued to your station.",
                        "",
                        "You are now authorized to recover abandoned materials and derelict assets within your assigned sector."
                    ]
                }
            },
            {
                amount: 10000,
                label: "QUOTA II",
                unlocked: false,
                message: {
                    title: "INCOMING MESSAGE // QUOTA VERIFIED",
                    from: "DEBT-CLAIM AUTHORITY",
                    body: [
                        "Quota milestone reached: 10.000 total ore units acquired.",
                        "",
                        "Additional operational privileges have been marked for future issuance."
                    ]
                }
            },
            {
                amount: 100000,
                label: "QUOTA III",
                unlocked: false,
                message: {
                    title: "INCOMING MESSAGE // QUOTA VERIFIED",
                    from: "DEBT-CLAIM AUTHORITY",
                    body: [
                        "Quota milestone reached: 100.000 total ore units acquired.",
                        "",
                        "Your station remains under review for expanded extraction permissions."
                    ]
                }
            },
            {
                amount: 1000000,
                label: "QUOTA IV",
                unlocked: false,
                message: {
                    title: "INCOMING MESSAGE // QUOTA VERIFIED",
                    from: "DEBT-CLAIM AUTHORITY",
                    body: [
                        "Quota milestone reached: 1.000.000 total ore units acquired.",
                        "",
                        "Significant debt-service progress confirmed."
                    ]
                }
            }
        ];

        function checkOreQuotas() {
            for (const quota of oreQuotas) {
                if (!quota.unlocked && totalOreAcquired >= quota.amount) {
                    quota.unlocked = true;

                    if (quota.onUnlock) {
                        quota.onUnlock();
                    }

                    queueIncomingMessage(quota.message);
                }
            }
        }

        function getResourceAmount(type) {
            return resources[type] ?? 0;
        }

        function addResource(type, amount) {
            resources[type] = (resources[type] ?? 0) + amount;

            if (type === "science" && amount > 0) {
                hasDiscoveredScience = true;
            }

            if (type === "metal" && amount > 0) {
                hasDiscoveredMetal = true;
            }

            if (type === "ore") {
                totalOreAcquired += amount;
                checkOreQuotas();
            }
        }

        function spendResource(type, amount) {
            if ((resources[type] ?? 0) < amount) return false;
            resources[type] -= amount;
            return true;
        }

        function canAffordCost(cost) {
            return Object.entries(cost).every(([type, amount]) =>
                getResourceAmount(type) >= amount
            );
        }

        function spendCost(cost) {
            if (!canAffordCost(cost)) return false;

            for (const [type, amount] of Object.entries(cost)) {
                spendResource(type, amount);
            }

            return true;
        }

        function formatCost(cost) {
            return Object.entries(cost)
                .map(([type, amount]) => `${amount} ${type.toUpperCase()}`)
                .join(" + ");
        }

        let scienceTickTimer = 0;
        let scienceTickInterval = 60; // frames; 60 = once per second

        const celestialBodies = [];

        let observatoryArrays = [];
        let arrayAssignSerial = 0;

        function getRangeUpgradeCost(module) {
            const level = module.rangeUpgradeLevel ?? 0;
            return { science: Math.floor(500 * Math.pow(2, level)) };
        }

        function getRangeUpgradeAmount(module) {
            return module.id === "observatory" ? 500 : 250;
        }

        function addRangeUpgradeItem(module) {
            if (!module.range) return;

            module.rangeUpgradeLevel = module.rangeUpgradeLevel ?? 0;
            module.rangeUpgradeCap = module.rangeUpgradeCap ?? 5;

            module.items.push({
                label: "Module Range",
                type: "upgrade",
                getLevel: () => module.rangeUpgradeLevel,
                getCap: () => module.rangeUpgradeCap,
                getCost: () => getRangeUpgradeCost(module),
                isVisible: () => module.rangeUpgradeLevel < module.rangeUpgradeCap && hasDiscoveredScience,
                canBuy: () => true,
                buy: () => {
                    module.rangeUpgradeLevel++;
                    module.range += getRangeUpgradeAmount(module);
                }
            });
        }

        const SALVAGE_RIGHTS_MAX = 5;
        const SALVAGE_WRECK_COOLDOWN = 60 * 60; // 1 minute at 60fps

        const salvageSlots = [];

        let salvagingLicenseUnlocked = false;

        const stationModules = [];

        const MODULE_DEFS = {
            stationCore: {
                id: "stationCore",
                codename: "CITADEL-01",
                type: "menu",
                xOffset: 0,
                yOffset: 0,
                radius: 58,
                menuTitle: "MAIN STATION",
                items: [
                    {
                        label: "Shipyard",
                        cost: { ore: 10 },
                        canBuy: () => !stationModules.some(m => m.id === "smallShipyard"),
                        buy: () => {
                            stationModules.push(createModule("smallShipyard"));
                            activeMenu = null;
                        }
                    },
                    {
                        label: "Observatory",
                        cost: { ore: 25 },
                        canBuy: () => !stationModules.some(m => m.id === "observatory"),
                        buy: () => {
                            stationModules.push(createModule("observatory"));

                            observatoryArrays.push({
                                id: "ARRAY-01",
                                target: null,
                                assignedAt: 0
                            });

                            activeMenu = null;
                        }
                    },
                    {
                        label: "Salvaging Rights",
                        type: "upgrade",
                        getLevel: () => salvageSlots.length,
                        getCap: () => SALVAGE_RIGHTS_MAX,
                        getCost: () => ({ ore: Math.floor(1500 * Math.pow(2.2, salvageSlots.length)) }),
                        isVisible: () => salvagingLicenseUnlocked && salvageSlots.length < SALVAGE_RIGHTS_MAX,
                        canBuy: () => true,
                        buy: () => {
                            addSalvageSlot();
                        }
                    }
                ]
            },

            stationMiningLaser: {
                id: "stationMiningLaser",
                codename: "LASER-LANCE",
                type: "menu",
                xOffset: 0,
                yOffset: -96,
                radius: 30,
                range: 500,
                menuTitle: "MINING LASER CONTROL",
                items: [
                    {
                        label: "Laser Strength",
                        type: "upgrade",
                        getLevel: () => upgrades.laserStrength.level,
                        getCap: () => upgrades.laserStrength.cap,
                        getCost: () => ({ science: getLaserStrengthCost() }),
                        isVisible: () => upgrades.laserStrength.level < upgrades.laserStrength.cap && hasDiscoveredScience,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.laserStrength;
                            upg.level++;
                        }
                    },

                    {
                        label: "Laser Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.laserSpeed.level,
                        getCap: () => upgrades.laserSpeed.cap,
                        getCost: () => ({ science: getLaserSpeedCost() }),
                        isVisible: () =>
                            upgrades.laserStrength.level >= upgrades.laserStrength.cap &&
                            upgrades.laserSpeed.level < upgrades.laserSpeed.cap &&
                            hasDiscoveredScience,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.laserSpeed;
                            upg.level++;
                        }
                    }
                ]
            },

            gravityPulse: {
                id: "gravityPulse",
                codename: "GRAV-PULSE",
                type: "menu",
                xOffset: -92,
                yOffset: 0,
                radius: 36,
                range: 500,
                menuTitle: "GRAVITY PULSE CONTROL",
                menuSide: "left",
                action: () => {
                    const cd = CLICK_COOLDOWNS.gravity;

                    if (cd.current <= 0) {
                        triggerGravityField();
                        cd.current = cd.max;
                    }
                },
                items: [
                    {
                        label: "Automatic Pulse",
                        type: "upgrade",
                        getLevel: () => upgrades.automaticPulse.level,
                        getCap: () => upgrades.automaticPulse.cap,
                        getCost: () =>  ({ ore: getAutomaticPulseCost() }),
                        isVisible: () => upgrades.automaticPulse.level < upgrades.automaticPulse.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.automaticPulse;
                            upg.level++;
                            automaticPulseTimer = 0;
                        }
                    }
                ]
            },

            smallShipyard: {
                id: "smallShipyard",
                codename: "YARD-ALPHA",
                type: "menu",
                xOffset: 110,
                yOffset: 0,
                radius: 40,
                range: 500,
                menuTitle: "SHIPYARD REQUISITIONS",
                items: [
                    {
                        label: "Mining Frigate",
                        getCost: () => ({ ore: Math.floor(Math.pow(2, ships.length) * 10) }),
                        canBuy: () => true,
                        buy: () => {
                            ships.push(makeShip(ships.length));
                        }
                    },
                    {
                        label: "Ship Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.shipSpeed.level,
                        getCap: () => upgrades.shipSpeed.cap,
                        getCost: () => ({ science: Math.floor(75 * Math.pow(2, upgrades.shipSpeed.level)) }),
                        isVisible: () => upgrades.shipSpeed.level < upgrades.shipSpeed.cap && hasDiscoveredScience,
                        canBuy: () => true,
                        buy: () => {
                            upgrades.shipSpeed.level++;

                            for (const ship of ships) {
                                ship.speed *= (1 + SHIP_SPEED_MULTIPLIER);
                            }
                        }
                    },
                    {
                        label: "Mining Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.miningSpeed.level,
                        getCap: () => upgrades.miningSpeed.cap,
                        getCost: () => ({ science: Math.floor(90 * Math.pow(2, upgrades.miningSpeed.level)) }),
                        isVisible: () => upgrades.miningSpeed.level < upgrades.miningSpeed.cap && hasDiscoveredScience,
                        canBuy: () => true,
                        buy: () => {
                            upgrades.miningSpeed.level++;
                        }
                    },
                    {
                        label: "Cargo Capacity",
                        type: "upgrade",
                        getLevel: () => upgrades.cargoCapacity.level,
                        getCap: () => upgrades.cargoCapacity.cap,
                        getCost: () => ({ science: Math.floor(80 * Math.pow(2, upgrades.cargoCapacity.level)) }),
                        isVisible: () => upgrades.cargoCapacity.level < upgrades.cargoCapacity.cap && hasDiscoveredScience,
                        canBuy: () => true,
                        buy: () => {
                            upgrades.cargoCapacity.level++;

                            for (const ship of ships) {
                                ship.cargoMax = Math.floor(ship.cargoMax * (1 + SHIP_CARGO_MULTIPLIER));
                            }
                        }
                    }
                ]
            },

            observatory: {
                id: "observatory",
                codename: "OBSERVATORY",
                type: "menu",
                xOffset: 0,
                yOffset: 112,
                radius: 34,
                range: 1000,
                menuTitle: "OBSERVATORY CONTROL",
                items: [
                    {
                        label: "Telescopic Array",
                        type: "upgrade",
                        getLevel: () => observatoryArrays.length,
                        getCap: () => 3,
                        getCost: () => ({ ore: Math.floor(Math.pow(2, observatoryArrays.length) * 75) }),
                        isVisible: () => observatoryArrays.length < 3,
                        canBuy: () => true,
                        buy: () => {
                            observatoryArrays.push({
                                id: `ARRAY-${String(observatoryArrays.length + 1).padStart(2, "0")}`,
                                target: null,
                                assignedAt: 0
                            });
                        }
                    },
                    {
                        label: "Science Probe",
                        getCost: () => ({ ore: Math.floor(500 * Math.pow(2.25, scienceProbes.length)) }),
                        canBuy: () => observatoryArrays.some(a => a.target),
                        buy: () => {
                            const observatory = getModuleById("observatory");
                            if (!observatory) return;

                            scienceProbes.push(makeScienceProbe(scienceProbes.length, observatory));
                            retargetScienceProbes();
                        }
                    }
                ]
            }
        };

        function createModule(id) {
            const def = MODULE_DEFS[id];

            const module = {
                ...def,
                items: def.items ? [...def.items] : [],
                x: station.x + def.xOffset,
                y: station.y + def.yOffset
            };

            addRangeUpgradeItem(module);

            return module;
        }

        stationModules.push(createModule("stationCore"));
        stationModules.push(createModule("gravityPulse"));
        stationModules.push(createModule("stationMiningLaser"));

        const codenamePrefixes = [
            "IRON", "GHOST", "VULTURE", "SABLE", "ORBIT",
            "HAMMER", "WRAITH", "TITAN", "ECHO", "RAVEN"
        ];

        const shipNames = [
            "MULE-7", "DRILL-12", "ROOK-4", "MANTIS-9",
            "PICKAXE-3", "HOUND-6"
        ];

        function rand(min, max) {
            return min + Math.random() * (max - min);
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getModuleById(id) {
            return stationModules.find(m => m.id === id);
        }

        function distSq(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return dx * dx + dy * dy;
        }

        function isInModuleRange(module, target) {
            if (!module.range) return true;
            return distSq(module, target) <= module.range * module.range;
        }

        function getObservedBodies() {
            return [...new Set(
                observatoryArrays
                    .filter(a => a.target)
                    .map(a => a.target)
            )];
        }

        function getAssignedProbeCount(body) {
            return scienceProbes.filter(p => p.target === body).length;
        }

        function getOrbitingProbeCount(body) {
            return scienceProbes.filter(p =>
                p.state === "orbiting" && p.target === body
            ).length;
        }

        function chooseProbeTarget() {
            const observedBodies = getObservedBodies();
            if (observedBodies.length <= 0) return null;

            return observedBodies
                .slice()
                .sort((a, b) => {
                    const assignedDiff = getAssignedProbeCount(a) - getAssignedProbeCount(b);
                    if (assignedDiff !== 0) return assignedDiff;

                    return b.sciencePerSecond - a.sciencePerSecond;
                })[0];
        }

        function makeScienceProbe(i, observatory) {
            return {
                x: observatory.x,
                y: observatory.y,
                angle: rand(0, Math.PI * 2),
                orbitRadius: 0,
                orbitSpeed: rand(0.012, 0.02),
                speed: 2.2,
                target: null,
                state: "idle",
                codename: `PROBE-${String(i + 1).padStart(2, "0")}`
            };
        }

        function addSalvageSlot() {
            const slot = {
                id: salvageSlots.length + 1,
                state: "cooldown",
                cooldown: 0,
                hauler: null,
                wreck: null
            };

            salvageSlots.push(slot);
            startSalvageHauler(slot);
        }

        function findWreckParkingSpot() {
            for (let attempt = 0; attempt < 500; attempt++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(500, 750);

                const spot = {
                    x: station.x + Math.cos(angle) * dist,
                    y: station.y + Math.sin(angle) * dist
                };

                const tooCloseToAsteroid = asteroids.some(a => {
                    const dx = spot.x - a.x;
                    const dy = spot.y - a.y;
                    return dx * dx + dy * dy < 180 * 180;
                });

                const tooCloseToCelestial = celestialBodies.some(b => {
                    const dx = spot.x - b.x;
                    const dy = spot.y - b.y;
                    return dx * dx + dy * dy < 280 * 280;
                });

                const tooCloseToWreck = salvageSlots.some(s => {
                    if (!s.wreck) return false;
                    const dx = spot.x - s.wreck.x;
                    const dy = spot.y - s.wreck.y;
                    return dx * dx + dy * dy < 220 * 220;
                });

                if (!tooCloseToAsteroid && !tooCloseToCelestial && !tooCloseToWreck) {
                    return spot;
                }
            }

            return {
                x: station.x + rand(-750, 750),
                y: station.y + rand(-750, 750)
            };
        }

        function makeWreck(slot, x, y) {
            const radius = rand(42, 68);
            const verts = [];
            const sides = 10;

            for (let i = 0; i < sides; i++) {
                const t = (i / sides) * Math.PI * 2;
                const r = radius * rand(0.55, 1.25);

                verts.push({
                    x: Math.cos(t) * r,
                    y: Math.sin(t) * r
                });
            }

            return {
                x,
                y,
                radius,
                verts,
                metal: Math.floor(rand(450, 900)),
                maxMetal: 900,
                resourceType: "metal",
                codename: `WRECK-${String(slot.id).padStart(2, "0")}`,
                fading: false,
                fade: 1
            };
        }

        function startSalvageHauler(slot) {
            const edge = Math.floor(rand(0, 4));
            let x, y;

            if (edge === 0) {
                x = rand(0, WORLD_W);
                y = -80;
            } else if (edge === 1) {
                x = WORLD_W + 80;
                y = rand(0, WORLD_H);
            } else if (edge === 2) {
                x = rand(0, WORLD_W);
                y = WORLD_H + 80;
            } else {
                x = -80;
                y = rand(0, WORLD_H);
            }

            const parkingSpot = findWreckParkingSpot();

            slot.state = "hauling";
            slot.hauler = {
                x,
                y,
                angle: 0,
                speed: 2.0,
                targetX: parkingSpot.x,
                targetY: parkingSpot.y,
                exitX: x,
                exitY: y,
                wreckOffsetX: -34,
                wreckOffsetY: 0,
                state: "inbound",
                codename: `HAULER-${String(slot.id).padStart(2, "0")}`
            };

            slot.wreck = makeWreck(slot, x + slot.hauler.wreckOffsetX, y + slot.hauler.wreckOffsetY);
        }

        function updateSalvageSlot(slot) {
            if (slot.state === "cooldown") {
                slot.cooldown--;

                if (slot.cooldown <= 0) {
                    startSalvageHauler(slot);
                }

                return;
            }

            if (slot.state === "hauling") {
                const h = slot.hauler;

                if (h.state === "inbound") {
                    const dx = h.targetX - h.x;
                    const dy = h.targetY - h.y;
                    h.angle = Math.atan2(dy, dx);

                    const arrived = moveToward(h, h.targetX, h.targetY, h.speed);

                    slot.wreck.x = h.x + h.wreckOffsetX;
                    slot.wreck.y = h.y + h.wreckOffsetY;

                    if (arrived) {
                        h.state = "leaving";
                        slot.wreck.x = h.targetX;
                        slot.wreck.y = h.targetY;
                    }
                } else if (h.state === "leaving") {
                    const dx = h.exitX - h.x;
                    const dy = h.exitY - h.y;
                    h.angle = Math.atan2(dy, dx);

                    const left = moveToward(h, h.exitX, h.exitY, h.speed * 1.35);

                    if (left) {
                        slot.hauler = null;
                        slot.state = "parked";
                    }
                }

                return;
            }

            if (slot.state === "parked") {
                if (slot.wreck && slot.wreck.metal <= 0 && !slot.wreck.fading) {
                    slot.wreck.fading = true;
                    slot.wreck.fade = 1;
                }

                if (slot.wreck && slot.wreck.fading) {
                    slot.wreck.fade -= 0.025;

                    if (slot.wreck.fade <= 0) {
                        slot.wreck = null;
                        slot.state = "cooldown";
                        slot.cooldown = SALVAGE_WRECK_COOLDOWN;
                    }
                }
            }
        }

        function updateSalvage() {
            for (const slot of salvageSlots) {
                updateSalvageSlot(slot);
            }
        }

        function getActiveWrecks() {
            return salvageSlots
                .filter(s =>
                    s.wreck &&
                    (

                        (s.state === "hauling" && s.hauler?.state === "leaving")
                    )

        function getHoveredTarget() {
            const module = getHoveredModule();

            if (module) {
                return { type: "module", object: module };
            }

            for (const body of celestialBodies) {
                if (pointInCelestialBody(mouseX, mouseY, body)) {
                    return { type: "celestial", object: body };

            for (const wreck of getActiveWrecks()) {
                if (wreck.metal > 0 && pointInAsteroid(mouseX, mouseY, wreck)) {
                    return { type: "wreck", object: wreck };

            }

            for (const asteroid of asteroids) {

            return null;

        function pointInCelestialBody(mx, my, body) {
            const dx = mx - body.x;
            const dy = my - body.y;
            return dx * dx + dy * dy <= body.radius * body.radius;
        }

        function assignArrayToCelestialBody(body) {
            const observatory = getModuleById("observatory");
            if (!observatory) return;
            if (!isInModuleRange(observatory, body)) return;
            if (observatoryArrays.length <= 0) return;

            // Already observed: do nothing.
            if (observatoryArrays.some(a => a.target === body)) {
                return;
            }

            let array = observatoryArrays.find(a => !a.target);

            if (!array) {
                array = observatoryArrays.reduce((oldest, current) =>
                    current.assignedAt < oldest.assignedAt ? current : oldest
                );
            }

            array.target = body;
            array.assignedAt = ++arrayAssignSerial;

            retargetScienceProbes();
        }

        function retargetScienceProbes() {
            const observedBodies = getObservedBodies();

            if (observedBodies.length <= 0) {
                for (const probe of scienceProbes) {
                    probe.target = null;
                    probe.state = "idle";
                }
                return;
            }

            const sortedBodies = observedBodies
                .slice()
                .sort((a, b) => b.sciencePerSecond - a.sciencePerSecond);

            const desiredTargets = [];

            for (let i = 0; i < scienceProbes.length; i++) {
                desiredTargets.push(sortedBodies[i % sortedBodies.length]);
            }

            scienceProbes.forEach((probe, i) => {
                const desiredTarget = desiredTargets[i];

                if (probe.target !== desiredTarget) {
                    probe.target = desiredTarget;
                    probe.state = "traveling";
                }
            });
        }

        function queueOreGatherSound() {
            oreGatherChunks++;
            oreGatherComboTimer = ORE_GATHER_COMBO_WINDOW;

            oreGatherCombo = Math.floor(oreGatherChunks / CHUNKS_PER_COMBO);

            const MAX_COMBO = 20;
            const MAX_PITCH = 1.9;

            const normalized = Math.min(1, oreGatherCombo / MAX_COMBO);
            const pitch = 1 + normalized * (MAX_PITCH - 1);

            queuedOreGatherSounds.push({
                volume: 0.22,
                volumeVar: 0.04,
                pitch,
                pitchVar: 0.025
            });
        }

        function updateOreGatherSoundQueue() {

        function makeCelestialBodyAtDistance(
            type,
            codename,
            distMin,
            distMax,
            radiusMin,
            radiusMax,
            scienceMin,
            scienceMax,
            minBodyDistance = MIN_CELESTIAL_BODY_DISTANCE
        ) {
            let x, y;

            do {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(distMin, distMax);

                x = station.x + Math.cos(angle) * dist;
                y = station.y + Math.sin(angle) * dist;

                attempts++;
            } while (
                attempts < 300 &&
                celestialBodies.some(body => {
                    const dx = x - body.x;
                    const dy = y - body.y;
                    return dx * dx + dy * dy < minBodyDistance * minBodyDistance;
                })
            );

            return {
                x,
                y,
                radius: rand(radiusMin, radiusMax),
                type,
                codename,
                sciencePerSecond: Math.floor(rand(scienceMin, scienceMax))
            };
        }

        function spawnAsteroidBeltAround(body, count = 10) {
            let spawned = 0;
            let attempts = 0;
            const maxAttempts = count * 80;

            while (spawned < count && attempts < maxAttempts) {
                attempts++;

                const angle = Math.random() * Math.PI * 2;
                const dist = rand(body.radius + 90, body.radius + 220);
                const radius = rand(14, 34);

                const x = body.x + Math.cos(angle) * dist;
                const y = body.y + Math.sin(angle) * dist;

                const overlaps = asteroids.some(a => {
                    const dx = x - a.x;
                    const dy = y - a.y;
                    const minDist = radius + a.radius + 12;
                    return dx * dx + dy * dy < minDist * minDist;
                });

                if (overlaps) continue;

                const verts = [];
                const sides = Math.floor(rand(7, 13));

                for (let a = 0; a < sides; a++) {
                    const t = (a / sides) * Math.PI * 2;
                    const r = radius * rand(0.65, 1.25);

                    verts.push({
                        x: Math.cos(t) * r,
                        y: Math.sin(t) * r
                    });
                }

                asteroids.push({
                    x,
                    y,
                    radius,
                    verts,
                    ore: Math.floor(rand(800, 12000)),
                    maxOre: 12000,
                    codename: `${body.codename}-BELT-${String(spawned + 1).padStart(2, "0")}`
                });

                spawned++;
            }
        }

        function triggerGravityField() {
            const gravModule = getModuleById("gravityPulse") || station;

            gravityPulses.push({

            for (const ore of floatingOre) {

            const rect = canvas.getBoundingClientRect();

            const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
            const { x: mx, y: my } = screenToWorld(sx, sy);

            // Menu clicks first
            if (activeMenu) {
                const visibleItems = activeMenu.items.filter(item =>
                    item.isVisible ? item.isVisible() : true
                );

                for (const item of visibleItems) {
                    if (!item.bounds) continue;

                    const inside =
                        sx >= item.bounds.x &&
                        sx <= item.bounds.x + item.bounds.w &&
                        sy >= item.bounds.y &&
                        sy <= item.bounds.y + item.bounds.h;

                    if (inside) {
                        const cost = item.getCost ? item.getCost() : item.cost;
                        const canBuy = item.canBuy ? item.canBuy() : true;

                        if (canBuy && canAffordCost(cost)) {
                            if (spendCost(cost)) {
                                item.buy();

                        }

                        return;
                    }
                }

                activeMenu = null;

            // Module clicks
            for (let i = stationModules.length - 1; i >= 0; i--) {
                const module = stationModules[i];

                if (pointInModule(mx, my, module)) {
                    if (module.action) {
                        module.action();

                    return;

            }

            //Celestial bodies
            for (const body of celestialBodies) {
                if (pointInCelestialBody(mx, my, body)) {
                    assignArrayToCelestialBody(body);
                    return;
                }
            }

            // Asteroid click: pulse laser
            for (const asteroid of getMineableTargets()) {
                if (pointInAsteroid(mx, my, asteroid)) {
                    const cd = CLICK_COOLDOWNS.laser;

                    if (cd.current <= 0) {
                        firePulseLaser(asteroid);
                        cd.current = cd.getMax();
                    }

                    return;
                }
            }
        });

            }

            const hoveredModule = getHoveredModule();

            if (hoveredModule && hoveredModule.type === "menu") {
                if (activeMenu !== hoveredModule) {
                    activeMenu = hoveredModule;
                    playSound("menu", {
                        volume: 0.3,
                        volumeVar: 0.05,
                        pitch: 1,
                        pitchVar: 0.08
                    });
                }

                menuCloseTimer = 0;
                return;
            }

            if (activeMenu) {
                menuCloseTimer++;

                if (menuCloseTimer > MENU_CLOSE_DELAY) {
                    activeMenu = null;
                    menuCloseTimer = 0;
                }
            }
        }

        function updateHeldLaserFire() {
            if (!mouseDown || !heldAsteroidTarget) return;

            if (isMineableTargetDepleted(heldAsteroidTarget)) {
                heldAsteroidTarget = null;
                return;
            }

            const stillHovering = pointInAsteroid(mouseX, mouseY, heldAsteroidTarget);

            if (!stillHovering) {
                heldAsteroidTarget = null;
                return;
            }

            const cd = CLICK_COOLDOWNS.laser;

            if (cd.current <= 0) {
                firePulseLaser(heldAsteroidTarget);
                cd.current = cd.getMax();
            }
        }

        function isAsteroidClaimedByOtherShip(asteroid, currentShip) {
            return ships.some(other =>
                other !== currentShip &&
                other.target === asteroid &&
                (
                    other.state === "outbound" ||
                    other.state === "mining"
                )
            );
        }

        function isValidShipAsteroidTarget(ship, asteroid) {
            if (!asteroid) return false;
            if (asteroid.ore <= 0) return false;

            const shipyard = getModuleById("smallShipyard");
            if (!shipyard) return false;
            if (!isInModuleRange(shipyard, asteroid)) return false;

            // If another ship is already traveling to it or mining it,
            // this ship should not use it.
            if (isAsteroidClaimedByOtherShip(asteroid, ship)) return false;

            return true;
        }

        function chooseAsteroid(ship) {
            const available = asteroids.filter(a =>
                isValidShipAsteroidTarget(ship, a)
            );

            if (!available.length) return null;

            // Prefer nearest unclaimed asteroid.
            // This reduces wasted travel compared to random selection.
            available.sort((a, b) => {
                const da = distSq(ship, a);
                const db = distSq(ship, b);
                return da - db;
            });

            return available[0];
        }

        function moveToward(obj, tx, ty, speed) {
            const dx = tx - obj.x;
            const dy = ty - obj.y;
            const d = Math.hypot(dx, dy);

            if (d < speed) {
                obj.x = tx;
                obj.y = ty;
                return true;
            }

            obj.x += dx / d * speed;
            obj.y += dy / d * speed;
            return false;
        }

        function updateCooldowns() {
            for (const key in CLICK_COOLDOWNS) {
                const cd = CLICK_COOLDOWNS[key];
                if (cd.current > 0) cd.current--;
            }
        }

        function updateLaserBeams() {
            for (let i = laserBeams.length - 1; i >= 0; i--) {
                const beam = laserBeams[i];

                beam.life--;

                if (beam.life === 6) {
                    const chunks = getLaserOreChunks();

                    for (let n = 0; n < chunks; n++) {
                        spawnFloatingChunk(beam.asteroid);
                    }
                }

                if (beam.life <= 0) {
                    laserBeams.splice(i, 1);
                }
            }
        }

        function isMineableTargetDepleted(target) {
            if (target.resourceType === "metal") return target.metal <= 0;
            return target.ore <= 0;
        }

        function getMineableTargets() {
            return [
                ...asteroids.filter(a => a.ore > 0),
                ...getActiveWrecks().filter(w => w.metal > 0 && !w.fading)
            ];
        }

        function updateFloatingOre() {
            for (let i = floatingOre.length - 1; i >= 0; i--) {
                const ore = floatingOre[i];

                if (ore.pull) {
                    const target = ore.pullTarget || station;
                    const dx = target.x - ore.x;
                    const dy = target.y - ore.y;
                    const d = Math.hypot(dx, dy);

                    if (d < 12) {
                        addResource(ore.resourceType || "ore", 1);
                        queueOreGatherSound();
                        // playSound("oreGather", {
                        //     volume: 0.22,
                        //     volumeVar: 0.04,
                        //     pitch: 1,
                        //     pitchVar: 0.025
                        // });
                        ore.pull = false;
                        ore.pullTarget = null;
                        floatingOre.splice(i, 1);
                        continue;
                    }

                    ore.vx += dx / d * 0.22;
                    ore.vy += dy / d * 0.22;
                }

                ore.vx *= 0.96;
                ore.vy *= 0.96;

                ore.x += ore.vx;
                ore.y += ore.vy;
            }
        }

        function updateGravityPulses() {
            for (let i = gravityPulses.length - 1; i >= 0; i--) {
                const p = gravityPulses[i];

                p.r += 10;
                p.life--;

                if (p.life <= 0) {
                    gravityPulses.splice(i, 1);
                }
            }
        }

        function updateScienceProbe(probe) {
            if (!probe.target) {
                probe.target = chooseProbeTarget();
                probe.state = probe.target ? "traveling" : "idle";
                return;
            }

            const observedBodies = getObservedBodies();

            if (!observedBodies.includes(probe.target)) {
                probe.target = chooseProbeTarget();
                probe.state = probe.target ? "traveling" : "idle";
                return;
            }

            if (probe.state === "traveling") {
                const arrived = moveToward(probe, probe.target.x, probe.target.y, probe.speed);

                if (arrived) {
                    probe.state = "orbiting";
                    probe.angle = rand(0, Math.PI * 2);
                    probe.orbitRadius = probe.target.radius + rand(55, 85);
                }
            }

            if (probe.state === "orbiting") {
                probe.angle += probe.orbitSpeed;

                probe.x = probe.target.x + Math.cos(probe.angle) * probe.orbitRadius;
                probe.y = probe.target.y + Math.sin(probe.angle) * probe.orbitRadius;
            }
        }

        function updateScienceProbes() {
            for (const probe of scienceProbes) {
                updateScienceProbe(probe);
            }
        }

        function updateShip(ship) {
            // Idle ships should keep looking for newly freed asteroids.
            if (ship.state === "idle") {
                ship.state = "seeking";
            }

            if (ship.state === "seeking") {
                ship.target = chooseAsteroid(ship);

                if (ship.target) {
                    ship.state = "outbound";
                } else {
                    ship.state = "idle";
                    return;
                }
            }

            if (ship.state === "outbound") {
                if (!isValidShipAsteroidTarget(ship, ship.target)) {
                    ship.target = null;
                    ship.state = "seeking";
                    return;
                }

                if (moveToward(ship, ship.target.x, ship.target.y, ship.speed)) {
                    ship.state = "mining";
                    ship.miningTimer = 0;
                }
            }

            if (ship.state === "mining") {
                if (!isValidShipAsteroidTarget(ship, ship.target)) {
                    ship.target = null;
                    ship.state = ship.cargo > 0 ? "returning" : "seeking";
                    return;
                }

                ship.miningTimer++;

                if (ship.miningTimer % getMiningInterval() === 0) {
                    const mined = Math.min(
                        getMiningAmountPerTick(),
                        ship.target.ore,
                        ship.cargoMax - ship.cargo
                    );

                    ship.target.ore -= mined;
                    ship.cargo += mined;
                }

                if (!ship.target || ship.target.ore <= 0 || ship.cargo >= ship.cargoMax) {
                    // Important: release the asteroid reservation before returning.
                    ship.target = null;
                    ship.state = "returning";
                }
            }

            if (ship.state === "returning") {
                if (moveToward(ship, station.x, station.y, ship.speed * 0.85)) {
                    if (ship.cargo > 0) {
                        addResource("ore", ship.cargo);
                        queueOreGatherSound();
                    }

                    ship.cargo = 0;
                    ship.target = null;
                    ship.state = "seeking";
                }
            }
        }

        function wrapTextLines(text, maxWidth) {
            const words = text.split(" ");
            const lines = [];
            let line = "";

            for (const word of words) {
                const testLine = line ? `${line} ${word}` : word;

                if (ctx.measureText(testLine).width > maxWidth && line) {
                    lines.push(line);
                    line = word;
                } else {
                    line = testLine;
                }
            }

            if (line) lines.push(line);
            return lines;
        }

        function drawDebtProgressBar() {
            const barW = 620;
            const barH = 22;
            const gap = 8;
            const x = W / 2 - barW / 2;
            const y = 24;

            const debtProgress = Math.min(1, totalOreAcquired / DEBT_TARGET_ORE);

            const nextQuota = oreQuotas.find(q => !q.unlocked);
            const prevQuota = (() => {
                const unlocked = oreQuotas.filter(q => q.unlocked);
                return unlocked.length ? unlocked[unlocked.length - 1].amount : 0;
            })();

            const quotaProgress = nextQuota
                ? Math.min(1, (totalOreAcquired - prevQuota) / (nextQuota.amount - prevQuota))
                : 1;

            ctx.save();

            function drawBar(label, valueText, progress, yPos) {
                ctx.strokeStyle = GREEN;
                ctx.fillStyle = "rgba(0,20,0,0.82)";
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.fillRect(x, yPos, barW, barH);
                ctx.strokeRect(x, yPos, barW, barH);

                ctx.fillStyle = "rgba(80,255,130,0.28)";
                ctx.fillRect(x + 3, yPos + 3, (barW - 6) * progress, barH - 6);

                ctx.fillStyle = GREEN;
                ctx.font = "12px monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                ctx.fillText(`${label}: ${valueText}`, W / 2, yPos + barH / 2);
            }

            drawBar(
                "DEBT REPAYMENT",
                `${Math.floor(totalOreAcquired).toLocaleString("de-DE")} / ${DEBT_TARGET_ORE.toLocaleString("de-DE")} ORE`,
                debtProgress,
                y
            );

            drawBar(
                "NEXT LICENSE",
                nextQuota
                    ? `${nextQuota.label} ${Math.floor(totalOreAcquired).toLocaleString("de-DE")} / ${nextQuota.amount.toLocaleString("de-DE")} ORE`
                    : "ALL LICENSES ISSUED",
                quotaProgress,
                y + barH + gap
            );

            ctx.restore();
        }

        function drawIncomingMessage() {
            if (!activeIncomingMessage) return;

            const boxW = 760;
            const boxH = 420;
            const x = W / 2 - boxW / 2;
            const y = H / 2 - boxH / 2;

            ctx.save();

            ctx.fillStyle = "rgba(0,0,0,0.62)";
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.94)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 18;

            ctx.fillRect(x, y, boxW, boxH);
            ctx.strokeRect(x, y, boxW, boxH);

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.strokeRect(x + 12, y + 12, boxW - 24, boxH - 24);

            ctx.fillStyle = GREEN;
            ctx.font = "16px monospace";
            ctx.fillText(activeIncomingMessage.title, x + 34, y + 44);

            ctx.globalAlpha = 0.7;
            ctx.font = "12px monospace";
            ctx.fillText(`FROM: ${activeIncomingMessage.from}`, x + 34, y + 70);
            ctx.globalAlpha = 1;

            ctx.beginPath();
            ctx.moveTo(x + 34, y + 92);
            ctx.lineTo(x + boxW - 34, y + 92);
            ctx.stroke();

            ctx.font = "15px monospace";

            let lineY = y + 128;

            const textMaxWidth = boxW - 84;

            for (const paragraph of activeIncomingMessage.body) {
                if (paragraph === "") {
                    lineY += 18;
                    continue;
                }

                const wrappedLines = wrapTextLines(paragraph, textMaxWidth);

                for (const line of wrappedLines) {
                    ctx.fillText(line, x + 42, lineY);
                    lineY += 24;
                }
            }

            const blink = Math.floor(frameCount / 24) % 2 === 0;

            if (blink) {
                ctx.font = "13px monospace";
                ctx.fillText("PRESS SPACE TO CONTINUE", x + boxW / 2 - 100, y + boxH - 34);
            }

            ctx.restore();
        }

        function drawStartScreen() {
            ctx.fillStyle = "rgba(0,12,0,0.35)";
            ctx.fillRect(0, 0, W, H);

            drawGrid();

            ctx.save();
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 18;

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.08)";

            ctx.strokeRect(W / 2 - 420, H / 2 - 190, 840, 360);

            ctx.font = "46px monospace";
            ctx.fillStyle = GREEN;
            ctx.fillText("IDLE SPACE MINER", W / 2, H / 2 - 95);

            ctx.font = "16px monospace";
            ctx.globalAlpha = 0.75;
            ctx.fillText("DEEP SPACE EXTRACTION COMMAND", W / 2, H / 2 - 46);
            ctx.fillText("SECTOR KAPPA-9 // MINING AUTHORIZATION REQUIRED", W / 2, H / 2 - 18);
            ctx.globalAlpha = 1;

            const hovered = pointInRect(mouseScreenX, mouseScreenY, startButton);

            ctx.strokeStyle = hovered ? "rgba(120,255,160,0.95)" : GREEN;

                ctx.fillText("<<", startButton.x + startButton.w + 28, startButton.y + startButton.h / 2);
            }

            ctx.restore();

            drawScanlines();
            drawVignette();

        }

        function drawCrosshair() {
            const size = 10;
            const gap = 4;

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            // horizontal left
            ctx.beginPath();
            ctx.moveTo(mouseScreenX - size, mouseScreenY);
            ctx.lineTo(mouseScreenX - gap, mouseScreenY);
            ctx.stroke();

            // horizontal right
            ctx.beginPath();
            ctx.moveTo(mouseScreenX + gap, mouseScreenY);
            ctx.lineTo(mouseScreenX + size, mouseScreenY);
            ctx.stroke();

            // vertical top
            ctx.beginPath();
            ctx.moveTo(mouseScreenX, mouseScreenY - size);
            ctx.lineTo(mouseScreenX, mouseScreenY - gap);
            ctx.stroke();

            // vertical bottom
            ctx.beginPath();
            ctx.moveTo(mouseScreenX, mouseScreenY + gap);
            ctx.lineTo(mouseScreenX, mouseScreenY + size);
            ctx.stroke();

            // center dot
            ctx.beginPath();
            ctx.arc(mouseScreenX, mouseScreenY, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = GREEN;
            ctx.fill();

            ctx.restore();
        }

        function drawLaserBeams() {
            for (const beam of laserBeams) {
                const alpha = beam.life / 12;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 14;

                ctx.beginPath();
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(beam.x2, beam.y2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawFloatingOre() {
            if (floatingOre.length <= 0) return;

            // Only draw particles visible in the current camera view.
            // Padding keeps glowy particles from popping at screen edges.
            const pad = 40 / camera.zoom;
            const left = camera.x - W / 2 / camera.zoom - pad;
            const right = camera.x + W / 2 / camera.zoom + pad;
            const top = camera.y - H / 2 / camera.zoom - pad;
            const bottom = camera.y + H / 2 / camera.zoom + pad;

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(80,255,130,0.25)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            // ---- ORE CIRCLES ----
            ctx.beginPath();

            for (const ore of floatingOre) {
                if (ore.resourceType === "metal") continue;

                if (
                    ore.x < left || ore.x > right ||
                    ore.y < top || ore.y > bottom
                ) {
                    continue;
                }

                ctx.moveTo(ore.x + 3, ore.y);
                ctx.arc(ore.x, ore.y, 3, 0, Math.PI * 2);
            }

            ctx.fill();
            ctx.stroke();

            // ---- METAL SQUARES ----
            ctx.beginPath();

            const size = 6;
            const half = size / 2;

            for (const ore of floatingOre) {
                if (ore.resourceType !== "metal") continue;

                if (
                    ore.x < left || ore.x > right ||
                    ore.y < top || ore.y > bottom
                ) {
                    continue;
                }

                ctx.rect(ore.x - half, ore.y - half, size, size);
            }

            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawGravityPulses() {
            for (const p of gravityPulses) {
                const alpha = p.life / 28;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawText(text, x, y, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = GREEN;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 6;
            ctx.font = "12px monospace";
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function drawGrid() {
            ctx.strokeStyle = FAINT;
            ctx.lineWidth = 1;

            for (let x = 0; x < WORLD_W; x += 32) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, WORLD_H);
                ctx.stroke();
            }

            for (let y = 0; y < WORLD_H; y += 32) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WORLD_W, y);
                ctx.stroke();
            }
        }

        function drawStation() {
            drawStationConnections();

            for (const module of stationModules) {
                drawStationModule(module);
            }
        }

        function drawStationConnections() {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            for (const module of stationModules) {
                if (module.id === "stationCore") continue;

                ctx.beginPath();
                ctx.moveTo(station.x, station.y);
                ctx.lineTo(module.x, module.y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawStationModule(module) {
            const hovered = getHoveredTarget()?.object === module;

            ctx.save();
            ctx.translate(module.x, module.y);

            ctx.strokeStyle = hovered ? "rgba(120,255,160,0.95)" : GREEN;
            ctx.fillStyle = hovered
                ? "rgba(0,255,90,0.16)"
                : "rgba(0,255,90,0.06)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 22 : 12;

            if (module.id === "stationCore") {
                drawCoreShape(module);
            } else if (module.id === "gravityPulse") {
                drawGravityModuleShape(module);
            } else if (module.id === "smallShipyard") {
                drawShipyardShape(module);
            } else if (module.id === "stationMiningLaser") {
                drawMiningLaserShape(module);
            } else if (module.id === "observatory") {
                drawObservatoryShape(module);
            }

            ctx.restore();

            if (hovered && module.range) {
                drawModuleRange(module);
            }

            drawText(module.codename, module.x - 42, module.y - module.radius - 14, hovered ? 1 : 0.75);
        }

        function drawModuleRange(module) {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.28)";
            ctx.lineWidth = 2;
            ctx.setLineDash([12, 10]);
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            ctx.arc(module.x, module.y, module.range, 0, Math.PI * 2);

        function drawObservatoryShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);

            ctx.beginPath();
            ctx.moveTo(-18, 10);

            ctx.closePath();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, -4, 8, 0, Math.PI * 2);

        function drawMiningLaserShape(module) {
            ctx.save();

            // lean triangle pointing outward (upward relative to module)
            ctx.beginPath();
            ctx.moveTo(0, -20);   // tip
            ctx.lineTo(-10, 10);  // left base
            ctx.lineTo(10, 10);   // right base
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner cross (targeting / focusing element)
            ctx.beginPath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(5, 0);
            ctx.moveTo(0, -5);
            ctx.lineTo(0, 5);
            ctx.stroke();

            ctx.restore();
