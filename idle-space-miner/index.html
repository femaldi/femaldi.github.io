<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Idle Space Miner</title>
    <style>
        body {
            margin: 0;
            background: #020802;
            display: grid;
            place-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }

        canvas {
            width: 1920;
            height: 1080px;
            image-rendering: pixelated;
            background: #001000;
            box-shadow: 0 0 40px #00ff6644;
            cursor: none;
        }
    </style>
</head>

<body>
    <canvas id="game" width="1920" height="1080"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const W = 1920;
        const H = 1080;
        const WORLD_W = W * 3;
        const WORLD_H = H * 3;

        const camera = {
            x: WORLD_W / 2,
            y: WORLD_H / 2,
            zoom: 1,
            minZoom: 0.45,
            maxZoom: 2.5
        };

        let mouseScreenX = 0;
        let mouseScreenY = 0;
        let isCameraDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let cameraStartX = 0;
        let cameraStartY = 0;

        let oreGatherCombo = 0;
        let oreGatherComboTimer = 0;
        const ORE_GATHER_COMBO_WINDOW = 12; // frames
        let oreGatherChunks = 0;
        const CHUNKS_PER_COMBO = 10;

        const soundEnabled = true;

        const sounds = {
            laser: new Audio("sounds/laser.wav"),
            oreGather: new Audio("sounds/ore-gather.wav"),
            menu: new Audio("sounds/menu.wav")
        };

        for (const sound of Object.values(sounds)) {
            sound.preload = "auto";
            sound.volume = 0.45;
        }

        function playSound(name, options = {}) {
            if (!soundEnabled) return;

            const base = sounds[name];
            if (!base) return;

            const {
                volume = 0.45,
                volumeVar = 0,
                pitch = 1,
                pitchVar = 0
            } = options;

            const s = base.cloneNode();

            // volume variance
            const finalVolume = volume + (Math.random() * 2 - 1) * volumeVar;
            s.volume = Math.max(0, Math.min(1, finalVolume));

            // pitch variance (playbackRate)
            const finalPitch = pitch + (Math.random() * 2 - 1) * pitchVar;
            s.playbackRate = Math.max(0.5, Math.min(2.0, finalPitch));

            s.play().catch(() => {});
        }

        const keys = {};

        const GREEN = "#66ff99";
        const DIM = "rgba(80,255,130,0.35)";
        const FAINT = "rgba(80,255,130,0.15)";

        const DEBT_TARGET_ORE = 6587651565;

        const incomingMessages = [];
        let activeIncomingMessage = null;
        let messageInputLock = 0;

        let gameState = "start";
        const startButton = {
            x: W / 2 - 110,
            y: H / 2 + 90,
            w: 220,
            h: 54
        };

        function queueIncomingMessage(message) {
            incomingMessages.push(message);

            if (!activeIncomingMessage) {
                showNextIncomingMessage();
            }
        }

        function showNextIncomingMessage() {
            activeIncomingMessage = incomingMessages.shift() || null;
            messageInputLock = 8;
        }

        function advanceIncomingMessage() {
            if (!activeIncomingMessage) return;
            if (messageInputLock > 0) return;

            showNextIncomingMessage();
        }

        function isMessageActive() {
            return !!activeIncomingMessage;
        }

        function queueStartingMessages() {
            queueIncomingMessage({
                title: "INCOMING MESSAGE // ESTATE TRANSFER",
                from: "DEBT-CLAIM AUTHORITY",
                body: [
                    "Administrator, welcome to your inherited command post.",
                    "",
                    "By validated succession protocol, this extraction station, its liabilities, and its outstanding mineral obligations are now yours.",
                    "",
                    `Current inherited debt: ${DEBT_TARGET_ORE.toLocaleString("de-DE")} ORE UNITS.`,
                    "",
                    "Grow the station. Keep the ore flowing. Reach the owed amount, and your contract will be considered fulfilled."
                ]
            });

            queueIncomingMessage({
                title: "INCOMING MESSAGE // FIELD INSTRUCTION",
                from: "STATION OPERATIONS",
                body: [
                    "Initial procedure:",
                    "",
                    "Use the Old War Laser to mine one asteroid.",
                    "Then activate the Grav Pull module to retrieve the released ore chunks.",
                    "Use the Station to requisiton new modules spending the acquired ore.",
                    "",
                    "Laser: click and hold an asteroid within range.",
                    "Grav Pull: click the GRAV-PULSE module.",
                    "",
                    "May the ore flow forevermore."
                ]
            });
        }

        function pointInRect(px, py, r) {
            return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
        }

        function clampCamera() {
            const halfW = W / 2 / camera.zoom;
            const halfH = H / 2 / camera.zoom;

            camera.x = Math.max(halfW, Math.min(WORLD_W - halfW, camera.x));
            camera.y = Math.max(halfH, Math.min(WORLD_H - halfH, camera.y));
        }

        function screenToWorld(sx, sy) {
            return {
                x: camera.x + (sx - W / 2) / camera.zoom,
                y: camera.y + (sy - H / 2) / camera.zoom
            };
        }

        function applyCameraTransform() {
            ctx.translate(W / 2, H / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
        }

        function zoomCamera(delta, sx = mouseScreenX, sy = mouseScreenY) {
            const before = screenToWorld(sx, sy);

            camera.zoom = Math.max(
                camera.minZoom,
                Math.min(camera.maxZoom, camera.zoom * delta)
            );

            const after = screenToWorld(sx, sy);

            camera.x += before.x - after.x;
            camera.y += before.y - after.y;

            clampCamera();
        }

        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        let heldAsteroidTarget = null;
        let frameCount = 0;
        let menuCloseTimer = 0;
        const MENU_CLOSE_DELAY = 15;

        const station = {
            x: WORLD_W / 2,
            y: WORLD_H / 2,
            r: 46,
            codename: "CITADEL-01"
        };

        let activeMenu = null;

        const resources = {
            ore: 0,
            science: 0
        };

        function getResourceAmount(type) {
            return resources[type] ?? 0;
        }

        function addResource(type, amount) {
            resources[type] = (resources[type] ?? 0) + amount;
        }

        function spendResource(type, amount) {
            if ((resources[type] ?? 0) < amount) return false;
            resources[type] -= amount;
            return true;
        }

        function canAffordCost(cost) {
            return Object.entries(cost).every(([type, amount]) =>
                getResourceAmount(type) >= amount
            );
        }

        function spendCost(cost) {
            if (!canAffordCost(cost)) return false;

            for (const [type, amount] of Object.entries(cost)) {
                spendResource(type, amount);
            }

            return true;
        }

        function formatCost(cost) {
            return Object.entries(cost)
                .map(([type, amount]) => `${amount} ${type.toUpperCase()}`)
                .join(" + ");
        }

        let scienceTickTimer = 0;
        let scienceTickInterval = 60; // frames; 60 = once per second

        const celestialBodies = [
            {
                x: station.x - 1200,
                y: station.y - 850,
                radius: 42,
                type: "STAR",
                codename: "HELION-A",
                sciencePerSecond: 15
            },
            {
                x: station.x + 1350,
                y: station.y + 760,
                radius: 55,
                type: "STAR",
                codename: "VESTA-B",
                sciencePerSecond: 20
            },
            {
                x: station.x + 900,
                y: station.y - 260,
                radius: 28,
                type: "PLANET",
                codename: "BOREAL-3",
                sciencePerSecond: 1
            }
        ];

        let observatoryArrays = [];
        let arrayAssignSerial = 0;

        function getRangeUpgradeCost(module) {
            const level = module.rangeUpgradeLevel ?? 0;
            return { science: Math.floor(50 * Math.pow(2, level)) };
        }

        function getRangeUpgradeAmount(module) {
            return module.id === "observatory" ? 1000 : 500;
        }

        function addRangeUpgradeItem(module) {
            if (!module.range) return;

            module.rangeUpgradeLevel = module.rangeUpgradeLevel ?? 0;
            module.rangeUpgradeCap = module.rangeUpgradeCap ?? 5;

            module.items.push({
                label: "Module Range",
                type: "upgrade",
                getLevel: () => module.rangeUpgradeLevel,
                getCap: () => module.rangeUpgradeCap,
                getCost: () => getRangeUpgradeCost(module),
                isVisible: () => module.rangeUpgradeLevel < module.rangeUpgradeCap,
                canBuy: () => true,
                buy: () => {
                    module.rangeUpgradeLevel++;
                    module.range += getRangeUpgradeAmount(module);
                }
            });
        }

        const stationModules = [];

        const MODULE_DEFS = {
            stationCore: {
                id: "stationCore",
                codename: "CITADEL-01",
                type: "menu",
                xOffset: 0,
                yOffset: 0,
                radius: 58,
                menuTitle: "STATION MODULES",
                items: [
                    {
                        label: "Small Shipyard",
                        cost: { ore: 10 },
                        canBuy: () => !stationModules.some(m => m.id === "smallShipyard"),
                        buy: () => {
                            stationModules.push(createModule("smallShipyard"));
                            activeMenu = null;
                        }
                    },
                    {
                        label: "Observatory",
                        cost: { ore: 25 },
                        canBuy: () => !stationModules.some(m => m.id === "observatory"),
                        buy: () => {
                            stationModules.push(createModule("observatory"));

                            observatoryArrays.push({
                                id: "ARRAY-01",
                                target: null,
                                assignedAt: 0
                            });

                            activeMenu = null;
                        }
                    }
                ]
            },

            stationMiningLaser: {
                id: "stationMiningLaser",
                codename: "LASER-LANCE",
                type: "menu",
                xOffset: 0,
                yOffset: -96,
                radius: 30,
                range: 500,
                menuTitle: "MINING LASER CONTROL",
                items: [
                    {
                        label: "Laser Strength",
                        type: "upgrade",
                        getLevel: () => upgrades.laserStrength.level,
                        getCap: () => upgrades.laserStrength.cap,
                        getCost: () => ({ science: getLaserStrengthCost() }),
                        isVisible: () => upgrades.laserStrength.level < upgrades.laserStrength.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.laserStrength;
                            upg.level++;
                        }
                    },

                    {
                        label: "Laser Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.laserSpeed.level,
                        getCap: () => upgrades.laserSpeed.cap,
                        getCost: () => ({ science: getLaserSpeedCost() }),
                        isVisible: () =>
                            upgrades.laserStrength.level >= upgrades.laserStrength.cap &&
                            upgrades.laserSpeed.level < upgrades.laserSpeed.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.laserSpeed;
                            upg.level++;
                        }
                    }
                ]
            },

            gravityPulse: {
                id: "gravityPulse",
                codename: "GRAV-PULSE",
                type: "menu",
                xOffset: -92,
                yOffset: 0,
                radius: 36,
                range: 500,
                menuTitle: "GRAVITY PULSE CONTROL",
                menuSide: "left",
                action: () => {
                    const cd = CLICK_COOLDOWNS.gravity;

                    if (cd.current <= 0) {
                        triggerGravityField();
                        cd.current = cd.max;
                    }
                },
                items: [
                    {
                        label: "Automatic Pulse",
                        type: "upgrade",
                        getLevel: () => upgrades.automaticPulse.level,
                        getCap: () => upgrades.automaticPulse.cap,
                        getCost: () =>  ({ ore: getAutomaticPulseCost() }),
                        isVisible: () => upgrades.automaticPulse.level < upgrades.automaticPulse.cap,
                        canBuy: () => true,
                        buy: () => {
                            const upg = upgrades.automaticPulse;
                            upg.level++;
                            automaticPulseTimer = 0;
                        }
                    }
                ]
            },

            smallShipyard: {
                id: "smallShipyard",
                codename: "YARD-ALPHA",
                type: "menu",
                xOffset: 110,
                yOffset: 0,
                radius: 40,
                range: 500,
                menuTitle: "SHIPYARD REQUISITIONS",
                items: [
                    {
                        label: "Basic Miner",
                        getCost: () => ({ ore: Math.floor(Math.pow(2, ships.length) * 10) }),
                        canBuy: () => true,
                        buy: () => {
                            ships.push(makeShip(ships.length));
                        }
                    },
                    {
                        label: "Ship Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.shipSpeed.level,
                        getCap: () => upgrades.shipSpeed.cap,
                        getCost: () => ({ science: Math.floor(75 * Math.pow(2, upgrades.shipSpeed.level)) }),
                        isVisible: () => upgrades.shipSpeed.level < upgrades.shipSpeed.cap,
                        canBuy: () => true,
                        buy: () => {
                            upgrades.shipSpeed.level++;

                            for (const ship of ships) {
                                ship.speed *= (1 + SHIP_SPEED_MULTIPLIER);
                            }
                        }
                    },
                    {
                        label: "Mining Speed",
                        type: "upgrade",
                        getLevel: () => upgrades.miningSpeed.level,
                        getCap: () => upgrades.miningSpeed.cap,
                        getCost: () => ({ science: Math.floor(90 * Math.pow(2, upgrades.miningSpeed.level)) }),
                        isVisible: () => upgrades.miningSpeed.level < upgrades.miningSpeed.cap,
                        canBuy: () => true,
                        buy: () => {
                            upgrades.miningSpeed.level++;
                        }
                    },
                    {
                        label: "Cargo Capacity",
                        type: "upgrade",
                        getLevel: () => upgrades.cargoCapacity.level,
                        getCap: () => upgrades.cargoCapacity.cap,
                        getCost: () => ({ science: Math.floor(80 * Math.pow(2, upgrades.cargoCapacity.level)) }),
                        isVisible: () => upgrades.cargoCapacity.level < upgrades.cargoCapacity.cap,
                        canBuy: () => true,
                        buy: () => {
                            upgrades.cargoCapacity.level++;

                            for (const ship of ships) {
                                ship.cargoMax = Math.floor(ship.cargoMax * (1 + SHIP_CARGO_MULTIPLIER));
                            }
                        }
                    }
                ]
            },

            observatory: {
                id: "observatory",
                codename: "OBSERVATORY",
                type: "menu",
                xOffset: 0,
                yOffset: 112,
                radius: 34,
                range: 1000,
                menuTitle: "OBSERVATORY CONTROL",
                items: [
                    {
                        label: "Telescopic Array",
                        type: "upgrade",
                        getLevel: () => observatoryArrays.length,
                        getCap: () => 3,
                        getCost: () => ({ ore: Math.floor(Math.pow(2, observatoryArrays.length) * 75) }),
                        isVisible: () => observatoryArrays.length < 3,
                        canBuy: () => true,
                        buy: () => {
                            observatoryArrays.push({
                                id: `ARRAY-${String(observatoryArrays.length + 1).padStart(2, "0")}`,
                                target: null,
                                assignedAt: 0
                            });
                        }
                    }
                ]
            }
        };

        function createModule(id) {
            const def = MODULE_DEFS[id];

            const module = {
                ...def,
                items: def.items ? [...def.items] : [],
                x: station.x + def.xOffset,
                y: station.y + def.yOffset
            };

            addRangeUpgradeItem(module);

            return module;
        }

        stationModules.push(createModule("stationCore"));
        stationModules.push(createModule("gravityPulse"));
        stationModules.push(createModule("stationMiningLaser"));

        const codenamePrefixes = [
            "IRON", "GHOST", "VULTURE", "SABLE", "ORBIT",
            "HAMMER", "WRAITH", "TITAN", "ECHO", "RAVEN"
        ];

        const shipNames = [
            "MULE-7", "DRILL-12", "ROOK-4", "MANTIS-9",
            "PICKAXE-3", "HOUND-6"
        ];

        function rand(min, max) {
            return min + Math.random() * (max - min);
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getModuleById(id) {
            return stationModules.find(m => m.id === id);
        }

        function distSq(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return dx * dx + dy * dy;
        }

        function isInModuleRange(module, target) {
            if (!module.range) return true;
            return distSq(module, target) <= module.range * module.range;
        }

        function getHoveredTarget() {
            const module = getHoveredModule();

            if (module) {
                return { type: "module", object: module };
            }

            for (const body of celestialBodies) {
                if (pointInCelestialBody(mouseX, mouseY, body)) {
                    return { type: "celestial", object: body };
                }
            }

            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mouseX, mouseY, asteroid)) {
                    return { type: "asteroid", object: asteroid };
                }
            }

            return null;
        }

        function pointInCelestialBody(mx, my, body) {
            const dx = mx - body.x;
            const dy = my - body.y;
            return dx * dx + dy * dy <= body.radius * body.radius;
        }

        function assignArrayToCelestialBody(body) {
            const observatory = getModuleById("observatory");
            if (!observatory) return;
            if (!isInModuleRange(observatory, body)) return;
            if (observatoryArrays.length <= 0) return;

            let array = observatoryArrays.find(a => !a.target);

            if (!array) {
                array = observatoryArrays.reduce((oldest, current) =>
                    current.assignedAt < oldest.assignedAt ? current : oldest
                );
            }

            array.target = body;
            array.assignedAt = ++arrayAssignSerial;
        }

        function updateSoundCombos() {
            if (oreGatherComboTimer > 0) {
                oreGatherComboTimer--;
            } else {
                oreGatherCombo = 0;
                oreGatherChunks = 0; // 👈 important
            }
        }

        function playOreGatherSound() {
            oreGatherChunks++;
            oreGatherComboTimer = ORE_GATHER_COMBO_WINDOW;

            // increase combo every N chunks
            const newCombo = Math.floor(oreGatherChunks / CHUNKS_PER_COMBO);

            if (newCombo !== oreGatherCombo) {
                oreGatherCombo = newCombo;
            }

            const MAX_COMBO = 20;
            const MAX_PITCH = 1.9;

            const normalized = Math.min(1, oreGatherCombo / MAX_COMBO);
            const pitch = 1 + normalized * (MAX_PITCH - 1);

            playSound("oreGather", {
                volume: 0.22,
                volumeVar: 0.04,
                pitch,
                pitchVar: 0.15
            });
        }

        function updateScienceProduction() {
            scienceTickTimer++;

            if (scienceTickTimer < scienceTickInterval) return;

            scienceTickTimer = 0;

            for (const array of observatoryArrays) {
                if (!array.target) continue;

                addResource("science", Math.floor(array.target.sciencePerSecond));
            }
        }

        function makeAsteroid(i, existingAsteroids) {
            let x, y, radius;
            let attempts = 0;

            do {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(300, 500);

                x = station.x + Math.cos(angle) * dist;
                y = station.y + Math.sin(angle) * dist;
                radius = rand(28, 62);

                attempts++;
            } while (
                attempts < 200 &&
                existingAsteroids.some(a => {
                    const dx = x - a.x;
                    const dy = y - a.y;
                    const minDist = radius + a.radius + 28;
                    return dx * dx + dy * dy < minDist * minDist;
                })
            );

            const verts = [];
            const sides = Math.floor(rand(8, 15));

            for (let a = 0; a < sides; a++) {
                const t = (a / sides) * Math.PI * 2;
                const r = radius * rand(0.65, 1.2);
                verts.push({
                    x: Math.cos(t) * r,
                    y: Math.sin(t) * r
                });
            }

            return {
                x,
                y,
                radius,
                verts,
                ore: Math.floor(rand(1000, 50000)),
                maxOre: 50000,
                codename: `${pick(codenamePrefixes)}-${String(i + 1).padStart(2, "0")}`
            };
        }

        const asteroids = [];

        for (let i = 0; i < 12; i++) {
            asteroids.push(makeAsteroid(i, asteroids));
        }

        function getShipSpeedMultiplier() {
            return 1 + upgrades.shipSpeed.level * SHIP_SPEED_MULTIPLIER;
        }

        function getCargoCapacityMultiplier() {
            return 1 + upgrades.cargoCapacity.level * SHIP_CARGO_MULTIPLIER;
        }

        function getMiningInterval() {
            return Math.max(4, 14 - upgrades.miningSpeed.level * SHIP_MINING_MULTIPLIER);
        }

        function makeShip(i) {
            return {
                x: station.x + rand(-30, 30),
                y: station.y + rand(-30, 30),
                speed: getShipSpeedMultiplier(),
                cargo: 0,
                cargoMax: 25 * getCargoCapacityMultiplier(),
                miningTimer: 0,
                target: null,
                state: "seeking",
                codename: shipNames[i] || `MINER-${i + 1}`
            };
        }

        const upgrades = {
            laserStrength: {
                level: 0,
                cap: 5
            },
            laserSpeed: {
                level: 0,
                cap: 3
            },
            automaticPulse: {
                level: 0,
                cap: 3
            },
            shipSpeed: {
                level: 0,
                cap: 5
            },
            miningSpeed: {
                level: 0,
                cap: 5
            },
            cargoCapacity: {
                level: 0,
                cap: 5
            }
        };

        const SHIP_SPEED_MULTIPLIER = 0.5;
        const SHIP_CARGO_MULTIPLIER = 0.5;
        const SHIP_MINING_MULTIPLIER = 3.0;

        function toRoman(n) {
            const romans = [
                "", "I", "II", "III", "IV", "V",
                "VI", "VII", "VIII", "IX", "X"
            ];

            return romans[n] || String(n);
        }

        let automaticPulseTimer = 0;

        function getAutomaticPulseCost() {
            return Math.floor(Math.pow(2, upgrades.automaticPulse.level) * 50);
        }

        function getAutomaticPulseInterval() {
            const intervals = [
                Infinity, // level 0 = disabled
                600,      // level I   = 10s
                360,      // level II  = 6s
                180       // level III = 3s
            ];

            return intervals[upgrades.automaticPulse.level];
        }

        function updateAutomaticPulse() {
            if (upgrades.automaticPulse.level <= 0) return;
            if (floatingOre.length <= 0) return;

            automaticPulseTimer++;

            const interval = getAutomaticPulseInterval();

            if (automaticPulseTimer >= interval) {
                triggerGravityField();
                automaticPulseTimer = 0;
            }
        }

        function getLaserOreChunks() {
            return Math.pow(2, upgrades.laserStrength.level);
        }

        function getLaserStrengthCost() {
            return Math.floor(Math.pow(2, upgrades.laserStrength.level) * 10);
        }

        function getLaserSpeedCost() {
            return Math.floor(Math.pow(3, upgrades.laserSpeed.level) * 100);
        }

        function getLaserCooldownMax() {
            const baseCooldown = 30; // 0.5s at 60fps

            const cooldownByLevel = [
                30, // no upgrade
                20, // Laser Speed I
                15, // Laser Speed II
                10  // Laser Speed III
            ];

            return cooldownByLevel[upgrades.laserSpeed.level] ?? baseCooldown;
        }

        const ships = []; //Array.from({ length: 6 }, (_, i) => makeShip(i));

        const floatingOre = [];
        const laserBeams = [];
        const gravityPulses = [];

        const CLICK_COOLDOWNS = {
            laser: {
                current: 0,
                getMax: () => getLaserCooldownMax()
            },
            gravity: {
                current: 0,
                max: 30
            }
        };

        function pointInAsteroid(mx, my, asteroid) {
            const dx = mx - asteroid.x;
            const dy = my - asteroid.y;
            return dx * dx + dy * dy <= asteroid.radius * asteroid.radius;
        }

        function pointInModule(mx, my, module) {
            const dx = mx - module.x;
            const dy = my - module.y;
            return dx * dx + dy * dy <= module.radius * module.radius;
        }

        function getHoveredModule() {
            for (let i = stationModules.length - 1; i >= 0; i--) {
                const module = stationModules[i];

                if (pointInModule(mouseX, mouseY, module)) {
                    return module;
                }
            }

            return null;
        }

        function spawnFloatingOre(asteroid) {
            if (asteroid.ore <= 0) return;

            asteroid.ore--;

            floatingOre.push({
                x: asteroid.x + rand(-asteroid.radius * 0.35, asteroid.radius * 0.35),
                y: asteroid.y + rand(-asteroid.radius * 0.35, asteroid.radius * 0.35),
                vx: rand(-0.35, 0.35),
                vy: rand(-0.35, 0.35),
                pull: false,
                codename: `ORE-${Math.floor(rand(100, 999))}`
            });
        }

        function firePulseLaser(asteroid) {
            const laserModule = getModuleById("stationMiningLaser");
            if (!laserModule) return;
            if (!isInModuleRange(laserModule, asteroid)) return;

            laserBeams.push({
                x1: laserModule.x,
                y1: laserModule.y,
                x2: asteroid.x,
                y2: asteroid.y,
                life: 12,
                asteroid
            });

            playSound("laser", {
                volume: 0.35,
                volumeVar: 0.08,
                pitch: 1,
                pitchVar: 0.5
            });
        }

        function triggerGravityField() {
            const gravModule = getModuleById("gravityPulse") || station;

            gravityPulses.push({
                x: gravModule.x,
                y: gravModule.y,
                r: 20,
                life: 28
            });

            for (const ore of floatingOre) {
                const dx = ore.x - gravModule.x;
                const dy = ore.y - gravModule.y;

                if (dx * dx + dy * dy <= gravModule.range * gravModule.range) {
                    ore.pull = true;

                    // optional: store target so it pulls toward module instead of center
                    ore.pullTarget = gravModule;
                }
            }
        }

        function centerCameraOnStation() {
            camera.x = station.x;
            camera.y = station.y;
            clampCamera();
        }

        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();

            mouseScreenX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseScreenY = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (isCameraDragging) {
                camera.x = cameraStartX - (mouseScreenX - dragStartX) / camera.zoom;
                camera.y = cameraStartY - (mouseScreenY - dragStartY) / camera.zoom;
                clampCamera();
            }

            const worldMouse = screenToWorld(mouseScreenX, mouseScreenY);
            mouseX = worldMouse.x;
            mouseY = worldMouse.y;
        });

        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            zoomCamera(e.deltaY < 0 ? 1.12 : 1 / 1.12);
        });

        window.addEventListener("keydown", e => {
            keys[e.code] = true;

            if (isMessageActive()) {
                e.preventDefault();
                advanceIncomingMessage();
                return;
            }

            if (e.code === "Space") {
                e.preventDefault(); // avoid page scroll
                centerCameraOnStation();
            }

            if (e.code === "NumpadAdd" || e.code === "Equal") {
                zoomCamera(1.12, W / 2, H / 2);
            }

            if (e.code === "NumpadSubtract" || e.code === "Minus") {
                zoomCamera(1 / 1.12, W / 2, H / 2);
            }
        });

        window.addEventListener("keyup", e => {
            keys[e.code] = false;
        });

        function updateCameraKeyboard() {
            const speed = 14 / camera.zoom;

            if (keys.KeyW) camera.y -= speed;
            if (keys.KeyS) camera.y += speed;
            if (keys.KeyA) camera.x -= speed;
            if (keys.KeyD) camera.x += speed;

            clampCamera();
        }

        canvas.addEventListener("mousedown", e => {
            if (isMessageActive()) {
                advanceIncomingMessage();
                return;
            }

            if (gameState === "start") {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
                const my = (e.clientY - rect.top) * (canvas.height / rect.height);

                if (pointInRect(mx, my, startButton)) {
                    gameState = "playing";
                    queueStartingMessages();
                }

                return;
            }

            mouseDown = true;

            if (e.button === 2) { // RIGHT CLICK
                isCameraDragging = true;
                dragStartX = mouseScreenX;
                dragStartY = mouseScreenY;
                cameraStartX = camera.x;
                cameraStartY = camera.y;
                return;
            }

            const rect = canvas.getBoundingClientRect();

            const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
            const { x: mx, y: my } = screenToWorld(sx, sy);

            // detect asteroid under cursor at press time
            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mx, my, asteroid)) {
                    heldAsteroidTarget = asteroid;

                    // fire immediately if off cooldown (feels responsive)
                    const cd = CLICK_COOLDOWNS.laser;
                    if (cd.current <= 0) {
                        firePulseLaser(asteroid);
                        cd.current = cd.getMax();
                    }

                    return;
                }
            }

            // no asteroid → clear target
            heldAsteroidTarget = null;
        });

        canvas.addEventListener("contextmenu", e => e.preventDefault());

        canvas.addEventListener("mouseup", e => {
            mouseDown = false;
            heldAsteroidTarget = null;
            isCameraDragging = false;
        });

        canvas.addEventListener("mouseleave", e => {
            mouseDown = false;
            heldAsteroidTarget = null;
            isCameraDragging = false;
        });

        canvas.addEventListener("click", e => {
            if (gameState !== "playing") return;

            if (isMessageActive()) {
                advanceIncomingMessage();
                return;
            }

            const rect = canvas.getBoundingClientRect();

            const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
            const { x: mx, y: my } = screenToWorld(sx, sy);

            // Menu clicks first
            if (activeMenu) {
                const visibleItems = activeMenu.items.filter(item =>
                    item.isVisible ? item.isVisible() : true
                );

                for (const item of visibleItems) {
                    if (!item.bounds) continue;

                    const inside =
                        mx >= item.bounds.x &&
                        mx <= item.bounds.x + item.bounds.w &&
                        my >= item.bounds.y &&
                        my <= item.bounds.y + item.bounds.h;

                    if (inside) {
                        const cost = item.getCost ? item.getCost() : item.cost;
                        const canBuy = item.canBuy ? item.canBuy() : true;

                        if (canBuy && canAffordCost(cost)) {
                            if (spendCost(cost)) {
                                item.buy();
                            }
                        }

                        return;
                    }
                }

                activeMenu = null;
            }

            // Module clicks
            for (let i = stationModules.length - 1; i >= 0; i--) {
                const module = stationModules[i];

                if (pointInModule(mx, my, module)) {
                    if (module.action) {
                        module.action();
                    }

                    return;
                }
            }

            //Celestial bodies
            for (const body of celestialBodies) {
                if (pointInCelestialBody(mx, my, body)) {
                    assignArrayToCelestialBody(body);
                    return;
                }
            }

            // Asteroid click: pulse laser
            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mx, my, asteroid)) {
                    const cd = CLICK_COOLDOWNS.laser;

                    if (cd.current <= 0) {
                        firePulseLaser(asteroid);
                        cd.current = cd.getMax();
                    }

                    return;
                }
            }
        });

        function updateActiveMenu() {
            const prevMenu = activeMenu;

            // If menu is open, hovering the menu keeps it active
            // and blocks underlying modules from opening their own menus.
            if (activeMenu && activeMenu.menuBounds) {
                const b = activeMenu.menuBounds;

                const insideMenu =
                    mouseX >= b.x &&
                    mouseX <= b.x + b.w &&
                    mouseY >= b.y &&
                    mouseY <= b.y + b.h;

                if (insideMenu) {
                    menuCloseTimer = 0;
                    return;
                }
            }

            const hoveredModule = getHoveredModule();

            if (hoveredModule && hoveredModule.type === "menu") {
                if (activeMenu !== hoveredModule) {
                    activeMenu = hoveredModule;
                    playSound("menu", {
                        volume: 0.3,
                        volumeVar: 0.05,
                        pitch: 1,
                        pitchVar: 0.08
                    });
                }

                menuCloseTimer = 0;
                return;
            }

            if (activeMenu) {
                menuCloseTimer++;

                if (menuCloseTimer > MENU_CLOSE_DELAY) {
                    activeMenu = null;
                    menuCloseTimer = 0;
                }
            }
        }

        function updateHeldLaserFire() {
            if (!mouseDown || !heldAsteroidTarget) return;

            if (heldAsteroidTarget.ore <= 0) {
                heldAsteroidTarget = null;
                return;
            }

            const stillHovering = pointInAsteroid(mouseX, mouseY, heldAsteroidTarget);

            if (!stillHovering) {
                heldAsteroidTarget = null;
                return;
            }

            const cd = CLICK_COOLDOWNS.laser;

            if (cd.current <= 0) {
                firePulseLaser(heldAsteroidTarget);
                cd.current = cd.getMax();
            }
        }

        function chooseAsteroid(ship) {
            const shipyard = getModuleById("smallShipyard");

            const available = asteroids.filter(a => {
                if (a.ore <= 0) return false;
                if (!shipyard) return false;
                return isInModuleRange(shipyard, a);
            });

            if (!available.length) return null;
            return pick(available);
        }

        function moveToward(obj, tx, ty, speed) {
            const dx = tx - obj.x;
            const dy = ty - obj.y;
            const d = Math.hypot(dx, dy);

            if (d < speed) {
                obj.x = tx;
                obj.y = ty;
                return true;
            }

            obj.x += dx / d * speed;
            obj.y += dy / d * speed;
            return false;
        }

        function updateCooldowns() {
            for (const key in CLICK_COOLDOWNS) {
                const cd = CLICK_COOLDOWNS[key];
                if (cd.current > 0) cd.current--;
            }
        }

        function updateLaserBeams() {
            for (let i = laserBeams.length - 1; i >= 0; i--) {
                const beam = laserBeams[i];

                beam.life--;

                if (beam.life === 6) {
                    const chunks = getLaserOreChunks();

                    for (let n = 0; n < chunks; n++) {
                        spawnFloatingOre(beam.asteroid);
                    }
                }

                if (beam.life <= 0) {
                    laserBeams.splice(i, 1);
                }
            }
        }

        function updateFloatingOre() {
            for (let i = floatingOre.length - 1; i >= 0; i--) {
                const ore = floatingOre[i];

                if (ore.pull) {
                    const target = ore.pullTarget || station;
                    const dx = target.x - ore.x;
                    const dy = target.y - ore.y;
                    const d = Math.hypot(dx, dy);

                    if (d < 12) {
                        addResource("ore", 1);
                        //playOreGatherSound();
                        playSound("oreGather", {
                            volume: 0.22,
                            volumeVar: 0.04,
                            pitch: 1,
                            pitchVar: 0.025
                        });
                        ore.pull = false;
                        ore.pullTarget = null;
                        floatingOre.splice(i, 1);
                        continue;
                    }

                    ore.vx += dx / d * 0.22;
                    ore.vy += dy / d * 0.22;
                }

                ore.vx *= 0.96;
                ore.vy *= 0.96;

                ore.x += ore.vx;
                ore.y += ore.vy;
            }
        }

        function updateGravityPulses() {
            for (let i = gravityPulses.length - 1; i >= 0; i--) {
                const p = gravityPulses[i];

                p.r += 10;
                p.life--;

                if (p.life <= 0) {
                    gravityPulses.splice(i, 1);
                }
            }
        }

        function updateShip(ship) {
            if (ship.state === "seeking") {
                ship.target = chooseAsteroid(ship);
                ship.state = ship.target ? "outbound" : "idle";
            }

            if (ship.state === "outbound") {
                if (!ship.target || ship.target.ore <= 0) {
                    ship.state = "seeking";
                    ship.target = null;
                    return;
                }

                const shipyard = getModuleById("smallShipyard");
                if (!shipyard || !isInModuleRange(shipyard, ship.target)) {
                    ship.state = "seeking";
                    ship.target = null;
                    return;
                }

                if (moveToward(ship, ship.target.x, ship.target.y, ship.speed)) {
                    ship.state = "mining";
                    ship.miningTimer = 0;
                }
            }

            if (ship.state === "mining") {
                ship.miningTimer++;

                if (ship.miningTimer % getMiningInterval() === 0 && ship.target && ship.target.ore > 0) {
                    ship.target.ore--;
                    ship.cargo++;
                }

                if (!ship.target || ship.target.ore <= 0 || ship.cargo >= ship.cargoMax) {
                    ship.state = "returning";
                }
            }

            if (ship.state === "returning") {
                if (moveToward(ship, station.x, station.y, ship.speed * 1.15)) {
                    addResource("ore", ship.cargo);
                    ship.cargo = 0;
                    ship.state = "seeking";
                }
            }
        }

        function wrapTextLines(text, maxWidth) {
            const words = text.split(" ");
            const lines = [];
            let line = "";

            for (const word of words) {
                const testLine = line ? `${line} ${word}` : word;

                if (ctx.measureText(testLine).width > maxWidth && line) {
                    lines.push(line);
                    line = word;
                } else {
                    line = testLine;
                }
            }

            if (line) lines.push(line);
            return lines;
        }

        function drawIncomingMessage() {
            if (!activeIncomingMessage) return;

            const boxW = 760;
            const boxH = 420;
            const x = W / 2 - boxW / 2;
            const y = H / 2 - boxH / 2;

            ctx.save();

            ctx.fillStyle = "rgba(0,0,0,0.62)";
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.94)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 18;

            ctx.fillRect(x, y, boxW, boxH);
            ctx.strokeRect(x, y, boxW, boxH);

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.strokeRect(x + 12, y + 12, boxW - 24, boxH - 24);

            ctx.fillStyle = GREEN;
            ctx.font = "16px monospace";
            ctx.fillText(activeIncomingMessage.title, x + 34, y + 44);

            ctx.globalAlpha = 0.7;
            ctx.font = "12px monospace";
            ctx.fillText(`FROM: ${activeIncomingMessage.from}`, x + 34, y + 70);
            ctx.globalAlpha = 1;

            ctx.beginPath();
            ctx.moveTo(x + 34, y + 92);
            ctx.lineTo(x + boxW - 34, y + 92);
            ctx.stroke();

            ctx.font = "15px monospace";

            let lineY = y + 128;

            const textMaxWidth = boxW - 84;

            for (const paragraph of activeIncomingMessage.body) {
                if (paragraph === "") {
                    lineY += 18;
                    continue;
                }

                const wrappedLines = wrapTextLines(paragraph, textMaxWidth);

                for (const line of wrappedLines) {
                    ctx.fillText(line, x + 42, lineY);
                    lineY += 24;
                }
            }

            const blink = Math.floor(frameCount / 24) % 2 === 0;

            if (blink) {
                ctx.font = "13px monospace";
                ctx.fillText("CLICK OR PRESS ANY KEY TO CONTINUE", x + boxW / 2 - 132, y + boxH - 34);
            }

            ctx.restore();
        }

        function drawStartScreen() {
            ctx.fillStyle = "rgba(0,12,0,0.35)";
            ctx.fillRect(0, 0, W, H);

            drawGrid();

            ctx.save();
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 18;

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.08)";
            ctx.lineWidth = 2;

            ctx.strokeRect(W / 2 - 420, H / 2 - 190, 840, 360);

            ctx.font = "46px monospace";
            ctx.fillStyle = GREEN;
            ctx.fillText("IDLE SPACE MINER", W / 2, H / 2 - 95);

            ctx.font = "16px monospace";
            ctx.globalAlpha = 0.75;
            ctx.fillText("DEEP SPACE EXTRACTION COMMAND", W / 2, H / 2 - 46);
            ctx.fillText("SECTOR KAPPA-9 // MINING AUTHORIZATION REQUIRED", W / 2, H / 2 - 18);
            ctx.globalAlpha = 1;

            const hovered = pointInRect(mouseX, mouseY, startButton);

            ctx.strokeStyle = hovered ? "rgba(120,255,160,0.95)" : GREEN;
            ctx.fillStyle = hovered ? "rgba(0,255,90,0.18)" : "rgba(0,255,90,0.08)";
            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowBlur = hovered ? 24 : 12;

            ctx.fillRect(startButton.x, startButton.y, startButton.w, startButton.h);
            ctx.strokeRect(startButton.x, startButton.y, startButton.w, startButton.h);

            ctx.font = "22px monospace";
            ctx.fillStyle = GREEN;
            ctx.fillText("START", W / 2, startButton.y + startButton.h / 2);

            if (hovered) {
                ctx.font = "16px monospace";
                ctx.fillText(">>", startButton.x - 28, startButton.y + startButton.h / 2);
                ctx.fillText("<<", startButton.x + startButton.w + 28, startButton.y + startButton.h / 2);
            }

            ctx.restore();

            drawScanlines();
            drawVignette();
            drawCrosshair();
        }

        function drawCrosshair() {
            const size = 10;
            const gap = 4;

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            // horizontal left
            ctx.beginPath();
            ctx.moveTo(mouseScreenX - size, mouseScreenY);
            ctx.lineTo(mouseScreenX - gap, mouseScreenY);
            ctx.stroke();

            // horizontal right
            ctx.beginPath();
            ctx.moveTo(mouseScreenX + gap, mouseScreenY);
            ctx.lineTo(mouseScreenX + size, mouseScreenY);
            ctx.stroke();

            // vertical top
            ctx.beginPath();
            ctx.moveTo(mouseScreenX, mouseScreenY - size);
            ctx.lineTo(mouseScreenX, mouseScreenY - gap);
            ctx.stroke();

            // vertical bottom
            ctx.beginPath();
            ctx.moveTo(mouseScreenX, mouseScreenY + gap);
            ctx.lineTo(mouseScreenX, mouseScreenY + size);
            ctx.stroke();

            // center dot
            ctx.beginPath();
            ctx.arc(mouseScreenX, mouseScreenY, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = GREEN;
            ctx.fill();

            ctx.restore();
        }

        function drawLaserBeams() {
            for (const beam of laserBeams) {
                const alpha = beam.life / 12;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 14;

                ctx.beginPath();
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(beam.x2, beam.y2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawFloatingOre() {
            for (const ore of floatingOre) {
                ctx.save();
                ctx.translate(ore.x, ore.y);

                ctx.strokeStyle = GREEN;
                ctx.fillStyle = "rgba(80,255,130,0.25)";
                ctx.lineWidth = 1;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2); // 👈 circle instead of square
                ctx.fill();
                ctx.stroke();

                ctx.restore();

                //drawText(ore.codename, ore.x + 8, ore.y - 6, 0.55);
            }
        }

        function drawGravityPulses() {
            for (const p of gravityPulses) {
                const alpha = p.life / 28;

                ctx.save();
                ctx.strokeStyle = `rgba(120,255,160,${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawText(text, x, y, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = GREEN;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 6;
            ctx.font = "12px monospace";
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function drawGrid() {
            ctx.strokeStyle = FAINT;
            ctx.lineWidth = 1;

            for (let x = 0; x < WORLD_W; x += 32) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, WORLD_H);
                ctx.stroke();
            }

            for (let y = 0; y < WORLD_H; y += 32) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WORLD_W, y);
                ctx.stroke();
            }
        }

        function drawStation() {
            drawStationConnections();

            for (const module of stationModules) {
                drawStationModule(module);
            }
        }

        function drawStationConnections() {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.35)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            for (const module of stationModules) {
                if (module.id === "stationCore") continue;

                ctx.beginPath();
                ctx.moveTo(station.x, station.y);
                ctx.lineTo(module.x, module.y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawStationModule(module) {
            const hovered = getHoveredTarget()?.object === module;

            ctx.save();
            ctx.translate(module.x, module.y);

            ctx.strokeStyle = hovered ? "rgba(120,255,160,0.95)" : GREEN;
            ctx.fillStyle = hovered
                ? "rgba(0,255,90,0.16)"
                : "rgba(0,255,90,0.06)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 22 : 12;

            if (module.id === "stationCore") {
                drawCoreShape(module);
            } else if (module.id === "gravityPulse") {
                drawGravityModuleShape(module);
            } else if (module.id === "smallShipyard") {
                drawShipyardShape(module);
            } else if (module.id === "stationMiningLaser") {
                drawMiningLaserShape(module);
            } else if (module.id === "observatory") {
                drawObservatoryShape(module);
            }

            ctx.restore();

            if (hovered && module.range) {
                drawModuleRange(module);
            }

            drawText(module.codename, module.x - 42, module.y - module.radius - 14, hovered ? 1 : 0.75);
        }

        function drawModuleRange(module) {
            ctx.save();

            ctx.strokeStyle = "rgba(80,255,130,0.28)";
            ctx.lineWidth = 2;
            ctx.setLineDash([12, 10]);
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            ctx.arc(module.x, module.y, module.range, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();
        }

        function drawObservatoryShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-18, 10);
            ctx.lineTo(0, -20);
            ctx.lineTo(18, 10);
            ctx.closePath();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, -4, 8, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, 30);
            ctx.lineTo(0, 44);
            ctx.moveTo(-14, 44);
            ctx.lineTo(14, 44);
            ctx.stroke();
        }

        function drawMiningLaserShape(module) {
            ctx.save();

            // lean triangle pointing outward (upward relative to module)
            ctx.beginPath();
            ctx.moveTo(0, -20);   // tip
            ctx.lineTo(-10, 10);  // left base
            ctx.lineTo(10, 10);   // right base
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner cross (targeting / focusing element)
            ctx.beginPath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(5, 0);
            ctx.moveTo(0, -5);
            ctx.lineTo(0, 5);
            ctx.stroke();

            ctx.restore();
        }

        function drawCoreShape(module) {
            // outer hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 58;
                const y = Math.sin(a) * 58;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // inner hexagon
            ctx.beginPath();

            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;
                const x = Math.cos(a) * 30;
                const y = Math.sin(a) * 30;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.closePath();
            ctx.stroke();

            // central command node
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.stroke();

            // small hardpoint lines
            for (let i = 0; i < 6; i++) {
                const a = -Math.PI / 2 + i * Math.PI / 3;

                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 34, Math.sin(a) * 34);
                ctx.lineTo(Math.cos(a) * 52, Math.sin(a) * 52);
                ctx.stroke();
            }
        }

        function drawGravityModuleShape(module) {
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-34, 0);
            ctx.lineTo(-18, 0);
            ctx.moveTo(18, 0);
            ctx.lineTo(34, 0);
            ctx.moveTo(0, -34);
            ctx.lineTo(0, -18);
            ctx.moveTo(0, 18);
            ctx.lineTo(0, 34);
            ctx.stroke();
        }

        function drawShipyardShape(module) {
            ctx.beginPath();
            ctx.rect(-34, -22, 68, 44);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-24, 22);
            ctx.lineTo(-24, 34);
            ctx.moveTo(0, 22);
            ctx.lineTo(0, 38);
            ctx.moveTo(24, 22);
            ctx.lineTo(24, 34);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-18, -6);
            ctx.lineTo(14, -6);
            ctx.lineTo(24, 0);
            ctx.lineTo(14, 6);
            ctx.lineTo(-18, 6);
            ctx.closePath();
            ctx.stroke();
        }

        const MENU_OFFSET = 6; // was 18

        function drawActiveMenu() {
            if (!activeMenu) return;

            const rowH = 26;
            const w = 220;
            const visibleItems = activeMenu.items.filter(item =>
                item.isVisible ? item.isVisible() : true
            );

            const h = 60 + visibleItems.length * rowH;

            let x;
            let y = activeMenu.y - h / 2;

            // GRAV-PULSE → force left side
            if (activeMenu.menuSide === "left") {
                x = activeMenu.x - activeMenu.radius - w - MENU_OFFSET;

                // fallback if offscreen
                if (x < 12) {
                    x = activeMenu.x + activeMenu.radius + MENU_OFFSET;
                }
            } else {
                // default → right side
                x = activeMenu.x + activeMenu.radius + MENU_OFFSET;

                // fallback if offscreen
                if (x + w > WORLD_W - 12) {
                    x = activeMenu.x - activeMenu.radius - w - MENU_OFFSET;
                }
            }

            if (y < 12) y = 12;
            if (y + h > WORLD_H - 12) y = WORLD_H - h - 12;

            activeMenu.menuBounds = { x, y, w, h };

            ctx.save();

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,20,0,0.88)";
            ctx.lineWidth = 1;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 10;

            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);

            // determine which side the menu is on
            const menuCenterX = x + w / 2;
            const isMenuOnRight = menuCenterX > activeMenu.x;

            // connection points
            const fromX = activeMenu.x;
            const fromY = activeMenu.y;

            const toX = isMenuOnRight ? x : x + w;
            const toY = y + h / 2;

            // draw connector
            const midX = (fromX + toX) / 2;

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(midX, fromY);
            ctx.lineTo(midX, toY);
            ctx.lineTo(toX, toY);
            ctx.stroke();

            ctx.fillStyle = GREEN;
            ctx.font = "12px monospace";
            ctx.fillText(activeMenu.menuTitle, x + 12, y + 20);
            ctx.fillText(activeMenu.codename, x + 12, y + 36);

            visibleItems.forEach((item, i) => {
                const bx = x + 12;
                const by = y + 50 + i * rowH;
                const bw = w - 24;
                const bh = 20;

                const cost = item.getCost ? item.getCost() : item.cost;
                const canBuy = item.canBuy ? item.canBuy() : true;
                const affordable = canBuy && canAffordCost(cost);

                ctx.strokeStyle = affordable ? GREEN : "rgba(80,255,130,0.25)";
                ctx.fillStyle = affordable
                    ? "rgba(0,255,90,0.08)"
                    : "rgba(0,255,90,0.03)";

                ctx.fillRect(bx, by, bw, bh);
                ctx.strokeRect(bx, by, bw, bh);

                ctx.fillStyle = affordable ? GREEN : "rgba(80,255,130,0.35)";
                let label = item.label;

                if (item.type === "upgrade") {
                    const nextLevel = item.getLevel() + 1;
                    label = `${item.label} ${toRoman(nextLevel)}`;
                }

                ctx.fillText(`${label} (${formatCost(cost)})`, bx + 8, by + 14);

                if (affordable) {
                    const pulse = Math.floor(frameCount / 12) % 2;
                    const offset = pulse ? 2 : 0;

                    ctx.fillText(">>", bx - 24 - offset, by + 14);
                    ctx.fillText("<<", bx + bw + 8 + offset, by + 14);
                }

                item.bounds = { x: bx, y: by, w: bw, h: bh };
            });

            ctx.restore();
        }

        function drawObservationLinks() {
            const observatory = getModuleById("observatory");
            if (!observatory) return;

            for (const array of observatoryArrays) {
                if (!array.target) continue;

                ctx.save();
                ctx.strokeStyle = "rgba(80,255,130,0.22)";
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 8]);
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = 8;

                ctx.beginPath();
                ctx.moveTo(observatory.x, observatory.y);
                ctx.lineTo(array.target.x, array.target.y);
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawCelestialBody(body) {
            const hovered = getHoveredTarget()?.object === body;
            const observedBy = observatoryArrays.filter(a => a.target === body);

            ctx.save();
            ctx.translate(body.x, body.y);

            if (body.type === "STAR") {
                const pulse = 0.5 + Math.sin(frameCount * 0.05) * 0.5;

                ctx.save();

                // --- OUTER GLOW (big soft halo) ---
                ctx.shadowColor = "#00ffaa";
                ctx.shadowBlur = hovered ? 90 : 70;
                ctx.globalAlpha = 0.35 + pulse * 0.25;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius + 30, 0, Math.PI * 2);
                ctx.fillStyle = "#00ff99";
                ctx.fill();

                // --- MID HALO ---
                ctx.globalAlpha = 0.5 + pulse * 0.3;
                ctx.shadowBlur = hovered ? 55 : 40;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius + 14, 0, Math.PI * 2);
                ctx.fill();

                // --- CORE (very bright) ---
                ctx.globalAlpha = 1;
                ctx.shadowBlur = hovered ? 35 : 25;

                ctx.fillStyle = "#66ffcc";
                ctx.strokeStyle = "#aaffdd";
                ctx.lineWidth = hovered ? 3 : 2;

                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // --- SHARP CROSS FLARE ---
                ctx.shadowBlur = hovered ? 28 : 18;
                ctx.strokeStyle = "#99ffcc";

                ctx.beginPath();
                ctx.moveTo(-body.radius - 28, 0);
                ctx.lineTo(body.radius + 28, 0);
                ctx.moveTo(0, -body.radius - 28);
                ctx.lineTo(0, body.radius + 28);
                ctx.stroke();

                ctx.restore();
            } else if (body.type === "PLANET") {
                // --- PLANET STYLE (solid, subdued) ---
                ctx.strokeStyle = hovered ? "rgba(120,255,160,0.9)" : "rgba(80,255,130,0.45)";
                ctx.fillStyle = hovered ? "rgba(0,255,90,0.14)" : "rgba(0,255,90,0.05)";
                ctx.lineWidth = hovered ? 3 : 2;
                ctx.shadowColor = GREEN;
                ctx.shadowBlur = hovered ? 18 : 6;

                // body
                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // equatorial ring (thin tech-style)
                ctx.beginPath();
                ctx.ellipse(0, 0, body.radius + 10, body.radius * 0.35, 0, 0, Math.PI * 2);
                ctx.stroke();

                // small surface detail lines
                ctx.beginPath();
                ctx.arc(-6, -4, 6, 0, Math.PI * 2);
                ctx.moveTo(8, 4);
                ctx.arc(8, 4, 4, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.restore();

            // labels (same for both)
            drawText(`${body.type}: ${body.codename}`, body.x - 54, body.y - body.radius - 50, 0.9);
            drawText(`SCI:${body.sciencePerSecond}/SEC`, body.x - 42, body.y + body.radius + 50, 0.65);

            if (observedBy.length > 0) {
                drawText(`OBSERVED x${observedBy.length}`, body.x - 42, body.y + body.radius + 75, 0.85);
            }
        }

        function drawAsteroid(a) {
            const hovered = getHoveredTarget()?.object === a;

            ctx.save();
            ctx.translate(a.x, a.y);

            ctx.strokeStyle = hovered
                ? "rgba(120,255,160,0.9)"
                : a.ore > 0
                    ? DIM
                    : "rgba(80,255,130,0.08)";

            ctx.lineWidth = hovered ? 3 : 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = hovered ? 16 : a.ore > 0 ? 5 : 0;

            ctx.beginPath();
            a.verts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.stroke();

            ctx.restore();

            drawText(a.codename, a.x - 28, a.y - 60, 0.85);
            drawText(`ORE:${a.ore}`, a.x - 22, a.y + 60, 0.65);
        }

        function drawShip(ship) {
            const angle = ship.state === "returning"
                ? Math.atan2(station.y - ship.y, station.x - ship.x)
                : ship.target
                    ? Math.atan2(ship.target.y - ship.y, ship.target.x - ship.x)
                    : 0;

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(angle);

            ctx.strokeStyle = GREEN;
            ctx.fillStyle = "rgba(0,255,90,0.12)";
            ctx.lineWidth = 2;
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;

            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(-9, -7);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-9, 7);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();

            drawText(ship.codename, ship.x + 10, ship.y - 10);
            drawText(`${ship.state.toUpperCase()} ${ship.cargo}/${ship.cargoMax}`, ship.x + 10, ship.y + 4, 0.65);

            if (ship.target && ship.state !== "idle") {
                ctx.strokeStyle = "rgba(80,255,130,0.12)";
                ctx.beginPath();
                ctx.moveTo(ship.x, ship.y);
                ctx.lineTo(ship.target.x, ship.target.y);
                ctx.stroke();
            }
        }

        function drawScanlines() {
            ctx.fillStyle = "rgba(0,0,0,0.18)";
            for (let y = 0; y < H; y += 3) {
                ctx.fillRect(0, y, W, 1);
            }
        }

        function drawVignette() {
            const g = ctx.createRadialGradient(W / 2, H / 2, 160, W / 2, H / 2, 620);
            g.addColorStop(0, "rgba(0,0,0,0)");
            g.addColorStop(1, "rgba(0,0,0,0.72)");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
        }

        function drawHud() {
            const RESOURCES_OFFSET_Y = 450;

            drawText("DEEP SPACE EXTRACTION COMMAND", 24, 28);
            drawText("SECTOR: KAPPA-9 / STATUS: ACTIVE", 24, 46, 0.75);
            drawText(`FLEET: ${ships.length} MINING UNITS`, 24, 64, 0.75);
            if (resources.ore > 0) drawText(`ORE: ${resources.ore}`, 24, RESOURCES_OFFSET_Y + 82, 1.0);
            if (resources.science > 0) drawText(`SCIENCE: ${resources.science}`, 24, RESOURCES_OFFSET_Y + 100, 1.0);

            const hovered = getHoveredTarget();

            if (hovered?.type === "asteroid") {
                const laser = getModuleById("stationMiningLaser");
                
                if (laser && !isInModuleRange(laser, hovered.object)) {
                    drawText("TARGET OUT OF LASER RANGE", 24, 132, 0.8);
                } else {
                    drawText(`TARGET LOCK: ${hovered.object.codename}`, 24, 132, 0.8);
                }
            }

            if (hovered?.type === "module") {
                drawText(`MODULE LOCK: ${hovered.object.codename}`, 24, 132, 0.8);
            }

        }

        function loop() {
            frameCount++;

            if (gameState === "start") {
                drawStartScreen();
                requestAnimationFrame(loop);
                return;
            }

            if (messageInputLock > 0) {
                messageInputLock--;
            }

            updateCameraKeyboard();

            ctx.fillStyle = "rgba(0,12,0,0.35)";
            ctx.fillRect(0, 0, W, H);

            updateCooldowns();
            updateHeldLaserFire();
            updateSoundCombos();
            updateAutomaticPulse();
            updateActiveMenu();
            updateLaserBeams();
            updateFloatingOre();
            updateGravityPulses();
            updateScienceProduction();

            ctx.save();
            applyCameraTransform();

            drawGrid();

            asteroids.forEach(drawAsteroid);
            celestialBodies.forEach(drawCelestialBody);

            drawObservationLinks();
            drawLaserBeams();
            drawFloatingOre();
            drawGravityPulses();

            ships.forEach(updateShip);
            ships.forEach(drawShip);

            drawStation();
            drawActiveMenu();

            ctx.restore();

            drawScanlines();
            drawVignette();

            drawHud();
            drawCrosshair();
            drawIncomingMessage();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
