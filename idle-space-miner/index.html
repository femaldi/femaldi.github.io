        async function loadSoundBuffer(name, url) {
            const res = await fetch(url);

        function playSound(name, options = {}) {
            if (!soundEnabled) return;

            const buffer = soundBuffers[name];
            if (!buffer) return;

            if (audioCtx.state === "suspended") {
                audioCtx.resume();
            }

            const {
                volume = 0.45,
                volumeVar = 0,
                pitch = 1,
                pitchVar = 0,
                attackMs = 2,
                releaseMs = 18
            } = options;

            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();

            const finalVolume = Math.max(
                0,
                Math.min(1, volume + (Math.random() * 2 - 1) * volumeVar)
            );

            const finalPitch = Math.max(
                0.5,
                Math.min(2.0, pitch + (Math.random() * 2 - 1) * pitchVar)
            );

            source.buffer = buffer;
            source.playbackRate.value = finalPitch;

            source.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            const attack = attackMs / 1000;
            const release = releaseMs / 1000;
            const duration = buffer.duration / finalPitch;
            const stopAt = now + duration;

            // Tiny fade-in prevents attack clicks.
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(finalVolume, now + attack);

            // Tiny fade-out prevents browser/playbackRate tail clicks.
            gain.gain.setValueAtTime(finalVolume, Math.max(now + attack, stopAt - release));
            gain.gain.linearRampToValueAtTime(0, stopAt);

            source.start(now);
            source.stop(stopAt + 0.01);
        }

        function clampCamera() {
            const halfW = W / 2 / camera.zoom;
            const halfH = H / 2 / camera.zoom;

            camera.x = Math.max(halfW, Math.min(WORLD_W - halfW, camera.x));
            camera.y = Math.max(halfH, Math.min(WORLD_H - halfH, camera.y));
        }

        function screenToWorld(sx, sy) {
            return {
                x: camera.x + (sx - W / 2) / camera.zoom,
                y: camera.y + (sy - H / 2) / camera.zoom
            };
        }

        function applyCameraTransform() {
            ctx.translate(W / 2, H / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
        }

        function zoomCamera(delta, sx = mouseScreenX, sy = mouseScreenY) {
            const before = screenToWorld(sx, sy);

            camera.zoom = Math.max(
                camera.minZoom,
                Math.min(camera.maxZoom, camera.zoom * delta)
            );

            const after = screenToWorld(sx, sy);

            camera.x += before.x - after.x;
            camera.y += before.y - after.y;

            clampCamera();
        }

        function unlockTaxes() {
            taxesUnlocked = true;
            taxCycleTimer = TAX_CYCLE_FRAMES;
            oreMinedThisTaxCycle = 0;
        }

        function getTaxableOreForCycle() {
            return Math.max(0, oreMinedThisTaxCycle - TAX_FREE_ORE_PER_CYCLE);
        }

        function getTaxDueForCycle() {
            return Math.floor(getTaxableOreForCycle() * TAX_RATE);
        }

        function getTaxCycleProgress() {
            if (!taxesUnlocked) return 0;
            return 1 - taxCycleTimer / TAX_CYCLE_FRAMES;
        }

        function spawnTaxCollector(taxDue, oreMined, taxableOre) {
            const edge = Math.floor(rand(0, 4));
            let x, y;

            if (edge === 0) {
                x = rand(0, WORLD_W);
                y = -120;
            } else if (edge === 1) {
                x = WORLD_W + 120;
                y = rand(0, WORLD_H);
            } else if (edge === 2) {
                x = rand(0, WORLD_W);
                y = WORLD_H + 120;
            } else {
                x = -120;
                y = rand(0, WORLD_H);
            }

            taxCollectors.push({
                x,
                y,
                exitX: x,
                exitY: y,
                speed: 2.4,
                state: "inbound",
                taxDue,
                oreMined,
                taxableOre,
                collected: 0,
                angle: 0,
                codename: `TAX-${String(frameCount % 10000).padStart(4, "0")}`
            });
        }

        function resolveTaxCollection(collector) {
            const paid = Math.min(resources.ore, collector.taxDue);

            resources.ore -= paid;

            // Taxes reduce effective debt repayment progress.
            // This is intentionally based on the amount actually collected,
            // not the theoretical tax due.
            totalOreAcquired = Math.max(0, totalOreAcquired - paid);

            collector.collected = paid;

            lastTaxBill = {
                oreMined: collector.oreMined,
                exemptOre: Math.min(collector.oreMined, TAX_FREE_ORE_PER_CYCLE),
                taxableOre: collector.taxableOre,
                taxDue: collector.taxDue,
                paid,
                unpaid: collector.taxDue - paid,
                debtDeducted: paid,
                frame: frameCount
            };

            if (
                !lucrativeLiberationEventUnlocked &&
                collector.taxableOre > 0 &&
                paid > 0
            ) {
                triggerLucrativeLiberationArrival();
            }
        }

        function beginTaxCollectionCycle() {
            const taxableOre = getTaxableOreForCycle();
            const taxDue = getTaxDueForCycle();

            if (taxDue > 0) {
                spawnTaxCollector(taxDue, oreMinedThisTaxCycle, taxableOre);
            } else {

                    oreMined: oreMinedThisTaxCycle,
                    exemptOre: oreMinedThisTaxCycle,
                    taxableOre: 0,
                    taxDue: 0,
                    paid: 0,
                    unpaid: 0,

            taxCycleTimer = TAX_CYCLE_FRAMES;

        function getResourceAmount(type) {
            return resources[type] ?? 0;

        function addResource(type, amount) {
            resources[type] = (resources[type] ?? 0) + amount;

            if (type === "science" && amount > 0) {
                hasDiscoveredScience = true;
            }

            if (type === "metal" && amount > 0) {
                hasDiscoveredMetal = true;
            }

            if (type === "helion" && amount > 0) {
                hasDiscoveredHelion = true;
            }

            if (type === "ore") {
                const wasTaxing = taxesUnlocked;

                totalOreAcquired += amount;

                if (wasTaxing && amount > 0) {
                    oreMinedThisTaxCycle += amount;
                }

                checkOreQuotas();
            }
        }

        function spendResource(type, amount) {
            if ((resources[type] ?? 0) < amount) return false;
            resources[type] -= amount;
            return true;
        }

        function canAffordCost(cost) {
            return Object.entries(cost).every(([type, amount]) =>
                getResourceAmount(type) >= amount
            );
        }

        function spendCost(cost) {
            if (!canAffordCost(cost)) return false;

            for (const [type, amount] of Object.entries(cost)) {
                spendResource(type, amount);
            }

            return true;
        }

        function formatCost(cost) {
            return Object.entries(cost)

        function getBestHyperlaneRouteToPoint(ship, destinationPoint, afterState) {
            if (!canShipUseHyperlane(ship)) return null;
            if (hyperlanes.length <= 0) return null;
            if (!destinationPoint) return null;

            const speed = getEffectiveShipSpeed(ship);
            const normalTime = estimateTravelTime(ship, destinationPoint, speed);

            let bestRoute = null;
            let bestTime = normalTime;

            for (const lane of hyperlanes) {
                const endpoints = getHyperlaneEndpoints(lane);

                // Outbound direction:
                // station-side gate -> destination-side gate
                const timeToEntry = estimateTravelTime(ship, endpoints.from, speed);
                const laneTime = estimateTravelTime(
                    endpoints.from,
                    endpoints.to,
                    HYPERLANE_TRAVEL_SPEED
                );
                const timeAfterExit = estimateTravelTime(
                    endpoints.to,
                    destinationPoint,
                    speed
                );

                const totalTime = timeToEntry + laneTime + timeAfterExit;

                if (totalTime < bestTime) {
                    bestTime = totalTime;
                    bestRoute = {
                        lane,
                        from: endpoints.from,
                        to: endpoints.to,
                        afterState
                    };
                }
            }

            return bestRoute;
        }

        function getBestHyperlaneRouteBackToStation(ship, dockPoint, afterState) {
            if (!canShipUseHyperlane(ship)) return null;
            if (hyperlanes.length <= 0) return null;
            if (!dockPoint) return null;

            const speed = getEffectiveShipSpeed(ship);
            const normalTime = estimateTravelTime(ship, dockPoint, speed);

            let bestRoute = null;
            let bestTime = normalTime;

            for (const lane of hyperlanes) {
                const endpoints = getHyperlaneEndpoints(lane);

                // Return direction:
                // destination-side gate -> station-side gate
                const timeToEntry = estimateTravelTime(ship, endpoints.to, speed);
                const laneTime = estimateTravelTime(
                    endpoints.to,
                    endpoints.from,
                    HYPERLANE_TRAVEL_SPEED
                );
                const timeAfterExit = estimateTravelTime(
                    endpoints.from,
                    dockPoint,
                    speed
                );

                const totalTime = timeToEntry + laneTime + timeAfterExit;

                if (totalTime < bestTime) {
                    bestTime = totalTime;
                    bestRoute = {
                        lane,
                        from: endpoints.to,
                        to: endpoints.from,
                        afterState
                    };
                }
            }

            return bestRoute;
        }

        function startShipHyperlaneTravel(ship, route) {
            if (!route) return false;

            const cost = getHyperlaneUseCostForShip(ship);

            if (!Number.isFinite(cost)) return false;

            if (!spendResource("helion", cost)) {
                return false;
            }

            ship.hyperlane = {
                lane: route.lane,
                from: route.from,
                to: route.to,
                afterState: route.afterState
            };

            ship.state = "hyperlaneEntry";
            return true;
        }

        function updateTaxSystem() {
            if (!taxesUnlocked) return;

            taxCycleTimer--;

            if (taxCycleTimer <= 0) {
                beginTaxCollectionCycle();
            }

            updateTaxCollectors();
        }

        function updateTaxCollectors() {
            for (let i = taxCollectors.length - 1; i >= 0; i--) {
                const collector = taxCollectors[i];

                if (collector.state === "inbound") {
                    const dx = station.x - collector.x;
                    const dy = station.y - collector.y;
                    collector.angle = Math.atan2(dy, dx);

                    const arrived = moveToward(
                        collector,
                        station.x,
                        station.y,
                        collector.speed
                    );

                    if (arrived) {
                        resolveTaxCollection(collector);
                        collector.state = "outbound";
                    }

                    continue;
                }

                if (collector.state === "outbound") {
                    const dx = collector.exitX - collector.x;
                    const dy = collector.exitY - collector.y;
                    collector.angle = Math.atan2(dy, dx);

                    const left = moveToward(
                        collector,
                        collector.exitX,
                        collector.exitY,
                        collector.speed * 1.4
                    );

                    if (left) {
                        taxCollectors.splice(i, 1);
                    }
                }
            }
        }

        function updateShipHyperlaneTravel(ship) {
            if (!ship.hyperlane) {
                ship.state = "seeking";
                return;

            if (ship.state === "hyperlaneEntry") {
                const arrived = moveToward(
                    ship,
                    ship.hyperlane.from.x,
                    ship.hyperlane.from.y,
                    getEffectiveShipSpeed(ship)
                );

                if (arrived) {
                    ship.state = "hyperlaneTravel";
                }

                return;
            }

            if (ship.state === "hyperlaneTravel") {
                const arrived = moveToward(
                    ship,
                    ship.hyperlane.to.x,
                    ship.hyperlane.to.y,
                    HYPERLANE_TRAVEL_SPEED
                );

                if (arrived) {
                    const afterState = ship.hyperlane.afterState;
                    ship.hyperlane = null;
                    ship.state = afterState;

        function createNebulaPois(baseRadius) {
            const count = Math.random() < 0.5 ? 1 : 2;
            const pois = [];

            for (let i = 0; i < count; i++) {
                let placed = false;

                for (let attempt = 0; attempt < 40 && !placed; attempt++) {
                    const angle = rand(0, Math.PI * 2);
                    const dist = rand(baseRadius * 0.18, baseRadius * 0.58);
                    const radius = rand(25, 40);

                    const candidate = {
                        angle,
                        dist,
                        radius,
                        phase: rand(0, Math.PI * 2)
                    };

                    const overlaps = pois.some(existing => {
                        const ax = Math.cos(candidate.angle) * candidate.dist;
                        const ay = Math.sin(candidate.angle) * candidate.dist;
                        const bx = Math.cos(existing.angle) * existing.dist;
                        const by = Math.sin(existing.angle) * existing.dist;

                        const minDist = candidate.radius + existing.radius + 24;
                        const dx = ax - bx;
                        const dy = ay - by;

                        return dx * dx + dy * dy < minDist * minDist;
                    });

                    if (!overlaps) {
                        pois.push(candidate);
                        placed = true;
                    }
                }
            }

            return pois;
        }

        function makeNebula(i, existingNebulas) {
            for (let attempt = 0; attempt < 800; attempt++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(
                    NEBULA_MIN_DISTANCE_FROM_STATION,
                    NEBULA_MAX_DISTANCE_FROM_STATION
                );

                const radius = rand(420, 900);
                const scaleX = rand(0.85, 1.8);
                const scaleY = rand(0.55, 1.15);

                const x = station.x + Math.cos(angle) * dist;
                const y = station.y + Math.sin(angle) * dist;

                if (
                    x < NEBULA_EDGE_MARGIN ||
                    x > WORLD_W - NEBULA_EDGE_MARGIN ||
                    y < NEBULA_EDGE_MARGIN ||
                    y > WORLD_H - NEBULA_EDGE_MARGIN
                ) {
                    continue;
                }

                const visualRadius = radius * Math.max(scaleX, scaleY);
                const tooCloseToStar = celestialBodies.some(body => {
                    if (body.type !== "STAR") return false;

                    const minDist =
                        NEBULA_MIN_DISTANCE_FROM_STARS +
                        body.radius +
                        visualRadius * 0.15;

                    return distSq({ x, y }, body) < minDist * minDist;
                });

                if (tooCloseToStar) continue;
                const overlaps = existingNebulas.some(n => {
                    const otherVisualRadius = n.radius * Math.max(n.scaleX, n.scaleY);
                    const minDist = (visualRadius + otherVisualRadius) * 0.45;

                    return distSq({ x, y }, n) < minDist * minDist;
                });

                if (overlaps) continue;

                return {
                    x,
                    y,
                    radius,
                    scaleX,
                    scaleY,
                    rotation: 0, //rand(0, Math.PI * 2),
                    color: pick(NEBULA_COLOR_SETS),
                    alpha: rand(0.5, 0.8),
                    phase: rand(0, Math.PI * 2),
                    pulseSpeed: rand(0.006, 0.014),
                    puffs: createNebulaPuffs(radius),
                    filaments: createNebulaFilaments(radius),
                    dust: createNebulaDust(radius),
                    gaps: createNebulaGaps(radius),
                    pois: createNebulaPois(radius)
                };
            }

            for (let attempt = 0; attempt < 360; attempt++) {
                const angle =
                    (i / NEBULA_COUNT) * Math.PI * 2 +
                    (attempt / 360) * Math.PI * 2;

                const dist = rand(
                    NEBULA_MIN_DISTANCE_FROM_STATION + 160,
                    NEBULA_MAX_DISTANCE_FROM_STATION - 120
                );

                const radius = rand(480, 760);
                const scaleX = rand(0.9, 1.6);
                const scaleY = rand(0.6, 1.1);

                const x = station.x + Math.cos(angle) * dist;
                const y = station.y + Math.sin(angle) * dist;

                if (
                    x < NEBULA_EDGE_MARGIN ||
                    x > WORLD_W - NEBULA_EDGE_MARGIN ||
                    y < NEBULA_EDGE_MARGIN ||
                    y > WORLD_H - NEBULA_EDGE_MARGIN
                ) {
                    continue;
                }

                const visualRadius = radius * Math.max(scaleX, scaleY);

                const tooCloseToStar = celestialBodies.some(body => {
                    if (body.type !== "STAR") return false;

                    const minDist =
                        NEBULA_MIN_DISTANCE_FROM_STARS +
                        body.radius +
                        visualRadius * 0.15;

                    return distSq({ x, y }, body) < minDist * minDist;
                });

                if (tooCloseToStar) continue;

                return {
                    x,
                    y,
                    radius,
                    scaleX,
                    scaleY,
                    rotation: 0, // rand(0, Math.PI * 2),
                    color: pick(NEBULA_COLOR_SETS),
                    alpha: rand(0.5, 0.8),
                    phase: rand(0, Math.PI * 2),
                    pulseSpeed: rand(0.006, 0.014),
                    puffs: createNebulaPuffs(radius),
                    filaments: createNebulaFilaments(radius),
                    dust: createNebulaDust(radius),
                    gaps: createNebulaGaps(radius),
                    pois: createNebulaPois(radius)
                };
            }

            const radius = 560;
            const x = station.x + Math.cos((i / NEBULA_COUNT) * Math.PI * 2) * (NEBULA_MAX_DISTANCE_FROM_STATION - 200);
            const y = station.y + Math.sin((i / NEBULA_COUNT) * Math.PI * 2) * (NEBULA_MAX_DISTANCE_FROM_STATION - 200);

            return {
                x,
                y,
                radius,
                scaleX: 1.2,
                scaleY: 0.85,
                rotation: 0, //rand(0, Math.PI * 2),
                color: pick(NEBULA_COLOR_SETS),
                alpha: rand(0.5, 0.8),
                phase: rand(0, Math.PI * 2),
                pulseSpeed: rand(0.006, 0.014),
                puffs: createNebulaPuffs(radius),
                filaments: createNebulaFilaments(radius),
                dust: createNebulaDust(radius),
                gaps: createNebulaGaps(radius),
                pois: createNebulaPois(radius)
            };
        }

        function getModuleById(id) {
            return stationModules.find(m => m.id === id);
        }

        function distSq(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return dx * dx + dy * dy;
        }

        function isInModuleRange(module, target) {
            if (!module.range) return true;
            return distSq(module, target) <= module.range * module.range;
        }

        function getObservedBodies() {
            return [...new Set(
                observatoryArrays
                    .filter(a => a.target)
                    .map(a => a.target)
            )];
        }

        function getAssignedProbeCount(body) {
            return scienceProbes.filter(p => p.target === body).length;
        }

        function getOrbitingProbeCount(body) {
            return scienceProbes.filter(p =>
                p.state === "orbiting" && p.target === body
            ).length;
        }

        function chooseProbeTarget() {
            const observedBodies = getObservedBodies();
            if (observedBodies.length <= 0) return null;

            return observedBodies
                .slice()
                .sort((a, b) => {
                    const assignedDiff = getAssignedProbeCount(a) - getAssignedProbeCount(b);
                    if (assignedDiff !== 0) return assignedDiff;

                    return b.sciencePerSecond - a.sciencePerSecond;
                })[0];
        }

        function updateLiberationCorvette(ship) {
            const speed = getEffectiveShipSpeed(ship);
            const cargoMax = getEffectiveCargoMax(ship);

            if (ship.state === "toStation") {
                ship.targetX = station.x;
                ship.targetY = station.y;

                const arrived = moveToward(ship, station.x, station.y, speed);

                if (arrived) {
                    ship.state = "loading";
                }

                return;
            }

            if (ship.state === "loading") {
                const sheltered = shelterTaxableOre(cargoMax);

                if (sheltered > 0) {
                    ship.cargo = sheltered;
                    ship.exitPoint = getRandomSectorExitPoint();
                    ship.targetX = ship.exitPoint.x;
                    ship.targetY = ship.exitPoint.y;
                    ship.state = "offsector";
                } else {
                    // Nothing taxable yet. Loiter near station and try again.
                    const orbitAngle = frameCount * 0.01 + ship.x * 0.001;
                    const loiterX = station.x + Math.cos(orbitAngle) * 115;
                    const loiterY = station.y + Math.sin(orbitAngle) * 115;

                    moveToward(ship, loiterX, loiterY, speed * 0.45);
                }

                return;
            }

            if (ship.state === "offsector") {
                const arrived = moveToward(
                    ship,
                    ship.exitPoint.x,
                    ship.exitPoint.y,
                    speed
                );

                if (arrived) {
                    // Cargo is already removed from the taxable cycle.
                    // This just represents the off-sector delivery completing.
                    ship.cargo = 0;
                    ship.state = "toStation";
                }

                return;
            }
        }

        function findWreckParkingSpot() {
            for (let attempt = 0; attempt < 500; attempt++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(500, 750);

                const spot = {
                    x: station.x + Math.cos(angle) * dist,
                    y: station.y + Math.sin(angle) * dist
                };

                const tooCloseToAsteroid = asteroids.some(a => {
                    const dx = spot.x - a.x;
                    const dy = spot.y - a.y;
                    return dx * dx + dy * dy < 180 * 180;
                });

                const tooCloseToCelestial = celestialBodies.some(b => {
                    const dx = spot.x - b.x;
                    const dy = spot.y - b.y;
                    return dx * dx + dy * dy < 280 * 280;
                });

                const tooCloseToWreck = salvageSlots.some(s => {
                    if (!s.wreck) return false;
                    const dx = spot.x - s.wreck.x;
                    const dy = spot.y - s.wreck.y;
                    return dx * dx + dy * dy < 220 * 220;
                });

                if (!tooCloseToAsteroid && !tooCloseToCelestial && !tooCloseToWreck) {
                    return spot;
                }
            }

            return {
                x: station.x + rand(-750, 750),
                y: station.y + rand(-750, 750)
            };
        }

        function getWreckQualityCost() {
            return {
                science: Math.floor(400 * Math.pow(2, upgrades.wreckQuality.level))
            };
        }

        function getWreckHaulingSpeedCost() {
            return {
                science: Math.floor(350 * Math.pow(2, upgrades.wreckHaulingSpeed.level))
            };
        }

        function getWreckMetalMultiplier() {
            return 1 + upgrades.wreckQuality.level * WRECK_QUALITY_METAL_BONUS;
        }

        function getSalvageWreckCooldown() {
            const multiplier = Math.pow(
                1 - SALVAGE_COOLDOWN_REDUCTION,
                upgrades.wreckHaulingSpeed.level
            );

            return Math.max(
                SALVAGE_WRECK_COOLDOWN_MIN,
                Math.floor(SALVAGE_WRECK_COOLDOWN * multiplier)
            );
        }

        function formatSecondsFromFrames(frames) {
            return `${Math.ceil(frames / 60)}s`;
        }

        function makeWreck(slot, x, y) {
            const radius = rand(42, 68);
            const verts = [];
            const sides = 10;

            for (let i = 0; i < sides; i++) {
                const t = (i / sides) * Math.PI * 2;
                const r = radius * rand(0.55, 1.25);

                verts.push({
                    x: Math.cos(t) * r,
                    y: Math.sin(t) * r
                });
            }

            const baseMetal = Math.floor(rand(4000, 5000));
            const metal = Math.floor(baseMetal * getWreckMetalMultiplier());

            return {
                x,
                y,
                radius,
                verts,
                metal,
                maxMetal: metal,
                resourceType: "metal",
                codename: `WRECK-${String(slot.id).padStart(2, "0")}`,
                fading: false,
                fade: 1
            };
        }

        function startSalvageHauler(slot) {
            const edge = Math.floor(rand(0, 4));
            let x, y;

            if (edge === 0) {
                x = rand(0, WORLD_W);
                y = -80;
            } else if (edge === 1) {
                x = WORLD_W + 80;
                y = rand(0, WORLD_H);
            } else if (edge === 2) {
                x = rand(0, WORLD_W);
                y = WORLD_H + 80;
            } else {
                x = -80;
                y = rand(0, WORLD_H);
            }

            const parkingSpot = findWreckParkingSpot();

            slot.state = "hauling";
            slot.hauler = {
                x,
                y,
                angle: 0,
                speed: 2.0,
                targetX: parkingSpot.x,
                targetY: parkingSpot.y,
                exitX: x,
                exitY: y,
                wreckOffsetX: -34,
                wreckOffsetY: 0,
                state: "inbound",
                codename: `HAULER-${String(slot.id).padStart(2, "0")}`
            };

            slot.wreck = makeWreck(slot, x + slot.hauler.wreckOffsetX, y + slot.hauler.wreckOffsetY);
        }

        function updateSalvageSlot(slot) {
            if (slot.state === "cooldown") {
                slot.cooldown--;

                if (slot.cooldown <= 0) {
                    startSalvageHauler(slot);
                }

                return;
            }

            if (slot.state === "hauling") {
                const h = slot.hauler;

                if (h.state === "inbound") {
                    const dx = h.targetX - h.x;
                    const dy = h.targetY - h.y;
                    h.angle = Math.atan2(dy, dx);

                    const arrived = moveToward(h, h.targetX, h.targetY, h.speed);

                    slot.wreck.x = h.x + h.wreckOffsetX;
                    slot.wreck.y = h.y + h.wreckOffsetY;

                    if (arrived) {
                        h.state = "leaving";
                        slot.wreck.x = h.targetX;
                        slot.wreck.y = h.targetY;
                    }
                } else if (h.state === "leaving") {
                    const dx = h.exitX - h.x;
                    const dy = h.exitY - h.y;
                    h.angle = Math.atan2(dy, dx);

                    const left = moveToward(h, h.exitX, h.exitY, h.speed * 1.35);

                    if (left) {
                        slot.hauler = null;
                        slot.state = "parked";
                    }
                }

                return;
            }

            if (slot.state === "parked") {
                if (slot.wreck && slot.wreck.metal <= 0 && !slot.wreck.fading) {
                    slot.wreck.fading = true;
                    slot.wreck.fade = 1;
                }

                if (slot.wreck && slot.wreck.fading) {
                    slot.wreck.fade -= 0.025;

                    if (slot.wreck.fade <= 0) {
                        slot.wreck = null;
                        slot.state = "cooldown";
                        slot.cooldown = getSalvageWreckCooldown();
                    }
                }
            }
        }

        function formatEtaFrames(frames) {
            frames = Math.max(0, Math.ceil(frames));

            const totalSeconds = Math.ceil(frames / 60);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            if (minutes <= 0) {
                return `${seconds}s`;
            }

            return `${minutes}:${String(seconds).padStart(2, "0")}`;
        }

        function getHaulerInboundEtaFrames(slot) {
            if (!slot.hauler) return null;
            if (slot.state !== "hauling") return null;
            if (slot.hauler.state !== "inbound") return null;

            const h = slot.hauler;
            const dx = h.targetX - h.x;
            const dy = h.targetY - h.y;
            const distance = Math.hypot(dx, dy);

            return distance / h.speed;
        }

        function getSalvageHudRows() {
            const rows = [];

            for (const slot of salvageSlots) {
                const id = String(slot.id).padStart(2, "0");

                if (slot.state === "cooldown") {
                    rows.push({
                        label: `SLOT-${id}`,
                        status: `NEXT WRECK IN ${formatEtaFrames(slot.cooldown)}`
                    });
                    continue;
                }

                if (slot.state === "hauling" && slot.hauler?.state === "inbound") {
                    const eta = getHaulerInboundEtaFrames(slot);

                    rows.push({
                        label: `SLOT-${id}`,
                        status: `HAULER INBOUND // ETA ${formatEtaFrames(eta)}`
                    });
                    continue;
                }

                if (slot.state === "hauling" && slot.hauler?.state === "leaving") {
                    rows.push({
                        label: `SLOT-${id}`,
                        status: "WRECK DELIVERED // HAULER EXITING"
                    });
                    continue;
                }

                if (slot.state === "parked" && slot.wreck && !slot.wreck.fading) {
                    rows.push({
                        label: `SLOT-${id}`,
                        status: `${slot.wreck.codename} PARKED // ${slot.wreck.metal}/${slot.wreck.maxMetal} METAL`
                    });
                    continue;
                }

                if (slot.state === "parked" && slot.wreck?.fading) {
                    rows.push({
                        label: `SLOT-${id}`,
                        status: "WRECK DEPLETED // CLEARING SITE"
                    });
                }
            }

            return rows;
        }

        function updateSalvage() {
            for (const slot of salvageSlots) {
                updateSalvageSlot(slot);
            }
        }

        function getActiveWrecks() {
            return salvageSlots
                .filter(s =>
                    s.wreck &&
                    (
                        s.state === "parked" ||
                        (s.state === "hauling" && s.hauler?.state === "leaving")
                    )
                )
                .map(s => s.wreck);
        }

        function getHoveredDroneShip() {
            for (let i = ships.length - 1; i >= 0; i--) {
                const ship = ships[i];

                if (ship.kind !== "droneCarrier") continue;
                if (pointInModule(mouseX, mouseY, ship)) return ship;
            }

            return null;
        }

        function getHoveredTarget() {
            const module = getHoveredModule();

            if (module) {
                return { type: "module", object: module };
            }

            const liberationShip = getHoveredLucrativeLiberationShip();

            if (liberationShip) {
                return { type: "liberationShip", object: liberationShip };
            }

            const droneShip = getHoveredDroneShip();

            if (droneShip) {
                return { type: "droneShip", object: droneShip };
            }

            for (const body of celestialBodies) {
                if (pointInCelestialBody(mouseX, mouseY, body)) {
                    return { type: "celestial", object: body };
                }
            }

            for (const wreck of getActiveWrecks()) {
                if (wreck.metal > 0 && pointInAsteroid(mouseX, mouseY, wreck)) {
                    return { type: "wreck", object: wreck };
                }
            }

            for (const asteroid of asteroids) {
                if (asteroid.ore > 0 && pointInAsteroid(mouseX, mouseY, asteroid)) {
                    return { type: "asteroid", object: asteroid };
                }
            }

            return null;
        }

        function pointInCelestialBody(mx, my, body) {
            const dx = mx - body.x;
            const dy = my - body.y;
            return dx * dx + dy * dy <= body.radius * body.radius;
        }

        function assignArrayToCelestialBody(body) {
            const observatory = getModuleById("observatory");
            if (!observatory) return;
            if (!isInModuleRange(observatory, body)) return;
            if (observatoryArrays.length <= 0) return;

            // Already observed: do nothing.
            if (observatoryArrays.some(a => a.target === body)) {
                return;
            }

            let array = observatoryArrays.find(a => !a.target);

            if (!array) {
                array = observatoryArrays.reduce((oldest, current) =>
                    current.assignedAt < oldest.assignedAt ? current : oldest
                );
            }

            array.target = body;
            array.assignedAt = ++arrayAssignSerial;

            retargetScienceProbes();
        }

        function retargetScienceProbes() {
            const observedBodies = getObservedBodies();

            if (observedBodies.length <= 0) {
                for (const probe of scienceProbes) {
                    probe.target = null;
                    probe.state = "idle";
                }
                return;
            }

            const sortedBodies = observedBodies
                .slice()
                .sort((a, b) => b.sciencePerSecond - a.sciencePerSecond);

            const desiredTargets = [];

            for (let i = 0; i < scienceProbes.length; i++) {
                desiredTargets.push(sortedBodies[i % sortedBodies.length]);
            }

            scienceProbes.forEach((probe, i) => {
                const desiredTarget = desiredTargets[i];

                if (probe.target !== desiredTarget) {
                    probe.target = desiredTarget;
                    probe.state = "traveling";
                }
            });
        }

        function updateSoundCombos() {
            if (oreGatherComboTimer > 0) {
                oreGatherComboTimer--;
            } else {
                oreGatherCombo = 0;
                oreGatherChunks = 0; // 👈 important
                queuedOreGatherSounds.length = 0;
            }
        }

        function queueOreGatherSound() {
            oreGatherChunks++;
            oreGatherComboTimer = ORE_GATHER_COMBO_WINDOW;

            oreGatherCombo = Math.floor(oreGatherChunks / CHUNKS_PER_COMBO);

            const MAX_COMBO = 20;
            const MAX_PITCH = 1.9;

            const normalized = Math.min(1, oreGatherCombo / MAX_COMBO);
            const pitch = 1 + normalized * (MAX_PITCH - 1);

            queuedOreGatherSounds.push({
                volume: 0.22,
                volumeVar: 0.04,
                pitch,
                pitchVar: 0.025
            });
        }

        function updateOreGatherSoundQueue() {
            if (oreGatherSoundDelay > 0) {
                oreGatherSoundDelay--;
                return;
            }

            if (queuedOreGatherSounds.length <= 0) return;

            const soundOptions = queuedOreGatherSounds.shift();
            playSound("oreGather", soundOptions);

            oreGatherSoundDelay = ORE_GATHER_SOUND_SPACING;
        }

        function updateScienceProduction() {
            scienceTickTimer++;

            if (scienceTickTimer < scienceTickInterval) return;

            scienceTickTimer = 0;

            for (const array of observatoryArrays) {
                if (!array.target) continue;

                const orbitingProbes = getOrbitingProbeCount(array.target);
                const multiplier = 1 + orbitingProbes;

                addResource(
                    "science",
                    Math.floor(array.target.sciencePerSecond * multiplier)
                );
            }
        }

        const MIN_CELESTIAL_BODY_DISTANCE = 1200;

        function makeCelestialBodyAtDistance(
            type,
            codename,
            distMin,
            distMax,
            radiusMin,
            radiusMax,
            scienceMin,
            scienceMax,
            minBodyDistance = MIN_CELESTIAL_BODY_DISTANCE
        ) {
            let x, y;
            let attempts = 0;

            do {
                const angle = Math.random() * Math.PI * 2;
                const dist = rand(distMin, distMax);

                x = station.x + Math.cos(angle) * dist;
                y = station.y + Math.sin(angle) * dist;

                attempts++;
            } while (
                attempts < 300 &&
                celestialBodies.some(body => {
                    const dx = x - body.x;
                    const dy = y - body.y;
                    return dx * dx + dy * dy < minBodyDistance * minBodyDistance;
                })
            );

            return {
                x,
                y,
                radius: rand(radiusMin, radiusMax),
                type,
                codename,
                sciencePerSecond: Math.floor(rand(scienceMin, scienceMax))
            };
        }

        function spawnAsteroidBeltAround(body, count = 10) {
            let spawned = 0;
            let attempts = 0;
            body.hasAsteroidBelt = true;
            const maxAttempts = count * 80;

            while (spawned < count && attempts < maxAttempts) {
                attempts++;

                const angle = Math.random() * Math.PI * 2;
                const dist = rand(body.radius + 90, body.radius + 220);
                const radius = rand(14, 34);

                const x = body.x + Math.cos(angle) * dist;
                const y = body.y + Math.sin(angle) * dist;

                const overlaps = asteroids.some(a => {
                    const dx = x - a.x;
                    const dy = y - a.y;
                    const minDist = radius + a.radius + 12;
                    return dx * dx + dy * dy < minDist * minDist;
                });

                if (overlaps) continue;

                const verts = [];
                const sides = Math.floor(rand(7, 13));

                for (let a = 0; a < sides; a++) {
                    const t = (a / sides) * Math.PI * 2;
                    const r = radius * rand(0.65, 1.25);

                    verts.push({
                        x: Math.cos(t) * r,
                        y: Math.sin(t) * r
                    });
                }

                const ore = Infinity; // Math.floor(rand(800, 12000));

                asteroids.push({
                    x,
                    y,
                    radius,
                    verts,
                    ore,
                    maxOre: ore,
                    resourceType: "richOre",
                    beltParent: body,
                    codename: `${body.codename}-RICH-${String(spawned + 1).padStart(2, "0")}`
                });

                spawned++;
            }
        }

        function makeAsteroid(i, existingAsteroids) {

                x = station.x + Math.cos(angle) * dist;
                y = station.y + Math.sin(angle) * dist;
                radius = rand(28, 62);

                attempts++;
            } while (
                attempts < 200 &&
                existingAsteroids.some(a => {
                    const dx = x - a.x;
                    const dy = y - a.y;
                    const minDist = radius + a.radius + 28;
                    return dx * dx + dy * dy < minDist * minDist;
                })
            );

            const verts = [];
            const sides = Math.floor(rand(8, 15));

            for (let a = 0; a < sides; a++) {
                const t = (a / sides) * Math.PI * 2;
                const r = radius * rand(0.65, 1.2);
                verts.push({
                    x: Math.cos(t) * r,
                    y: Math.sin(t) * r
                });
            }

            return {
                x,
                y,
                radius,
                verts,
                ore: Infinity, // Math.floor(rand(1000, 50000)),
                maxOre: Infinity,
                codename: `${pick(codenamePrefixes)}-${String(i + 1).padStart(2, "0")}`
            };
        }

        const asteroids = [];

        for (let i = 0; i < 12; i++) {
            asteroids.push(makeAsteroid(i, asteroids));
        }

        let body;

        body = makeCelestialBodyAtDistance("PLANET", "NYX-1", 800, 800, 24, 38, 2, 2);
        celestialBodies.push(body);

        body = makeCelestialBodyAtDistance("PLANET", "NYX-2", 800, 800, 24, 38, 2, 2);
        celestialBodies.push(body);

        body = makeCelestialBodyAtDistance("PLANET", "NYX-3", 800, 800, 24, 38, 2, 2);
        celestialBodies.push(body);

        body = makeCelestialBodyAtDistance("PLANET", "TERA-4", 1600, 1900, 24, 38, 2, 5);
        celestialBodies.push(body);
        spawnAsteroidBeltAround(body, 6);

        body = makeCelestialBodyAtDistance("PLANET", "ORION-7", 1600, 1900, 28, 44, 3, 6);
        celestialBodies.push(body);
        spawnAsteroidBeltAround(body, 8);

        body = makeCelestialBodyAtDistance("PLANET", "LYRA-2", 1600, 1900, 22, 36, 2, 5);
        celestialBodies.push(body);

        body = makeCelestialBodyAtDistance("PLANET", "VANTA-9", 1600, 1900, 30, 48, 4, 7);
        celestialBodies.push(body);
        spawnAsteroidBeltAround(body, 12);

        // stars
        body = makeCelestialBodyAtDistance("STAR", "SOLACE-C", 2600, 2900, 38, 58, 12, 24);
        celestialBodies.push(body);

        body = makeCelestialBodyAtDistance("STAR", "MERCY-D", 2600, 2900, 42, 64, 16, 28);
        celestialBodies.push(body);

        body = makeCelestialBodyAtDistance("STAR", "VIGIL-E", 2600, 2900, 46, 70, 20, 32);
        celestialBodies.push(body);

        for (let i = 0; i < NEBULA_COUNT; i++) {
            nebulas.push(makeNebula(i, nebulas));
        }

        function getShipSpeedMultiplier() {
            return 1 + upgrades.shipSpeed.level * SHIP_SPEED_MULTIPLIER;
        }

        function getCargoCapacityMultiplier() {
            return 1 + upgrades.cargoCapacity.level * SHIP_CARGO_MULTIPLIER;
        }

        function getEffectiveShipSpeed(ship) {
            const kind = ship.kind || "miningFrigate";

            // Large ships are intentionally slow and are NOT affected
            // by Small Shipyard speed upgrades.
            if (kind === "starSiphoner") {
                return ship.baseSpeed ?? STAR_SIPHONER_BASE_SPEED;
            }

            if (kind === "liberationCorvette") {
                return ship.baseSpeed ?? LIBERATION_CORVETTE_BASE_SPEED;
            }

            if (kind === "transportShip") {
                return ship.baseSpeed ?? TRANSPORT_SHIP_BASE_SPEED;
            }

            const baseSpeed = ship.baseSpeed ?? getEffectiveShipSpeed(ship) ?? 1;

            return baseSpeed * getShipSpeedMultiplier();
        }

        function getEffectiveCargoMax(ship) {
            const kind = ship.kind || "miningFrigate";

            // Helion Siphoners use Large Shipyard cargo upgrades only.
            if (kind === "starSiphoner") {
                return getStarSiphonerCargoMax();
            }

            if (kind === "liberationCorvette") {
                return getLiberationCorvetteCargoMax();
            }

            if (kind === "transportShip") {
                return getEffectiveTransportCargoMax(ship);
            }

            // Drone carriers do not carry resources.
            if (kind === "droneCarrier") {
                return 0;
            }

            const baseCargoMax = ship.baseCargoMax ?? getEffectiveCargoMax(ship) ?? 0;

            return Math.floor(baseCargoMax * getCargoCapacityMultiplier());
        }

        function getMiningInterval() {
            return 14;
        }

        function getMiningAmountPerTick() {
            return 1 + upgrades.miningSpeed.level;
        }

        function countShipsByKind(kind) {
            return ships.filter(s => (s.kind || "miningFrigate") === kind).length;
        }

        function getDroneShipSchematicCost() {
            return 350;
        }

        function getSalvagingShipSchematicCost() {
            return 250;
        }

        function getDroneShipCost() {
            return Math.floor(220 * Math.pow(1.85, countShipsByKind("droneCarrier")));
        }

        function getSalvagingShipCost() {
            return Math.floor(120 * Math.pow(1.75, countShipsByKind("salvageShip")));
        }

        function getMiningDroneCost(carrier) {
            const count = carrier.drones.filter(d => d.droneType === "mining").length;
            return Math.floor(45 * Math.pow(1.55, count));
        }

        function getSalvagingDroneCost(carrier) {
            const count = carrier.drones.filter(d => d.droneType === "salvaging").length;
            return Math.floor(55 * Math.pow(1.55, count));
        }

        function getShipyardStandbyCenter() {
            return getModuleById("smallShipyard") || station;
        }

        function shouldUseStandbyFormation(ship) {
            const kind = ship.kind || "miningFrigate";

            if (kind === "droneCarrier" && ship.drones.length <= 0) {
                return true;
            }

            return ship.state === "standby" || ship.state === "idle";
        }

        function getStandbyFormationIndex(ship) {
            return ships
                .filter(shouldUseStandbyFormation)
                .indexOf(ship);
        }

        function getShipStandbyPosition(ship) {
            const center = getShipyardStandbyCenter();
            const index = Math.max(0, getStandbyFormationIndex(ship));

            const ring = Math.floor(index / SHIP_STANDBY_RING_SIZE);
            const slot = index % SHIP_STANDBY_RING_SIZE;

            const slotsInRing = SHIP_STANDBY_RING_SIZE + ring * 4;
            const radius = SHIP_STANDBY_BASE_RADIUS + ring * SHIP_STANDBY_RING_GAP;

            // Offset angle so the first few ships don't sit directly over the station.
            const angle =
                -Math.PI / 2 +
                (slot / slotsInRing) * Math.PI * 2 +
                ring * 0.28;

            return {
                x: center.x + Math.cos(angle) * radius,
                y: center.y + Math.sin(angle) * radius
            };
        }

        function updateShipStandbyPosition(ship) {
            const pos = getShipStandbyPosition(ship);

            ship.target = null;
            ship.targetX = pos.x;
            ship.targetY = pos.y;
            ship.state = "standby";

            moveToward(ship, pos.x, pos.y, getEffectiveShipSpeed(ship) * 0.75);
        }

        function shouldStandbyShipRetryWork(ship) {
            ship.standbySearchTimer = (ship.standbySearchTimer || 0) + 1;

            if (ship.standbySearchTimer >= SHIP_STANDBY_RETRY_INTERVAL) {
                ship.standbySearchTimer = 0;
                return true;
            }

            return false;
        }

        function openHyperlaneScreen() {
            activeHyperlaneScreen = true;
            activeMenu = null;
        }

        function closeHyperlaneScreen() {
            activeHyperlaneScreen = false;
        }

        function getHyperlaneTargets() {
            return celestialBodies.filter(body =>
                body.type === "STAR" ||
                body.hasAsteroidBelt
            );
        }

        function handleHyperlaneScreenClick(sx, sy) {
            const layout = getHyperlaneMapLayout();

            const dxClose = sx - layout.closeX;
            const dyClose = sy - layout.closeY;

            if (dxClose * dxClose + dyClose * dyClose <= layout.closeR * layout.closeR) {
                closeHyperlaneScreen();
                return true;
            }

            for (const body of getHyperlaneTargets()) {
                if (hasHyperlaneTo(body)) continue;

                const p = worldToHyperlaneMap(body.x, body.y, layout);
                const dx = sx - p.x;
                const dy = sy - p.y;

                if (dx * dx + dy * dy <= 18 * 18) {
                    const cost = getHyperlaneBuildCost();

                    if (!canAffordCost(cost)) {
                        return true;
                    }

                    if (spendCost(cost)) {
                        buildHyperlaneTo(body);
                        closeHyperlaneScreen();
                    }

                    return true;
                }
            }

            return true;
        }

        function hasHyperlaneTo(body) {
            return hyperlanes.some(lane => lane.destination === body);
        }

        function buildHyperlaneTo(body) {
            if (!body) return false;
            if (hasHyperlaneTo(body)) return false;

            hyperlanes.push({
                destination: body,
                codename: `LANE-${String(hyperlanes.length + 1).padStart(2, "0")}`
            });

            return true;
        }

        function getHyperlaneStationEndpoint(destination) {
            if (!destination) {
                return {
                    x: station.x,
                    y: station.y
                };
            }

            const dx = destination.x - station.x;
            const dy = destination.y - station.y;
            const d = Math.hypot(dx, dy) || 1;

            return {
                x: station.x + dx / d * HYPERLANE_STATION_STANDOFF,
                y: station.y + dy / d * HYPERLANE_STATION_STANDOFF
            };
        }

        function getHyperlaneBodyEndpoint(body) {
            const dx = station.x - body.x;
            const dy = station.y - body.y;
            const d = Math.hypot(dx, dy) || 1;

            return {
                x: body.x + dx / d * (body.radius + HYPERLANE_BODY_STANDOFF),
                y: body.y + dy / d * (body.radius + HYPERLANE_BODY_STANDOFF)
            };
        }

        function getHyperlaneEndpoints(lane) {
            return {
                from: getHyperlaneStationEndpoint(lane.destination),
                to: getHyperlaneBodyEndpoint(lane.destination)
            };
        }

        function canUseHyperlane() {
            return getResourceAmount("helion") >= HYPERLANE_SIPHONER_COST;
        }

        function getRandomSectorExitPoint() {
            const edge = Math.floor(rand(0, 4));

            if (edge === 0) {
                return { x: rand(0, WORLD_W), y: -180 };
            }

            if (edge === 1) {
                return { x: WORLD_W + 180, y: rand(0, WORLD_H) };
            }

            if (edge === 2) {
                return { x: rand(0, WORLD_W), y: WORLD_H + 180 };
            }

            return { x: -180, y: rand(0, WORLD_H) };
        }

        function makeLiberationCorvette(i) {
            const spawn = lucrativeLiberationShip || station;

            return {
                kind: "liberationCorvette",
                x: spawn.x + rand(-40, 40),
                y: spawn.y + rand(-40, 40),
                baseSpeed: LIBERATION_CORVETTE_BASE_SPEED,
                cargo: 0,
                state: "toStation",
                targetX: station.x,
                targetY: station.y,
                exitPoint: getRandomSectorExitPoint(),
                codename: `LLC-CORVETTE-${String(i + 1).padStart(2, "0")}`
            };
        }

        function makeTransportShip(i) {
            return {
                kind: "transportShip",
                x: station.x + rand(-50, 50),
                y: station.y + rand(-50, 50),
                baseSpeed: TRANSPORT_SHIP_BASE_SPEED,
                baseCargoMax: TRANSPORT_SHIP_CARGO_BASE,
                baseShipSlots: TRANSPORT_SHIP_SLOT_BASE,

                cargo: 0,
                targetSite: null,
                parkingPoint: null,
                targetX: station.x,
                targetY: station.y,

                state: "seekingSite",

                gravTimer: 0,
                passengerSerial: 0,

                codename: `TRANSPORT-${String(i + 1).padStart(2, "0")}`
            };
        }

        function getRichAsteroidsForSite(site) {
            return asteroids.filter(a =>
                a.beltParent === site &&
                isRichOreTarget(a) &&
                a.ore > 0
            );
        }

        function isTransportMiningSiteActive(site) {
            return !!site && getRichAsteroidsForSite(site).length > 0;
        }

        function getTransportMiningSites() {
            return celestialBodies.filter(body =>
                body.hasAsteroidBelt &&
                isTransportMiningSiteActive(body)
            );
        }

        function getTransportSiteOreValue(site) {
            return getRichAsteroidsForSite(site)
                .reduce((sum, a) => sum + a.ore * RICH_ORE_VALUE_MULTIPLIER, 0);
        }

        function chooseTransportMiningSite(transport) {
            const sites = getTransportMiningSites();

            if (!sites.length) return null;

            sites.sort((a, b) => {
                const timeA = estimateTransportTravelTimeToSite(transport, a);
                const timeB = estimateTransportTravelTimeToSite(transport, b);

                if (timeA !== timeB) {
                    return timeA - timeB;
                }

                // Tie-breaker: richer belts first.
                const valueDiff = getTransportSiteOreValue(b) - getTransportSiteOreValue(a);
                if (valueDiff !== 0) return valueDiff;

                return distSq(transport, a) - distSq(transport, b);
            });

            return sites[0];
        }

        function isTransportReservingSiteParking(other, site) {
            if (!isTransportShip(other)) return false;
            if (other.targetSite !== site) return false;

            // Returning transports are leaving the belt, so they should not reserve a belt parking spot.
            return (
                other.state === "outbound" ||
                other.state === "deployed" ||
                other.state === "recallingShips" ||
                (
                    (other.state === "hyperlaneEntry" || other.state === "hyperlaneTravel") &&
                    other.hyperlane?.afterState === "outbound"
                )
            );
        }

        function getOtherTransportsParkingAtSite(transport, site) {
            return ships.filter(other =>
                other !== transport &&
                isTransportReservingSiteParking(other, site)
            );
        }

        function wouldTransportParkingOverlap(transport, site, x, y) {
            const minDistSq = TRANSPORT_PARKING_SEPARATION * TRANSPORT_PARKING_SEPARATION;

            return getOtherTransportsParkingAtSite(transport, site).some(other => {
                const ox = other.parkingPoint?.x ?? other.targetX ?? other.x;
                const oy = other.parkingPoint?.y ?? other.targetY ?? other.y;

                const dx = ox - x;
                const dy = oy - y;

                return dx * dx + dy * dy < minDistSq;
            });
        }

        function scoreTransportParkingCandidate(transport, site, candidate, baseAngle) {
            let score = 0;

            // Prefer closer travel from the transport's current position.
            score -= Math.sqrt(distSq(transport, candidate)) / 25;

            // Prefer the station-facing side, but allow spreading if occupied.
            let angleDelta = Math.abs(candidate.angle - baseAngle);
            angleDelta = Math.min(angleDelta, Math.PI * 2 - angleDelta);
            score -= angleDelta * 12;

            // Prefer inner ring before outer rings.
            score -= candidate.ring * 35;

            // Hard penalty for overlapping another transport's reserved parking spot.
            if (wouldTransportParkingOverlap(transport, site, candidate.x, candidate.y)) {
                score -= 100000;
            }

            return score;
        }

        function getTransportParkingPointForSite(transport, site) {
            const candidates = [];

            const baseAngle = Math.atan2(
                station.y - site.y,
                station.x - site.x
            );

            for (let ring = 0; ring < 3; ring++) {
                const distance =
                    site.radius +
                    TRANSPORT_SITE_STANDOFF +
                    ring * TRANSPORT_PARKING_RING_GAP;

                const samples = TRANSPORT_PARKING_SAMPLES + ring * 6;

                for (let i = 0; i < samples; i++) {
                    // Start from station-facing side, then rotate around the planet.
                    const angle =
                        baseAngle +
                        (i / samples) * Math.PI * 2 +
                        ring * 0.21;

                    candidates.push({
                        x: site.x + Math.cos(angle) * distance,
                        y: site.y + Math.sin(angle) * distance,
                        angle,
                        ring
                    });
                }
            }

            candidates.sort((a, b) =>
                scoreTransportParkingCandidate(transport, site, b, baseAngle) -
                scoreTransportParkingCandidate(transport, site, a, baseAngle)
            );

            return candidates[0] || {
                x: site.x + Math.cos(baseAngle) * (site.radius + TRANSPORT_SITE_STANDOFF),
                y: site.y + Math.sin(baseAngle) * (site.radius + TRANSPORT_SITE_STANDOFF)
            };
        }

        function assignTransportParkingPoint(transport, site) {
            const p = getTransportParkingPointForSite(transport, site);

            transport.parkingPoint = p;
            transport.targetX = p.x;
            transport.targetY = p.y;

            return p;
        }

        function isTargetInsideTransportRange(transport, target) {
            if (!transport || !target) return false;

            return distSq(transport, target) <= TRANSPORT_DEPLOY_RANGE * TRANSPORT_DEPLOY_RANGE;
        }

        function isTargetUsableByTransport(transport, target) {
            if (!isTransportShip(transport)) return false;
            if (transport.state !== "deployed" && transport.state !== "recallingShips") return false;
            if (!isRichOreTarget(target)) return false;
            if (target.ore <= 0) return false;
            if (target.beltParent !== transport.targetSite) return false;
            if (!isTargetInsideTransportRange(transport, target)) return false;

            return true;
        }

        function getFinalOreValueForCargo(resourceType, amount) {
            if (resourceType === "richOre") {
                return amount * RICH_ORE_VALUE_MULTIPLIER;
            }

            if (resourceType === "ore") {
                return amount;
            }

            return 0;
        }

        function addCargoToTransport(transport, resourceType, amount) {
            if (!isTransportShip(transport)) return false;
            if (amount <= 0) return false;

            const value = getFinalOreValueForCargo(resourceType, amount);
            if (value <= 0) return false;

            const cargoMax = getEffectiveTransportCargoMax(transport);
            const space = cargoMax - transport.cargo;

            if (space <= 0) return false;

            transport.cargo += Math.min(space, value);
            return true;
        }

        function isTransportCargoFull(transport) {
            return transport.cargo >= getEffectiveTransportCargoMax(transport);
        }

        function depositTransportCargoAtStation(transport) {
            if (transport.cargo <= 0) return;

            addResource("ore", Math.floor(transport.cargo));
            transport.cargo = 0;
        }

        function estimateTransportTravelTimeToSite(transport, site) {
            const parkingPoint = getTransportParkingPointForSite(transport, site);
            const speed = getEffectiveShipSpeed(transport);

            const normalTime = estimateTravelTime(
                transport,
                parkingPoint,
                speed
            );

            const route = getBestHyperlaneRouteToPoint(
                transport,
                parkingPoint,
                "outbound"
            );

            if (!route) {
                return normalTime;
            }

            const laneTime =
                estimateTravelTime(transport, route.from, speed) +
                estimateTravelTime(route.from, route.to, HYPERLANE_TRAVEL_SPEED) +
                estimateTravelTime(route.to, parkingPoint, speed);

            return Math.min(normalTime, laneTime);
        }

        function canShipBeCarriedByTransport(ship) {
            const kind = ship.kind || "miningFrigate";

            if (kind !== "miningFrigate" && kind !== "droneCarrier") {
                return false;
            }

            if (ship.assignedTransport) return false;
            if (ship.carriedBy) return false;

            if (kind === "droneCarrier") {
                const miningDroneCount = ship.drones.filter(d =>
                    d.droneType === "mining"
                ).length;

                if (miningDroneCount <= 0) {
                    return false;
                }

                if (getDroneCarrierOperationMode(ship) === "salvaging") {
                    return false;
                }
            }

            return (
                ship.state === "idle" ||
                ship.state === "standby" ||
                ship.state === "seeking" ||
                ship.state === "outbound" ||
                ship.state === "mining" ||
                ship.state === "returning" ||
                ship.state === "deployed"
            );
        }

        function getTransportPassengers(transport) {
            return ships.filter(s => s.assignedTransport === transport);
        }

        function getTransportCarriedPassengers(transport) {
            return ships.filter(s => s.carriedBy === transport);
        }

        function hasTransportFreeSlot(transport) {
            return getTransportPassengers(transport).length < getEffectiveTransportShipSlots(transport);
        }

        function getAvailableShipsForTransport(transport) {
            return ships.filter(s => canShipBeCarriedByTransport(s));
        }

        function assignShipToTransport(ship, transport) {
            ship.assignedTransport = transport;
            ship.transportPassengerIndex = transport.passengerSerial++;
            ship.carriedBy = null;
            ship.target = null;
            ship.targetX = transport.x;
            ship.targetY = transport.y;
            ship.state = "joiningTransport";

            if ((ship.kind || "miningFrigate") === "droneCarrier") {
                ship.forceRedeploy = false;

                for (const drone of ship.drones) {
                    drone.target = null;
                }

        function wouldSiphonerParkingOverlap(currentShip, star, x, y) {
            const minDistSq =
                STAR_SIPHONER_PARKING_SEPARATION *
                STAR_SIPHONER_PARKING_SEPARATION;

            return getOtherSiphonersUsingStar(currentShip, star).some(other => {
                const px = other.siphonPoint?.x ?? other.x;
                const py = other.siphonPoint?.y ?? other.y;

                const dx = px - x;
                const dy = py - y;

                return dx * dx + dy * dy < minDistSq;
            });
        }

        function scoreSiphonerParkingSpot(ship, star, spot, preferredFromPoint) {
            let score = 0;

            // Prefer spots close to where the ship is coming from.
            // This keeps travel paths natural.
            score -= Math.sqrt(distSq(spot, preferredFromPoint)) / 20;

            // Strongly avoid overlapping another siphoner's assigned spot.
            if (wouldSiphonerParkingOverlap(ship, star, spot.x, spot.y)) {
                score -= 100000;
            }

            return score;
        }

        function chooseSiphonerParkingSpot(ship, star, preferredFromPoint = ship) {
            const candidates = [];

            const baseAngle = Math.atan2(
                preferredFromPoint.y - star.y,
                preferredFromPoint.x - star.x
            );

            for (let ring = 0; ring < 3; ring++) {
                const distance =
                    star.radius +
                    STAR_SIPHON_STANDOFF +
                    ring * STAR_SIPHONER_PARKING_RING_GAP;

                const samples = STAR_SIPHONER_PARKING_SAMPLES + ring * 6;

                for (let i = 0; i < samples; i++) {
                    const angle =
                        baseAngle +
                        (i / samples) * Math.PI * 2 +
                        ring * 0.17;

                    candidates.push({
                        x: star.x + Math.cos(angle) * distance,
                        y: star.y + Math.sin(angle) * distance,
                        ring
                    });
                }
            }

            candidates.sort((a, b) =>
                scoreSiphonerParkingSpot(ship, star, b, preferredFromPoint) -
                scoreSiphonerParkingSpot(ship, star, a, preferredFromPoint)
            );

            return candidates[0] || getStarSiphonPointFrom(star, preferredFromPoint);
        }

        function assignSiphonerParkingSpot(ship, star, preferredFromPoint = ship) {
            ship.siphonPoint = chooseSiphonerParkingSpot(
                ship,
                star,
                preferredFromPoint
            );

        }

        function getBestHyperlaneRouteToStar(ship, star) {
            if (!canUseHyperlane()) return null;
