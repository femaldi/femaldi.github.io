        // --- START OF REPLACEMENT (Complete executeRecipe function) ---
        /**
         * The core engine for processing an alchemical recipe.
         * @param {number} recipePageIndex - The index of the recipe in the player's grimoire.
         * @param {object} stationGeometry - The geometry of the active Alembic station.
         */
        function executeRecipe(recipePageIndex, stationGeometry) {
            const recipe = player.grimoire.pages[recipePageIndex];
            if (!recipe || recipe.runes.length === 0) {
                displayMessage("Reaction Failed", "The selected recipe is empty.", 240);
                return;
            }

            console.log(`--- Executing Recipe: ${recipe.name} ---`);
            const AETHER_COST = 10; // Base cost for any reaction
            if (player.aether < AETHER_COST) {
                displayMessage("Reaction Failed", "Not enough Aether to start the reaction.", 240);
                return;
            }
            player.aether -= AETHER_COST;

            // --- Step 1: Initialize the Processing Batch ---
            let processingBatch = new Map();
            const firstRune = recipe.runes[0];
            if (firstRune.id === 'from_input_crucible') {
                processingBatch = getMaterialsInArea(stationGeometry.inputCrucible.worldPoints);
            } else {
                displayMessage("Reaction Failed", "Recipe must start with [From Input Crucible].", 300);
                return;
            }

            if (processingBatch.size === 0) {
                displayMessage("Reaction Failed", "Input Crucible is empty.", 240);
                return;
            }

            // --- Step 2: Process Runes Sequentially ---
            for (let i = 1; i < recipe.runes.length; i++) {
                const rune = recipe.runes[i];
                console.log(`Processing Rune ${i}: ${rune.id}`);

                switch (rune.id) {
                    case 'filter_by': {
                        const targetMaterial = rune.target;
                        if (processingBatch.has(targetMaterial)) {
                            const quantity = processingBatch.get(targetMaterial);
                            // The new batch contains ONLY the filtered material
                            processingBatch = new Map([[targetMaterial, quantity]]);
                        } else {
                            processingBatch.clear(); // Filter found nothing, batch is now empty
                        }
                        break;
                    }

                    case 'infuse_from_input':
                    case 'infuse_from_retort': {
                        const sourceArea = (rune.id === 'infuse_from_input') 
                            ? stationGeometry.inputCrucible.worldPoints 
                            : stationGeometry.retort.worldPoints;
                        
                        const sourceName = (rune.id === 'infuse_from_input') ? "Input Crucible" : "Retort";

                        const sourceMaterials = getMaterialsInArea(sourceArea);
                        
                        // Separate essences from base liquids
                        const essences = new Map();
                        let baseLiquid = null;
                        let baseLiquidQuantity = 0;

                        for (const [matId, quantity] of sourceMaterials.entries()) {
                            if (matId >= 200) { // All unstable essences have ID >= 200
                                essences.set(matId, quantity);
                            } else if (isLiquid(matId) && matId !== MAT.LAVA) { // Assume the first non-essence liquid is the base
                                baseLiquid = matId;
                                baseLiquidQuantity = quantity;
                            }
                        }

                        if (essences.size === 0) {
                            displayMessage("Infusion Failed", `No unstable essences found in the ${sourceName}.`, 300);
                            processingBatch.clear();
                            break;
                        }
                        if (baseLiquid === null) {
                            displayMessage("Infusion Failed", `No base liquid (like water or oil) found in the ${sourceName}.`, 300);
                            processingBatch.clear();
                            break;
                        }

                        // Consume the materials from the source
                        removeMaterialsFromArea(sourceArea, sourceMaterials);

                        // The new processing batch is a special object representing the potion's ingredients
                        processingBatch = {
                            isPotionBatch: true,
                            essences: essences,
                            base: baseLiquid,
                            baseQuantity: baseLiquidQuantity
                        };

                        break;
                    }

                    case 'combine': {
                        if (processingBatch.size === 0) {
                            // Nothing to combine, just continue to the next rune
                            break;
                        }

                        // Get a sorted array of the material types currently in the batch
                        const currentMaterials = Array.from(processingBatch.keys()).sort((a, b) => a - b);
                        let matchedRecipe = null;

                        // Find a recipe in our master list that exactly matches the inputs
                        for (const recipeDef of ALCHEMY_COMBINATIONS) {
                            // We compare the stringified arrays for a simple and reliable match check
                            if (JSON.stringify(currentMaterials) === JSON.stringify(recipeDef.inputs)) {
                                matchedRecipe = recipeDef;
                                break;
                            }
                        }

                        if (matchedRecipe) {
                            // --- Success: A valid combination was found ---

                            // Determine the quantity of the output. It's limited by the ingredient with the smallest quantity.
                            const quantities = matchedRecipe.inputs.map(inputId => processingBatch.get(inputId));
                            const outputQuantity = Math.min(...quantities);

                            if (outputQuantity > 0) {
                                // 1. Consume the inputs from the processing batch
                                for (const inputId of matchedRecipe.inputs) {
                                    const currentAmount = processingBatch.get(inputId);
                                    if (currentAmount - outputQuantity > 0) {
                                        // If there's leftover material, update its count
                                        processingBatch.set(inputId, currentAmount - outputQuantity);
                                    } else {
                                        // Otherwise, remove it completely
                                        processingBatch.delete(inputId);
                                    }
                                }

                                // 2. Add the output material to the batch
                                processingBatch.set(matchedRecipe.output, (processingBatch.get(matchedRecipe.output) || 0) + outputQuantity);

                                console.log(`Combined to produce ${outputQuantity} of ${MATERIAL_NAME[matchedRecipe.output]}`);
                            }

                        } else {
                            // --- Failure: No matching combination ---
                            displayMessage("Combination Failed", "The materials in the crucible do not form a known combination.", 300);
                            processingBatch.clear(); // Clear the batch to signify failure
                            return; // Stop processing the rest of the recipe
                        }
                        break;
                    }

                    case 'forma_potion': {
                        if (!processingBatch.isPotionBatch) {
                            displayMessage("Creation Failed", "[Forma: Potion] requires an infused liquid from an [Infuse] rune.", 400);
                            processingBatch.clear();
                            break;
                        }

                        const vesselBody = getRigidBodyAt(stationGeometry.vessel.x + stationGeometry.vessel.width / 2, stationGeometry.vessel.y + stationGeometry.vessel.height / 2);

                        if (!vesselBody || vesselBody.body.getUserData().definitionId !== 'empty_potion') {
                             displayMessage("Creation Failed", "[Forma: Potion] requires an Empty Potion in the Vessel Slot.", 400);
                             processingBatch.clear();
                             break;
                        }
                        
                        // --- START: REVISED POTION SPAWNING LOGIC ---
                        
                        let potionId = null;
                        if (processingBatch.essences.has(ESSENCE_TO_MAT[ESSENCES.INTENSE_HEAT])) {
                            potionId = 'ashen_skin';
                        }
                        // Add `else if` for other potions later

                        if (!potionId) {
                            displayMessage("Creation Failed", "The combination of essences did not produce a known potion.", 300);
                            processingBatch.clear();
                            break;
                        }

                        player.knownPotions.add(potionId);

                        // Consume the empty potion vessel
                        vesselBody.isDestroyed = true; 
                        
                        // Calculate duration
                        let totalEssence = 0;
                        for (const quantity of processingBatch.essences.values()) { totalEssence += quantity; }
                        const multiplier = BASE_LIQUID_MULTIPLIERS[processingBatch.base] || 1.0;
                        const durationInFrames = Math.round(totalEssence * multiplier * 60);

                        // Get the position of the vessel slot to spawn the new potion
                        const spawnX = stationGeometry.vessel.x + stationGeometry.vessel.width / 2;
                        const spawnY = stationGeometry.vessel.y + stationGeometry.vessel.height / 2;
                        const potionDef = POTION_DEFINITIONS[potionId];

                        // Create a new RigidBody for the finished potion
                        const finishedPotion = new RigidBody(spawnX, spawnY, 8, 12, MAT.GLASS, potionDef.name);
                        finishedPotion.pixels = new Uint8Array(OBJECT_DEFINITIONS.empty_potion.pixels); // Reuse pixel art for now
                        
                        // Fill the potion visually (simple version for now)
                        for(let y = 5; y < 10; y++) {
                            for(let x = 2; x < 6; x++) {
                                finishedPotion.pixels[y * 8 + x] = ESSENCE_TO_MAT[ESSENCES.INTENSE_HEAT]; // Color it with the primary essence
                            }
                        }
                        
                        finishedPotion.rebuildFixtures();
                        
                        // Store the potion's data in the RigidBody's UserData
                        const userData = finishedPotion.body.getUserData();
                        userData.isPickup = true;
                        userData.isPotion = true; // Flag it as a potion
                        userData.potionData = {
                            definitionId: potionId,
                            charges: 1,
                            duration: durationInFrames,
                        };
                        rigidBodies.push(finishedPotion); // Add it to the world

                        // --- END: REVISED POTION SPAWNING LOGIC ---

                        displayMessage("Potion Created!", `You brewed a "${potionDef.name}". Pick it up from the vessel slot.`, 480);
                        
                        const vesselCenter = { x: stationGeometry.vessel.x + stationGeometry.vessel.width / 2, y: stationGeometry.vessel.y + stationGeometry.vessel.height / 2 };
                        createShapeDissolveEffect({ x: vesselCenter.x, y: vesselCenter.y, shapeImage: SpriteManager.sprites.get('pickup_shape'), color: [220, 180, 255], shapeSize: 48, particleCount: 1500 });
                        
                        return; // End the recipe
                    }

                    case 'extract_essence': {
                        const essenceToExtract = rune.target;
                        if (!essenceToExtract) {
                            displayMessage("Reaction Failed", "Extract Essence rune is not set.", 300);
                            processingBatch.clear();
                            return;
                        }

                        let sourceMaterial = -1;
                        let sourceQuantity = 0;

                        for (const [matId, quantity] of processingBatch.entries()) {
                            const essencesInMaterial = MATERIAL_ESSENCES[matId] || [];
                            if (essencesInMaterial.includes(essenceToExtract)) {
                                sourceMaterial = matId;
                                sourceQuantity = quantity;
                                break;
                            }
                        }

                        if (sourceMaterial !== -1) {
                            // Use the hardcoded mapping to get the correct material ID for the essence.
                            const essenceMaterialId = ESSENCE_TO_MAT[essenceToExtract];
                            
                            processingBatch = new Map([[essenceMaterialId, sourceQuantity]]);
                        } else {
                            displayMessage("Reaction Fizzled", `No material containing [${essenceToExtract.replace(/_/g, ' ')}] was found.`, 300);
                            processingBatch.clear();
                            return;
                        }
                        break;
                    }

                    case 'transform': {
                        const fromMat = rune.from;
                        const toMat = rune.to;
                        if (processingBatch.has(fromMat)) {
                            const quantity = processingBatch.get(fromMat);
                            processingBatch.delete(fromMat);
                            processingBatch.set(toMat, (processingBatch.get(toMat) || 0) + quantity);
                        }
                        break;
                    }

                    case 'yield_to_retort': {
                        if (processingBatch.size === 0) {
                            // If the batch is empty, there's nothing to move. Just continue.
                            break;
                        }

                        // Physically move the materials from the input crucible to the retort
                        removeMaterialsFromArea(stationGeometry.inputCrucible.worldPoints, processingBatch);
                        spawnMaterialsInArea(stationGeometry.retort.worldPoints, processingBatch);

                        // Provide some visual feedback for the transfer
                        const inputCenter = { x: stationGeometry.inputCrucible.x + stationGeometry.inputCrucible.width / 2, y: stationGeometry.inputCrucible.y + stationGeometry.inputCrucible.height / 2 };
                        createShapeDissolveEffect({ x: inputCenter.x, y: inputCenter.y, shapeImage: SpriteManager.sprites.get('filter_shape'), color: [255, 180, 180], shapeSize: 32, particleCount: 500, wispDuration: 40 });
                        
                        const retortCenter = { x: stationGeometry.retort.x + stationGeometry.retort.width / 2, y: stationGeometry.retort.y + stationGeometry.retort.height / 2 };
                        createShapeDissolveEffect({ x: retortCenter.x, y: retortCenter.y, shapeImage: SpriteManager.sprites.get('filter_shape'), color: [180, 255, 180], shapeSize: 32, particleCount: 500, appearDuration: 15 });

                        // *** CRITICAL STEP ***
                        // Reset the processing batch to what is now LEFT in the input crucible.
                        // This allows the next rune in the recipe to operate on the remaining materials.
                        processingBatch = getMaterialsInArea(stationGeometry.inputCrucible.worldPoints);

                        break; // Continue to the next rune in the recipe
                    }

                    case 'yield_to_output': {
                        if (processingBatch.isPotionBatch) {
                            displayMessage("Reaction Failed", "An infused liquid cannot be yielded to the output. Use a [Forma] rune instead.", 400);
                            processingBatch.clear();
                            break;
                        }

                        const originalContents = getMaterialsInArea(stationGeometry.inputCrucible.worldPoints);
                        removeMaterialsFromArea(stationGeometry.inputCrucible.worldPoints, originalContents);

                        spawnMaterialsInArea(stationGeometry.outputCrucible.worldPoints, processingBatch);
                        
                        const outputCenter = { x: stationGeometry.outputCrucible.x + stationGeometry.outputCrucible.width / 2, y: stationGeometry.outputCrucible.y + stationGeometry.outputCrucible.height / 2 };
                        createShapeDissolveEffect({ x: outputCenter.x, y: outputCenter.y, shapeImage: SpriteManager.sprites.get('filter_shape'), color: [220, 255, 220], shapeSize: 48, particleCount: 1000 });
                        displayMessage("Reaction Complete!", `${recipe.name} finished successfully.`, 300);
                        return;
                    }

                    default:
                        console.warn(`Unimplemented rune in recipe: ${rune.id}`);
                        break;
                }
                
                if (processingBatch.size === 0) {
                    displayMessage("Reaction Fizzled", "A step in the recipe resulted in no material.", 300);
                    return;
                }
            }

            displayMessage("Reaction Incomplete", "The recipe does not have a [Yield] or [Forma] rune at the end.", 300);
        }
        // --- END OF REPLACEMENT ---

        // --- ADD THIS NEW HELPER FUNCTION ---
        /**
         * Finds the first valid material present in the Athanor's designated area.
         * Checks for both grid materials (powders/liquids) and rigid bodies (chunks/ingots).
         * @param {object} stationGeometry - The station's geometry object containing the Athanor's worldPoints.
         * @returns {object|null} An object describing the found material, or null if empty.
         */
        function getMaterialInAthanor(stationGeometry) {
            if (!stationGeometry || !stationGeometry.athanor) return null;

            const athanorArea = stationGeometry.athanor;

            // 1. Check for materials on the static grid (powders, liquids)
            for (const point of athanorArea.worldPoints) {
                const type = getGrid(point.x, point.y);
                if (type !== MAT.EMPTY && MATERIAL_ESSENCES[type]) {
                    return { type: type, x: point.x, y: point.y, isRigidBody: false };
                }
            }

            // 2. Check for rigid body objects overlapping the area (chunks, ingots)
            const areaAABB = {
                minX: athanorArea.x, minY: athanorArea.y,
                maxX: athanorArea.x + athanorArea.width, maxY: athanorArea.y + athanorArea.height
            };

            for (const body of rigidBodies) {
                if (body.isDestroyed || !body.body) continue;
                const bodyPos = body.body.getPosition();
                const worldX = bodyPos.x * B2_SCALE;
                const worldY = bodyPos.y * B2_SCALE;

                if (worldX > areaAABB.minX && worldX < areaAABB.maxX &&
                    worldY > areaAABB.minY && worldY < areaAABB.maxY)
                {
                    // Found an overlapping rigid body. We assume it's a single chunk/ingot.
                    // Note: This logic assumes Chunks/Ingots will have a 'materialType' property.
                    const bodyMaterialType = body.materialType;
                    if (MATERIAL_ESSENCES[bodyMaterialType]) {
                        return { type: bodyMaterialType, body: body, isRigidBody: true };
                    }
                }
            }

            return null; // Athanor is empty
        }

        /**
         * Compresses a Uint8Array using Run-Length Encoding.
         * Example: [1, 1, 1, 2, 2, 3] becomes [3, 1, 2, 2, 1, 3]
         * @param {Uint8Array} data The raw chunk data.
         * @returns {number[]} The compressed data as a simple array.
         */
        function compressRLE(data) {
            if (!data || data.length === 0) return [];
            const compressed = [];
            let count = 1;
            for (let i = 1; i <= data.length; i++) {
                if (i < data.length && data[i] === data[i - 1]) {
                    count++;
                } else {
                    compressed.push(count, data[i - 1]);
                    count = 1;
                }
            }
            return compressed;
        }

        /**
         * Decompresses an RLE array back into a Uint8Array.
         * @param {number[]} rleData The compressed data.
         * @returns {Uint8Array} The decompressed chunk data.
         */
        function decompressRLE(rleData) {
            const decompressed = new Uint8Array(CHUNK_SIZE_SQ);
            let index = 0;
            for (let i = 0; i < rleData.length; i += 2) {
                const count = rleData[i];
                const value = rleData[i + 1];
                for (let j = 0; j < count; j++) {
                    decompressed[index++] = value;
                }
            }
            return decompressed;
        }

        let backgroundQueue = [];
        let isGeneratingBackground = false;

        function saveSectorToStorage(sx, sy) {
            const storageKey = `fsp-sector-${sx},${sy}`;
            const sectorData = {
                terrain: [],
                light: []
            };

            const startCX = sx * (SECTOR_SIZE / CHUNK_SIZE);
            const startCY = sy * (SECTOR_SIZE / CHUNK_SIZE);
            const endCX = startCX + (SECTOR_SIZE / CHUNK_SIZE);
            const endCY = startCY + (SECTOR_SIZE / CHUNK_SIZE);

            for (let cy = startCY; cy < endCY; cy++) {
                for (let cx = startCX; cx < endCX; cx++) {
                    const key = coordToKey(cx, cy);
                    
                    const terrainChunk = chunkMap.get(key);
                    if (terrainChunk) {
                        sectorData.terrain.push({ cx, cy, data: compressRLE(terrainChunk.data) });
                        chunkMap.delete(key);
                    }

                    const lightChunk = lightChunkMap.get(key);
                    if (lightChunk) {
                        sectorData.light.push({ cx, cy, data: compressRLE(lightChunk.data) });
                        lightChunkMap.delete(key);
                    }
                }
            }

            try {
                // Now only saving terrain and light, which is much smaller.
                sectorWangTileData.delete(coordToKey(sx, sy));
                localStorage.setItem(storageKey, JSON.stringify(sectorData));
                console.log(`Sector [${sx}, ${sy}] saved to storage (without background).`);
            } catch (e) {
                console.error(`Failed to save sector [${sx}, ${sy}].`, e);
            }
        }

        /**
         * Loads a sector from storage and queues its background for regeneration.
         */
        function loadSectorFromStorage(sx, sy) {
            const storageKey = `fsp-sector-${sx},${sy}`;
            const savedData = localStorage.getItem(storageKey);

            if (!savedData) {
                return false;
            }

            try {
                const sectorData = JSON.parse(savedData);

                for (const chunkData of sectorData.terrain) {
                    const key = coordToKey(chunkData.cx, chunkData.cy);
                    const chunk = getChunk(chunkMap, key);
                    chunk.data = decompressRLE(chunkData.data);
                    chunk.cx = chunkData.cx;
                    chunk.cy = chunkData.cy;
                }

                for (const chunkData of sectorData.light) {
                    const key = coordToKey(chunkData.cx, chunkData.cy);
                    const chunk = getChunk(lightChunkMap, key);
                    chunk.data = decompressRLE(chunkData.data);
                    chunk.cx = chunkData.cx;
                    chunk.cy = chunkData.cy;
                }
                
                // CRITICAL: Instead of loading a background, queue it for regeneration.
                backgroundQueue.push({ sx, sy });

                localStorage.removeItem(storageKey); 
                console.log(`Sector [${sx}, ${sy}] loaded from storage. Background queued for regeneration.`);
                isRenderCacheInvalid = true;
                return true;
            } catch (e) {
                console.error(`Failed to load or parse sector [${sx}, ${sy}] from storage.`, e);
                return false;
            }
        }

        /**
         * Checks if the number of ready sectors exceeds the limit and unloads the oldest one.
         * This now uses the sectorGrid Map as the single source of truth.
         */
        function manageSectorMemory() {
            // Use sectorGrid.size, which counts only 'ready' and 'queued' sectors.
            if (sectorGrid.size <= MAX_READY_SECTORS) {
                return;
            }

            const protectedKeys = new Set();
            for (let sy = lastPlayerSectorY - 1; sy <= lastPlayerSectorY + 1; sy++) {
                for (let sx = lastPlayerSectorX - 1; sx <= lastPlayerSectorX + 1; sx++) {
                    protectedKeys.add(coordToKey(sx, sy));
                }
            }

            // Iterate directly over the map. The first entries are the oldest.
            for (const [key, sector] of sectorGrid.entries()) {
                // Find the first sector that is 'ready' and NOT protected.
                if (sector.state === 'ready' && !protectedKeys.has(key)) {
                    saveSectorToStorage(sector.sx, sector.sy);
                    sectorBackgrounds.delete(key);
                    sectorGrid.delete(key); // Unload it by removing it from the map.
                    
                    // We only unload one sector per frame to avoid hitches.
                    break; 
                }
            }
        }

        /**
         * Generates a single, tileable cave background image.
         */
        function generateCaveBackgroundTile(width, height) {
            const img = ctx.createImageData(width, height);
            const d = img.data;
            const layerHeight = WORLD_LAYER_HEIGHT;
            const transitionSize = 40;

            PerlinNoise.seed(WORLD_SEED);

            const hash = (x,y,s=0) => { let h=x*374761393+y*668265263+s*1442695041; h=(h^(h>>13))*1274126177; return (h^(h>>16))&255; };
            const lerp = (a,b,t) => a+(b-a)*t;
            const lerpColor = (c1,c2,t) => [lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)];

            const getSandCaveColor = (x,y)=>{ const px=x>>1,py=y>>1,n=(PerlinNoise.noise(px*0.04,py*0.1)+1)/2; if(n>0.6)return[60,45,30];if(n>0.4)return[50,38,25];return[40,30,20]; };
            const getCoalMineColor = (x,y)=>{ const px=x>>1,py=y>>1,r=(PerlinNoise.noise(px*0.1,py*0.1)+1)/2,s=PerlinNoise.noise(px*0.02,py*0.15); if(s*s>0.3)return[5,3,3];if(r>0.6)return[28,25,25];if(r>0.45)return[20,18,18];return[12,10,10]; };
            const getVolcanicColor = (x,y)=>{ const px=x>>1,py=y>>1,c=Math.abs(PerlinNoise.noise(px*0.06,py*0.06)*2.5); if(c>0.98)return[255,170,0];if(c>0.95)return[255,90,0];const r=hash(px>>1,py>>1)/255;if(r>0.5)return[25,10,10];return[15,5,5]; };
            const getLabyrinthColor = (x,y)=>{ const px=x>>2,py=y>>2;if(x%4<1||y%4<1)return[20,22,25];return hash(px,py)>128?[55,60,65]:[45,50,55]; };
            const getMagicDungeonColor = (x,y)=>{ const px=x>>1,py=y>>1,e=(PerlinNoise.noise(px*0.03,py*0.03)+1)/2,c=Math.abs(PerlinNoise.noise(px*0.16,py*0.16)); if(c*c*c>0.2)return[180,150,255];if(c*c>0.25)return[100,80,140];if(hash(x,y)>254)return[200,200,255];if(e>0.55)return[40,15,60];return[20,5,40]; };
            
            const layerFunctions = [getSandCaveColor, getCoalMineColor, getVolcanicColor, getLabyrinthColor, getMagicDungeonColor];

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const layerIndex = Math.min(layerFunctions.length - 1, Math.floor(Math.max(0, y) / layerHeight));
                    const yInLayer = y % layerHeight;
                    let color;
                    if (layerIndex > 0 && yInLayer < transitionSize) {
                        const t = yInLayer / transitionSize;
                        const color1 = layerFunctions[layerIndex - 1](x, y);
                        const color2 = layerFunctions[layerIndex](x, y);
                        color = lerpColor(color1, color2, t * t);
                    } else {
                        color = layerFunctions[layerIndex](x, y);
                    }
                    const i = (y * width + x) * 4;
                    d[i]=color[0]; d[i+1]=color[1]; d[i+2]=color[2]; d[i+3]=255;
                }
            }
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width; tempCanvas.height = height;
            tempCanvas.getContext('2d').putImageData(img, 0, 0);
            return tempCanvas;
        }

        /**
         * Checks if a given rectangular area is free of solid materials and has stable ground beneath it.
         * @param {RigidBody} body - The body to check the placement for (used for its dimensions).
         * @param {number} targetX - The desired center X coordinate of the placement.
         * @param {number} targetY - The desired center Y coordinate of the placement.
         * @returns {boolean} - True if the location is valid for placement.
         */
        function isValidPlacement(body, targetX, targetY) {
            const halfW = Math.ceil(body.width / 2);
            const halfH = Math.ceil(body.height / 2);

            const isPassable = (type) => (type === MAT.EMPTY || GASES.has(type));

            // 1. Check if the object's own area is clear of solids.
            for (let y = -halfH; y < halfH; y++) {
                for (let x = -halfW; x < halfW; x++) {
                    const checkX = Math.floor(targetX + x);
                    const checkY = Math.floor(targetY + y);
                    if (!isPassable(getGrid(checkX, checkY))) {
                        return false; // Obstructed
                    }
                }
            }

            // 2. Check for stable ground directly underneath the object's footprint.
            const groundCheckY = Math.floor(targetY + halfH) + 1;
            let groundFound = false;
            // Check 3 points along the bottom for support (left, middle, right)
            for (let i = -1; i <= 1; i++) {
                const groundCheckX = Math.floor(targetX + i * (halfW * 0.5));
                if (isSolidForPlayer(getGrid(groundCheckX, groundCheckY))) {
                    groundFound = true;
                    break; // Found at least one support point
                }
            }

            return groundFound;
        }

         * @returns {boolean} - True if the object was successfully placed, false otherwise.
         */
        function findAndPlaceStructure(bodyToPlace, initialX, initialY) {
            const SEARCH_RADIUS = 16; // How far in pixels to search for a valid spot.

            // Check the initial mouse position first.
            if (isValidPlacement(bodyToPlace, initialX, initialY)) {
                bodyToPlace.reintroduceToWorld(initialX, initialY);
                rigidBodies.push(bodyToPlace);
                return true;
            }

            // If initial spot fails, search in an expanding square radius.
            for (let r = 1; r <= SEARCH_RADIUS; r++) {
                for (let i = -r; i <= r; i++) {
                    // Check horizontal edges of the search square
                    if (isValidPlacement(bodyToPlace, initialX + i, initialY - r)) {
                        bodyToPlace.reintroduceToWorld(initialX + i, initialY - r);
                        rigidBodies.push(bodyToPlace);
                        return true;
                    }
                    if (isValidPlacement(bodyToPlace, initialX + i, initialY + r)) {
                        bodyToPlace.reintroduceToWorld(initialX + i, initialY + r);
                        rigidBodies.push(bodyToPlace);
                        return true;
                    }
                    // Check vertical edges of the search square
                    if (isValidPlacement(bodyToPlace, initialX - r, initialY + i)) {
                        bodyToPlace.reintroduceToWorld(initialX - r, initialY + i);
                        rigidBodies.push(bodyToPlace);
                        return true;
                    }
                    if (isValidPlacement(bodyToPlace, initialX + r, initialY + i)) {
                        bodyToPlace.reintroduceToWorld(initialX + r, initialY + i);
                        rigidBodies.push(bodyToPlace);
                        return true;
                    }
                }
            }

            // If no spot was found after searching the full radius
            return false;
        }

                const bodyType = body.getType();
                let color = 'rgba(200, 200, 200, 0.7)';

                if (bodyType === 'dynamic') {
                    color = 'rgba(255, 50, 50, 0.7)'; // Red for dynamic

                    color = 'rgba(50, 50, 255, 0.7)'; // Blue for static

                for (let fixture = body.getFixtureList(); fixture; fixture = fixture.getNext()) {
                    const shape = fixture.getShape();
                    const type = fixture.getType(); // Get the fixture type once
                    
                    ctx.beginPath();

                    if (type === 'polygon') {
                        const vertices = shape.m_vertices;
                        if (vertices.length === 0) continue;

                        let worldPoint = body.getWorldPoint(vertices[0]);
                        ctx.moveTo(worldPoint.x * B2_SCALE - camera.x, worldPoint.y * B2_SCALE - camera.y);

                        for (let i = 1; i < vertices.length; i++) {
                            worldPoint = body.getWorldPoint(vertices[i]);
                            ctx.lineTo(worldPoint.x * B2_SCALE - camera.x, worldPoint.y * B2_SCALE - camera.y);
                        }
                        
                        ctx.closePath();

                    } else if (type === 'circle') {
                        const localCenter = shape.m_p;
                        const radius = shape.m_radius;
                        
                        const worldCenter = body.getWorldPoint(localCenter);
                        const screenX = worldCenter.x * B2_SCALE - camera.x;
                        const screenY = worldCenter.y * B2_SCALE - camera.y;

                        ctx.arc(screenX, screenY, radius * B2_SCALE, 0, 2 * Math.PI);
                    
                    // --- START OF MODIFICATION: ADDED LOGIC FOR CHAIN SHAPES ---
                    } else if (type === 'chain') {
                        const vertices = shape.m_vertices;
                        if (vertices.length === 0) continue;

                        // The drawing logic for a chain is identical to a polygon's outline
                        let worldPoint = body.getWorldPoint(vertices[0]);
                        ctx.moveTo(worldPoint.x * B2_SCALE - camera.x, worldPoint.y * B2_SCALE - camera.y);

                        for (let i = 1; i < vertices.length; i++) {
                            worldPoint = body.getWorldPoint(vertices[i]);
                            ctx.lineTo(worldPoint.x * B2_SCALE - camera.x, worldPoint.y * B2_SCALE - camera.y);
                        }

        /**
         * Applies damage based on a cooldown, but also applies immediate "catch-up"
         * damage if the player becomes more submerged in a hazard during the cooldown period.
         */
        function updatePlayerDamage() {
            if (!player.body || player.isSpawning || player.hp <= 0) return;

            const hasAshenSkin = player.activeBuffs.some(b => b.id === 'ashen_skin');

            const now = performance.now();
            
            const DAMAGE_MAP = {
                [MAT.FIRE]: 10,
                [MAT.OIL_BURNING]: 12,
                [MAT.COAL_BURNING]: 10,
                [MAT.METHANE_BURNING]: 15,
                [MAT.ACID]: 40,
                [MAT.LAVA]: 50,
            };

            // --- Step 1: Always calculate the potential damage for the current frame ---
            let potentialDamage = 0;
            let deadliestMaterial = null;
            let contactPoints = 0;

            const samplePointsX = [0.2, 0.5, 0.8];
            const samplePointsY = [0.1, 0.3, 0.5, 0.7, 0.9];
            
            for (const xPercent of samplePointsX) {
                for (const yPercent of samplePointsY) {
                    const localX = player.width * xPercent;
                    const localY = player.height * yPercent;
                    const worldPos = player.body.getWorldPoint(pl.Vec2(
                        (localX - player.width / 2) / B2_SCALE,
                        (localY - player.height / 2) / B2_SCALE
                    ));
                    const gridMaterial = getGrid(Math.floor(worldPos.x * B2_SCALE), Math.floor(worldPos.y * B2_SCALE));
                    
                    if (DAMAGE_MAP[gridMaterial]) {
                        if (hasAshenSkin && (gridMaterial === MAT.LAVA || gridMaterial === MAT.FIRE || gridMaterial === MAT.OIL_BURNING || gridMaterial === MAT.COAL_BURNING)) {
                            continue; // Skip this damage point
                        }
                        // We go back to accumulating damage based on how many points are in contact.
                        potentialDamage += DAMAGE_MAP[gridMaterial] / (samplePointsX.length * samplePointsY.length);
                        contactPoints++;
                        deadliestMaterial = gridMaterial;
                    }
                }
            }
            
            // --- Step 2: Decide how much damage to apply based on the cooldown state ---
            let damageToApply = 0;
            let shouldResetCooldown = false;

            if (now - player.lastDamageTime >= PLAYER_DAMAGE_COOLDOWN_MS) {
                // The cooldown is over. We can apply a normal damage tick.
                if (potentialDamage > 0) {
                    damageToApply = potentialDamage;
                    shouldResetCooldown = true;
                } else {
                    // No hazard contact, so reset the baseline damage.
                    player.lastTickDamage = 0;
                }
            } else {
                // The player is on cooldown. Check for "catch-up" damage.
                if (potentialDamage > player.lastTickDamage) {
                    // The player is MORE submerged. Apply only the difference.
                    damageToApply = potentialDamage - player.lastTickDamage;
                    // We do NOT reset the cooldown timer here.
                }
            }

            // --- Step 3: Apply damage and trigger effects if necessary ---
            if (damageToApply > 0) {
                damageFlashIntensity = 1.0;
                player.hp = Math.round(Math.max(0, player.hp - damageToApply));
                
                // Always update the baseline damage to the new, higher potential.
                // This prevents applying the difference repeatedly on subsequent frames.
                player.lastTickDamage = potentialDamage;

                if (shouldResetCooldown) {
                    player.lastDamageTime = now;
                }
                
                spawnMagicParticles(contactPoints, player.x + player.width / 2, player.y + player.height / 2, [255, 50, 50], 1.5);

                if (player.hp <= 0) {
                    handlePlayerDeath(deadliestMaterial);
                }
            }
        }

        function updateRigidBodyGrid() {
            // 1. Clear all chunks that had stubs in the PREVIOUS frame.
            for (const key of activeStubChunks) {
                const chunk = etcChunkMap.get(key);
                if (chunk) {
                    chunk.data.fill(0); // Clear the old stub data
                }
            }
            activeStubChunks.clear(); // Reset the set for the CURRENT frame.

            // 2. Populate the grid with new stub locations and track the chunks used.
            const buffer = 1;
            for (const body of rigidBodies) {
                if (body.isDestroyed || !body.body) continue;

                for (let y = 0; y < body.height; y++) {
                    for (let x = 0; x < body.width; x++) {
                        if (body.pixels[y * body.width + x] === MAT.EMPTY) continue;

                        // Get the world position of the rigid body's pixel
                        const localPos = pl.Vec2((x - body.width / 2 + 0.5) / B2_SCALE, (y - body.height / 2 + 0.5) / B2_SCALE);
                        const worldPos = body.body.getWorldPoint(localPos);
                        const worldX = Math.floor(worldPos.x * B2_SCALE);
                        const worldY = Math.floor(worldPos.y * B2_SCALE);

                        // Mark a small buffered area in the etcChunkMap
                        for (let dy = -buffer; dy <= buffer; dy++) {
                            for (let dx = -buffer; dx <= buffer; dx++) {
                                const wx = worldX + dx;
                                const wy = worldY + dy;
                                setAuxData(etcChunkMap, wx, wy, 1); // Mark as a rigid body stub

                                // 3. Add the key of the affected chunk to our tracker for the NEXT frame's clear operation.
                                const cx = Math.floor(wx / CHUNK_SIZE);
                                const cy = Math.floor(wy / CHUNK_SIZE);
                                activeStubChunks.add(coordToKey(cx, cy));
                            }
                        }
                    }
                }
            }
        }

                // Calculate the world position of the player's hand
                const handLocalX = aim.facingRight ? 2 : 5;
                const handLocalY = 9; // Base y-offset of hand from player origin
                const handWorldX = player.x + handLocalX;
                const handWorldY = player.y + handLocalY;

                // Project from the hand to find the tip of the tool
                const toolLength = 8; // Approx. length in pixels from hand to tool tip
                const tipWorldX = handWorldX + Math.cos(aim.aimAngle) * toolLength;
                const tipWorldY = handWorldY + Math.sin(aim.aimAngle) * toolLength;

                // Spawn a single, non-gravity particle
                spawnMagicParticles(1, tipWorldX, tipWorldY, [255, 120, 0], 0);
            }
        }

        function updatePlayer() {
            if (player.isSpawning || !player.body) return;

            updatePlayerDamage();

            if (DialogueManager.isVisible || isAlembicUIVisible || TradeManager.isVisible) {

            const submersionRatio = getPlayerSubmersionRatio();
            const isInLiquid = submersionRatio > 0;
            player.onGround = isPlayerOnGround();

            // --- 1. Handle Vertical Movement (Buoyancy & Hover/Jump) ---
            const currentVel = player.body.getLinearVelocity();
            let newVelY = currentVel.y;
            
            if (isInLiquid) {

            if (keys['KeyA']) { targetVelX = -maxSpeed; playerFacingRight = false; }
            else if (keys['KeyD']) { targetVelX = maxSpeed; playerFacingRight = true; }

            const accel = player.onGround ? player.groundAccel : player.airAccel;
            const friction = player.onGround ? player.groundFriction : player.airFriction;

            if (targetVelX !== 0) {

        /**
         * Accurately checks for ground beneath the player's feet by sampling the falling sand grid directly.
         * @returns {boolean} - True if a solid surface is detected immediately beneath the player.
         */
        function isPlayerOnGround() {
            if (!player.body) return false;

            // Define the 3 horizontal points at the player's feet we want to check.
            // These are in local space, relative to the player's top-left corner (player.x, player.y).
            const footPositionsX = [
                player.x + player.width / 2,      // Center
                player.x + player.width / 2 - 1,
                player.x + player.width / 2 + 1,
            ];

            // The Y level to check is just below the player's bounding box.
            const groundCheckY = Math.floor(player.y + player.height) + 1;

            for (const checkX of footPositionsX) {
                // For each foot position, check the pixel directly below it.
                const gridType = getGrid(Math.floor(checkX), groundCheckY);

                // Use the existing helper function to determine if it's a solid surface.
                if (isSolidForPlayer(gridType)) {
                    // If we find solid ground under any of the check points, we are grounded.
                    return true;
                }
            }

            // --- Phase 2: Check for DYNAMIC Rigid Bodies Only ---
            const bodyPos = player.body.getPosition();
            const halfWidth = (player.width / 2) / B2_SCALE;
            const playerBottomY = bodyPos.y + (player.height / 2 / B2_SCALE);
            const sensorHeight = 1 / B2_SCALE;

            const aabb = new pl.AABB(
                pl.Vec2(bodyPos.x - 0.1, playerBottomY),
                pl.Vec2(bodyPos.x + 0.1, playerBottomY + sensorHeight)
            );

            let dynamicBodyFound = false;

            world.queryAABB(aabb, (fixture) => {
                const body = fixture.getBody();
                if (body === player.body) {
                    return true; // Continue searching, ignore ourself.
                }
                
                // --- START OF THE FIX ---
                // Only consider the body "ground" if its type is 'dynamic'.
                if (body.getType() === 'dynamic') {
                    dynamicBodyFound = true;
                    return false; // Stop searching, we found a dynamic body.
                }
                // --- END OF THE FIX ---
                
                // If it's not the player and not dynamic (i.e., it's static terrain),
                // we ignore it because the grid check should have already handled it.
                return true; // Continue searching.
            });

            return dynamicBodyFound;
        }
        
        function syncPlayerWithBody() {
            if (!player.body) return;
            const pos = player.body.getPosition();
            player.x = (pos.x * B2_SCALE) - (player.width / 2);

        /**
         * Creates visual particles that flow from a source point to the player.
         * @param {number} sourceX - The world X coordinate of the material being stored.
         * @param {number} sourceY - The world Y coordinate of the material being stored.
         * @param {number} materialType - The type of material to get the color from.
         */
        function createStoreParticles(sourceX, sourceY, materialType) {
            const count = 3; // Number of particles to spawn per stored pixel
            const speed = 2.0;
            const targetX = player.x + player.width / 2;
            const targetY = player.y + player.height / 2;
            const baseColor = COLORS[materialType] || [255, 255, 255];
            let spawnedCount = 0;

            for (let i = 0; i < MAX_MAGIC_PARTICLES; i++) {
                if (spawnedCount >= count) break;
                const p = magicParticlePool[i];
                if (p.active) continue;

                p.active = true;
                p.isStoringParticle = true; // NEW FLAG for special behavior
                p.gravity = 0;
                p.lifespan = 40 + Math.random() * 20; // Give them about a second to live

                // Start at the source with a tiny random offset
                p.x = sourceX + Math.random() - 0.5;
                p.y = sourceY + Math.random() - 0.5;

                // Calculate velocity vector towards the player
                const dx = targetX - p.x;
                const dy = targetY - p.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist > 1) {
                    const randomSpeed = speed + (Math.random() - 0.5) * 0.5;
                    p.vx = (dx / dist) * randomSpeed;
                    p.vy = (dy / dist) * randomSpeed;
                } else {
                    p.vx = 0; p.vy = 0; // Already at the target
                }
                
                // Set color with variance
                const v = 40;
                p.color = [
                    Math.max(0, Math.min(255, baseColor[0] + (Math.random() - 0.5) * v)),
                    Math.max(0, Math.min(255, baseColor[1] + (Math.random() - 0.5) * v)),
                    Math.max(0, Math.min(255, baseColor[2] + (Math.random() - 0.5) * v))
                ];

                spawnedCount++;

        /**
         * Finds the first solid material along a line, returning its position and type.
         * @param {number} x0 - Starting X coordinate.
         * @param {number} y0 - Starting Y coordinate.
         * @param {number} x1 - Ending X coordinate.
         * @param {number} y1 - Ending Y coordinate.
         * @returns {object|null} - An object {x, y, type} if a solid is hit, otherwise null.
         */
        function raycastForFirstSolid(x0, y0, x1, y1) {
            let ix0 = Math.floor(x0);
            let iy0 = Math.floor(y0);
            const ix1 = Math.floor(x1);
            const iy1 = Math.floor(y1);

            const dx = Math.abs(ix1 - ix0);
            const dy = -Math.abs(iy1 - iy0);
            const sx = ix0 < ix1 ? 1 : -1;
            const sy = iy0 < iy1 ? 1 : -1;
            let err = dx + dy;

            while (true) {
                const type = getGrid(ix0, iy0);

                // If we hit any solid material...
                if (isSolidForPlayer(type)) {
                    // ...return the hit information.
                    return { x: ix0, y: iy0, type: type };
                }

                // Check if we've reached the destination
                if (ix0 === ix1 && iy0 === iy1) {
                    break;
                }

                // Bresenham's algorithm stepping logic
                const e2 = 2 * err;
                if (e2 >= dy) { err += dy; ix0 += sx; }
                if (e2 <= dx) { err += dx; iy0 += sy; }
            }

            return null; // No solid was hit along the path to the destination.
        }

        /**
         * Checks for solid obstructions along a line between two points using Bresenham's algorithm.
         * @param {number} x0 - Starting X coordinate.
         * @param {number} y0 - Starting Y coordinate.
         * @param {number} x1 - Ending X coordinate.
         * @param {number} y1 - Ending Y coordinate.
         * @returns {boolean} - True if the line is clear, false if it's blocked by a solid pixel.
         */
        function hasLineOfSight(x0, y0, x1, y1) {
            let ix0 = Math.floor(x0);
            let iy0 = Math.floor(y0);
            const ix1 = Math.floor(x1);
            const iy1 = Math.floor(y1);

            const dx = Math.abs(ix1 - ix0);
            const dy = -Math.abs(iy1 - iy0);
            const sx = ix0 < ix1 ? 1 : -1;
            const sy = iy0 < iy1 ? 1 : -1;
            let err = dx + dy;

            while (true) {
                // Check the current pixel in the line
                const type = getGrid(ix0, iy0);

                // A wall blocks line of sight. We must also check that the obstacle is NOT the target pixel itself.
                if (isSolidForPlayer(type) && (ix0 !== ix1 || iy0 !== iy1)) {
                    return false; // Blocked
                }

                // Check if we've reached the destination
                if (ix0 === ix1 && iy0 === iy1) {
                    break;
                }

                // Bresenham's algorithm stepping logic
                const e2 = 2 * err;
                if (e2 >= dy) {
                    err += dy;
                    ix0 += sx;
                }
                if (e2 <= dx) {
                    err += dx;
                    iy0 += sy;
                }
            }

            return true; // Line is clear
        }

        /**
         * Removes the currently selected tool or structure from inventory and throws it into the world.
         */
        function throwHeldItem() {
            const THROW_FORCE = 6.0; // The initial speed of the thrown object in meters/sec.

            const isTool = activeContainer === 'tool';
            const pocket = isTool ? player.toolPocket : player.structurePocket;
            const index = isTool ? player.toolIndex : player.structureIndex;

            if (pocket.length === 0) return;

            // --- 1. Get the item and remove it from inventory ---
            const itemRepresentation = pocket.splice(index, 1)[0];

            // --- 2. Calculate spawn position and velocity ---
            const aim = computePlayerAim();
            // Spawn the object slightly in front of the player to avoid immediate collision
            const spawnOffsetX = 12; 
            const spawnOffsetY = 12;
            const spawnX = player.x + player.width / 2 + Math.cos(aim.aimAngle) * spawnOffsetX;
            const spawnY = player.y + player.height / 2 + Math.sin(aim.aimAngle) * spawnOffsetY;

            const velX = Math.cos(aim.aimAngle) * THROW_FORCE;
            const velY = Math.sin(aim.aimAngle) * THROW_FORCE;

            let thrownBody = null;

            // --- 3. Create the physical RigidBody in the world ---
            if (isTool) {
                // For tools, we only have the name. We need to find its definition and create a new body.
                let toolDefId = null;
                let toolDef = null;
                for (const id in OBJECT_DEFINITIONS) {
                    if (OBJECT_DEFINITIONS[id].name === itemRepresentation) {
                        toolDefId = id;
                        toolDef = OBJECT_DEFINITIONS[id];
                        break;
                    }
                }

                if (toolDef) {
                    const newBody = new RigidBody(spawnX, spawnY, toolDef.width, toolDef.height, MAT.WOOD, toolDef.name);
                    newBody.pixels = new Uint8Array(toolDef.pixels);
                    newBody.rebuildFixtures();
                    const userData = newBody.body.getUserData();
                    userData.isPickup = true;
                    userData.definitionId = toolDefId;
                    rigidBodies.push(newBody);
                    thrownBody = newBody;
                } else {
                    // Failsafe: if definition isn't found, put the item back.
                    pocket.splice(index, 0, itemRepresentation);
                    console.error("Could not find definition for tool:", itemRepresentation);
                }
            } else {
                // For structures, we already have the RigidBody object. Just re-introduce it to the world.
                const bodyToThrow = itemRepresentation;
                bodyToThrow.reintroduceToWorld(spawnX, spawnY);
                rigidBodies.push(bodyToThrow);
                thrownBody = bodyToThrow;
            }

            // --- 4. Apply the throw velocity and update inventory index ---
            if (thrownBody) {
                thrownBody.body.setLinearVelocity(pl.Vec2(velX, velY));

                // Update the selected index to prevent out-of-bounds errors
                if (isTool) {
                    if (player.toolIndex >= player.toolPocket.length) {
                        player.toolIndex = 0;
                    }
                } else {
                    if (player.structureIndex >= player.structurePocket.length) {
                        player.structureIndex = 0;
                    }
                }
            }
        }

        function storeMaterial(worldX, worldY) {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const storeRadius = 1;

            // === Step 1: Determine the Effective Target ===
            // Raycast from the player to the mouse cursor to see if anything is in the way.
            const hit = raycastForFirstSolid(playerCenterX, playerCenterY, worldX, worldY);

            let effectiveTargetX, effectiveTargetY;

            if (hit) {
                // An obstacle was hit. This obstacle is our new primary target.
                effectiveTargetX = hit.x;
                effectiveTargetY = hit.y;
            } else {
                // The path to the mouse is clear. The mouse position is our target.
                effectiveTargetX = worldX;
                effectiveTargetY = worldY;
            }

            // === Step 2: Attempt to Gather Around the Effective Target ===
            // We still loop in a small radius to make it easier to grab materials
            // without needing pixel-perfect aim.
            for (let dy = -storeRadius; dy <= storeRadius; dy++) {
                for (let dx = -storeRadius; dx <= storeRadius; dx++) {
                    const wx = effectiveTargetX + dx;
                    const wy = effectiveTargetY + dy;
                    const type = getGrid(wx, wy);

                    let targetGrid, targetW, targetH;
                    if (STORABLE_SOLIDS.has(type)) {
                        targetGrid = pouchGrid; targetW = pouchWidth; targetH = pouchHeight;
                    } else if (STORABLE_LIQUIDS.has(type)) {
                        targetGrid = flaskGrid; targetW = flaskWidth; targetH = flaskHeight;
                    } else {
                        continue; // This pixel is not a storable material, skip it.
                    }

                    // Final check: Ensure the final target pixel is both in range AND has a clear line of sight.
                    // This prevents grabbing items through a thin wall if the raycast happened to miss it.
                    const distSq = (playerCenterX - wx)**2 + (playerCenterY - wy)**2;
                    if (distSq <= PLAYER_INTERACTION_RADIUS * PLAYER_INTERACTION_RADIUS && hasLineOfSight(playerCenterX, playerCenterY, wx, wy)) {
                        
                        // Attempt to find an empty spot in the correct container
                        for (let y = 0; y < targetH; y++) {
                            const xOffset = Math.floor(Math.random() * targetW);
                            for (let i = 0; i < targetW; i++) {
                                const x = (i + xOffset) % targetW;
                                const containerIdx = getIdx(x, y, targetW, targetH);
                                if (containerIdx !== -1 && targetGrid[containerIdx] === MAT.EMPTY) {
                                    // Success! Move the material.
                                    targetGrid[containerIdx] = type;
                                    setGrid(wx, wy, MAT.EMPTY);
                                    createStoreParticles(wx, wy, type);
                                    
                                    // We've gathered one pixel, that's enough for one click.
                                    return;
                                }
                            }
                        }
                    }
                }
            }
        }
        
        function pourFromContainer() {
            const [containerGrid, cW, cH] = activeContainer === 'pouch' ? [pouchGrid, pouchWidth, pouchHeight] : [flaskGrid, flaskWidth, flaskHeight];
            const maxPourPerFrame = 3;
            let pouredCount = 0;

            for (let y = cH - 1; y >= 0; y--) {
                for (let i = 0; i < cW; i++) {

        function isRigidBodyAtPixel(worldX, worldY) {
            const pMin = pl.Vec2((worldX-0.5)/B2_SCALE, (worldY-0.5)/B2_SCALE);
            const pMax = pl.Vec2((worldX+0.5)/B2_SCALE, (worldY+0.5)/B2_SCALE);
            const aabb = new pl.AABB(pMin, pMax);
            let hit = false;
            world.queryAABB(aabb, (fixture) => {
                const ud = fixture.getBody().getUserData();
                if (ud && ud.pixels && ud.width && ud.height) { hit=true; return false; }
                return true;
            });
            return hit;
        }
        
        // --- START: REPLACEMENT for updatePouredParticles in index.html ---
        function updatePouredParticles() {
            pouredParticles = pouredParticles.filter(p => {
                p.lifespan--;
                if (p.lifespan <= 0) return false;

                p.vy += GRAVITY * 0.5;
                const vx = p.vx, vy = p.vy;
                const steps = Math.ceil(Math.max(Math.abs(vx), Math.abs(vy)));

                if (steps <= 0) return true;

                const stepX = vx / steps, stepY = vy / steps;

                for (let i = 1; i <= steps; i++) {
                    const checkX = p.x + stepX * i, checkY = p.y + stepY * i;
                    const checkIX = Math.floor(checkX), checkIY = Math.floor(checkY);
                    
                    const hitType = getGrid(checkIX, checkIY);
                    const rigidBlocked = getAuxData(etcChunkMap, checkIX, checkIY) === 1;

                    // Check for a collision with ANY non-empty grid cell or a rigid body.
                    if (hitType !== MAT.EMPTY || rigidBlocked) {
                        const finalX = Math.floor(p.x + stepX * (i - 1));
                        const finalY = Math.floor(p.y + stepY * (i - 1));

                        // --- Special Case: STICKY_MATERIALS ---
                        const stickyRules = STICKY_MATERIALS[p.type];
                        if (stickyRules) {
                            let canGlue = false;
                            let newAuxValue = 0;

                            if (stickyRules.stickTo.has(hitType)) {
                                canGlue = true;
                                newAuxValue = 1;
                            } else if (hitType === p.type) {
                                const hitAux = getAuxData(etcChunkMap, checkIX, checkIY);
                                if (hitAux > 0 && hitAux < stickyRules.maxLength) {
                                    canGlue = true;
                                    newAuxValue = hitAux + 1;
                                }
                            }

                            if (canGlue) {
                                // Place the particle at the last empty spot, overwriting any gas that might be there.
                                setGrid(finalX, finalY, p.type, true);
                                setAuxData(etcChunkMap, finalX, finalY, newAuxValue);
                                return false; // Particle is handled.
                            }
                        }
                        
                        // --- THE FIX: If we hit a gas and couldn't stick, ignore the collision. ---
                        if (GASES.has(hitType)) {
                            continue; // Continue to the next sub-step, passing through the gas.
                        }

                        // --- Fallback Settling Logic for non-sticky collisions (sand, water, etc.) ---
                        let placeX = finalX, placeY = finalY;
                        let attempts = 0;
                        while(getGrid(placeX, placeY) !== MAT.EMPTY && attempts < 5) {
                            placeY--;
                            attempts++;
                        }
                        setGrid(placeX, placeY, p.type, true);
                        return false; // Particle is placed.
                    }
                }
                
                // If no collision occurred during any sub-step, update position.
                p.x += vx;
                p.y += vy;
                return true;
            });
        }

        function stepNonLiquid(x, y, moved, grid, w, h, getIdx, setter) {

                }
                if (type === MAT.WATER && MOLTEN_METALS.has(nType)) {
                    _set(x, y, MAT.STEAM);             // Turn self to steam
                    _set(nx, ny, SOLIDIFY_MAP[nType]); // Solidify neighbor
                    if(!isWorldSim && idx!==-1) moved[idx] = 1; return;
                }
            }

            // --- Phase 2: Behaviors (if no reaction occurred) ---
            if (type === MAT.LAVA || MOLTEN_METALS.has(type)) {
                for (const dir of DIRS_4) {
                    const nx = x + dir.x, ny = y + dir.y;
                    const nType = _get(nx, ny);
                    
                    if (isWorldSim && type === MAT.LAVA && nType === MAT.OBSIDIAN) {
                        // Ensure the chunk containing the obsidian is active for future simulation ticks.
                        activateChunkAt(x, y, type);
                        
                        // Only lava can melt obsidian, and only has a small chance to do so.
                        if (type === MAT.LAVA && Math.random() < 0.005) {
                            _set(nx, ny, MAT.LAVA);
                        }
                    }

                    // All hot liquids can ignite things
                    if (isWorldSim) tryIgniteAt(nx, ny, 0.4);
                }
            }

            if (type === MAT.ACID) {
                let consumed = false;
                for (const dir of DIRS_4) {
                    const nx = x + dir.x, ny = y + dir.y;
                    const nType = _get(nx, ny);
                    const isImmune = [MAT.EMPTY,MAT.GLASS,MAT.GLASS_WALL,MAT.ADAMANTIUM,MAT.RUNE_WALL, MAT.OBSIDIAN, ...GASES].includes(nType);
                    if (!isImmune && !isLiquid(nType) && Math.random() < 0.25) {
                        _set(nx, ny, MAT.EMPTY);
                        if (Math.random() < 0.2) { _set(x, y, MAT.EMPTY); consumed = true; break; }
                    }
                }
                if (consumed) { if(!isWorldSim && idx!==-1) moved[idx] = 1; return; }
            }
             if (type === MAT.OIL_BURNING) {
                updateBurningOil(x, y, idx, moved, grid, w, h, getIdx, setter);
             }


            // --- Phase 3: Movement (if no reaction occurred) ---
            if (_getAux(x, y + 1) === 1) { 
                tryMoveLiquidSide(x, y, type, Math.random() < 0.5 ? -1 : 1, 10, 1, idx, moved, grid, w, h, getIdx, setter);
                return;
            }
            const belowType = _get(x, y + 1);
            if (belowType === MAT.FIRE) {
                if (type === MAT.OIL) _set(x, y, MAT.OIL_BURNING);
                else { _set(x, y, MAT.STEAM); _set(x, y + 1, MAT.STEAM); } 
                if(!isWorldSim && idx!==-1) moved[idx] = 1;
                return;
            }
            if ([MAT.EMPTY, ...GASES].includes(belowType)) { 
                _set(x, y, belowType); _set(x, y + 1, type); if(!isWorldSim && idx!==-1) moved[idx] = 1; return;
            }
            if (LIQUID_DENSITY[type] > LIQUID_DENSITY[belowType]) { 
                _set(x, y, belowType); _set(x, y + 1, type); if(!isWorldSim && idx!==-1) moved[idx] = 1; return;
            }
            tryMoveLiquidSide(x, y, type, Math.random() < 0.5 ? -1 : 1, 10, 1, idx, moved, grid, w, h, getIdx, setter);
        }

        function updateGas(x, y, type, idx, moved, grid, w, h, getIdx, setter) {
             const isWorldSim = !grid;
             const _get = (gx, gy) => isWorldSim ? getGrid(gx, gy) : (getIdx(gx, gy) !== -1 ? grid[getIdx(gx, gy)] : MAT.ROCK_WALL);
             const _set = (gx, gy, gtype) => {
                if (isWorldSim) {
                    setGrid(gx, gy, gtype, false);
                    movedInFrame.add(coordToKey(gx, gy));
                } else {
                    const gidx = getIdx(gx, gy);
                    if (gidx !== -1) { setter(gidx, gtype); moved[gidx] = 1; }
                }
            };
            
            const aboveType = _get(x, y - 1);

            // --- START OF MODIFICATION: DENSITY CHECK ---
            // If the space above is another gas, check densities
            if (GASES.has(aboveType)) {
                if (GAS_DENSITY[type] < GAS_DENSITY[aboveType]) {
                    // This gas is lighter, so it should rise. Swap with the gas above.
                    _set(x, y, aboveType);
                    _set(x, y - 1, type);
                    if(!isWorldSim && idx!==-1) moved[idx] = 1;
                    return;
                }
            }
            // Otherwise, check if it can rise into non-gas materials
            else if ([MAT.EMPTY, MAT.WATER, MAT.OIL, MAT.ACID, MAT.SAND, MAT.SOIL, MAT.GUNPOWDER].includes(aboveType)) {
                _set(x, y, aboveType);
                _set(x, y - 1, type);
                 if(!isWorldSim && idx!==-1) moved[idx] = 1;
                return;
            }
            // --- END OF MODIFICATION ---

            // If it can't move up, try to move sideways
            tryMoveLiquidSide(x, y, type, Math.random() < 0.5 ? -1 : 1, 4, -1, idx, moved, grid, w, h, getIdx, setter);
        }

        function tryMoveLiquidSide(x, y, type, dir, limit, vDir, idx, moved, grid, w, h, getIdx, setter) {
            const isWorldSim = !grid;
            const _get = (gx, gy) => isWorldSim ? getGrid(gx, gy) : (getIdx(gx, gy) !== -1 ? grid[getIdx(gx, gy)] : MAT.ROCK_WALL);
            const _set = (gx, gy, gtype) => {
                if (isWorldSim) {
                    setGrid(gx, gy, gtype);
                    movedInFrame.add(coordToKey(gx, gy));
                } else {
                    const gidx = getIdx(gx, gy);
                    if (gidx !== -1) { setter(gidx, gtype); moved[gidx] = 1; }
                }
            };
            const _getAux = (gx, gy) => isWorldSim ? getAuxData(etcChunkMap, gx, gy) : 0;
            
            let targetX = x;
            const movable = [MAT.EMPTY];
            const allMovable = [...LIQUIDS, ...GASES, ...movable];
            for (let i = 1; i <= limit; i++) {
                const nextX = x + (dir * i);
                if (_getAux(nextX, y) === 1) break;
                const content = _get(nextX, y);

                if (GASES.has(type) && GASES.has(content)) {
                    // A gas can only push a gas of equal or greater density sideways.
                    if (GAS_DENSITY[type] < GAS_DENSITY[content]) break;
                }

                if (allMovable.includes(content) && type != content) {
                    targetX = nextX;
                    const vType = _get(nextX, y + vDir);
                    if (movable.includes(vType)) break;
                } else break;
            }

            if (targetX !== x) {
                const tType = _get(targetX, y);
                _set(x, y, tType);
                _set(targetX, y, type);
                if(!isWorldSim && idx!==-1) moved[idx] = 1;
                return true;
            }
            return false;
        }


        function findGroundBelow(x, startY) {
            for (let y = startY; y < startY + 500; y++) {

        function createReservoir({x,y,width,height,fillType,wallType=MAT.WOOD}) {

            const leftX = Math.floor(x - width / 2), rightX = Math.floor(x + width / 2);
            const wallWidth = 2;
            for (let iy = topY; iy <= groundY; iy++) {
                for (let ix = leftX; ix <= rightX; ix++) {

            // --- START: Word Wrapping Implementation ---

            ctx.fillStyle = 'white';
            ctx.font = '8px monospace';
            
            const text = DialogueManager.currentNode.text;
            const textX = boxX + 10;
            let textY = boxY + 30; // The starting Y position for the first line
            const maxWidth = boxW - 20; // Box width minus horizontal padding
            const lineHeight = 10; // The distance between lines of text

            const words = text.split(' ');
            let currentLine = '';

            for (let i = 0; i < words.length; i++) {
                const word = words[i];
                const testLine = currentLine + word + ' ';
                const metrics = ctx.measureText(testLine);

                // If the next word makes the line too long, draw the current line and start a new one.
                if (metrics.width > maxWidth && i > 0) {
                    ctx.fillText(currentLine, textX, textY);
                    currentLine = word + ' ';
                    textY += lineHeight;
                } else {
                    // Otherwise, add the word to the current line.
                    currentLine = testLine;
                }
            }
            // Draw the final remaining line.
            ctx.fillText(currentLine, textX, textY);
            
            // --- END: Word Wrapping Implementation ---

            // Draw Player Options, positioning them dynamically below the wrapped text.
            let yOff = textY + lineHeight + 10; // Start options below the last line of dialogue.
            DialogueManager.currentNode.options.forEach((opt, index) => {

                if (yOff < boxY + boxH - 10) {

                    yOff += 12;
                }
            });

        function renderRigidBodies(startX, startY) {

                for (let i = 0; i < body.pixels.length; i++) {

                }
                if (currentHash !== body.pixelStateHash) {
                    needsCacheUpdate = true;
                    body.pixelStateHash = currentHash;
                }
                if (!hasSprite && body.renderCacheCanvas && body.isShimmering === undefined) {
                    body.isShimmering = false;
                    for (const p of body.pixels) { if (SHIMMERING_METALS.has(p)) { body.isShimmering = true; break; } }

                    const cachePixels = imageData.data;
                    for (let i = 0; i < body.pixels.length; i++) {

                                else { [r, g, b] = varyColor(...color, x, y, type, 8); }

                    }
