        // --- START OF NEW FUNCTION ---
        /**
         * Draws the correct background for a single pixel, prioritizing set piece backgrounds
         * over the default tiled background.
         * @param {Uint8ClampedArray} pixels - The destination image data array.
         * @param {number} destI - The starting index in the destination array for this pixel.
         * @param {number} worldX - The world X coordinate of the pixel.
         * @param {number} worldY - The world Y coordinate of the pixel.
         * @param {Array} visibleSetPieceBGs - Pre-calculated list of visible set piece background data.
         * @param {Uint8ClampedArray} bgData - The default tiled background's image data.
         * @param {number} bgWidth - The width of the default background tile.
         * @param {number} bgHeight - The height of the default background tile.
         */
        function drawBackgroundForPixel(pixels, destI, worldX, worldY, visibleSetPieceBGs, bgData, bgWidth, bgHeight) {
            // Step 1: Check for a set piece background for this pixel
            for (const bg of visibleSetPieceBGs) {
                // Check if the current world coordinate falls within this set piece's bounds
                if (worldX >= bg.bounds.x && worldX < bg.bounds.x + bg.bounds.width &&
                    worldY >= bg.bounds.y && worldY < bg.bounds.y + bg.bounds.height)
                {
                    // It does. Now find the corresponding pixel in the background image data.
                    const localX = worldX - bg.bounds.x;
                    const localY = worldY - bg.bounds.y;
                    const srcI = (localY * bg.width + localX) * 4;

                    // Only draw if the source pixel is not transparent
                    if (bg.imageData[srcI + 3] > 128) {
                        pixels[destI]     = bg.imageData[srcI];
                        pixels[destI + 1] = bg.imageData[srcI + 1];
                        pixels[destI + 2] = bg.imageData[srcI + 2];
                        pixels[destI + 3] = 255;
                        return; // We've drawn the correct background, so we're done.
                    }
                }
            }

            // Step 2: If no set piece background was found, draw the default tiled background
            const bgX = (worldX % bgWidth + bgWidth) % bgWidth;
            const bgY = (worldY % bgHeight + bgHeight) % bgHeight;
            const bgI = (bgY * bgWidth + bgX) * 4;
            pixels[destI]     = bgData[bgI];
            pixels[destI + 1] = bgData[bgI + 1];
            pixels[destI + 2] = bgData[bgI + 2];
            pixels[destI + 3] = 255;
        }

        // --- START OF NEW FUNCTION ---
        /**
         * Scans all set pieces and returns an array of data for those whose
         * background images are currently visible on screen.
         * @returns {Array<object>} An array of objects, each containing bounds, imageData, and width for a visible background.
         */
        function getVisibleSetPieceBackgrounds() {
            const visibleBGs = [];
            for (const piece of SetPieceManager.setPieces) {
                // Check if the piece has the necessary data to be rendered
                if (!piece.backgroundImageData || !piece.parsedData) continue;

                // Calculate the set piece's world position and bounds
                const targetSX = playerSpawnSX + piece.targetSectorOffsetX;
                const targetSY = playerSpawnSY + piece.targetSectorOffsetY;
                const halfW = Math.floor(piece.parsedData.width / 2);
                const halfH = Math.floor(piece.parsedData.height / 2);
                const centerX = (targetSX * SECTOR_SIZE) + piece.spawnLocalX;
                const centerY = (targetSY * SECTOR_SIZE) + piece.spawnLocalY;
                const pieceBounds = {
                    x: centerX - halfW,
                    y: centerY - halfH,
                    width: piece.parsedData.width,
                    height: piece.parsedData.height
                };

                // Check for intersection with the camera's view frustum
                if (pieceBounds.x < camera.x + viewWidth &&
                    pieceBounds.x + pieceBounds.width > camera.x &&
                    pieceBounds.y < camera.y + viewHeight &&
                    pieceBounds.y + pieceBounds.height > camera.y)
                {
                    // If visible, add its pre-calculated data to the list for the renderer to use
                    visibleBGs.push({
                        bounds: pieceBounds,
                        imageData: piece.backgroundImageData.data,
                        width: piece.backgroundImageData.width,
                    });
                }
            }
            return visibleBGs;
        }


        function render() {
            // Reset per-frame data
            firePixelsCoords = [];
            glowingPixelsCoords = [];

            const startX = Math.floor(camera.x);
            const startY = Math.floor(camera.y);

            const deltaX = startX - lastCameraX;
            const deltaY = startY - lastCameraY;

            // --- 1. PREPARE THE MAIN CANVAS ---
            if (isRenderCacheInvalid) {
                // If the entire cache is invalid, we don't need to do any clever shifting.
                // We'll just redraw everything later.
            } else {
                // The cache is valid. Start by drawing the entire (potentially outdated) cache
                // to the main visible canvas. Then, shift it to match camera movement.
                ctx.globalCompositeOperation = 'copy';
                ctx.drawImage(cacheCanvas, -deltaX, -deltaY);
                ctx.globalCompositeOperation = 'source-over';
            }

            // --- 2. IDENTIFY AND REDRAW DIRTY REGIONS ---
            const dirtyRects = [];
            if (isRenderCacheInvalid) {
                dirtyRects.push({ x: 0, y: 0, w: renderWidth, h: renderHeight });
            } else {
                // Add rects for newly exposed areas due to camera movement
                if (deltaX > 0) dirtyRects.push({ x: renderWidth - deltaX, y: 0, w: deltaX, h: renderHeight });
                if (deltaX < 0) dirtyRects.push({ x: 0, y: 0, w: -deltaX, h: renderHeight });
                if (deltaY > 0) dirtyRects.push({ x: 0, y: renderHeight - deltaY, w: renderWidth, h: deltaY });
                if (deltaY < 0) dirtyRects.push({ x: 0, y: 0, w: renderWidth, h: -deltaY });

                // --- START OF MODIFICATION ---
                // Combine all active chunk sets into one for rendering.
                // A Set automatically handles duplicates.
                const allRenderActiveChunks = new Set([
                    ...activeSolidChunks, 
                    ...activeLiquidChunks, 
                    ...activeGasChunks,
                    ...persistentGlowingChunks,
                    ...chunksWithLightingChanges // Add our static glowing chunks here
                ]);

                // Add rects for active simulation chunks
                for (const key of allRenderActiveChunks) {
                    const chunk = chunkMap.get(key);
                    if (chunk) {
                        dirtyRects.push({
                            x: chunk.cx * CHUNK_SIZE - startX,
                            y: chunk.cy * CHUNK_SIZE - startY,
                            w: CHUNK_SIZE,
                            h: CHUNK_SIZE
                        });
                    }

                // --- END OF MODIFICATION ---
            }

            if (!player.isSpawning) {
                const playerScreenX = player.x - startX;
                const playerScreenY = player.y - startY;
                const playerDirtyRadius = 16; // A 32x32 pixel box around the player's center
                dirtyRects.push({
                    x: playerScreenX + player.width / 2 - playerDirtyRadius,
                    y: playerScreenY + player.height / 2 - playerDirtyRadius,
                    w: playerDirtyRadius * 2,
                    h: playerDirtyRadius * 2
                });
            }

            const visibleSetPieceBGs = getVisibleSetPieceBackgrounds();

            // This is our main buffer for drawing new pixels for this frame
            const currentFrameImageData = ctx.getImageData(0, 0, renderWidth, renderHeight);
            const currentFramePixels = currentFrameImageData.data;

            // Loop through only the identified dirty rectangles
            for (const rect of dirtyRects) {
                const rStartX = Math.max(0, Math.floor(rect.x));
                const rStartY = Math.max(0, Math.floor(rect.y));
                const rEndX = Math.min(renderWidth, Math.ceil(rect.x + rect.w));
                const rEndY = Math.min(renderHeight, Math.ceil(rect.y + rect.h));

                for (let screenY = rStartY; screenY < rEndY; screenY++) {
                    for (let screenX = rStartX; screenX < rEndX; screenX++) {
                        const worldX = screenX + startX;
                        const worldY = screenY + startY;
                        const destI = (screenY * renderWidth + screenX) * 4;

                        // --- NEW INTEGRATED BACKGROUND LOGIC ---
                        let backgroundDrawn = false;

                        // Priority 1: Try to draw a set piece background.
                        for (const bg of visibleSetPieceBGs) {
                            if (worldX >= bg.bounds.x && worldX < bg.bounds.x + bg.bounds.width &&
                                worldY >= bg.bounds.y && worldY < bg.bounds.y + bg.bounds.height) {
                                const localX = worldX - bg.bounds.x;
                                const localY = worldY - bg.bounds.y;
                                const srcI = (localY * bg.width + localX) * 4;
                                if (bg.imageData[srcI + 3] > 128) {
                                    currentFramePixels[destI]     = bg.imageData[srcI];
                                    currentFramePixels[destI + 1] = bg.imageData[srcI + 1];
                                    currentFramePixels[destI + 2] = bg.imageData[srcI + 2];
                                    currentFramePixels[destI + 3] = 255;
                                    backgroundDrawn = true;
                                    break; // Found the right BG, stop checking others.
                                }
                            }
                        }

                        // Priority 2: If no set piece BG, draw the procedural sector background.
                        if (!backgroundDrawn) {
                            const sectorX = Math.floor(worldX / SECTOR_SIZE);
                            const sectorY = Math.floor(worldY / SECTOR_SIZE);
                            const sectorKey = coordToKey(sectorX, sectorY);
                            const bgImageData = sectorBackgrounds.get(sectorKey);

                            if (bgImageData) {
                                const localX = worldX - sectorX * SECTOR_SIZE;
                                const localY = worldY - sectorY * SECTOR_SIZE;
                                const srcI = (localY * SECTOR_SIZE + localX) * 4;
                                const bgData = bgImageData.data;
                                currentFramePixels[destI]     = bgData[srcI];

        function updateGrimoireHover() {
            GrimoireManager.hoveredRune = null;
            if (!GrimoireManager.isVisible || GrimoireManager.activeTab !== 'grimoire_runes') return;

            const mouseX = mouse.x / scale;
            const mouseY = mouse.y / scale;

            const boxW = 440, boxH = 260, boxX = (renderWidth - boxW) / 2, boxY = (renderHeight - boxH) / 2;
            const contentX = boxX, contentY = boxY + 20, contentW = boxW;
            const RUNE_SLOT_SIZE = 16, RUNE_SLOT_SPACING = 4;

            // Check recipe area
            const RECIPE_ROW_HEIGHT = RUNE_SLOT_SIZE + 6;
            let recipeY = contentY + 15;
            for (let i = 0; i < player.grimoire.maxPages; i++) {
                const page = player.grimoire.pages[i];
                if (page && mouseY >= recipeY && mouseY < recipeY + RUNE_SLOT_SIZE) {
                    let slotX = contentX + 40;
                    for (let j = 0; j < page.maxRunes; j++) {
                        if (mouseX >= slotX && mouseX < slotX + RUNE_SLOT_SIZE && page.runes[j]) {
                            GrimoireManager.hoveredRune = { text: getRuneTooltipText(page.runes[j]), x: slotX, y: recipeY }; return;
                        }
                        slotX += RUNE_SLOT_SIZE + RUNE_SLOT_SPACING;
                    }
                }
                recipeY += RECIPE_ROW_HEIGHT;
            }
            
            // Check rune repertoire area
            const recipeAreaHeight = (player.grimoire.maxPages * RECIPE_ROW_HEIGHT) + 30;
            const runeAreaY = contentY + recipeAreaHeight;
            const categories = ['Source', 'Action', 'Control', 'Forma', 'Meta'];
            let currentY = runeAreaY + 20;
            for (const category of categories) {
                let currentX = contentX + 80;
                for (const runeId in RUNE_DEFINITIONS) {
                    const runeDef = RUNE_DEFINITIONS[runeId];
                    if (runeDef.category === category) {
                        if (mouseX >= currentX && mouseX < currentX + RUNE_SLOT_SIZE && mouseY >= currentY && mouseY < currentY + RUNE_SLOT_SIZE) {
                            if (player.runeInventory.knownRunes.has(runeId)) {
                                GrimoireManager.hoveredRune = { text: getRuneTooltipText({id: runeId}), x: currentX, y: currentY }; return;
                            }
                        }
                        currentX += RUNE_SLOT_SIZE + RUNE_SLOT_SPACING;
                    }
                }
                currentY += RUNE_SLOT_SIZE + RUNE_SLOT_SPACING;
            }

            // --- NEW: Check filter area ---
            const FILTERS_PER_ROW = 4;
            const startX = contentX + contentW - 100;
            let filterY = runeAreaY + 40;
            const knownFilters = Array.from(player.runeInventory.known_filters);
            for (let i = 0; i < knownFilters.length; i++) {
                const col = i % FILTERS_PER_ROW;
                const row = Math.floor(i / FILTERS_PER_ROW);
                const filterX = startX + col * (RUNE_SLOT_SIZE + RUNE_SLOT_SPACING);
                filterY = runeAreaY + 40 + row * (RUNE_SLOT_SIZE + RUNE_SLOT_SPACING);
                if (mouseX >= filterX && mouseX < filterX + RUNE_SLOT_SIZE && mouseY >= filterY && mouseY < filterY + RUNE_SLOT_SIZE) {
                    const matId = knownFilters[i];
                    GrimoireManager.hoveredRune = { text: getRuneTooltipText({id: 'filter_by', target: matId}), x: filterX, y: filterY };
                    return;
                }
            }
        }

        function renderCompendiumList(x, y, w, h) {
            const itemHeight = 12;
            let itemList = [], isMaterialList = false;

            switch(GrimoireManager.compendiumActiveCategory) {
                case 'materials':
                    itemList = Object.keys(MATERIAL_ESSENCES).map(id => parseInt(id)).sort((a,b)=>MATERIAL_NAME[a].localeCompare(MATERIAL_NAME[b]));
                    isMaterialList = true;
                    break;
                case 'potions':
                    itemList = Object.keys(POTION_DEFINITIONS).sort();
                    break;
                // TODO: Cases for oils, alkahests, gems
                default:
                    ctx.fillStyle = '#666'; ctx.textAlign='center';
                    ctx.fillText("[Not Implemented]", x + w / 2, y + h / 2);
                    return;
            }

            const contentHeight = itemList.length * itemHeight;
            const maxScroll = Math.max(0, contentHeight - h);
            if (GrimoireManager.compendiumListScroll > maxScroll) GrimoireManager.compendiumListScroll = maxScroll;
            if (GrimoireManager.compendiumListScroll < 0) GrimoireManager.compendiumListScroll = 0;

            let yOff = y + 10 - GrimoireManager.compendiumListScroll;
            ctx.font = '8px monospace'; ctx.textAlign = 'left';

            ctx.save();
            ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();

            for (const itemId of itemList) {

                        isDiscovered = player.discoveredMaterials.has(itemId);

        function renderBloom() {
            const bloomResolution = 4;
            const blurPasses = 3;
            const bloomWidth = bloomCanvas.width;
            const bloomHeight = bloomCanvas.height;
            const MAX_COMPOUND_INTENSITY = 1.5;
            const BLOOM_BRIGHTNESS_MULTIPLIER = 200; // Tweakable: how bright the final bloom is

            // --- PASS 1: Accumulate bloom intensity into the R, G, and B grids ---
            bloomGrid.r.fill(0);
            bloomGrid.g.fill(0);
            bloomGrid.b.fill(0);

            for (const p of glowingPixelsCoords) {
                let intensity = 0;
                // Normalize color from 0-255 to 0-1 range for multiplication
                const normR = p.r / 255;
                const normG = p.g / 255;
                const normB = p.b / 255;

                if (p.type) { // From grid material
                    intensity = BLOOM_MATERIALS[p.type]?.intensity || 0;
                } else if (p.intensity) { // From particle
                    intensity = p.intensity;
                }
                if (intensity <= 0) continue;
                
                const bx = Math.floor(p.x / bloomResolution);
                const by = Math.floor(p.y / bloomResolution);
                const bloomIdx = by * bloomWidth + bx;

                // Add intensity to each channel, weighted by the source color
                bloomGrid.r[bloomIdx] = Math.min(MAX_COMPOUND_INTENSITY, bloomGrid.r[bloomIdx] + intensity * normR);
                bloomGrid.g[bloomIdx] = Math.min(MAX_COMPOUND_INTENSITY, bloomGrid.g[bloomIdx] + intensity * normG);
                bloomGrid.b[bloomIdx] = Math.min(MAX_COMPOUND_INTENSITY, bloomGrid.b[bloomIdx] + intensity * normB);
            }

            // --- PASS 2: Render the accumulated color grids to the bloom canvas ---
            bloomCtx.clearRect(0, 0, bloomWidth, bloomHeight);
            bloomCtx.globalCompositeOperation = 'source-over';

            for (let i = 0; i < bloomGrid.r.length; i++) {
                const rInt = bloomGrid.r[i];
                const gInt = bloomGrid.g[i];
                const bInt = bloomGrid.b[i];

                if (rInt > 0 || gInt > 0 || bInt > 0) {
                    const bx = i % bloomWidth;
                    const by = Math.floor(i / bloomWidth);
                    // Convert intensity back to a 0-255 color value for drawing
                    const r = Math.min(255, rInt * BLOOM_BRIGHTNESS_MULTIPLIER);
                    const g = Math.min(255, gInt * BLOOM_BRIGHTNESS_MULTIPLIER);
                    const b = Math.min(255, bInt * BLOOM_BRIGHTNESS_MULTIPLIER);

                    bloomCtx.fillStyle = `rgb(${r|0}, ${g|0}, ${b|0})`;
                    bloomCtx.fillRect(bx, by, 1, 1);
                }
            }

            // --- PASS 3: Blur the canvas and draw it additively onto the main screen ---
            bloomCtx.globalCompositeOperation = 'copy';
            for (let i = 0; i < blurPasses; i++) {
                bloomCtx.filter = `blur(${1 << i}px)`;
                bloomCtx.drawImage(bloomCanvas, 0, 0);
            }
            bloomCtx.filter = 'none';

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = 1.0;
            ctx.drawImage(bloomCanvas, 0, 0, renderWidth, renderHeight);
            ctx.restore();
        }

        /**
         * Generates a procedural wood grain color for a given pixel coordinate.
         * @param {number} x - The world X coordinate.
         * @param {number} y - The world Y coordinate.
         * @param {Array<number>} baseRGB - The base [r, g, b] color for the wood.
         * @returns {Array<number>} The final [r, g, b] color with a wood texture.
         */
        function woodColor(x, y, baseRGB) {
            // Main grain pattern - stretched vertically for a typical wood grain look.
            // Using different noise "layers" (the third parameter) adds variety.
            const grainNoise = PerlinNoise.noise(x * 0.08, y * 0.4, 10);

            // A second, finer noise layer for subtle texture and imperfections.
            const textureNoise = PerlinNoise.noise(x * 0.7, y * 0.7, 20);

            // Define the darker color for the grain lines by reducing the base color's brightness.
            const darkColor = [baseRGB[0] * 0.65, baseRGB[1] * 0.65, baseRGB[2] * 0.55];

            // The 'grainNoise' creates smooth waves. We'll use its fractional part to create sharp, repeating bands.
            // Multiplying by a number (e.g., 7) makes the bands denser.
            const bandValue = (grainNoise * 7) % 1.0;

            let r, g, b;

            // Create sharp, dark lines for the grain based on a threshold.
            if (bandValue < 0.25) {
                [r, g, b] = darkColor;
            } else {
                [r, g, b] = baseRGB;
            }

            // Apply the subtle texture noise to both light and dark bands for more realism.
            // This breaks up the flat colors and makes the texture feel more organic.
            const textureMod = (textureNoise - 0.5) * 35; // Varies brightness by +/- 17.5
            r = Math.max(0, Math.min(255, r + textureMod));
            g = Math.max(0, Math.min(255, g + textureMod));
            b = Math.max(0, Math.min(255, b + textureMod));

            return [r | 0, g | 0, b | 0];
        }

        function updateMagicParticles() {
            // --- Tweakable constants for the wisp/dissolve effect ---
            const WISP_DRAG = 0.98; // Closer to 1 = less drag. 0.98 is a good starting point.
            const WISP_WIND_STRENGTH = 0.04; // How much the "wind" affects the particles.
            const WISP_NOISE_SCALE = 0.05; // How "large" the wind swirls are. Lower = larger swirls.
            const WISP_TIME_SCALE = 0.01; // How fast the wind pattern changes over time.

            for (let i = 0; i < MAX_MAGIC_PARTICLES; i++) {
                const p = magicParticlePool[i];
                if (!p.active) continue;

                // --- START: Particle State Machine ---

                // --- NEW SHAPE PARTICLE STATE MACHINE ---
                if (p.isShapeParticle) {
                    switch (p.phase) {
                        case 'waiting':
                            // The particle is invisible during this phase.
                            p.spawnDelay--;
                            if (p.spawnDelay <= 0) {
                                // Time to appear and start holding/blinking.
                                p.phase = 'hold';
                            }
                            break;

                        case 'hold':
                            p.holdTime--;
                            if (p.holdTime <= 0) {
                                p.phase = 'wisp';
                                // Give it a small kick to start the wisp motion.
                                p.vx = (Math.random() - 0.5) * 0.5;
                                p.vy = (Math.random() - 0.5) * 0.5;
                            }
                            break;
                        
                        case 'wisp':
                            // This logic remains the same.
                            const noiseAngle = PerlinNoise.noise(p.x * WISP_NOISE_SCALE, p.y * WISP_NOISE_SCALE, frameCount * WISP_TIME_SCALE) * Math.PI * 4;
                            p.vx += Math.cos(noiseAngle) * WISP_WIND_STRENGTH;
                            p.vy += Math.sin(noiseAngle) * WISP_WIND_STRENGTH;
                            p.vx *= WISP_DRAG;
                            p.vy *= WISP_DRAG;
                            break;
                    }
                } else if (p.isStoringParticle) {
                    const targetX = player.x + player.width / 2;
                    const targetY = player.y + player.height / 2;
                    const distSq = (targetX - p.x)**2 + (targetY - p.y)**2;

                    if (distSq < 16) {
                        p.lifespan = 0;
                        continue;
                    }
                    
                    // --- START OF THE FIX: Homing Logic ---
                    const speed = Math.hypot(p.vx, p.vy); // Get the particle's current speed
                    const dx = targetX - p.x;
                    const dy = targetY - p.y;
                    const dist = Math.sqrt(distSq); // We need the actual distance now for normalization

                    // Re-calculate the velocity vector to always point at the player,
                    // but maintain the particle's current speed.
                    p.vx = (dx / dist) * speed;
                    p.vy = (dy / dist) * speed;

                    // Apply drag to make them slow down as they approach the player
                    p.vx *= 0.95;
                    p.vy *= 0.95;
                    // --- END OF THE FIX ---
                }

                // --- Universal Updates (apply to all active particles) ---
                p.x += p.vx;
                p.y += p.vy;
                if (p.gravity) {
                    p.vy += p.gravity;
                }
                
                p.lifespan--;

                if (p.lifespan <= 0) {
                    p.active = false;
                    // CRITICAL: Reset all custom flags when the particle is returned to the pool
                    p.isShapeParticle = false; 
                    p.bloomIntensity = 0;
                    p.alpha = undefined;
                    p.isStoringParticle = false;
                }
            }
        }

        /**
         * Generic helper to prioritize and limit a list of chunks.
         */
        function prioritizeChunkList(pending, next, active, limit, camBounds, playerChunk) {
            const allChunks = new Set([...pending, ...next]);
            next.clear();

            const priorityChunks = new Set();
            const otherChunks = [];

            for (const key of allChunks) {
                const chunk = chunkMap.get(key);
                if (!chunk) continue;

                if (chunk.cx >= camBounds.x1 && chunk.cx <= camBounds.x2 && chunk.cy >= camBounds.y1 && chunk.cy <= camBounds.y2) {
                    priorityChunks.add(key);
                } else {
                    otherChunks.push(key);
                }
            }

            otherChunks.sort((a, b) => {
                const chunkA = chunkMap.get(a);
                const chunkB = chunkMap.get(b);
                if (!chunkA || !chunkB) return 0;
                const distA = (chunkA.cx - playerChunk.x) ** 2 + (chunkA.cy - playerChunk.y) ** 2;
                const distB = (chunkB.cx - playerChunk.x) ** 2 + (chunkB.cy - playerChunk.y) ** 2;
                return distA - distB;
            });

            const processingOrder = [...priorityChunks, ...otherChunks];
            const chunksToProcess = processingOrder.slice(0, limit);
            const newPending = processingOrder.slice(limit);

            active.clear();
            for (const key of chunksToProcess) active.add(key);
            return newPending;
        }

            const playerChunk = { x: Math.floor(player.x / CHUNK_SIZE), y: Math.floor(player.y / CHUNK_SIZE) };

                // Use a Set to prevent processing the same chunk multiple times in one frame.
                const processed = new Set(lightingDirtyChunks);
                lightingDirtyChunks.clear();

                // Process the queue until all light propagation for this frame is complete.

                    // 3. Process the current chunk and get its list of affected neighbors.
                    const newNeighbors = updateLightingForChunk(chunkKey);
                    
                    // 4. Add any new, unprocessed neighbors to the queue to continue the cascade.
                    for (const neighborKey of newNeighbors) {

                { dx: 1, dy: 0 }, // Right
                { dx: -1, dy: 0 }, // Left
                { dx: 0, dy: 1 }, // Bottom
                { dx: 0, dy: -1 }  // Top
            ];

            for (const dir of directions) {
                const neighborSX = sx + dir.dx;
                const neighborSY = sy + dir.dy;
                const neighborSector = sectorGrid.get(coordToKey(neighborSX, neighborSY));

                // Check if the neighbor exists and is already loaded.
                if (neighborSector && neighborSector.state === 'ready') {
                    
                    // --- We found a seam that needs updating ---

                    if (dir.dx !== 0) { // Horizontal seam (left/right)
                        const newSectorBorderCX = (dir.dx === -1) ? (sx * chunksPerSector) : ((sx + 1) * chunksPerSector - 1);
                        const neighborBorderCX = (dir.dx === -1) ? (sx * chunksPerSector - 1) : ((sx + 1) * chunksPerSector);
                        
                        const startCY = sy * chunksPerSector;
                        const endCY = startCY + chunksPerSector;
                        for (let cy = startCY; cy < endCY; cy++) {
                            lightingDirtyChunks.add(coordToKey(newSectorBorderCX, cy));
                            lightingDirtyChunks.add(coordToKey(neighborBorderCX, cy));
                        }
                    } else { // Vertical seam (top/bottom)
                        const newSectorBorderCY = (dir.dy === -1) ? (sy * chunksPerSector) : ((sy + 1) * chunksPerSector - 1);
                        const neighborBorderCY = (dir.dy === -1) ? (sy * chunksPerSector - 1) : ((sy + 1) * chunksPerSector);

                        const startCX = sx * chunksPerSector;
                        const endCX = startCX + chunksPerSector;
                        for (let cx = startCX; cx < endCX; cx++) {
                            lightingDirtyChunks.add(coordToKey(cx, newSectorBorderCY));
                            lightingDirtyChunks.add(coordToKey(cx, neighborBorderCY));
                        }
                    }
                }
            }
        }

        /**
         * Updates the lighting for all pixels within a single chunk and identifies which
         * neighboring chunks have been affected and now also need an update.
         * @param {number} chunkKey - The unique key for the chunk to process.
         * @returns {Set<number>} - A Set containing the keys of any neighboring chunks that need to be updated.
         */
        function updateLightingForChunk(chunkKey) {
            const affectedNeighbors = new Set();
            const chunk = chunkMap.get(chunkKey);
            if (!chunk) return affectedNeighbors;

            const startX = chunk.cx * CHUNK_SIZE;
            const startY = chunk.cy * CHUNK_SIZE;

            // A flag to see if any light level in this chunk actually changed.
            let anyChange = false;

            // Iterate through all pixels in this chunk to update their light levels by "pulling" from neighbors.
            for (let ly = 0; ly < CHUNK_SIZE; ly++) {
                for (let lx = 0; lx < CHUNK_SIZE; lx++) {
                    const x = startX + lx;
                    const y = startY + ly;

                    const currentLight = getAuxData(lightChunkMap, x, y);
                    let newLight = 0;
                    const type = getGrid(x, y);

                    if ([MAT.EMPTY, MAT.STEAM].includes(type)) {
                        newLight = MAX_LIGHT_LEVEL;
                    }

                    const DIRS_4 = [{ x: -1, y: 0 }, { x: 1, y: 0 }, { x: 0, y: -1 }, { x: 0, y: 1 }];
                    for (const dir of DIRS_4) {
                        const nX = x + dir.x;
                        const nY = y + dir.y;
                        const lightLoss = WALL_TYPES.has(type) ? 3 : 0;
                        newLight = Math.max(newLight, getAuxData(lightChunkMap, nX, nY) - lightLoss);
                    }

                    if (newLight > currentLight) {
                        setAuxData(lightChunkMap, x, y, newLight);
                        anyChange = true;
                    }
                }
            }

            // If any light level in this chunk was increased, its neighbors might now need an update.
            if (anyChange) {
                affectedNeighbors.add(coordToKey(chunk.cx + 1, chunk.cy));
                affectedNeighbors.add(coordToKey(chunk.cx - 1, chunk.cy));
                affectedNeighbors.add(coordToKey(chunk.cx, chunk.cy + 1));
                affectedNeighbors.add(coordToKey(chunk.cx, chunk.cy - 1));
            }

            return affectedNeighbors;
        }

        function updateInteractions() {
            for (const trigger of triggers) {
                if (trigger.isDestroyed) continue;

                const isInside = (player.x + player.width > trigger.x && player.x < trigger.x + trigger.width &&
                                  player.y + player.height > trigger.y && player.y < trigger.y + trigger.height);

                if (isInside && !trigger.isActive) {
                    // Player has just entered
                    trigger.isActive = true;
                    if (trigger.onEnter) trigger.onEnter(trigger);
                } else if (!isInside && trigger.isActive) {
                    // Player has just left
                    trigger.isActive = false;
                    if (trigger.onLeave) trigger.onLeave(trigger);
                }
            }

            let closestInteractable = null;
            let minDistanceSq = PLAYER_INTERACTION_RADIUS * PLAYER_INTERACTION_RADIUS;

            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;

            // Phase 1: Check static triggers (like the alchemy slab or NPC dialogues)
            for (const trigger of triggers) {
                if (trigger.isDestroyed) continue;
                
                const isInside = (player.x + player.width > trigger.x && player.x < trigger.x + trigger.width &&
                                  player.y + player.height > trigger.y && player.y < trigger.y + trigger.height);
                
                if (isInside) {
                    const triggerCenterX = trigger.x + trigger.width / 2;
                    const triggerCenterY = trigger.y + trigger.height / 2;
                    const distSq = (playerCenterX - triggerCenterX)**2 + (playerCenterY - triggerCenterY)**2;

                    if (distSq < minDistanceSq) {
                        minDistanceSq = distSq;
                        closestInteractable = { type: 'trigger', target: trigger };
                    }
                }
            }

            // Phase 2: Check dynamic, pickupable objects
            for (const body of rigidBodies) {
                if (body.isDestroyed || !body.body || !body.body.getUserData().isPickup) continue;

                const bodyPos = body.body.getPosition();
                const worldX = bodyPos.x * B2_SCALE;
                const worldY = bodyPos.y * B2_SCALE;

                const distSq = (playerCenterX - worldX)**2 + (playerCenterY - worldY)**2;

                if (distSq < minDistanceSq) {
                    minDistanceSq = distSq;
                    closestInteractable = { type: 'object', target: body };
                }
            }

            // Final Step: Update the player's state
            player.currentInteractable = closestInteractable;
            player.canInteract = (closestInteractable !== null);
        }

            }, 500));
            gameLoop();
        }

        function updateWorldColliders(now) {
            const neededChunks = new Set(),
                lookahead = 1,
                allDynBodies = [...rigidBodies, player];
            for (const bodyObj of allDynBodies) {
                if (!bodyObj.body) continue;
                const body = bodyObj.body;
                let aabb = null;
                for (let f = body.getFixtureList(); f; f = f.getNext()) {
                    const f_aabb = f.getAABB(0);
                    if (!aabb) aabb = { lX: f_aabb.lowerBound.x, lY: f_aabb.lowerBound.y, uX: f_aabb.upperBound.x, uY: f_aabb.upperBound.y };
                    else { aabb.lX = Math.min(aabb.lX, f_aabb.lowerBound.x); aabb.lY = Math.min(aabb.lY, f_aabb.lowerBound.y); aabb.uX = Math.max(aabb.uX, f_aabb.upperBound.x); aabb.uY = Math.max(aabb.uY, f_aabb.upperBound.y); }
                }
                if (!aabb) continue;
                const minCX = Math.floor(aabb.lX * B2_SCALE / CHUNK_SIZE) - lookahead,
                    maxCX = Math.ceil(aabb.uX * B2_SCALE / CHUNK_SIZE) + lookahead;
                const minCY = Math.floor(aabb.lY * B2_SCALE / CHUNK_SIZE) - lookahead,
                    maxCY = Math.ceil(aabb.uY * B2_SCALE / CHUNK_SIZE) + lookahead;
                for (let cy = minCY; cy <= maxCY; cy++)
                    for (let cx = minCX; cx <= maxCX; cx++) {
                        // --- THIS IS THE FIX ---
                        neededChunks.add(coordToKey(cx, cy)); // Use numeric key
                    }
            }
            for (const key of activeStaticChunks) {
                if (!neededChunks.has(key)) {
                    const chunk = chunkMap.get(key);
                    if (chunk && chunk.staticBody) chunk.staticBody.setActive(false);
                }
            }
            for (const key of neededChunks) {
                const chunk = getChunk(chunkMap, key);
                if (chunk.dirty && chunk.staticBody) {
                    if (now - chunk.lastRegenTime > REGEN_COOLDOWN) { world.destroyBody(chunk.staticBody); chunk.staticBody = null; }
                }
                if (!chunk.staticBody) { chunk.staticBody = generateStaticBodyForChunk(chunk); chunk.dirty = false; chunk.lastRegenTime = now; }
                chunk.staticBody.setActive(true);
            }
            activeStaticChunks = neededChunks;
        }

        function updateRigidBodies(now) {
            // THE FIX: Only run the expensive collider update logic periodically.
            if (now - lastColliderUpdateTime > COLLIDER_UPDATE_INTERVAL) {
                updateWorldColliders(now);
                lastColliderUpdateTime = now;
            }

            SandForceManager.scanAndApplyForces();

            // The core physics step still runs every frame.
            world.step(1 / 60, 10, 5);
        }

        // --- START OF REPLACEMENT ---
        /**
         * Generates a static physics body for a chunk's solid terrain using efficient pl.Chain shapes.
         * This creates clean outlines instead of messy triangulated meshes.
         * @param {object} chunk - The chunk object containing the terrain data.
         * @returns {object} The newly created planck.js Body.
         */
        function generateStaticBodyForChunk(chunk) {
            const body = world.createBody({ type: 'static' });
            const startX = chunk.cx * CHUNK_SIZE;
            const startY = chunk.cy * CHUNK_SIZE;

            // Step 1: Create a binary mask of solid terrain (same as before).
            const mask = new Uint8Array(CHUNK_SIZE * CHUNK_SIZE);
            for (let y = 0; y < CHUNK_SIZE; y++) {
                for (let x = 0; x < CHUNK_SIZE; x++) {
                    const wX = startX + x;
                    const wY = startY + y;
                    // --- START OF MODIFICATION ---
                    let isSolid = isSolidForPlayer(getGrid(wX, wY)) && getAuxData(etcChunkMap, wX, wY) !== 1;

                    // Check if we are inside the no-settle zone
                    const zone = SandForceManager.noSettleZone;
                    if (zone && wX >= zone.minX && wX <= zone.maxX && wY >= zone.minY && wY <= zone.maxY) {
                        // If inside the zone, PREVENT sand-like materials from becoming part of the static body
                        const type = getGrid(wX, wY);
                        if (MATERIALS_TO_WEIGH[type]) { // Add any other materials you want to weigh
                             isSolid = false;
                        }
                    }
                    
                    mask[y * CHUNK_SIZE + x] = isSolid ? 1 : 0;
                }
            }

            // Step 2: Extract contiguous islands of solid pixels (same as before).
            const islands = extractIslands(mask, CHUNK_SIZE, CHUNK_SIZE);

            // Step 3: For each island, create a single, efficient Chain fixture.
            for (const island of islands) {
                // Find and simplify the outline (same as before).
                const outline = marchingSquares(island, CHUNK_SIZE, CHUNK_SIZE);
                if (outline.length < 3) continue;
                const simplifiedPre = simplifyDouglasPeucker(outline, 0.2);
                if (simplifiedPre.length < 3) continue;
                const simplified = removeCollinear(simplifiedPre, 0.001);
                if (simplified.length < 3) continue;

                // --- NEW LOGIC: Create a pl.Chain instead of triangulating ---

                // Convert the simplified local points to world-space physics coordinates.
                const worldVertices = simplified.map(p => 
                    pl.Vec2((startX + p.x) / B2_SCALE, (startY + p.y) / B2_SCALE)
                );

                // Create a Chain shape. The 'true' flag creates a closed loop, which is perfect for terrain.
                const chainShape = pl.Chain(worldVertices, true);

                // Create a single fixture for the entire island's outline.
                body.createFixture(chainShape);
            }

            body.setActive(false);
            return body;
        }
        // --- END OF REPLACEMENT ---
        
        // --- START OF REPLACEMENT ---
        function renderPlayerStatsUI() {
            const barW = 75,
                barH = 8,
                x = 16;
            let y = 8;
            const textYOffset = barH / 2; // Center text vertically
            ctx.imageSmoothingEnabled = false;
            ctx.font = '8px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // --- Health Bar ---
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(x, y, barW, barH);
            const hpP = player.hp / player.maxHp;
            ctx.fillStyle = '#d14242';
            ctx.fillRect(x, y, barW * hpP, barH);
            ctx.fillStyle = 'white';
            ctx.fillText(`${player.hp}/${player.maxHp}`, x + barW / 2, y + textYOffset);
            y += barH + 5;

            // --- Hover Energy Bar ---
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(x, y, barW, barH);
            const enP = player.hoverEnergy / player.maxHoverEnergy;
            ctx.fillStyle = '#DDED64';
            ctx.fillRect(x, y, barW * enP, barH);
            ctx.fillStyle = 'white';
            ctx.fillText(`${Math.round(player.hoverEnergy)}/${player.maxHoverEnergy}`, x + barW / 2, y + textYOffset);
            y += barH + 5;
            
            // --- NEW: Aether Bar ---
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(x, y, barW, barH);
            const aetherP = player.aether / player.maxAether;
            ctx.fillStyle = '#8b5cf6'; // A vibrant purple
            ctx.fillRect(x, y, barW * aetherP, barH);
            ctx.fillStyle = 'white';
            ctx.fillText(`${player.aether}/${player.maxAether}`, x + barW / 2, y + textYOffset);
        }
        // --- END OF REPLACEMENT ---

        window.onload = function() {
            const loadingStatus = document.getElementById('loading-status');
            loadingStatus.innerText = 'Loading Physics Engine...';
            mainLoader();
        };
    </script>
