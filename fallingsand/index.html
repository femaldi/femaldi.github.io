    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
    <script src="https://unpkg.com/planck-js@0.3.0/dist/planck.min.js"></script>


    <script>
        // --- CONFIGURATION ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pl = planck;
        let debugMode = false;
        const STATION_FLOOR_Y = 0;

        let isPlayerDead = false;
        const PLAYER_DAMAGE_COOLDOWN_MS = 500;
        let damageFlashIntensity = 0;
        let causeOfDeath = '';
        const deathScreenButton = { x: 0, y: -10, width: 60, height: 15 };
        let deathScreenButtonHover = false;

        const WANG_TILE_SCALE = 15;
        const WANG_TILE_SIZE = 15;

        const generationWorker = new Worker('generation.worker.js'); // ADD THIS LINE
        let WORLD_SEED = 0; // Will be set in mainLoader
        let playerSpawnSX = 0;
        let playerSpawnSY = 0;

        const world = new pl.World({
            gravity: pl.Vec2(0, 10)
        });

        const CATEGORY_DEFAULT = 0x0001; // For static world terrain
        const CATEGORY_SCALE = 0x0002;
        const CATEGORY_PLAYER = 0x0004;
        const CATEGORY_TEMP_SAND = 0x0008;

        const MASK_PLAYER = CATEGORY_DEFAULT | CATEGORY_SCALE | CATEGORY_TEMP_SAND;
        const MASK_SCALE = CATEGORY_DEFAULT | CATEGORY_PLAYER; // Notice: Does NOT include TEMP_SAND
        const MASK_TEMP_SAND = CATEGORY_PLAYER;

        // --- Add this listener for SOLID splashes ---
        world.on('begin-contact', function(contact) {
            const now = performance.now();
            const SPLASH_COOLDOWN_MS = 200;
            const MIN_SPLASH_SPEED = 1.8;

            let dynamicBody;
            if (contact.getFixtureA().getBody().getType() === 'dynamic' && contact.getFixtureB().getBody().getType() === 'static') {
                dynamicBody = contact.getFixtureA().getBody();
            } else if (contact.getFixtureB().getBody().getType() === 'dynamic' && contact.getFixtureA().getBody().getType() === 'static') {
                dynamicBody = contact.getFixtureB().getBody();
            } else {
                return;
            }

            const bodyInstance = dynamicBody.getUserData();
            if (!bodyInstance) return;

            bodyInstance.lastSplashTime = bodyInstance.lastSplashTime ?? 0;
            if (now - bodyInstance.lastSplashTime < SPLASH_COOLDOWN_MS) return;

            const manifold = contact.getWorldManifold();
            if (!manifold.points[0]) return;
            const point = manifold.points[0];

            const impactSpeed = dynamicBody.getLinearVelocityFromWorldPoint(point).length();
            if (impactSpeed < MIN_SPLASH_SPEED) return;

            const worldX = Math.floor(point.x * B2_SCALE);
            const worldY = Math.floor(point.y * B2_SCALE);
            const materialType = getGrid(worldX, worldY);

            // THIS LISTENER ONLY CARES ABOUT SOLIDS
            if (SPLASHABLE_SOLIDS.has(materialType)) {
                createSplashEffect(worldX, worldY, materialType, impactSpeed);
                bodyInstance.lastSplashTime = now;
            }
        });

        world.on('pre-solve', function(contact) {
            const fixtureA = contact.getFixtureA();
            const fixtureB = contact.getFixtureB();
            const bodyA = fixtureA.getBody();
            const bodyB = fixtureB.getBody();
            const userDataA = bodyA.getUserData();
            const userDataB = bodyB.getUserData();

            // Check if one of the bodies is the player and the other is static terrain.
            const isPlayerA = (userDataA === player);
            const isPlayerB = (userDataB === player);
            const isStaticA = (bodyA.getType() === 'static');
            const isStaticB = (bodyB.getType() === 'static');

            if ((isPlayerA && isStaticB) || (isPlayerB && isStaticA)) {
                const manifold = contact.getWorldManifold();
                if (!manifold || !manifold.normal) return;

                // The 'normal' vector points from body A to body B. We need to ensure
                // it always points FROM the static world TO the player.
                let worldNormal = manifold.normal;
                if (isPlayerA) {
                    // If A is the player, the normal points away from the player. Flip it.
                    worldNormal = { x: -worldNormal.x, y: -worldNormal.y };
                }

                // A "walkable" surface has a normal that points mostly upwards (Y is negative).
                // We use a threshold of -0.5 to include gentle slopes as walkable.
                const isWalkableSurface = worldNormal.y < -0.5;

                if (isWalkableSurface) {
                    // If it's a floor or walkable slope, apply the default friction.
                    contact.resetFriction();
                } else {
                    // If it's a wall, ceiling, or steep slope, set friction to zero to prevent sticking.
                    contact.setFriction(0.0);
                }
            }
        });

        const TOOLBAR_SLOT_SIZE = 32;
        const TOOLBAR_SLOT_SPACING = 12;
        const TOOLBAR_STACK_OFFSET = 3;

        const B2_SCALE = 30; // 30 pixels = 1 meter in the physics world
        let rigidBodies = [];
        let staticWorldBodies = []; // To hold temporary terrain colliders
        let activeStaticChunks = new Set();
        let lightingDirtyChunks = new Set();
        let bodiesToDestroy = [];   // NEW: A "kill list" for entire b2Bodies
        let tempVec1 = null;
        let tempVec2 = null;

        const CHUNK_SIZE = 16; // Chunks will be 16x16 pixels
        const CHUNK_SIZE_SQ = CHUNK_SIZE * CHUNK_SIZE;
        let chunkWidth, chunkHeight; // No longer used for world bounds
        
        // --- NEW: CHUNK-BASED WORLD DATA ---
        const chunkMap = new Map();       // Main material grid
        const lightChunkMap = new Map();    // Lighting data
        const etcChunkMap = new Map();      // For ignition timers, rigid body stubs, etc.
        const sectorWangTileData = new Map();

        const activeSolidChunks = new Set();
        const nextActiveSolidChunks = new Set();
        let pendingSolidChunks = [];

        const activeLiquidChunks = new Set();
        const nextActiveLiquidChunks = new Set();
        let pendingLiquidChunks = [];

        const activeGasChunks = new Set();
        const nextActiveGasChunks = new Set();
        let pendingGasChunks = [];

        let _lastChunk = null;
        let _lastChunkCX = -99999;
        let _lastChunkCY = -99999;

        // --- START OF NEW CODE ---
        const debugStats = {
            getCalls: 0,
            getHits: 0,
            setCalls: 0,
            setHits: 0,
        };
        // --- END OF NEW CODE ---

        // NEW: Increased view area and reduced scale
        const viewWidth = 480;
        const viewHeight = 270;
        const scale = 4; // Smaller pixels

        const SIMULATION_STEPS_PER_FRAME = 2;

        // --- SECTOR STREAMING CONFIGURATION ---
        const SECTOR_SIZE = 512;
        const WORLD_LAYER_HEIGHT = 2000;
        const MAX_READY_SECTORS = 12;
        let sectorGrid = new Map(); // Will store 'unloaded', 'queued', or 'ready' for each sector
        let lastPlayerSectorX = -1; // Used to track when the player crosses a sector boundary
        let lastPlayerSectorY = -1;
        let activeStubChunks = new Set();
        let npcs = [];
        let nextNpcId = 0;

        canvas.width = viewWidth;
        canvas.height = viewHeight;

        canvas.style.width = viewWidth * scale + "px";
        canvas.style.height = viewHeight * scale + "px";

        canvas.style.imageRendering = "pixelated";

        /*
        
        createMagicTablet(550, STATION_FLOOR_Y - 16, 'increase_tool_slots');
        createMagicTablet(570, STATION_FLOOR_Y - 16, 'increase_structure_slots');
        createMagicTablet(590, STATION_FLOOR_Y - 16, 'unlock_reaction', { reactionKey: 'heat_material' });
        createMagicTablet(610, STATION_FLOOR_Y - 16, 'unlock_reaction', { reactionKey: 'filter_material' });
        
        */

        function createMagicTablet(x, y, upgradeType, data = {}) {
            const width = 16;
            const height = 16;
            const pixels = new Uint8Array(width * height).fill(MAT.MAGIC_WALL);

            let messageTitle = "Upgrade Acquired!";
            let messageText = "Your abilities have been enhanced.";
            let name = "Magic Tablet: ";

            // --- Engrave the pattern AND define the message based on the upgrade type ---
            switch (upgradeType) {
                case 'unlock_reaction':
                    const key = data.reactionKey;
                    if (key === 'filter_material') {
                        messageTitle = "Reaction Unlocked: Filter";
                        name += "Filter";
                        messageText = "Separates impurities. Place a mixture in the LEFT cauldron, place the material to be filtered in the sampler and activate. The sampled material will move to the RIGHT cauldron.";
                    } else if (key === 'heat_material') {
                        messageTitle = "Reaction Unlocked: Heat";
                        name += "Heat";
                        messageText = "Applies intense heat to materials in the LEFT cauldron, causing transmutation.";
                    }
                    // Draw a simple rune pattern
                    const pattern = DWARVEN_RUNES.PATTERNS[Math.floor(Math.random() * DWARVEN_RUNES.PATTERNS.length)];
                    for (let py = 0; py < DWARVEN_RUNES.RUNE_HEIGHT; py++) {
                        for (let px = 0; px < DWARVEN_RUNES.RUNE_WIDTH; px++) {
                            if (pattern[py][px] === 1) {
                                pixels[(3 + py) * width + (4 + px)] = MAT.RUNE_WALL;
                            }
                        }
                    }
                    break;

                case 'increase_tool_slots':
                    messageTitle = "Tool Pouch Expanded!";
                    name += "Additional Tool Slot";
                    messageText = "You can now carry one additional tool.";
                    // Draw a simple pickaxe shape
                    const toolShape = ["01100110","00110100","00011000","00011000","00011000","00011000"];
                    for(let py=0; py<toolShape.length; py++) {
                        for(let px=0; px<toolShape[py].length; px++) {
                            if (toolShape[py][px] === '1') {
                                 pixels[(5 + py) * width + (4 + px)] = MAT.RUNE_WALL;
                            }
                        }
                    }
                    break;

                case 'increase_structure_slots':
                    messageTitle = "Structure Bag Expanded!";
                    name += "Additional Structure Slot";
                    messageText = "You can now carry one additional placeable structure.";
                     // Draw a simple square outline
                     for(let i = 0; i < 8; i++) {
                         pixels[(4 * width) + 4 + i] = MAT.RUNE_WALL; // Top
                         pixels[(11 * width) + 4 + i] = MAT.RUNE_WALL; // Bottom
                         pixels[((5+i) * width) + 4] = MAT.RUNE_WALL; // Left
                         pixels[((5+i) * width) + 11] = MAT.RUNE_WALL; // Right
                     }
                    break;
            }

            const body = new RigidBody(x, y, width, height, MAT.MAGIC_WALL, name);
            body.pixels = pixels;
            body.rebuildFixtures();

            const userData = body.body.getUserData();
            userData.isPickup = true;
            userData.messageTitle = messageTitle; // Store the message title
            userData.messageText = messageText;   // Store the message text
            userData.onPickup = (player) => {
                switch (upgradeType) {
                    case 'increase_tool_slots':
                        player.maxToolSlots++;
                        break;
                    case 'increase_structure_slots':
                        player.maxStructureSlots++;
                        break;
                }
                displayMessage(userData.messageTitle, userData.messageText);
            };

            rigidBodies.push(body);
        }

        function createObjectInWorld(definitionId, x, y) {
            const def = OBJECT_DEFINITIONS[definitionId];
            if (!def) {
                console.error("Unknown object definition:", definitionId);
                return;
            }

            const body = new RigidBody(x, y, def.width, def.height, MAT.WOOD, def.name);
            body.pixels = new Uint8Array(def.pixels);

            // --- NEW LOGIC: Sample the sprite and bake its colors ---
            if (SpriteManager.sprites.has(definitionId)) {
                const spriteImg = SpriteManager.sprites.get(definitionId);
                
                // Use a temporary canvas to sample the sprite's pixels
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = def.width;
                tempCanvas.height = def.height;
                const tempCtx = tempCanvas.getContext('2d');
                
                tempCtx.drawImage(spriteImg, 0, 0, def.width, def.height);
                
                // Get the raw RGBA data from the canvas
                const imageData = tempCtx.getImageData(0, 0, def.width, def.height);
                
                // Store this raw color data in our new property
                body.spritePixels = imageData.data; 
            }

            body.rebuildFixtures();
            const userData = body.body.getUserData();
            userData.isPickup = true;
            userData.definitionId = definitionId;
            rigidBodies.push(body);
        }

        /**
         * Spawns particles that form a shape by appearing from the center outwards,
         * hold with a blinking effect, then dissolve as wisps.
         * @param {object} options - Configuration for the effect.
         * @param {number} options.x - Center X coordinate in world space.
         * @param {number} options.y - Center Y coordinate in world space.
         * @param {HTMLImageElement} options.shapeImage - The pre-loaded image defining the target shape.
         * @param {number} [options.particleCount=200] - The number of particles to use for the effect.
         * @param {number} [options.shapeSize=48] - The final size of the shape in world pixels.
         * @param {Array<number>} [options.color=[255, 80, 80]] - The base RGB color.
         * @param {number} [options.appearDuration=15] - Max frames for particles to appear.
         * @param {number} [options.holdDuration=30] - Frames the shape stays intact and blinks.
         * @param {number} [options.wispDuration=80] - Frames the particles drift as wisps.
         */
        function createShapeDissolveEffect({ x, y, shapeImage, particleCount = 200, shapeSize = 48, color = [255, 80, 80], appearDuration = 15, holdDuration = 30, wispDuration = 80, bloomIntensity = 0.1 }) {
            const targetPoints = getCoordinatesFromImage(shapeImage);
            if (targetPoints.length === 0) return;

            const scale = shapeSize / shapeImage.width;
            
            // First, find the maximum distance from the center to normalize the spawn delay.
            let maxDistance = 0;
            for (const point of targetPoints) {
                maxDistance = Math.max(maxDistance, Math.hypot(point.x, point.y));
            }

            let spawnedCount = 0;
            for (let i = 0; i < MAX_MAGIC_PARTICLES && spawnedCount < particleCount; i++) {
                const p = magicParticlePool[i];
                if (p.active) continue;

                // Base Particle Setup
                p.active = true;
                p.gravity = 0;
                p.lifespan = appearDuration + holdDuration + wispDuration;
                p.initialLifespan = p.lifespan;
                p.vx = 0;
                p.vy = 0;

                // State Machine & Shape Properties
                p.isShapeParticle = true;
                p.bloomIntensity = bloomIntensity;
                
                // --- NEW "APPEAR" LOGIC ---
                p.phase = 'waiting'; // New initial state. The particle is invisible.
                const targetPoint = targetPoints[Math.floor(Math.random() * targetPoints.length)];
                const distance = Math.hypot(targetPoint.x, targetPoint.y);
                
                // The particle's spawn is delayed based on its distance from the center.
                p.spawnDelay = (distance / maxDistance) * appearDuration;
                
                // Set final position immediately. Visibility is controlled by the state machine.
                p.x = x + targetPoint.x * scale;
                p.y = y + targetPoint.y * scale;
                p.holdTime = holdDuration;
                p.totalAppearTime = appearDuration;

                const v = 50;
                p.color = [
                    Math.max(0, Math.min(255, color[0] + (Math.random() - 0.5) * v)),
                    Math.max(0, Math.min(255, color[1] + (Math.random() - 0.5) * v)),
                    Math.max(0, Math.min(255, color[2] + (Math.random() - 0.5) * v))
                ];
                spawnedCount++;
            }
        }

        function pickupObject(body) {
            if (body.isDestroyed || !body.body) return;

            const userData = body.body.getUserData();
            const ringSprite = SpriteManager.sprites.get('pickup_shape');
            let pickedUp = false;
            
            const pickupPos = body.body.getPosition();

            // Handle picking up finished potions
            if (userData.isPotion) {
                if (player.structurePocket.length < player.maxStructureSlots) {
                    world.destroyBody(body.body);
                    body.body = null;
                    player.structurePocket.push(body);
                    pickedUp = true;
                } else {
                    displayMessage("Inventory Full", "Cannot pick up the potion.", 240);
                }
            }
            // Handle special "onPickup" items like upgrade tablets
            else if (userData.onPickup) {
                userData.onPickup(player);
                body.isDestroyed = true; 
                createShapeDissolveEffect({ x: pickupPos.x * B2_SCALE, y: pickupPos.y * B2_SCALE, shapeImage: ringSprite });
                return;
            }
            // --- NEW LOGIC: Handle picking up material chunks ---
            else if (userData.isMaterialChunk) {
                if (player.structurePocket.length < player.maxStructureSlots) {
                    world.destroyBody(body.body);
                    body.body = null;
                    player.structurePocket.push(body);
                    pickedUp = true;
                } else {
                    displayMessage("Inventory Full", "Cannot pick up the material chunk.", 240);
                }
            }
            // --- END NEW LOGIC ---
            // Handle all other defined objects (tools, empty potions, barrels, etc.)
            else {
                const def = OBJECT_DEFINITIONS[userData.definitionId];
                if (!def) return; // THIS WAS THE LINE CAUSING THE PROBLEM

                switch (def.type) {
                    case 'tool':
                        if (player.toolPocket.length < player.maxToolSlots) {
                            player.toolPocket.push(def.name);
                            pickedUp = true;
                        }
                        break;
                    case 'structure':
                        if (player.structurePocket.length < player.maxStructureSlots) {
                            world.destroyBody(body.body);
                            body.body = null;
                            player.structurePocket.push(body); 
                            pickedUp = true;
                        }
                        break;
                }
            }
            
            if (pickedUp) {
                body.isDestroyed = true;
                createShapeDissolveEffect({
                    x: pickupPos.x * B2_SCALE,
                    y: pickupPos.y * B2_SCALE,
                    shapeImage: ringSprite,
                    color: [180, 220, 255],
                    shapeSize: 32,
                    particleCount: 800
                });
            }
        }
        
        const DIALOGUE_TREES = {
            'ylialkemisti_main': {
                'start': {
                    text: "Greetings, Apprentice. You have arrived at a pivotal time. This cave system holds wondrous treasures and profound secrets, culminating in the legendary Philosopher's Stone, deep within the final layer.",
                    options: [
                        { text: "What must I do?", nextNode: 'explain_quest' },
                    ]

        function renderZoneMessage() {
            if (!ZoneMessageManager.isVisible) return;

            const FADE_TIME = 60; // 1 second fade in/out
            const totalTime = ZoneMessageManager.maxTime;
            const remainingTime = ZoneMessageManager.timer;
            
            let alpha = 1.0;
            if (remainingTime < FADE_TIME) {
                // Fade out
                alpha = remainingTime / FADE_TIME;
            } else if (totalTime - remainingTime < FADE_TIME) {
                // Fade in
                alpha = (totalTime - remainingTime) / FADE_TIME;
            }

            const boxW = 150;
            const boxH = 25;
            const boxX = (renderWidth - boxW) / 2;
            const boxY = renderHeight / 2 + 30; // Position below center, like Noita
            const cornerRadius = 6;

            // Draw background box (using rounded rectangle path)
            ctx.fillStyle = `rgba(30, 20, 10, ${0.8 * alpha})`;
            ctx.strokeStyle = `rgba(255, 180, 80, ${0.9 * alpha})`;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(boxX + cornerRadius, boxY);
            ctx.lineTo(boxX + boxW - cornerRadius, boxY);
            ctx.arcTo(boxX + boxW, boxY, boxX + boxW, boxY + cornerRadius, cornerRadius);
            ctx.lineTo(boxX + boxW, boxY + boxH - cornerRadius);
            ctx.arcTo(boxX + boxW, boxY + boxH, boxX + boxW - cornerRadius, boxY + boxH, cornerRadius);
            ctx.lineTo(boxX + cornerRadius, boxY + boxH);
            ctx.arcTo(boxX, boxY + boxH, boxX, boxY + boxH - cornerRadius, cornerRadius);
            ctx.lineTo(boxX, boxY + cornerRadius);
            ctx.arcTo(boxX, boxY, boxX + cornerRadius, boxY, cornerRadius);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Draw Text
            ctx.fillStyle = `rgba(255, 220, 150, ${alpha})`;
            ctx.font = 'bold 10px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ZoneMessageManager.text, renderWidth / 2, boxY + boxH / 2);
        }

            const alpha = UIMessageManager.timer < fadeDuration

                : 1;

            const boxW = renderWidth - 80;
            const boxH = 50;
            const boxX = (renderWidth - boxW) / 2;
            const boxY = 100;

            // Draw background box
            ctx.fillStyle = `rgba(20, 20, 30, ${0.8 * alpha})`;
            ctx.fillRect(boxX, boxY, boxW, boxH);
            ctx.strokeStyle = `rgba(160, 160, 192, ${0.9 * alpha})`;
            ctx.strokeRect(boxX, boxY, boxW, boxH);

            // Draw Title
            ctx.fillStyle = `rgba(255, 217, 102, ${alpha})`;
            ctx.font = 'bold 10px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(UIMessageManager.title, boxX + 10, boxY + 8);

            // Draw Body Text (with word wrapping)
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.font = '8px monospace';
            
            const text = UIMessageManager.text;
            const textX = boxX + 10;
            let textY = boxY + 24;
            const maxWidth = boxW - 20;
            const lineHeight = 10;
            const words = text.split(' ');
            let currentLine = '';

            for (let i = 0; i < words.length; i++) {
                const testLine = currentLine + words[i] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && i > 0) {
                    ctx.fillText(currentLine, textX, textY);
                    currentLine = words[i] + ' ';
                    textY += lineHeight;
                } else {
                    currentLine = testLine;
                }
            }
            ctx.fillText(currentLine, textX, textY);
        }

        function fillCauldronWithMixture(cauldron, materials) {
            const numParticles = 160;
            for (let i = 0; i < numParticles; i++) {
                const angle = Math.random() * Math.PI;
                const radius = Math.random() * cauldron.r;
                const x = Math.floor(cauldron.cx + Math.cos(angle) * radius);
                const y = Math.floor(cauldron.cy + Math.sin(angle) * radius);
                
                if (getGrid(x, y) === MAT.EMPTY) {
                    const material = materials[i % materials.length];
                    setGrid(x, y, material);
                }
            }
        }

         * @param {number} materialType - The MAT id of the material being spawned.

            const config = MINABLE_MATERIALS[materialType];
            if (!config) return;

            const body = new RigidBody(x, y, config.size, config.size, materialType, config.name);

            // Fill the body's pixels with its representative material
            body.pixels.fill(materialType);
            body.rebuildFixtures();

            userData.isPickup = true;
            userData.isMaterialChunk = true;  // A flag to identify this as a resource chunk
            userData.materialType = materialType; // The material it represents for alchemy
            userData.quantity = config.quantity;  // How much it's worth

            rigidBodies.push(body);

        function countMetalsInCauldron(cauldron) {
            const counts = { [MAT.COPPER]: 0, [MAT.SILVER]: 0, [MAT.GOLD]: 0 };
            forEachInDownwardSemicircle(cauldron, (x, y) => {
                const type = getGrid(x, y);
                if (counts[type] !== undefined) {
                    counts[type]++;
                }
            });
            return counts;
        }

        function subtractMetalsFromCauldron(cauldron, cost) {
            const costCopy = { ...cost };
            // Iterate backwards to remove from the top of the pile first
            const r = cauldron.r, cx = cauldron.cx, cy = cauldron.cy;
            const minX = Math.floor(cx - r), maxX = Math.ceil(cx + r);
            const minY = Math.floor(cy), maxY = Math.ceil(cy + r);

            for (let y = maxY; y >= minY; y--) {
                for (let x = minX; x <= maxX; x++) {
                    const dx = x - cx, dy = y - cy;
                    if (dx * dx + dy * dy > r * r) continue;
                    
                    const type = getGrid(x, y);
                    if (costCopy[type] && costCopy[type] > 0) {
                        setGrid(x, y, MAT.EMPTY);
                        costCopy[type]--;
                    }
                }
            }
        }

        function purchaseItem(item) {
            const station = player.activeStationGeometry;
            if (!station) return;

            const playerMetals = countMetalsInCauldron(station.cauldrons.left);

            // Check if player can afford it
            for (const mat in item.cost) {
                if ((playerMetals[mat] || 0) < item.cost[mat]) {
                    displayMessage("Transaction Failed", "You do not have enough metal in the left cauldron.", 240);
                    return;
                }
            }

            // If affordable, subtract cost and spawn item
            subtractMetalsFromCauldron(station.cauldrons.left, item.cost);
            const target = station.cauldrons.right;
            const spawnX = target.cx;
            const spawnY = target.cy - 10; // Spawn slightly above the bottom

            switch (item.type) {
                case 'tablet':
                    createMagicTablet(spawnX, spawnY, item.data.upgradeType, item.data.reactionData);
                    break;
                case 'structure':
                    createObjectInWorld(item.data.definitionId, spawnX, spawnY);
                    break;
                case 'tool':
                    createObjectInWorld(item.data.definitionId, spawnX, spawnY);
                    break;
                case 'material':
                    fillCauldronWithMixture(target, Array(item.data.amount).fill(item.data.material));
                    break;
            }
            displayMessage("Transaction Complete!", `You have purchased ${item.name}.`, 240);
        }

        /**
         * Parses a loaded image and returns an array of coordinates for pixels that define a shape.
         * The coordinates are relative to the center of the image.
         * This function treats both transparent pixels AND white pixels as empty space.
         * @param {HTMLImageElement} img - The pre-loaded image object.
         * @returns {Array<{x: number, y: number}>} An array of coordinate points.
         */
        function getCoordinatesFromImage(img) {
            if (!img) return [];

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0);

            const imageData = tempCtx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;
            const coordinates = [];
            const centerX = img.width / 2;
            const centerY = img.height / 2;
            const whiteThreshold = 250; // Use a threshold to account for near-white JPEG artifacts

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const alpha = data[i + 3];

                // --- THIS IS THE NEW, ROBUST LOGIC ---
                // A pixel is considered part of the shape if it's visible (alpha > 50)
                // AND it's not white (at least one color channel is below the threshold).
                const isShapePixel = alpha > 50 && (r < whiteThreshold || g < whiteThreshold || b < whiteThreshold);

                if (isShapePixel) {
                    const pixelIndex = i / 4;
                    const x = pixelIndex % img.width;
                    const y = Math.floor(pixelIndex / img.width);
                    coordinates.push({ x: x - centerX, y: y - centerY });
                }
            }
            return coordinates;
        }

            if (!map.has(key)) {

                const newChunk = {

        function getGrid(x, y) {
            debugStats.getCalls++;
            // THE FIX: Use Math.floor() to correctly handle negative coordinates.
            const cx = Math.floor(x / CHUNK_SIZE);
            const cy = Math.floor(y / CHUNK_SIZE);

            // The caching logic itself is correct and can remain.
            if (cx !== _lastChunkCX || cy !== _lastChunkCY) {
                _lastChunkCX = cx;

                _lastChunk = chunkMap.get(coordToKey(cx, cy));
            } else {
                debugStats.getHits++;
            }

            if (!_lastChunk) {
                return MAT.EMPTY;
            }

            // The bitwise & for local coordinates is correct for negative numbers.
            const lx = x & (CHUNK_SIZE - 1);
            const ly = y & (CHUNK_SIZE - 1);
            return _lastChunk.data[ly * CHUNK_SIZE + lx];
        }

        function setGrid(x, y, type, updateChunkComplex = false) {
            debugStats.setCalls++;
            const cx = Math.floor(x / CHUNK_SIZE);
            const cy = Math.floor(y / CHUNK_SIZE);
            let chunk;

            // THE FIX: Add a check to ensure _lastChunk is not undefined before using it.
            if (cx === _lastChunkCX && cy === _lastChunkCY && _lastChunk) {
                debugStats.setHits++;
                chunk = _lastChunk;
            } else {
                // This block is now correctly entered when the cached chunk was undefined.
                const key = coordToKey(cx, cy);
                chunk = getChunk(chunkMap, key, MAT.EMPTY);
                _lastChunk = chunk;
                _lastChunkCX = cx;
                _lastChunkCY = cy;
            }
            
            if (chunk.cx === undefined) {
                chunk.cx = cx;
                chunk.cy = cy;
            }

            const lx = x & (CHUNK_SIZE - 1);
            const ly = y & (CHUNK_SIZE - 1);
            const lIdx = ly * CHUNK_SIZE + lx;

            const oldType = chunk.data[lIdx];

            // --- START OF NEW LIGHTING LOGIC ---
            const wasLightBlocking = WALL_TYPES.has(oldType);
            const isLightBlocking = WALL_TYPES.has(type);
            
            // If the light-blocking state of this pixel changes, this chunk and its
            // neighbors will need a lighting update.
            if (wasLightBlocking !== isLightBlocking) {
                const key = coordToKey(cx, cy);
                lightingDirtyChunks.add(key);
                // Also add neighbors, as the light change will propagate into them.
                lightingDirtyChunks.add(coordToKey(cx - 1, cy));
                lightingDirtyChunks.add(coordToKey(cx + 1, cy));
                lightingDirtyChunks.add(coordToKey(cx, cy - 1));
                lightingDirtyChunks.add(coordToKey(cx, cy + 1));
            }
            // --- END OF NEW LIGHTING LOGIC ---

            const wasSolid = isSolidForPlayer(oldType);
            const isSolid = isSolidForPlayer(type);

            if (wasSolid !== isSolid) {
                chunk.dirty = true;
            }
            
            chunk.data[lIdx] = type;

        /**

        function coordToKey(x, y) {

                            }

                            // --- START OF FIX: Correctly update Mass AND Center of Mass ---
                            const massData = { mass: 0, center: pl.Vec2(0, 0), I: 0 };
                            this.body.getMassData(massData);
                            
                            const oldMass = massData.mass; // <-- MODIFIED: Store old mass
                            const pixelMass = (MATERIAL_DENSITY[type] || 1.0) * 0.01; 
                            const newMass = oldMass + pixelMass; // <-- MODIFIED: Calculate new mass

                            // --- NEW: Calculate the new center of mass ---
                            // This is a weighted average of the old center and the new pixel's position.
                            if (newMass > 0.0001) { // Avoid division by zero
                                const newCenterX = (massData.center.x * oldMass + localPointMeters.x * pixelMass) / newMass;
                                const newCenterY = (massData.center.y * oldMass + localPointMeters.y * pixelMass) / newMass;
                                massData.center.set(newCenterX, newCenterY);
                            }
                            
                            // Now update the mass and inertia
                            massData.mass = newMass; // <-- MODIFIED: Assign the new mass
                            const distSq = localPointMeters.x * localPointMeters.x + localPointMeters.y * localPointMeters.y;
                            massData.I += pixelMass * distSq; // Inertia is about the origin, this is correct

                            // Set the fully updated mass data
                            this.body.setMassData(massData);
                            // --- END OF FIX ---

                            if (oldType !== 'dynamic') {
                                this.body.setType(oldType);
                            }
                            
                            return true; // Success!
                        }
                    }
                }

                return false; // Bucket is full in this column.
            }

            _createSimpleBoxFixture() {
                // First, remove any fixtures that might have been created by the constructor
                let f = this.body.getFixtureList();
                while (f) {
                    const next = f.getNext();
                    this.body.destroyFixture(f);
                    f = next;
                }

                // Create a new box shape, making it slightly smaller than the visual body
                const halfWidth = (this.width / 2) / B2_SCALE;
                const halfHeight = (this.height / 2) / B2_SCALE;
                
                // Ensure dimensions are not negative if the object is very small
                if (halfWidth <= 0 || halfHeight <= 0) return;

                const shape = pl.Box(halfWidth, halfHeight);
                const density = MATERIAL_DENSITY[this.materialType] || 1.0;

                this.body.createFixture(shape, { 
                    density: density, 
                    friction: 0.6, 
                    restitution: 0.1 
                });

                this.body.resetMassData();
            }

            reintroduceToWorld(x, y) {
                // If it somehow already has a body, do nothing.
                if (this.body) return;

                this.isDestroyed = false;
                this.body = world.createBody({
                    type: 'dynamic',
                    position: pl.Vec2(x / B2_SCALE, y / B2_SCALE)
                });
                this.body.setUserData(this);
                
                // Use the existing method to build fixtures from its stored pixel data.
                this.rebuildFixtures();
            }

            addPixel(type) {
                // Find an empty spot at the top-center of the body's internal grid
                const startX = Math.floor(this.width / 2) - 1;
                for (let y = 0; y < this.height; y++) {
                    for (let dx = 0; dx < 3; dx++) { // Check a 3-pixel wide area
                        const x = startX + dx;
                        const lIdx = y * this.width + x;
                        if (this.pixels[lIdx] === MAT.EMPTY) {
                            this.pixels[lIdx] = type;
                            return true; // Pixel placed successfully
                        }
                    }
                }
                return false; // Could not find a spot
            }

            rebuildFixtures() {
                if (!this.body) {
                    this.needsShapeUpdate = false; // Also reset the flag to prevent repeated calls
                    return;
                }

                // 1. Save the body's current state (type and velocity).
                const oldType = this.body.getType();
                const oldLinVel = this.body.getLinearVelocity();
                const oldAngVel = this.body.getAngularVelocity();

                // 2. Temporarily make the body kinematic. It won't be affected by gravity
                //    or other forces during the moment it has no fixtures.
                this.body.setType('kinematic');

                let f = this.body.getFixtureList();
                while (f) {
                    const next = f.getNext();
                    this.body.destroyFixture(f);
                    f = next;
                }
                this._createFixturesFromPixels();
                this.needsShapeUpdate = false;

                // 3. Restore the body to its original state.
                this.body.setType(oldType);
                this.body.setLinearVelocity(oldLinVel);
                this.body.setAngularVelocity(oldAngVel);

                // 4. Wake the body up to ensure the physics engine re-evaluates it immediately.
                this.body.setAwake(true);
            }

            getBinaryMask() {
                const mask = new Uint8Array(this.width * this.height);
                for (let i = 0; i < mask.length; i++) {
                    const t = this.pixels[i];
                    mask[i] = (t !== MAT.EMPTY && !GASES.has(t)) ? 1 : 0;
                }
                return mask;
            }

            _createFixturesFromPixels() {
                this.fixtureCount = 0;
                const w = this.width;
                const h = this.height;
                const mask = new Uint8Array(w * h);

                for (let i = 0; i < mask.length; i++) {
                    const t = this.pixels[i];
                    mask[i] = (t !== MAT.EMPTY && !GASES.has(t)) ? 1 : 0;
                }

                if (!mask.some(v => v === 1)) {
                    this.isDestroyed = true;
                    return;
                }

                const density = MATERIAL_DENSITY[this.materialType] || 1.0;
                const islands = extractIslands(mask, w, h);

                for (const island of islands) {
                    const outline = marchingSquares(island, w, h);
                    if (outline.length < 3) continue;
                    const preSimplified = simplifyDouglasPeucker(outline, 1.0);
                    if (preSimplified.length < 3) continue;
                    const simplified = removeCollinear(preSimplified, 0.01);
                    if (simplified.length < 3) continue;

                    validatePolygon(simplified);

                    const flat = [];
                    for (const p of simplified) flat.push(p.x, p.y);
                    const indices = earcut(flat);

                    for (let i = 0; i < indices.length; i += 3) {
                        const p0 = simplified[indices[i]];
                        const p1 = simplified[indices[i + 1]];
                        const p2 = simplified[indices[i + 2]];

                        const ax = (p0.x - w / 2) / B2_SCALE, ay = (p0.y - h / 2) / B2_SCALE;
                        const bx = (p1.x - w / 2) / B2_SCALE, by = (p1.y - h / 2) / B2_SCALE;
                        const cx = (p2.x - w / 2) / B2_SCALE, cy = (p2.y - h / 2) / B2_SCALE;

                        const area = Math.abs(ax*(by-cy) + bx*(cy-ay) + cx*(ay-by)) * 0.5;
                        if (area < 0.00001) continue;

                        const cross = (bx-ax)*(cy-ay) - (by-ay)*(cx-ax);
                        let verts = (cross < 0)
                            ? [pl.Vec2(ax,ay), pl.Vec2(cx,cy), pl.Vec2(bx,by)]
                            : [pl.Vec2(ax,ay), pl.Vec2(bx,by), pl.Vec2(cx,cy)];

                        try {
                            this.body.createFixture(pl.Polygon(verts), { density: density, friction: 0.6, restitution: 0.1 });
                            this.fixtureCount++;
                        } catch (e) { continue; }
                    }
                }
                this.body.resetMassData();
            }
        }

        function extractIslands(mask, w, h) {
            const visited = new Uint8Array(mask.length);
            const islands = [];
            const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y*w+x;
                    if (!mask[idx] || visited[idx]) continue;
                    const stack = [[x,y]];
                    const island = new Set();
                    visited[idx] = 1;
                    while (stack.length) {
                        const [cx, cy] = stack.pop();
                        island.add(cy*w+cx);
                        for (const [dx,dy] of dirs) {
                            const nx = cx+dx, ny = cy+dy;
                            if (nx<0||ny<0||nx>=w||ny>=h) continue;
                            const nIdx = ny*w+nx;
                            if (mask[nIdx] && !visited[nIdx]) {
                                visited[nIdx]=1;
                                stack.push([nx,ny]);
                            }
                        }
                    }
                    islands.push(island);
                }
            }
            return islands;
        }

        function marchingSquares(island, w, h) {
            const isSolid = (x, y) => (x >= 0 && y >= 0 && x < w && y < h) ? island.has(y * w + x) : false;
            let start = null;
            for (const idx of island) {
                const x = idx % w, y = Math.floor(idx / w);
                if (!isSolid(x - 1, y)) { start = { x, y }; break; }
            }
            if (!start) return [];
            const outline = [];
            let x = start.x, y = start.y, dir = 0;
            const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
            do {
                outline.push({ x: x + 0.5, y: y + 0.5 });
                for (let i = 0; i < 4; i++) {
                    const ndir = (dir + 3 + i) % 4;
                    const nx = x + dirs[ndir][0], ny = y + dirs[ndir][1];
                    if (isSolid(nx, ny)) {
                        x = nx; y = ny; dir = ndir;
                        break;
                    }
                }
            } while (!(x === start.x && y === start.y));
            return outline;
        }

        function simplifyDouglasPeucker(points, epsilon) {
            if (points.length < 3) return points;
            const sqDist = (p, a, b) => {
                const dx = b.x - a.x, dy = b.y - a.y;
                const t = ((p.x-a.x)*dx + (p.y-a.y)*dy)/(dx*dx+dy*dy);
                const proj = {x:a.x+t*dx,y:a.y+t*dy};
                return (p.x-proj.x)**2 + (p.y-proj.y)**2;
            };
            const simplify = (pts) => {
                let maxDist = 0, index = 0;
                for (let i=1;i<pts.length-1;i++){
                    const d = sqDist(pts[i], pts[0], pts[pts.length-1]);
                    if (d>maxDist){maxDist=d;index=i;}
                }
                if (Math.sqrt(maxDist) > epsilon){
                    const left = simplify(pts.slice(0,index+1));
                    const right = simplify(pts.slice(index));
                    return left.slice(0,-1).concat(right);
                }
                return [pts[0], pts[pts.length-1]];
            };
            return simplify(points);
        }

        function removeCollinear(points, epsilon = 0.001) {
            const result = [];
            for (let i = 0; i < points.length; i++) {
                const prev = points[(i-1+points.length)%points.length], curr = points[i], next = points[(i+1)%points.length];
                const ax = curr.x-prev.x, ay = curr.y-prev.y, bx = next.x-curr.x, by = next.y-curr.y;
                if (Math.abs(ax*by-ay*bx) > epsilon) result.push(curr);
            }
            return result;
        }

        function isPixelSolidForConnectivity(type) {
            return type !== MAT.EMPTY && !GASES.has(type);
        }

        function findPixelIslands(pixels, width, height) {
            const islands = [], visited = new Uint8Array(width * height);
            const getIdx = (x, y) => y*width+x;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = getIdx(x, y);
                    if (isPixelSolidForConnectivity(pixels[idx]) && !visited[idx]) {
                        const newIsland = [], queue = [{x, y}];
                        visited[idx] = 1;
                        while (queue.length > 0) {
                            const current = queue.shift();
                            newIsland.push(current);
                            const neighbors = [{dx:0,dy:1},{dx:0,dy:-1},{dx:1,dy:0},{dx:-1,dy:0},{dx:1,dy:1},{dx:1,dy:-1},{dx:-1,dy:1},{dx:-1,dy:-1}];
                            for (const n of neighbors) {
                                const nx = current.x+n.dx, ny = current.y+n.dy;
                                if (nx>=0 && nx<width && ny>=0 && ny<height) {
                                    const nIdx = getIdx(nx, ny);
                                    if (isPixelSolidForConnectivity(pixels[nIdx]) && !visited[nIdx]) {
                                        visited[nIdx] = 1;
                                        queue.push({x:nx, y:ny});
                                    }
                                }
                            }
                        }
                        islands.push(newIsland);
                    }
                }
            }
            return islands;
        }

        // --- REPLACEMENT for the checkForSplits function ---
        function checkForSplits(body) {
            const islands = findPixelIslands(body.pixels, body.width, body.height);
            if (islands.length <= 1) return null;

            const MIN_ISLAND_PIXELS = 6;
            const validIslands = [], smallIslands = [];
            for (const island of islands) {
                if (island.length >= MIN_ISLAND_PIXELS) validIslands.push(island);
                else smallIslands.push(island);
            }
            if (validIslands.length <= 1) return null;

            for (const island of smallIslands) {
                for (const p of island) body.pixels[p.y*body.width+p.x] = MAT.EMPTY;
            }

            const oldBody = body.body, oldAngle = oldBody.getAngle(), oldLinVel = oldBody.getLinearVelocity(), oldAngVel = oldBody.getAngularVelocity();
            const newBodies = [];
            const hasSpriteData = body.spritePixels !== null;

            for (const island of validIslands) {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                for (const p of island) {
                    if (p.x<minX) minX=p.x; if (p.y<minY) minY=p.y;
                    if (p.x>maxX) maxX=p.x; if (p.y>maxY) maxY=p.y;
                }
                const newWidth = maxX - minX + 1, newHeight = maxY - minY + 1;
                const localOriginX = (minX+newWidth/2)-(body.width/2), localOriginY = (minY+newHeight/2)-(body.height/2);
                const worldOrigin = oldBody.getWorldPoint(pl.Vec2(localOriginX/B2_SCALE, localOriginY/B2_SCALE));
                const worldX = worldOrigin.x*B2_SCALE, worldY = worldOrigin.y*B2_SCALE;
                
                const newPixels = new Uint8Array(newWidth*newHeight).fill(MAT.EMPTY);
                const newSpritePixels = hasSpriteData ? new Uint8ClampedArray(newWidth * newHeight * 4) : null;

                for (const p of island) {
                    const nx = p.x - minX, ny = p.y - minY;
                    const newIdx = ny * newWidth + nx;
                    const oldIdx = p.y * body.width + p.x;
                    
                    // Copy the material type
                    newPixels[newIdx] = body.pixels[oldIdx];
                    
                    // If there's sprite data, copy the RGBA values for this pixel
                    if (hasSpriteData) {
                        const newSpriteIdx = newIdx * 4;
                        const oldSpriteIdx = oldIdx * 4;
                        newSpritePixels[newSpriteIdx]     = body.spritePixels[oldSpriteIdx];
                        newSpritePixels[newSpriteIdx + 1] = body.spritePixels[oldSpriteIdx + 1];
                        newSpritePixels[newSpriteIdx + 2] = body.spritePixels[oldSpriteIdx + 2];
                        newSpritePixels[newSpriteIdx + 3] = body.spritePixels[oldSpriteIdx + 3];
                    }
                }
                
                const nb = new RigidBody(worldX, worldY, newWidth, newHeight, body.materialType, body.name);
                nb.pixels = newPixels;
                nb.spritePixels = newSpritePixels; // Assign the copied sprite data
                
                nb.rebuildFixtures();
                nb.body.setAngle(oldAngle);
                nb.body.setLinearVelocity(pl.Vec2(oldLinVel.x, oldLinVel.y));
                nb.body.setAngularVelocity(oldAngVel);
                nb.body.setAwake(false);
                newBodies.push(nb);
            }

            world.destroyBody(oldBody);
            body.body = null;
            body.isDestroyed = true;
            return newBodies;
        }

        /**
         * Scans the initial spawn area and activates any chunks containing dynamic materials.
         */
        function activateInitialChunks() {
            const startX = Math.floor(player.x - viewWidth);
            const endX = Math.floor(player.x + viewWidth);
            const startY = Math.floor(player.y - viewHeight);
            const endY = Math.floor(player.y + viewHeight);

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const type = getGrid(x, y);
                    if (type !== MAT.EMPTY && !STATIC_MATERIALS.has(type)) {
                        activateChunkAt(x, y, type);
                    }
                }
            }
        }

        /**
         * Periodically scans the visible screen area for any materials with a bloom effect
         * and updates a persistent list of their chunks.
         */
        function findAndActivateGlowingChunks() {
            // This is a full refresh, so clear the old list.
            persistentGlowingChunks.clear(); 
            
            const startX = Math.floor(camera.x);
            const startY = Math.floor(camera.y);
            const endX = startX + viewWidth;
            const endY = startY + viewHeight;

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const type = getGrid(x, y);

                    if (BLOOM_MATERIALS[type]) {
                        const chunkX = Math.floor(x / CHUNK_SIZE);
                        const chunkY = Math.floor(y / CHUNK_SIZE);
                        // Add the chunk to our persistent list.
                        persistentGlowingChunks.add(coordToKey(chunkX, chunkY));
                    }
                }
            }
        }

        /**
         * Checks if a material can be displaced by a given liquid.
         * @param {number} neighborType - The material ID of the adjacent pixel.
         * @param {number} liquidType - The material ID of the moving liquid.
         * @returns {boolean} True if the liquid can move into the neighbor's space.
         */
        function canBeDisplacedByLiquid(neighborType, liquidType) {
            // Case 1: The space is empty.
            if (neighborType === MAT.EMPTY) return true;

            // Case 2: The neighbor is a gas. Liquids always displace gases.
            if (GASES.has(neighborType)) return true;

            // Case 3: The neighbor is another liquid.
            if (LIQUIDS.has(neighborType)) {
                // A liquid can only displace another liquid if it is denser.
                // This correctly handles oil floating on water, lava on water, etc.
                return LIQUID_DENSITY[liquidType] > LIQUID_DENSITY[neighborType];
            }

            // Any other material (solids, walls, etc.) is considered an unmovable barrier for this check.
            return false;
        }

        /**
         * Scans the visible screen area for any liquid pixels that are on an "active outline,"
         * meaning they are adjacent to any material they can flow into or displace.
         */
        function findAndActivateLiquidOutlines() {
            const outlineChunks = new Set();
            const startX = Math.floor(camera.x);
            const startY = Math.floor(camera.y);
            const endX = startX + viewWidth;
            const endY = startY + viewHeight;

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const type = getGrid(x, y);

                    // We only care about liquid pixels.
                    if (isLiquid(type)) {
                        // Check all 4 direct neighbors.
                        const neighbors = [
                            getGrid(x, y - 1), // Above
                            getGrid(x, y + 1), // Below
                            getGrid(x - 1, y), // Left
                            getGrid(x + 1, y)  // Right
                        ];

                        // Use our helper to see if there's any potential for movement.
                        for (const neighborType of neighbors) {
                            if (canBeDisplacedByLiquid(neighborType, type)) {
                                // This liquid pixel is on an active outline.
                                // Activate its chunk and stop checking its other neighbors.
                                const chunkX = Math.floor(x / CHUNK_SIZE);
                                const chunkY = Math.floor(y / CHUNK_SIZE);
                                outlineChunks.add(coordToKey(chunkX, chunkY));
                                break; 
                            }
                        }
                    }
                }
            }

            // Add all the identified chunks to the activation set for the next frame.
            for (const key of outlineChunks) {
                nextActiveLiquidChunks.add(key);
            }
        }

        /**
         * Scans the visible screen area for any burning materials and ensures their chunks
         * are active for the next simulation frame.
         */
        function findAndActivateFireChunks() {
            const fireChunks = new Set();
            const startX = Math.floor(camera.x);
            const startY = Math.floor(camera.y);
            const endX = startX + viewWidth;
            const endY = startY + viewHeight;

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const type = getGrid(x, y);

                    // If the pixel is any kind of fire, its chunk must be active.
                    if (BURNING_MATERIALS.has(type)) {
                        const chunkX = Math.floor(x / CHUNK_SIZE);
                        const chunkY = Math.floor(y / CHUNK_SIZE);
                        fireChunks.add(coordToKey(chunkX, chunkY));
                    }
                }
            }

            // Add all the identified chunks to the activation set for the next frame.
            // Fire belongs in the "solid" simulation pass (stepNonLiquid).
            for (const key of fireChunks) {
                nextActiveSolidChunks.add(key);
            }
        }

        /**
         * Checks if a material can be displaced by a given gas.
         * @param {number} neighborType - The material ID of the adjacent pixel.
         * @param {number} gasType - The material ID of the moving gas.
         * @returns {boolean} True if the gas can move into the neighbor's space.
         */
        function canBeDisplacedByGas(neighborType, gasType) {
            // Case 1: The space is empty.
            if (neighborType === MAT.EMPTY) return true;

            // Case 2: The neighbor is another gas.
            if (GASES.has(neighborType)) {
                // A gas can only displace another gas if it is lighter (lower density value).
                return GAS_DENSITY[gasType] < GAS_DENSITY[neighborType];
            }
            
            // Case 3: The neighbor is a liquid. Lighter gases can bubble up through liquids.
            // (We can assume all our gases are lighter than all our liquids for simplicity here)
            if (LIQUIDS.has(neighborType)) {
                return true;
            }

            // Any other material (solids, walls) is considered an unmovable barrier.
            return false;
        }

        /**
         * Scans the visible screen area for any gas pixels that are on an "active outline,"
         * meaning they are adjacent to any material they can rise into or displace.
         */
        function findAndActivateGasOutlines() {
            const outlineChunks = new Set();
            const startX = Math.floor(camera.x);
            const startY = Math.floor(camera.y);
            const endX = startX + viewWidth;
            const endY = startY + viewHeight;

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const type = getGrid(x, y);

                    // We only care about gas pixels.
                    if (GASES.has(type)) {
                        // Check all 4 direct neighbors.
                        const neighbors = [
                            getGrid(x, y - 1), // Above
                            getGrid(x, y + 1), // Below
                            getGrid(x - 1, y), // Left
                            getGrid(x + 1, y)  // Right
                        ];

                        // Use our helper to see if there's any potential for movement.
                        for (const neighborType of neighbors) {
                            if (canBeDisplacedByGas(neighborType, type)) {
                                // This gas pixel is on an active outline.
                                // Activate its chunk and stop checking its other neighbors.
                                const chunkX = Math.floor(x / CHUNK_SIZE);
                                const chunkY = Math.floor(y / CHUNK_SIZE);
                                outlineChunks.add(coordToKey(chunkX, chunkY));
                                break;
                            }
                        }
                    }
                }
            }

            // Add all the identified chunks to the activation set for the next frame.
            for (const key of outlineChunks) {
                nextActiveGasChunks.add(key);
            }
        }

        // --- START OF NEW FUNCTION ---
        /**
         * Scans the visible screen area for gas clouds and activates their chunks.
         * A gas cloud is considered "active" if it has empty space above it to rise into.
         */
        function findAndActivateGasClouds() {
            const gasChunks = new Set();
            const startX = Math.floor(camera.x);
            const startY = Math.floor(camera.y);
            const endX = startX + viewWidth;
            const endY = startY + viewHeight;

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    // Check for a gas pixel that is directly above an empty pixel.
                    // This is the "leading edge" of a gas cloud that needs to be simulated.
                    let type = getGrid(x, y);
                    if ( GASES.has(type) && getGrid(x, y + 1) !== type) {
                        const chunkX = Math.floor(x / CHUNK_SIZE);
                        const chunkY = Math.floor(y / CHUNK_SIZE);
                        gasChunks.add(coordToKey(chunkX, chunkY));
                    }
                }
            }
            for (const key of gasChunks) {
                nextActiveChunks.add(key);
            }
        }
        
        function getActivationSetForMaterial(type) {
            if (LIQUIDS.has(type)) return nextActiveLiquidChunks;
            if (GASES.has(type)) return nextActiveGasChunks;
            if (type !== MAT.EMPTY && !STATIC_MATERIALS.has(type)) return nextActiveSolidChunks;
            return null; // For static materials or empty space
        }

        // --- START OF NEW HELPER FUNCTION ---
        /**
         * Creates a complete, hollow, U-shaped RigidBody with both physics and visuals.
         * @param {object} options - Configuration object.
         * @returns {RigidBody} The created RigidBody instance.
         */
        function createRectangularBucket({ worldX, worldY, width, height, thickness, material, name }) {
            // --- Part 1: Create the Physics Body with 3 Fixtures ---
            const body = world.createDynamicBody({
                position: pl.Vec2(worldX / B2_SCALE, worldY / B2_SCALE),
            });

            const fixtureDef = {
                density: MATERIAL_DENSITY[material] || 7.8,
                friction: 0.8,
                filterCategoryBits: CATEGORY_SCALE,
                filterMaskBits: MASK_SCALE
            };

            // A. Bottom fixture
            body.createFixture(pl.Box(
                width / 2 / B2_SCALE,
                thickness / 2 / B2_SCALE,
                pl.Vec2(0, (height - thickness) / 2 / B2_SCALE) // Position at bottom
            ), fixtureDef);
            
            // B. Left wall fixture
            body.createFixture(pl.Box(
                thickness / 2 / B2_SCALE,
                height / 2 / B2_SCALE,
                pl.Vec2(-(width - thickness) / 2 / B2_SCALE, 0) // Position at left
            ), fixtureDef);

            // C. Right wall fixture
            body.createFixture(pl.Box(
                thickness / 2 / B2_SCALE,
                height / 2 / B2_SCALE,
                pl.Vec2((width - thickness) / 2 / B2_SCALE, 0) // Position at right
            ), fixtureDef);

            // --- Part 2: Create the corresponding RigidBody for Rendering ---
            const rb = new RigidBody(worldX, worldY, width, height, material, name);
            rb.isFillable = false;
            
            // Link the renderable object to our custom physics body
            world.destroyBody(rb.body);
            rb.body = body;
            body.setUserData(rb);

            // --- Part 3: Manually create the hollow pixel art ---
            rb.pixels.fill(MAT.EMPTY); // Start with a hollow interior
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    // Check if the pixel is part of the bottom, left, or right wall
                    if (y >= height - thickness || x < thickness || x >= width - thickness) {
                        rb.pixels[y * width + x] = material;
                    }
                }
            }

            // Add the completed bucket to the main simulation array
            rigidBodies.push(rb);

            return rb; // Return the full RigidBody object
        }

        /**
         * Creates a dynamic rigid body from an arbitrary array of pixel coordinates.
         * @param {object} options - Configuration for the object.
         * @param {Array<{x, y}>} options.cells - Array of pixel coordinates in set piece local space.
         * @param {number} options.material - The base MAT id for physics and color.
         * @param {number} options.worldOffsetX - The world X coordinate of the set piece's origin.
         * @param {number} options.worldOffsetY - The world Y coordinate of the set piece's origin.
         * @param {string} [options.name='Object'] - The display name for the object.
         * @param {string} [options.spriteId=null] - The ID of a sprite to bake onto the shape.
         */
        function createRigidBodyFromCells({ cells, material, worldOffsetX, worldOffsetY, name = 'Object', spriteId = null }) {
            if (!cells || cells.length === 0) return null;

            // 1. Find the bounding box of the shape.
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const cell of cells) {
                minX = Math.min(minX, cell.x);
                minY = Math.min(minY, cell.y);
                maxX = Math.max(maxX, cell.x);
                maxY = Math.max(maxY, cell.y);
            }
            const width = maxX - minX + 1;
            const height = maxY - minY + 1;

            // 2. Calculate the world center for the new RigidBody.
            const centerX = worldOffsetX + minX + width / 2;
            const centerY = worldOffsetY + minY + height / 2;

            // 3. Create the RigidBody instance with the calculated bounding box.
            const body = new RigidBody(centerX, centerY, width, height, material, name);

            // 4. Clear the default filled pixels and "paint" the actual shape.
            body.pixels.fill(MAT.EMPTY);
            for (const cell of cells) {
                const localX = cell.x - minX;
                const localY = cell.y - minY;
                const lIdx = localY * width + localX;
                body.pixels[lIdx] = material;
            }

            // 5. Bake sprite if provided.
            if (spriteId && SpriteManager.sprites.has(spriteId)) {
                const spriteImg = SpriteManager.sprites.get(spriteId);
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d');
                
                // Draw the sprite, but offset it to align with the body's bounding box.
                // The sprite is drawn relative to the set piece image's origin (0,0).
                tempCtx.drawImage(spriteImg, -minX, -minY);

                const imageData = tempCtx.getImageData(0, 0, width, height);
                body.spritePixels = imageData.data;
            }

            // 6. Finalize the body.
            body.rebuildFixtures();
            rigidBodies.push(body);
            return body;
        }

        /**

        function parseSetPieceImage(imageData) {
            console.log("--- Starting Set Piece Image Parsing (v5.2 - Generic Bodies & Joints) ---");

            const emptyColor = { r: 255, g: 255, b: 255 };
            const MARKER_COLORS = {
                // Main Interactive Areas
                inputCrucible:    { r: 200, g: 254, b: 200 },
                retort:           { r: 200, g: 253, b: 200 },
                outputCrucible:   { r: 200, g: 252, b: 200 },

                pressureSlot:     { r: 253, g: 200, b: 200 },

                // General Markers
                treasureMarker:   { r: 1, g: 1, b: 1 },
                rigidBodyMarker:  { r: 100, g: 100, b: 0 },
                // New Markers
                genericBody:      { r: 166, g: 166, b: 166 },
                revoluteJoint:    { r: 2,   g: 2,   b: 2 },
            };

            const colorToMaterialMap = new Map();
            for (const matId in COLORS) {
                const color = COLORS[matId];
                colorToMaterialMap.set(`${color[0]},${color[1]},${color[2]}`, parseInt(matId));
            }

            const { width, height, data } = imageData;
            const pixels = new Int16Array(width * height).fill(-1);
            
            const functionalAreas = {};
            const areaPoints = {};
            for (const key in MARKER_COLORS) { areaPoints[key] = []; }

            const rigidBodies = [];
            const genericRigidBodies = [];
            const visited = new Uint8Array(width * height);
            const genericBodyMarker = MARKER_COLORS.genericBody;
            const jointMarker = MARKER_COLORS.revoluteJoint;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const pixelArrayIndex = y * width + x;
                    if (visited[pixelArrayIndex]) continue;

                    const dataIndex = pixelArrayIndex * 4;
                    const r = data[dataIndex], g = data[dataIndex + 1], b = data[dataIndex + 2], a = data[dataIndex + 3];

                    if (a < 128) { pixels[pixelArrayIndex] = -1; continue; }
                    if (r === emptyColor.r && g === emptyColor.g && b === emptyColor.b) { pixels[pixelArrayIndex] = MAT.EMPTY; continue; }
                    
                    // --- NEW: Arbitrary Shape Rigid Body Parsing using BFS ---
                    if (r === genericBodyMarker.r && g === genericBodyMarker.g && b === genericBodyMarker.b) {
                        const bodyCells = [];
                        const bodyJoints = [];
                        const queue = [{x, y}];
                        visited[pixelArrayIndex] = 1;

                        while(queue.length > 0) {
                            const current = queue.shift();
                            bodyCells.push(current);
                            pixels[current.y * width + current.x] = MAT.EMPTY; // Carve out space

                            // Check 8 neighbors for more body parts or joints
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    if (dx === 0 && dy === 0) continue;
                                    const nx = current.x + dx, ny = current.y + dy;
                                    if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                        const nIdx = ny * width + nx;
                                        if (!visited[nIdx]) {
                                            const nDataIdx = nIdx * 4;
                                            const nr = data[nDataIdx], ng = data[nDataIdx+1], nb = data[nDataIdx+2];
                                            if (nr === genericBodyMarker.r && ng === genericBodyMarker.g && nb === genericBodyMarker.b) {
                                                visited[nIdx] = 1;
                                                queue.push({x: nx, y: ny});
                                            } else if (nr === jointMarker.r && ng === jointMarker.g && nb === jointMarker.b) {
                                                visited[nIdx] = 1;
                                                pixels[nIdx] = MAT.EMPTY;
                                                bodyJoints.push({x: nx, y: ny});
                                            }
                                        }
                                    }
                                }
                            }
                        }
                        if (bodyCells.length > 0) {
                            genericRigidBodies.push({ cells: bodyCells, material: MAT.SEALANT, joints: bodyJoints });
                        }
                        continue;
                    }

                    // Legacy Rigid Body Marker Logic
                    const rbMarker = MARKER_COLORS.rigidBodyMarker;
                    if (r === rbMarker.r && g === rbMarker.g && b === rbMarker.b) {
                        visited[pixelArrayIndex] = 1;
                        pixels[pixelArrayIndex] = MAT.EMPTY;
                        if (x + 1 < width) {
                            const bodyPixelIndex = (y * width + (x + 1)) * 4;
                            const bodyR = data[bodyPixelIndex], bodyG = data[bodyPixelIndex + 1], bodyB = data[bodyPixelIndex + 2];
                            const bodyColorKey = `${bodyR},${bodyG},${bodyB}`;
                            if (colorToMaterialMap.has(bodyColorKey)) {
                                const bodyMaterial = colorToMaterialMap.get(bodyColorKey);
                                let endX = x + 1;
                                while (endX < width && data[(y * width + endX) * 4] === bodyR && data[(y * width + endX) * 4 + 1] === bodyG && data[(y * width + endX) * 4 + 2] === bodyB) { endX++; }
                                let endY = y;
                                while (endY < height && data[(endY * width + x + 1) * 4] === bodyR && data[(endY * width + x + 1) * 4 + 1] === bodyG && data[(endY * width + x + 1) * 4 + 2] === bodyB) { endY++; }
                                const rbWidth = endX - (x + 1), rbHeight = endY - y;

                            }
                        }

                    }

                    // Other Functional Markers
                    let isMarker = false;
                    for (const key in MARKER_COLORS) {

                    if (isMarker) continue;

                    pixels[pixelArrayIndex] = colorToMaterialMap.has(colorKey) ? colorToMaterialMap.get(colorKey) : -1;
                }
            }

                if (points.length === 0) continue;
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

                    const maxX = Math.ceil(combinedAABB.upperBound.x * B2_SCALE);
                    const minY = Math.floor(combinedAABB.lowerBound.y * B2_SCALE - 60); // Scan 40px above
                    const maxY = Math.ceil(combinedAABB.upperBound.y * B2_SCALE);

                    //console.log("scanning");

                    for (let y = minY; y < maxY; y++) {

        function getMaterialsInArea(areaPoints) {
            const counts = new Map();
            if (!areaPoints || areaPoints.length === 0) return counts;

            // --- Step 1: Scan the static grid (original behavior) ---
            for (const point of areaPoints) {
                const type = getGrid(point.x, point.y);

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const p of areaPoints) {

            const pMax = pl.Vec2(maxX / B2_SCALE, maxY / B2_SCALE);
            const aabb = new pl.AABB(pMin, pMax);

        function removeMaterialsFromArea(areaPoints, materialsToRemove) {

                    if (spawnIndex >= shuffledEmptyPoints.length) {
                        // We've run out of empty space in the target area
                        console.warn("Ran out of space spawning materials in area.");
                        return;
                    }
                    const point = shuffledEmptyPoints[spawnIndex++];
                    setGrid(point.x, point.y, matId, true);
                }
            }
